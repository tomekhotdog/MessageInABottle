"}, {"id": 14, "sender": "Liesbet Raens", "recipient": "her husband Claes Raens", "date": "[1533] July 25", "origin": "", "destination": "London", "language": "Middle Dutch", "original_transcription": "i:  mercha nt s’  letters  (1533)\n\n1 13\n\nclosed with the signet of the writer in green wax. On the dorse: Desen brief\nsal men geven tot Loenen aen Claes Raens in haest.\n\n+ Jhesus Maria Anna\n\nVryendelijke groete gescreven aen u mijn alder liefst maen Claes Raes. Ick laet u veten,\nhoe dat ick vel te paessen ben en aellen mien huessien, aels ick hoeppen, dat ghie oeck sijt.\nEnde ick hebbe w brief oentfaenghen en wel wersstaen. Ghee scrieft mijn vaen Machiel\nDammasch hues. Wet, Claes Raes, hoe dat Jana Braeckaet die Veeven getroeut heet, soe\nduechel ick, dat sye niet vercoepen en soellen, maer schenken.\n\nBernaet, die het ock en maen ghenomen ende syen en sael daer ni[e]tb blieven voenen,\nwant sie en wel die coemcaeppen niet d[oen]b, soe moech ghi biessien. Oeft sien datc\nwercoepen werden.\n\nEnde Aendries, den daener, die ies coemmen ende cloeck ende gesoent. Ende ghie\nen scrieft niet, waet die hoeppe ghelt, want ghie Paeuleus Coernelys gheloeft haet. Ende\nDiellyes vain Goek, dye het toet roellen vech. Ende ick hebbe daet gelt oentfaenc 30s\nVlemes net, soe hebbe ick noech in roellen toet mijn huessen. Ende oef ghie vesset coeceht\ncoept tuec scoen svaert ende dat goet ies vaet ten ies ael daech niet te beten. Ende vaechet\nu vel, dat ghie niet sick en voert in maer goe die sieren. Niet mer opt desen tijt daen God\nghespaer u en mij in dochden.\n\nGescreven metter haest bij my Liesbet Raens u hoesfroeu oep sient Jaecoep dach.\n\n[a rectangle in the lower right hand corner of the letter, containing the writer’s signature, has\nbeen cut away]", "editorial_notes": "a Corrected in HL from Ien.\nthrough HL.\nb Hole in the paper HL.\nc vre follows, struck", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 14 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA, Externa Anglicana no. 1606). Possibly holograph letter. Paper. Sealed", "file": "catalogued/letter_14.md", "modern_english_translation": "Friendly greetings written to you, my dearest husband Claes Raens. I let you know that I am well since Easter, and all my little household too, as I hope you are also.\n\nI have received your letter and understood it well. You write to me about Machiel Dammasch's house. Know, Claes Raens, that Jana Braeckaet has married the Widow, so I think they will not sell but rather give it away.\n\nBernaet has also taken a husband, and he will not stay living there, because he does not want to do the buying and selling, so you may look into it. See whether they can be sold.\n\nAnd Andries, the servant, has arrived and is well and healthy. And you do not write what the hops cost, since you have promised Pauelus Coernelys. And Diellyes van Goek has carted it away. And I have received that money — 30 shillings Flemish — so I still have enough in rolls for my household. And if you find good cheap goods, buy two good black ones and make sure the goods are good, for it is not always good to buy cheaply. And take good care that you do not make yourself sick, but go and tend to yourself. Nothing more at this time than may God preserve you and me in virtue.\n\nWritten in haste by me, Liesbet Raens, your housewife, on the feast day of Saint Jacob [Note: Saint James's Day, July 25].", "summary": "Liesbet Raens writes from home to her husband Claes in London, updating him on family and household affairs since Easter. She reports on marriages that may affect a property deal he was interested in, gently reproaches him for forgetting to write hop prices as promised, and closes with a plea that he look after his health. A tender picture of a couple managing distance together.", "letter_type": "mixed", "themes": ["family", "trade", "property", "health", "textiles", "social_networks", "women_writing", "financial"], "people_mentioned": ["Liesbet Raens", "Claes Raens", "Machiel Dammasch", "Jana Braeckaet", "Bernaet", "Andries", "Pauelus Coernelys"], "goods_mentioned": ["hops", "black cloth"], "notable": true, "notable_reason": "An unusually warm and personal letter from a wife to an absent merchant husband, combining domestic detail, property negotiation, and marital affection."}, {"id": 15, "sender": "Harry Austen", "recipient": "his wife", "date": "[1533] July 24", "origin": "Antwerp", "destination": "London", "language": "Middle English", "original_transcription": "Jhesus\natt Andwarpp the 24. day off July\n\nWelbelovyd wyff, I hartely recomend unto yow, trustyng in Jhesu thatt yow be in good\nhellthe and alle your howsolld. Certeffeyng yow thatt yow shalle receive off thys bryngger\nClayse de Fryse 3 lyttle fyrkyns storgyon markyd with my marke wyche yow shalle delyver\nthe gretyst off them to master Blanke and thea second gretyst wyche ys markyd with a\nfygure of b4b. I wolld yow made a letter with all and send hyt to Coventre for therein ys\n4 rondes for your mother won and eche of your brethren, allso cwonc a pes. And the lest\nof all has 2d rondes wyche I geve unto yow to make merry with. And lett Harre goo to\nmaster Hylle for to aske lysens to take hyt upp. And lett hym show hym the letter, yff he\nwyll nott geve yow lysens, for hyt ys alle to geve awaye.\n\n\nThus Jhesu preserve yow in longe lyff to hys pleasure.\n\n[on the dorse, hidden when the letter is folded up] And whereas I have wrytton þat yow\nshalle receive the storgyon in Clayse de Fryse, yow shalle resseyve hyt in Adryan Jonson\nþe brynger here off.\n\nBy your husband\n[signed] Harre Austen", "editorial_notes": "a fat follows, struck through HL.\nc-c Interlined HL.\nHL.\nb-b Interlined above 4 (iiij), struck through\nd Two illegible words follow, struck through HL.", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 15 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in green wax. On the dorse: +;\nunto Harre Austen att þe syne of þe Blew Anker in Temstrett this be\ndelivered att London; N° F.", "file": "catalogued/letter_15.md", "modern_english_translation": "Jesus\n\nAt Antwerp, the 24th day of July\n\nWell-beloved wife, I heartily commend myself to you, trusting in Jesus that you are in good health and all your household.\n\nI am writing to let you know that you shall receive from this bearer, Claes de Frise, 3 little firkins of sturgeon marked with my mark, which you shall deliver — the greatest of them to Master Blanke, and the second greatest, which is marked with the figure b4b. I would have you write a letter with all haste and send it to Coventry, for therein are 4 rounds for your mother, one, and each of your brothers, also one apiece. And the least of all has 2 rounds which I give to you to make merry with. And let Harry go to Master Hill to ask leave to take it up. And let him show him the letter, if he will not give you leave — for it is all to give away.\n\nThus Jesus preserve you in long life to His pleasure.\n\nAnd whereas I have written that you shall receive the sturgeon from Claes de Frise, you shall receive it from Adrian Johnson, the bearer hereof.\n\nBy your husband,\nHarry Austen", "summary": "Harry Austen writes from Antwerp to his wife in London, arranging the delivery of three small firkins of sturgeon via Adrian Johnson. He carefully allocates the contents: the largest for a business associate, the middle one to be forwarded to Coventry for her family, and the smallest for her own enjoyment.", "letter_type": "personal", "themes": ["food", "family", "shipping", "gifts", "social_networks"], "people_mentioned": ["Harry Austen", "Adrian Johnson", "Master Blanke", "Master Hill", "Claes de Frise"], "goods_mentioned": ["sturgeon"], "notable": false}, {"id": 16, "sender": "John Blundell", "recipient": "John Petey, servant of Sir Thomas Baldry, alderman", "date": "1533 July 24", "origin": "", "destination": "", "language": "Middle English", "original_transcription": "In Andwerp le 24. jour de July anno 1533; n° 1\n\n+\n\nJohn Petey, I recomend me unto yowe, trustyng that my master, my lady with all the\nhowshold be yn good helthe wherof I praye God of contenewance, desyryng yowe I\nmaye be recomendyd to all my frendes and felowes not so muche butt to master Nycholl,\nprayng hym to remember my gowne for to have ytt to Wylliam Pages fuller for to dresse\nand to dey yn a pewke. Wyche done I praye yowe bydd hym to fetche yt home and bydde\nHanyngton the taylor to make yt me ayenst my comyng home and cawse hym to ruffe\nthe sleves above etc.\n\nItem at my departyng at Belyngsgate, I borowed of John Bennett 20s sterling for my\ncostes and Nycolas was ther with my bowghet and I browght hym ynto Tower Strette, were I\nshuld receive of a armorar 24s wiche was redy, butt he was owtt of the waye, werffor I prayed\nyowe to receive the same 24s of the seyd armorar – his name ys Symond Cowper – and to\ngeve hym a qwyttans yn my name and nede bee. And of that to geve to John Bennet the\n20s I borowed of hym, so that I trust ye have received ytt and geven yt hym or ells and I\nwyste the contrary, I wold apoynte hym wher he shuld receive the same 20s.\n\nItem this ys the effecte of my letter: Ye shall receive owtt Adryan Johnsons hooye of\nAntwerp halffe a storgeon for my master under his marke wiche cost clere aborde with\nall maner of charges 39s, payeng for freyght 8d.\n\nOther newes I have none to wryght, butt that here is a shreud martte and all maner\nof warns be here onresonably dere and owt of the waye. Whyt ware ys very dere. Holmes\nfusteans g p £ lf, Osborns CC £ lpf, mather lRs and better peper gsg and all other warns very\ndere and spechially all maner of mercery warns, soo that men knowe not wheryn to bestowe\nthur money. And yet they havea bowght yt very dere. And thus owr Lord kepe yowe. In hast.\n\na Corrected in HL from thave.\n\n[signed] by your John Blundell\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 15", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 16 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper. Sealed\nclosed with the signet of the writer in red wax. On the dorse: +; To John Petey\nservant with syr Thomas Baldry alderman soytt delivere in London.", "file": "catalogued/letter_16.md", "modern_english_translation": "John Petey, I commend myself to you, trusting that my master, my lady, and all the household are in good health, of which I pray God for continuance. I desire you to give my commendations to all my friends and fellows, and not least to Master Nicholl, praying him to remember my gown — to have it taken to William Page's fuller to be dressed and dyed in a puce color. Once that is done, I pray you bid him fetch it home, and bid Hanyngton the tailor to make it ready for me against my coming home, and cause him to ruff the sleeves above, etc.\n\nItem: at my departing at Billingsgate, I borrowed of John Bennett 20 shillings sterling for my costs, and Nycolas was there with my budget, and I brought him into Tower Street, where I was to receive from an armorer 24 shillings, which was ready, but he was out of the way. Wherefore I prayed you to receive the same 24 shillings from the said armorer — his name is Symond Cowper — and to give him a receipt in my name as need be. And of that, to give to John Bennett the 20 shillings I borrowed of him, so that I trust you have received it and given it to him; or else, if I were to learn the contrary, I would appoint him a place where he should receive the same 20 shillings.\n\nItem: this is the substance of my letter. You shall receive out of Adryan Johnson's hoy of Antwerp half a sturgeon for my master, under his mark, which cost clear aboard with all manner of charges 39 shillings, paying for freight 8 pence.\n\nOther news I have none to write, but that here is a difficult market and all manner of goods are here unreasonably dear and out of reach. White ware is very dear. [Note: The following appear to be commodity price quotations using abbreviated merchant notation and may be partially coded or in shorthand: \"Holmes fustians g p £ lf, Osborns CC £ lpf, mather lRs and better, pepper gsg\" — precise values are unclear.] All other goods are very dear, and especially all manner of mercery goods, so that men know not wherein to bestow their money. And yet they have bought it very dear. And thus our Lord keep you. In haste.\n\nBy your John Blundell", "summary": "John Blundell writes from Antwerp to John Petey, a servant of London alderman Sir Thomas Baldry, with a mix of personal errands and trade business. He asks for his gown to be dyed puce and tailored with ruffed sleeves, arranges debt repayment via an armorer, and ships half a sturgeon. He reports all goods unreasonably dear, especially mercery goods.", "letter_type": "mixed", "themes": ["trade", "financial", "debt", "textiles", "crafts", "food", "employment", "social_networks"], "people_mentioned": ["John Blundell", "John Petey", "Sir Thomas Baldry", "Hanyngton", "John Bennett", "Symond Cowper", "Adrian Johnson"], "goods_mentioned": ["gown", "sturgeon", "mercery goods"], "notable": false}, {"id": 17, "sender": "Katline Tsaseleren", "recipient": "her son Marten Tsaseleren", "date": "1533 May 22", "origin": "", "destination": "", "language": "Middle Dutch", "original_transcription": "Jhesus Maria Anna\n\nSij u ghescreven vor een zaleghe groete aen u mijnn alder liefste zone. U belieft te weten,\nhoe dat ic groet verlanghen heb, om te weten, hoe dat mit u ende uwer huysffrouwe zijn\nmach, want ic en langhen van u niet vernomen en heb. Ende belyeft u te weten van mij,\nic ben in redeliken poente na mijnen ouden staet. Mijn beminde zoen, ic soude u so zeer\ngheren noch eens seen vor mijn doot, wart moeghelyck.\n\nU brueder Peter, die ghebiet hem zeer met zijnder huysfrouwe toet u. Ende hij woent\nnou ter Woeren in den moelen. God gheef der hem spoet mede. Ende Marie u suster, die\nen es noch anieta ghehout. Ic woude, dat sij enen goeden man hadde. Dat kint God, die u,\nmijn alder liefte zoen, bewaren en ghesparen wyl toet enen zaleghen ende.\n\nGhescrevenb op den Assencioens dach anno 1533 bij mij\n\nu goet wylleghe moeder\n[signed] Katline Tsaseleren\n\nLaet mij weten, oft ghij desen brief ontfanghen hebt.", "editorial_notes": "a-a Interlined HL.\nb den follows, struck through HL.", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 17 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA, Externa Anglicana no. 1606). Paper. Sealed closed with the signet\nof the writer in red wax (paper seal). On the dorse: Desen brief sal men\nbestellen aen Marten Tsaseleren mynen lieven ende zere bemynden zoen.", "file": "catalogued/letter_17.md", "modern_english_translation": "Jesus, Mary, Anna\n\nLet this be written to you as a blessed greeting, to you my dearest son. Be pleased to know how greatly I long to hear how things may be with you and your wife, for I have heard nothing from you in a long while. And be pleased to know of me: I am in reasonably good health, after my old condition [Note: meaning she is managing as well as can be expected given her age or prior illness]. My beloved son, I would so very gladly see you once more before my death, if it were possible.\n\nYour brother Peter sends you his warm greetings along with his wife. He now lives at Woeren at the mill. God grant him success there. And Marie, your sister, is not yet married. I wish that she had a good man. May God, who preserves and keeps you, my dearest son, bring you to a blessed end.\n\nWritten on Ascension Day [Note: the fortieth day after Easter, a moveable feast], in the year 1533, by me,\n\nyour devoted mother,\nKatline Tsaseleren\n\nLet me know whether you have received this letter.", "summary": "An elderly Flemish mother, Katline Tsaseleren, writes a heartfelt letter to her son Marten, expressing her longing to see him once more before she dies. She shares modest news of the family — a brother at a mill in Woeren, a sister still unmarried — and closes with a prayer for her son's soul. Written on Ascension Day, the letter is remarkable for its emotional directness.", "letter_type": "personal", "themes": ["family", "health", "religion", "women_writing", "social_networks"], "people_mentioned": ["Katline Tsaseleren", "Marten Tsaseleren", "Peter", "Marie"], "goods_mentioned": [], "notable": true, "notable_reason": "A deeply moving letter from an elderly mother to her absent son, offering a rare and intimate glimpse into family emotion and the fear of death in the sixteenth century."}, {"id": 18, "sender": "Unnamed writer", "recipient": "Wyllem van Tonghen", "date": "1533 July 24", "origin": "Antwerp", "destination": "London", "language": "Middle Dutch", "original_transcription": "Laus Deo\nAntvers tho 24. Jully anno 1533\n\nper Adrian Janson N° 32\n\nWet Wyllem, dat wij wel tepasse sin alls ic hoepe by Dey gracia goed, dat ock met u ys.\nWet, dat ghij ontfange sole ut Adrian Janson scepper van Antwerpen 2 corfferkin\ncontinentes 11 hout 2s 2 [gr.]; noch een hocsoet continente 8 dosin ende 4 lb. scefne garen\nende 4 dosin [lb.] garen dolees rondt van coulleurs coechst 7s 6d doussin; noch in desen\nselve sack den selve tonne, dat te incamena 11 houtte van Dornich tot 1s stuck, dat ys 12s\ndosin; noch 3 stuck gheheten sayen croiset tot 20s Vle[m]s stuc. Sij si lang 14½ gierde af\ndreen intrent; 1 carpet van sae draet tot 22s Vle[m]s; 6 dousin figuren 25s 6d; 4 grosse\ncoroy tot 3s 6d; 4 dosin large ap 19s; Noch 1 fardelle mer besaen continente 22 dossin lert\n\n\ntot 6s; 12 dossin tot 5s 6d, 15 dosin tot 4s; noch een paken 6 tapijte sarpelier; noch 43 dosin\ntapitte tot 22s 8d; 23 dobles Yperlin tot 16s 6d dosin.\nb12s 6 s 5s 1s\n⊕ O Cc 1s\nende soe alavenateb\nNoch 12 dosin lints Brussel tot 15s 2d\n6 dosin tot 13s 6d dosin\nNoch dry stucd kippe, 1 stuck 30s,\n1 stuc 28s, 1 stuc 26s. De marck ys [merchant’s mark is lacking]\nNoch een pack van Valechy haelf ossen stuc 37ti\n5 stuck tot 21s 8d\n3 stuck tot 20s 8d\n7 stuck tot 19s 8d\n6 stuck tot 18s 8d\ne5e stuck tot 17s 8d\n3 stuck tot 16s 8d\n2 stuck tot 15s 8d\n1 stuck tot 15s\n1 stuck tot 14s\n2 stuckf 13s 8d\n2 say stuck 12s 8d\nNoch sal ghij hebben in desem 1 corve met drij hubeken crest, 9 steres, 15 hade, 8 usin\ndoer soe crest deon.\n\na 1 tappit serigel follows, struck through HL.\nc 3 follows, struck through HL.\nHL.\nlined above 6, struck through HL.\n\nb-b Entered in the left margin\ne Inter-", "editorial_notes": "d ki[ppe] follows, expunged HL.\nf 18 follows, struck through HL.\n1)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 18 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper. Sealed\nclosed with the signet of the writer in red wax. On the dorse: Aen Wyllem\nvan Tonghen op Sommerstran detur littere a Londres; [merchant’s\nmark no. 1 follows]; (in the lower left corner of the letter as it was folded\nup) Adrian Janson.", "file": "catalogued/letter_18.md", "modern_english_translation": "Praise be to God.\nAntwerp, 24 July, in the year 1533.\n\nVia Adrian Janson, No. 32.\n\nKnow, Willem, that we are well and in good health, as I hope by the grace of God, and that the same is true for you.\n\nKnow that you shall receive from Adrian Janson, shipper from Antwerp, 2 small baskets containing 11 pieces of wood at 2 shillings 2 groats; also one hogshead containing 8 dozen and 4 pounds of fine yarn, and 4 dozen pounds of smooth round coloured yarn, purchased at 7 shillings 6 pence per dozen; also in this same sack, the same barrel, to be entered — 11 pieces of Tournai at 1 shilling per piece, that is 12 shillings per dozen; also 3 pieces called crossed says [Note: a type of lightweight twill-woven woollen cloth with a cross pattern] at 20 shillings Flemish per piece. They are approximately 14½ yards long or thereabouts; 1 carpet of silk thread at 22 shillings Flemish; 6 dozen figures at 25 shillings 6 pence; 4 gross of cord at 3 shillings 6 pence; 4 dozen large pieces at 19 shillings; also 1 further bale containing 22 dozen leather at 6 shillings; 12 dozen at 5 shillings 6 pence; 15 dozen at 4 shillings; also a pack of 6 tapestries in burlap wrapping; also 43 dozen tapestry pieces at 22 shillings 8 pence; 23 dozen Ypres doubles [Note: a double-width cloth from Ypres, a major Flemish textile city] at 16 shillings 6 pence per dozen.\n\nAlso 12 dozen Brussels ribbons at 15 shillings 2 pence; 6 dozen at 13 shillings 6 pence per dozen.\n\nAlso three pieces of kersey: 1 piece at 30 shillings, 1 piece at 28 shillings, 1 piece at 26 shillings. The merchant's mark is lacking.\n\nAlso one pack from Valenciennes, half ox-pieces: 37 pieces; 5 pieces at 21 shillings 8 pence; 3 pieces at 20 shillings 8 pence; 7 pieces at 19 shillings 8 pence; 6 pieces at 18 shillings 8 pence; 5 pieces at 17 shillings 8 pence; 3 pieces at 16 shillings 8 pence; 2 pieces at 15 shillings 8 pence; 1 piece at 15 shillings; 1 piece at 14 shillings; 2 pieces at 13 shillings 8 pence; 2 say-pieces at 12 shillings 8 pence.\n\nAlso you shall have in this same shipment 1 basket with three small crested jugs, 9 ewers, 15 hats, 8 items passed through, so that the crested pieces may be kept accordingly.", "summary": "An unnamed Antwerp merchant sends a detailed cargo manifest to Wyllem van Tonghen in London, documenting a diverse shipment via Adrian Janson. The list spans luxury and everyday goods — fine yarns, Tournai textiles, tapestries, Brussels ribbons, silk thread carpets, kerseys, decorated ceramics, and hats — an unusually rich record of the range of commodities flowing between Antwerp and London.", "letter_type": "business", "themes": ["trade", "textiles", "shipping", "crafts"], "people_mentioned": ["Wyllem van Tonghen", "Adrian Janson"], "goods_mentioned": ["yarn", "Tournai textiles", "says", "silk thread carpet", "cord", "leather", "tapestries", "Ypres doubles", "Brussels ribbons", "kerseys", "Valenciennes half ox-pieces", "crested jugs", "ewers", "hats", "wood"], "notable": false}, {"id": 19, "sender": "Dietrich Hoerner", "recipient": "Heinrich Schelt, Hanseatic merchant in the Steelyard", "date": "1533 July 17", "origin": "Cologne", "destination": "London", "language": "Low German", "original_transcription": "i:  mercha nt s’  letters  (1533)\n\n1 17\n\nSealed closed with the signet of the writer in green wax. On the dorse: Dem\nersamen Heynrych Schelt zo Londen in Engelant up dem Stayll Hoff\nto geven [merchant’s mark no. 1 follows]. In another hand, upside down:\nDusser breff hefft Hynrik Cron upbraken, ßo he sede.\n\n+ Jhesus Maria anno 1533 ad 17. July in Coln +\n\nSaluttem in Domino myt vermoygen. Wyss, Heynrych goyde frunt, dat ich dye ad 14.\ndieto eyn bryff geschryben hayb und ways gans verdrossen, dat du myr dyn rechenyng\nnytt schyckttes. Und so synt myr up datum 2 bryff van dyr geschryffen worden datum\n20. Juny und primo July. Und so d schryffs, dat du ethich kronen van Arnt Byrckman\nintf[angen] hayst, und dy sall ich im betallen mytt kronen und im wyderum so fyll doyn.\nDem sall so geschyen, wylt Gott. Arnt und Johan van Gangell sall ich dy £30 sterling zo\ndang betallen und besyen, off ich mytt invorderen mocht all yr gelt, van in zo haven, dat\nsy dess jayrs int lant untf[angen] in des, dat sy sycher synt, yr wessell gelt zo bezallen etc.\nFort so du schryffs, dat ich dyr noch umtrynt 20. Mayssen [20 May] goltz solt senden,\nund du hayffs noch sylffers genoych, hyr yss nytt eyn mass um gelt zo bekomen. Dy\ngoltsleger wyllen der nytt myr maychen. Ich hayn der bestalt zo maychen tegen Remyge\n[1 Oct.] 25. Vur der zytt sall ich nytt wall wat zo wegen brengen. Dy merzer synt gemaycht,\nlygen bey myr haym, dar nytt bey zo pagcken. So layss ich sy lygen, byss war darbey zo\npacken kompt.\n\nFortt, so du schryffs, du wolt myr 3 blauwen koppen mytt smallen lysten, so balt der\nupkomen. Ich bedarff der blaewen nyt, ytt sy dan dat sy sat von der farffen synt und nyt\nstryffych, ouch nytt der wysser hoyr in hant, dan sy moyssen blau syn van bla zo blyffen etc.\nIch hayn nu geltz genoch bekomen up wessell up Antwerppen zo bezallen, Gott loff,\nso dyr Otto wol schryffen sall, und versyn mych, wyrtt dyr nytt myn dan £400 sterling\noffer Maychen tegen Bartholmeye [24 Aug.]. So wylt doch flys an kyren um goytt gemeyn\nwyssen, darvur zo koppen, und eyn pack goyder roden und 2 fyn rossett van goyder farben\nund dat mytt den yrsten, dat moychlychen yss. Und so balt du dyn gelt bestaytt hayst,\nso wolt offer komen. Ich wolt woll, dat du in der myssen wyrs, so ytt moychlychen wyr.\nSo nyt, so moyss ich mych beheppen, wy ich be kan. Wylt Gott, dan so balt du dat gelt\nbestaytt hayst, so kom offer per awysso.\n\nSo du schryffs, dyn rechenÿnck nytt offer gesant hayst, um dat ich dyr nytt geschryffen\nhayff, war dar golt kost, so hayst du dat nytt zo boych konnen stellen, so besuÿch dyn\nvurbryff, wan ych dyr golt off sylffer gesant hayn, wyes du wayll fynden, wat ytt gekost\nhaytt und wyr des nytt, so suls du gedayn hayn, als du byssher gedayn hayst und stellen\nzo boch, wat darvan komen yss. Wan wir tzamen quemen, solt sych wayll fonden hayn,\nwat wayssdoms darvan komen. Wyr hayn ich dyr den waysdom darvan zo gesaycht, dat\nwyll dyr ouch holden, wy byllych ytt yss. Darum nytt gesaycht, dat ich nytt wyssen sall,\nwat respondyrtt, dan dat du mych gantz mytt dyner reckenyck. Darum haystu ungelych\nin wyll, dat ytz layssen berestes.\n\nIch hayn eyn bryff intf[angen] datum 6. July. Darin besynt ich dyn reckenyck in dat\nkortt somarie geslotten, wan myr dy reckenÿnck in percellen wyrtt, wy sych behoertt, und\nich dy parzelen tegen de mynen recht befynden, wy sych behoertt. Asdan wyll ich dych\nquÿtteren, wy byllych, und mynem zosagen fortt naekomen. Ich wyll affer ungepant van\ndyr syn per awysso, myt dem zyn wylt layssen berestes.\n\n\nFortt so hayn ich dyssen daych eyn groyss flach pack geladen up Antwerppen. Gott\n\nder Her layss ytt dyr mytt leve werden etc. Hyrmytt byss Gott dem Hern befolhen etc.\n\n[signed] Derych Hoernner\n\n1) (on the dorse)", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 19 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.", "file": "catalogued/letter_19.md", "modern_english_translation": "Jesus Maria, in the year 1533, on the 17th of July, in Cologne.\n\nGreetings in the Lord, with all goodwill. Know this, Heinrich, good friend, that I wrote you a letter on the 14th of this month and am greatly vexed that you have not sent me your account. And since that date, two letters written by you have reached me, dated the 20th of June and the 1st of July. You write that you have received some crowns from Arnt Byrckman, and I shall repay him in crowns and render him the same in return. That shall be done, God willing. To Arnt and Johan van Gangell I shall duly pay the £30 sterling and shall see whether I might recover all their money from them — that which they have received in the country this year — so that they are secure in paying their exchange money, etc.\n\nFurthermore, you write that I should still send you around 20 Mayssen [Note: a measure of gold, likely Maas weight] of gold, and that you still have enough silver. Here it is not possible to obtain even one measure for money. The goldsmiths will not make any more of them. I have commissioned them to make 25 by Remige [Note: the feast of St. Remigius, 1 October]. Before that time I shall not easily be able to bring anything to pass. The merzers are made and lying here at home, with nothing to pack alongside them. So I shall leave them lying until something comes along to pack with them.\n\nFurthermore, you write that you would like to send me 3 blue caps with narrow borders, as soon as any arrive. I do not need the blue ones, unless they are fully saturated in colour and not streaky, and also not with white hairs showing, for they must be blue and remain blue, etc.\n\nI have now obtained enough money by exchange to pay in Antwerp, praise God — as Otto will write to you — and I expect there will be no less than £400 sterling available to you before Bartholomew [Note: the feast of St. Bartholomew, 24 August]. So do take pains to buy good common woad with it, and one pack of good red and 2 fine russets of good colour, and this at the earliest opportunity possible. And as soon as you have laid out your money, come over. I would be glad if you were here for the fair, if that were possible. If not, then I must manage as best I can. God willing, as soon as you have laid out the money, come over per avviso [Note: by the next post or advice boat].\n\nYou write that you have not sent your account across because I did not write to you what the gold cost, and therefore you could not enter it in the book. Look back at your previous letters — when I sent you gold or silver you will easily find what it cost. And if not, you should have done as you have done hitherto and entered in the book whatever came of it. When we meet, it would soon be found what profit came of it. Wherever I told you the profit from it, I shall also hold to that, as is right. Not said because I should not know what is answered, but because you have left me entirely without your account. Therefore you are in the wrong, in my view, to let it rest as it is now.\n\nI have received a letter dated the 6th of July. Within it I find your account summarised in brief. When the account comes to me itemised in detail, as it ought to be, and I find the items against mine to be correct, as they ought to be, then I will discharge you, as is right, and proceed to fulfil my promise. I wish however to be free of any bond with you per avviso — with that let the rest stand as it is.\n\nFurthermore, this day I have loaded a large flat pack onto a ship bound for Antwerp. May the Lord God let it reach you in good condition, etc. With that, be commended to God the Lord, etc.\n\nDerych Hoernner", "summary": "Dietrich Hoerner writes from Cologne to Heinrich Schelt, a Hanseatic merchant at the London Steelyard, expressing frustration that Heinrich has failed to send proper accounts. The letter details complex financial arrangements including crown repayments, currency exchange in Antwerp, and instructions to purchase woad, red cloth, and russets. Hoerner scolds Heinrich directly — 'you are in the wrong.'", "letter_type": "business", "themes": ["trade", "financial", "debt", "textiles"], "people_mentioned": ["Dietrich Hoerner", "Heinrich Schelt", "Arnt Byrckman", "van Gangell"], "goods_mentioned": ["woad", "red cloth", "russets", "gold measures"], "notable": false}, {"id": 20, "sender": "James Bolney, mercer,", "recipient": "his servant William Hobson", "date": "1533 July 25", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+\nAt Andwerp, le 25. jour de Julii anno 1533\n\nYe shall receive of the brynger herof Audryen Janson of Andworpa a barrell under thys\nmarc [merchant’s mark no. 1 in the left margin] with half a sturgon therein pakyd containing\n14 rondes and the half jolle, which ys for my neyghbour Laurens and for me equally to be\ndevydyd, that ys to wytt 7 rondes apez. And the jolle to be sold to mistress Joones in case\nshe wyll have yt. She spake unto me to bye a jolle, as I remember. As so far as she wylle\nhave yt for the pris, we shalle agre welle. I nowghe further ye shall understond I sent by\nUmffre Lewssys servaunt 5 ferkyns elles and ½ of seames for to be delyvered unto my\nwyffe for a shett. The other, which was myche better, ys sold, as I understond by master\nWylson servaunt, wherefore she myst be contentyd with yt. As so far as the tyme can not\nbe prolongyd, there was none other to be gotten, how be yt I have bespoken another which\nI trust shalle be redy tyme I nowghe. Wherefore I wold my wyffe showld not be to hasty\nin ocupying of yt, for I have respyt betwene thys and the next marte whether I wyll have\nyt or not. In case I have yt, I must pay 12 gr. for a nelle whiche ys to myche. Therefore let\nmy wyff kepe yt tell she hyre further.\n\nMoreover, I pray yow shew unto mistress Jarvys I sent her 2 half bundles onward for 2\nshertes by William, Robert Stokfysh sone in law, at the watter syde by Byllynggate whiche\nbrowght yow a letter as trustying she hathb received yt or thys tyme. Yt twas all that I cowld\ngett: they were never soo gesson in Andworp as knowith God.\n\n6  James Bolney, mercer, admitted 1521.\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 19\n\nWryten in hast ut supra\n\n[signed] By me Jamys Bolney\n\nFurthermore ye shalle understond I have sent you 2 letters before overland which I\ntrust be cum unto your handes longe er thys tyme. And accordyng to the tenour of them,\nI wyll ye doo the best ye can and dyspache and com over with the fyrst shyp that comes\nyt thys chargable comyng overland. I intend not to tarry fore long after your commynge\nover for dyverse causys wherefore I wyll ye make said etc.\n\nCopynger the fysshmonger has the other half in the sayd ship.", "editorial_notes": "a One illegible letter follows, struck through HL.\nb it follows, struck through HL.\n1)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 20 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper. Sealed\nclosed with the signet of the writer in red wax. On the dorse: To William\nHobson servaunt with Jamys Bolney6 inne in Sent Laurens Lane this\nletter be delyvered in London.", "file": "catalogued/letter_20.md", "modern_english_translation": "You shall receive from the bearer of this letter, Audrien Janson of Antwerp, a barrel under this mark containing half a sturgeon, packed with 14 rounds and the half jowl, which is to be divided equally between my neighbour Laurens and myself — that is to say, 7 rounds apiece. And the jowl is to be sold to Mistress Jones, in case she will have it. She spoke to me about buying a jowl, as I recall. As long as she will have it at the price, we shall agree well. Furthermore, you shall understand that I sent by Humphrey Lewis's servant 5 firkins of ells and a half of seams, to be delivered to my wife for a sheet. The other, which was much better, is sold, as I understand from Master Wilson's servant, wherefore she must be content with it. Since the time cannot be extended, there was no other to be had — however, I have ordered another which I trust shall be ready by the time you receive this. Therefore I would not have my wife be too hasty in making use of it, for I have a period of consideration between now and the next fair as to whether I will have it or not. In case I do take it, I must pay 12 groats per ell, which is too much. Therefore let my wife keep it until she hears further.\n\nMoreover, I pray you show Mistress Jarvis that I sent her 2 half-bundles of cloth for 2 shirts by William, Robert Stockfish's son-in-law, at the waterside at Billingsgate, who brought you a letter — trusting she has received it before now. It was all that I could get: they were never so scarce in Antwerp, as God knows.\n\nWritten in haste as above.\n\nBy me, James Bolney\n\nFurthermore, you shall understand that I have sent you 2 letters before by overland post, which I trust have come into your hands long before now. And in accordance with the tenor of them, I will that you do the best you can and dispatch yourself and come over on the first ship that comes — it being too costly to come overland. I do not intend to delay long after your coming over, for various reasons, wherefore I will that you make haste, etc.\n\nCopinger the fishmonger has the other half in the said ship.", "summary": "James Bolney, a mercer writing from Antwerp, instructs his servant William Hobson on the distribution of a sturgeon, with careful instructions on how to divide and sell it. He also relays news about cloth for shirts and a linen purchase for his wife, apologising that a better sheet was sold before he could secure it.", "letter_type": "mixed", "themes": ["trade", "food", "textiles", "family", "shipping", "social_networks"], "people_mentioned": ["James Bolney", "William Hobson", "Adrian Johnson", "Laurens", "Mistress Jones", "Humphrey Lewis", "Mistress Jarvis", "Robert Stockfish"], "goods_mentioned": ["sturgeon", "cloth", "shirts", "ells", "seams"], "notable": true, "notable_reason": "The meticulous instructions for dividing a single sturgeon between neighbours humanise the merchant world in an unusually domestic and personal way."}, {"id": 21, "sender": "John Dene", "recipient": "his brother Richard, servant of Richard Wilson, mercer", "date": "1533 July 23", "origin": "", "destination": "", "language": "Middle English", "original_transcription": "Att Andwarp the 23. day July 1533\n\nBrother Rycard, I harttely recommend me untto yow, trustyng to Jhesus thatt my mystress\nwith all the howsseold be in good helthe, the wyche I beseke Jhesus long to conttynu too\nhys plessure etc. Sertyffyyng yow thatt my master has received yowar lettar by master John\nGresham dattyd the 19. day off thys monythe. And whereas yow wrytt unto my master off\nmaster Bolyngar’s clothes and yff thatt a cum to Lundon ageyne beffore my master cum\nhome, yow must by them off hym off sum resonabulle prysse for £25 10s or as yow se they\nbe worthe off goodnes. And geve hym £10 or £12 apon them tyll my master cummyng\nhome and then a schall have the rest. And yff ther cum anny worc[tedys] to the halle thatt\nbe good and off enny ressonabulle prysse, yow must prove and ye can gette them partt for\nmony and tyme. Alsso conssarnyng the Sentte Mas worstedys, yow must abatte no mony\noff the prysse thatt ys sett on them. And as for the fostyans thatt yow wrytt, for my master\ncan by none to serve hym off thatt prysses. Holmys be worth £25 and Orburnys off the\ngrape £22 10s and bostyans 21s 6d genys. I can here off none butt the pryse ysa namyd 16s\nthere ysb no manar off ware here to by thatt can be sold att home to make 26s the £ off.\n\n\nRycard, and yff thatt master Lynche cum for anny mony, yow must pay hym none before\n\nmy master cummys home. As knoythe Jhesus who have yow in hys kepyng.\n\nBy yowar felow\n[signed] John Dene\n\nRycard, my master has bowtt 5 balys bevarnell off the grape, the wyche cost £22. You\nmust sell them for £17 13s 4d or bettar and ye can, for here be none to gett and scho yow\nmust schow hym thatt byys them. Yow must nott be knowne butt off 2 or 3 balys they be\npackyd in canvas bycawsse theyc schold nott be knowne whatt they ar. Yow schalle receive\nthem by the grasse of God in a hey of Andwarp off Adryan Johnssons undar thys marke\n[merchant’s mark N° 1 entered in the margin].\n\nRycard, rather then feyle feethen for £17 10s a bale. Alsso my master has bowtt 20 peces\nbastyans. Yow must sel themd for 17s to be delyvard att the cummyng home of the schypys\nor else before. And yff thatt there cum anny schyp awey befor thenn, Ricard, yow must\nsel them awey, for they wyl be bettar chepe schorrtly. Butt yow may schow the fostyan\nscheras ther be none to gett.\n\n[dorse] Yow schall receive in thys schyp butt 4 off them, butt ye must make the bargen\nto delyvar the 1 bale off thatt prysse as ye sell the 4 balys rather then feyle, sel them for\n£17, for they wylle fawle.", "editorial_notes": "a nany follows, struck through HL.\nnott follows, struck through HL.\nb nomar follows, struck through HL.\nd hym follows, struck through HL.\nc scho\n1)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 21 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax. On the dorse: To\nRycard lyver servantt unto Rycard Wylsson mercer thys be delivered\natt London in Soper Lane.", "file": "catalogued/letter_21.md", "modern_english_translation": "At Antwerp, the 23rd day of July 1533\n\nBrother Richard, I heartily commend myself to you, trusting in Jesus that my mistress with all the household are in good health, which I beseech Jesus long to continue to His pleasure, etc. Certifying you that my master has received your letter by master John Gresham, dated the 19th day of this month. And whereas you write to my master of master Bolinger's cloths, and if he comes to London again before my master comes home, you must buy them from him at some reasonable price for £25 10s, or as you see they are worth in quality. And give him £10 or £12 upon them until my master's coming home, and then he shall have the rest. And if there come any worsteds to the hall that are good and of any reasonable price, you must try if you can get them part for money and part on time. Also concerning the Saint Martin's worsteds, you must abate no money from the price that is set on them. And as for the fustians that you write of, my master can buy none to serve him at that price. Holms are worth £25 and Osborns of the grain £22 10s and fustians 21s 6d each. I can hear of none but the price named 16s — there is no kind of goods here to buy that can be sold at home to yield a profit of 26s in the pound.\n\nRichard, and if master Lynch comes for any money, you must pay him none before my master comes home. As knows Jesus, who have you in His keeping.\n\nBy your fellow,\nJohn Dene\n\nRichard, my master has bought 5 bales of Bavernell of the grain, which cost £22. You must sell them for £17 13s 4d or better if you can, for here there are none to be had, and so you must show him that buys them. You must not let it be known but that 2 or 3 bales are packed in canvas, so that it should not be known what they are. You shall receive them by the grace of God in a hoy from Antwerp from Adrian Johnson's under this mark.\n\nRichard, rather than fail, settle for £17 10s a bale. Also my master has bought 20 pieces of fustians. You must sell them for 17s, to be delivered at the coming home of the ships, or else before. And if any ship departs before then, Richard, you must sell them off, for they will be cheaper shortly. But you may tell the fustian shearers there are none to be had.\n\nYou shall receive in this ship but 4 of them, but you must make the bargain to deliver the 1 bale at that price as you sell the 4 bales — rather than fail, sell them for £17, for they will fall in price.", "summary": "John Dene writes from Antwerp to his brother Richard, relaying detailed trading instructions from their master. The letter covers cloth purchases, credit terms, and price negotiations on worsteds and fustians, with a confidential postscript to sell five bales of Bavernell cloth quietly before the price falls further.", "letter_type": "business", "themes": ["trade", "textiles", "financial", "debt"], "people_mentioned": ["John Dene", "Richard Dene", "Richard Wilson", "Bolinger", "Master Lynch"], "goods_mentioned": ["cloth", "worsteds", "fustians", "Bavernell cloth"], "notable": true, "notable_reason": "The confidential postscript — buy cheap and sell quietly before prices drop — gives a rare unguarded look at insider trading practices among Tudor cloth merchants."}, {"id": 22, "sender": "Robert Hobbes", "recipient": "his master Robert Dene, grocer", "date": "1533 July 23", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+ 1533 le 23 jour de July at Andwarp\n\nWurshipfull syr, my dewty consedryd, I lowly recommend me unto yow, lettyng yow\nto understand thatt yow shall receive by the grace of God in good safte in Adrean Johnson\nhopis 9 sakes, ponderantes 574, 750, 538, 464, 604, 500, 524, 516, 500 at 6s 9d the C, gum\nepoporeak by lb. at 5s, nygillo Romany 8 lb. at 6d, sangloys 14 lb. at 12d, lapis totte by\nlb. at 18d, armedactulus 6 lb. at 14d, seny 24¼ lb. at 18d in the seny, 1 lb. turbyt at 8s and\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 21\n\nthe armedactulus settoalle 3 lb. at 9s 6d the lb. All thesse small parsselles be losse in the\nschipp. Bolt canvas 12 rolles, 1 halff barelle of crosbow thred. The be markyd with a crosse\nas knowth Jhesu who ever presserve yow amen.\n\nBy your sarvan\n[signed] Robert Hobbes", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 22 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper. Sealed\nclosed with the signet of the writer in red wax. On the dorse: +; To Robert\nDean grocer this by delyveryd at London.", "file": "catalogued/letter_22.md", "modern_english_translation": "Worshipful sir, my duty considered, I humbly commend myself unto you, letting you know that you shall receive, by the grace of God, in good safety in Adrian Johnson's keeping: 9 sacks weighing 574, 750, 538, 464, 604, 500, 524, 516, 500, at 6 shillings 9 pence the hundredweight; gum [Note: \"gum epoporeak\" — likely gum opopanax or a similar medicinal resin, spelling uncertain] by the pound at 5 shillings; nigella romana 8 pounds at 6 pence; [Note: \"sangloys\" — unidentified commodity, possibly a spice or dyestuff] 14 pounds at 12 pence; lapis [Note: \"lapis totte\" — unidentified stone or mineral compound] by the pound at 18 pence; [Note: \"armedactulus\" — unidentified commodity, possibly a medicinal or aromatic substance] 6 pounds at 14 pence; senna 24¼ pounds at 18 pence in the senna; 1 pound of turbith at 8 shillings; and the armedactulus settoalle 3 pounds at 9 shillings 6 pence the pound. All these small parcels are loose in the ship. Bolt canvas 12 rolls, 1 half barrel of crossbow thread. These are marked with a cross, as God knows, who ever preserve you. Amen.\n\nBy your servant,\nRobert Hobbes", "summary": "Robert Hobbes writes to his master Robert Dene, a London grocer, providing a cargo manifest of goods shipped via Adrian Johnson from Antwerp. The shipment includes exotic pharmaceutical and medicinal commodities — gum opopanax, senna, turbith, and several unidentified substances — alongside canvas and crossbow thread.", "letter_type": "business", "themes": ["trade", "shipping", "spices", "health", "crafts"], "people_mentioned": ["Robert Hobbes", "Robert Dene", "Adrian Johnson"], "goods_mentioned": ["gum opopanax", "nigella romana", "senna", "turbith", "canvas", "crossbow thread"], "notable": true, "notable_reason": "The cargo includes several obscure and unidentified medicinal substances, making it a rare primary source for the history of the pharmaceutical trade in Tudor England."}, {"id": 23, "sender": "Blase Saunders", "recipient": "Christopher Salway, apprentice to William Butler, [mercer]", "date": "1533 July 21", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+ 1533 +\nIn Anwerpe the 21. day of Julye\n\nBrother Chrystofer, I hertelye recommende me unto yow etc., sertefyeng you that at\nthe makyn hereof my master and I were in goode helthe, God be thankyd. Also yow shall\nreceve by Adryan Jonsun of Anwerpe 5 lytle tonekeys – 2 with sturgyn, 2 with olyves and\ncapers and another with socate – which were shyppyd at Anwerpe the day above sayd and\nmarkyd wyth tys [merchant’s mark N° 1 follows] my master’s marke.\n\nAllso I have resevyd my pake and Rycard Ponters bogets of Martyne Allbroke. Allso\nI have sente bye master Prat groser a lettera and a dosyn loutynge strynges whichb truste\nyow have delyverydc. Also I pray yow sende me worde how he dothe lyke themd. Also at\nthe makyng hereof my master cannot tell where Ie shal be, for he, which I showlde have\nbene with, hathe bereyd hys wyfe and ys in howse with hys sone. Therefore he wylle not\nhave me with hym and thus fare yow well. In haste by yowr\n\n[signed] Blase Saunders\n\na w[hich] follows, struck through HL.\nfollows, struck through HL.\nHL.\n\ne shube follows, struck through HL.\n\nc and\nb try follows, struck through HL.\nd and yf he welle have onyones follows, expunged\n\n1)\n\n7  William Butler, mercer, admitted 1512.", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 23 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax (paper seal). On the\ndorse: To Crystofer Sallway prentys with master Wylliam Butler7 thys\nbe deliveryd in Collman strete in London.", "file": "catalogued/letter_23.md", "modern_english_translation": "Brother Christopher, I heartily commend myself to you, etc., letting you know that at the writing of this my master and I were in good health, God be thanked. Also you shall receive by Adrian Johnson of Antwerp 5 little casks — 2 with sturgeon, 2 with olives and capers, and another with succade — which were shipped at Antwerp on the day noted above and marked with this my master's mark.\n\nAlso I have received my pack and Richard Ponter's budgets from Martin Allbrook. Also I have sent by Master Prat, grocer, a letter and a dozen lute strings, which I trust you have received. Also I pray you send me word of how he likes them. Also at the writing of this my master cannot tell where I shall be, for he with whom I should have stayed has buried his wife and is living in his son's house. Therefore he will not have me with him, and so farewell. In haste, by your\n\nBlase Saunders", "summary": "Blase Saunders writes from Antwerp to Christopher Salway, reporting the dispatch of food goods and enquiring about lute strings he had previously sent. A personal note reveals that the man with whom Saunders had arranged lodging has recently been bereaved and can no longer host him, leaving Saunders without accommodation.", "letter_type": "mixed", "themes": ["trade", "food", "shipping", "social_networks", "gifts"], "people_mentioned": ["Blase Saunders", "Christopher Salway", "William Butler", "Adrian Johnson", "Richard Ponter", "Martin Allbrook", "Master Pratt"], "goods_mentioned": ["sturgeon", "olives", "capers", "succade", "lute strings"], "notable": true, "notable_reason": "The lodging crisis caused by a host's bereavement illustrates the personal vulnerabilities of young men navigating life as merchant factors abroad."}, {"id": 24, "sender": "Stephen Bodington", "recipient": "his master William Mery, grocer", "date": "1533 July 23", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+\nJhesu 1533 the 23. daye of July in Andwarp\n\nRyght worshipfull and my synguler good master, in the lowelest maner that I can, I\nrecomend me unto yow, trustyng in Jhesu that yow be in good hilth, the wich I pray Jhesu\nlong to contenew to his plesure with the same dew to my mystres etc., sertyffyyng yow\nthat as yesterday I received letters from London wherby I do perseve that yow have ben\nin Darby shire, wheras I trust yow have prosperyd woll or ells I wold be sory, as yt shall\nbecome me so to do.\n\nAnd as for your mony that I am in debet toa yow, yt ys no small sum. Notwithstondyng\nyt ys not as yet my power to pay, but I trust sometyme to cover ye. Shall bee thorow your\ngoodnes.\n\nAnd as tochyng the sales that has byn, this shoo day hast past whas never worse, for\n\nyor servaunt hold never ane cloth nor no mor did a gret mony mor than I.\n\nSyr, this daye ther ys letters come from Venes, wherby gynger ys resson. Therfor\nyfb yow have any stor at home, sell yt well or kep yt stell, for that that yow shall by, for\nhendesforth shall be deror.\n\nSyr, tochyng your 2 bills that I have of yow, I shall se them deliveryd to yow within\nthis 14 days, God willyng. And as for the 54s sterling that yow have paid to mistress Hall,\nyow most have of Harry Mylles for 475c lb. in ledyn wayghtes of the same reconyng and\nthe rest I most geve yow or your servant.\n\nOther news [t]her ys none but gret mermeryng of the dyth of the 2 strangers of the\ngret myssfortewn, from which I pray Jhesu kep every Crystyn man from. Wryten in hast\nthe day above ut supra.\n\n[dorse]\n\n+\n\nSyr, this day ther shall be de cort holdyn her. And men thynkes that ther shall be a\nschipyng agayn now at this Barbers Mart. Yf yt so be, thain for well good sales of clothes\nthis sevyn yer. I canot as yt wryt the truth tell aftrnown. And this the Holy Gost preserve\nyow and all yours amen.\n\n[signed] Per your servaunt Stevyn Bodyngtond", "editorial_notes": "a yow HL, in error.\nabove goder, struck through HL.\nb ys HL, in error.\nc 4 C iij quarter HL.\nd Interlined", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 24 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax. On the dorse: +; To\nhis worshippffull master William Merey grocer of London at [room left\nfor completion] in London.", "file": "catalogued/letter_24.md", "modern_english_translation": "Jesus, 1533, the 23rd day of July, in Antwerp.\n\nRight worshipful and my singularly good master, in the most humble manner that I can, I commend myself unto you, trusting in Jesus that you are in good health, which I pray Jesus long to continue to his pleasure, with the same due to my mistress, etc. I certify you that as of yesterday I received letters from London, whereby I perceive that you have been in Derbyshire, where I trust you have prospered well, or else I would be sorry, as it shall become me to be.\n\nAnd as for your money that I am indebted to you, it is no small sum. Notwithstanding, it is not yet within my power to pay, but I trust sometime to recover it. This shall be through your goodness.\n\nAnd as touching the sales that have been, this show day just past was never worse, for your servant sold never a cloth, nor did a great many more than I.\n\nSir, this day there are letters come from Venice, whereby ginger is in good supply. Therefore if you have any stock at home, sell it well or keep it still, for that which you shall buy henceforth shall be dearer.\n\nSir, touching your two bills that I have of you, I shall see them delivered to you within these 14 days, God willing. And as for the 54 shillings sterling that you have paid to Mistress Hall, you must have of Harry Mylles for 475 pounds in lead weights of the same reckoning, and the rest I must give you or your servant.\n\nOther news there is none but great murmuring of the death of the 2 strangers of the great misfortune, from which I pray Jesus keep every Christian man. Written in haste the day above as stated.\n\nSir, this day there shall be a court held here. And men think that there shall be a shipping again now at this Barbers Mart. If it be so, then farewell good sales of cloth for these seven years. I cannot as yet write the truth until afternoon. And may the Holy Ghost preserve you and all yours, amen.\n\nPer your servant, Stephen Bodington.", "summary": "Stephen Bodington writes from Antwerp to his master William Mery, confessing he cannot yet repay a significant debt and reporting that the recent show day was the worst he had ever seen — not a single cloth sold. He relays intelligence from Venice on ginger supplies and warns that new shipping at Barbers Mart could devastate cloth sales for years.", "letter_type": "mixed", "themes": ["trade", "textiles", "spices", "financial", "debt", "news", "politics"], "people_mentioned": ["Stephen Bodington", "William Mery", "Mistress Hall", "Harry Mylles"], "goods_mentioned": ["cloth", "ginger", "lead weights"], "notable": true, "notable_reason": "A cryptic reference to 'great murmuring of the death of the 2 strangers' and fears of a seven-year market collapse capture a moment of acute commercial anxiety."}, {"id": 25, "sender": "Jan van Espen", "recipient": "Bernard de Bordverwerche", "date": "1533 May 26", "origin": "", "destination": "London", "language": "Middle Dutch", "original_transcription": "i:  mercha nt s’  letters  (1533)\n\n1 23\n\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper. Sealed\nclosed with the signet of the writer in red wax. On the dorse: Sij gegeven\nBernardt de Bordverwerche wonende op Sinte Quateryns tot Lonnen.\n\nBernaert, ic gebiede mij zeer tot u ende tot u lieve huysvruwen Maeyken. Ic laet u weten,\ndat Willem de Vlemmick synen veytten buyc afgeleet heeft. Soe verkeert, dat ghij nyet\nkunnen en soudt. Ende gruet mij zeer den swarten Peter ende alle die bordverwerckers\nende droncken coppeken unvergeten ende alle die goeden vrunden. Hier mit blijft God\nbevolen. Gescreven mit haesten den 26den dach van Meije anno [15]33.\n\ndie al uwe vrunt\n\n[signed] Jan van Espen\n[merchant’s mark no. 1 follows]", "editorial_notes": "1)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 25 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as", "file": "catalogued/letter_25.md", "modern_english_translation": "Bernaert, I commend myself warmly to you and to your dear wife Maeyken. I write to let you know that Willem de Vlemmick has shed his fat belly. [Note: This likely refers to a significant change in Willem's physical appearance or health, possibly weight loss due to illness.] So changed, that you would not be able to recognize him. And give my warm regards to black Peter and to all the embroiderers and to little drunken cup [Note: an affectionate nickname for a mutual acquaintance] not forgotten, and to all the good friends. Herewith, remain commended to God. Written in haste on the 26th day of May in the year 1533.\n\nYour devoted friend,\n\nJan van Espen", "summary": "Jan van Espen writes a brief, warm personal note to Bernard de Bordverwerche and his wife Maeyken in London. He reports that their mutual acquaintance Willem de Vlemmick has lost dramatic weight — likely through illness — and sends affectionate greetings to 'black Peter' and the circle of embroiderers, full of playful nicknames.", "letter_type": "personal", "themes": ["social_networks", "crafts", "health"], "people_mentioned": ["Jan van Espen", "Bernard de Bordverwerche", "Maeyken de Bordverwerche", "Willem de Vlemmick", "Peter"], "goods_mentioned": [], "notable": true, "notable_reason": "The use of affectionate nicknames such as 'little drunken cup' and the vivid description of a friend's dramatic physical transformation give this letter an unusually lively, intimate quality."}, {"id": 26, "sender": "Henry Brinklow", "recipient": "George Conyars", "date": "1533 July 23", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+ Jhesus Maria le 23. jour July 1533 in Andwerp\n4° T. Brace and his compani in London 2° M +\n\nMy last is yght by us for default convayans and £100 sterling in gold. We shall go by\nthe next. Wherfore yf ye receive anithyng from Newberi now, then ye can sett content. Ye\nmay dissir then to be content for 8 aors or 10, for to this £400 sterling trust and send soche\nthynges as ye have with diligens. Seale all thynges with our seale and lett not all thynges\ngoo to London stond but partea ther part at the waters syde.\n\nThe feckt of this is only ye shall receive by Godes grace in this shep Adryan Johnson\n1 litle trus under the marke in margent, content 1 covarlit de Lys. Delyver hit to mistress\nSmyng. More half pece lawne de Naf. Lett mistress Whale have hit for nys. Moreb half\npece lawne cost mys. Yf she will have it, sell hit no lese then mys sterling. It is halffc for\nprice. Yf she wyll not, show it mistress Shakeley. More 1 payr of tables for Henre Brynklow.\n\nDo your besines secretly with diligence.\n\n[signed] Per me Henri Brynklowe in hast\n\n\nSpare not to send [merchant’s mark (1) follows]\n\nd100,000 oy partes in o shep, videlicet Ely in o f ’ d", "editorial_notes": "a ut follows, struck through HL.\nuncertain HL.\nd-d Reading uncertain HL.\nb One illegible word follows HL.\nc Reading\n1)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 26 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax. On the dorse: +; To\nhis welbeloved George Conyars etc. in London; M.", "file": "catalogued/letter_26.md", "modern_english_translation": "In the name of Jesus and Mary, the 23rd day of July 1533, in Antwerp.\nTo T. Brace and his company in London.\n\nMy last letter was held back by us due to a failure in conveyance, along with £100 sterling in gold. We shall send it by the next opportunity. Therefore, if you receive anything from Newbury now, then you can settle the account. You may wish to be paid within 8 or 10 hours, for against this £400 sterling trust — send such things as you have with diligence. Seal all things with our seal, and do not let everything go to the London stand, but place part of it at the waterside.\n\nThe purpose of this letter is only that you shall receive, by God's grace, on this ship with Adrian Johnson, one little truss under the mark shown in the margin, containing one coverlet of lilies. Deliver it to Mistress Smyng. Also, half a piece of lawn from Naef. Let Mistress Whale have it for the price. Also, another half piece of lawn at a certain cost. If she will have it, sell it for no less than the set price in sterling. It is half-price already. If she will not take it, show it to Mistress Shakeley. Also, one pair of writing tablets for Henry Brinklow.\n\nDo your business secretly and with diligence.\n\nWritten by me, Henry Brinklow, in haste.\n\nSpare not to send.\n\n[Note: \"d100,000 oy partes in o shep, videlicet Ely in o f ' d\" — heavily abbreviated mercantile notation, likely referring to a consignment split across one ship; full meaning unclear due to coding.]", "summary": "Henry Brinklow writes from Antwerp to George Conyars with urgent business instructions involving a delayed £100 sterling payment, the distribution of goods between a London stand and the waterside, and a shipment including a coverlet of lilies and lawn fabric. The letter contains heavily coded mercantile notation and ends with a pointed directive to act 'secretly and with diligence.'", "letter_type": "business", "themes": ["trade", "financial", "textiles", "shipping", "coded_prices", "debt"], "people_mentioned": ["Henry Brinklow", "George Conyars", "T. Brace", "Adrian Johnson", "Mistress Smyng", "Mistress Whale"], "goods_mentioned": ["coverlet of lilies", "lawn", "writing tablets", "gold"], "notable": true, "notable_reason": "The combination of coded notation, secrecy instructions, and a £100 delayed payment gives a vivid picture of the covert mechanics of Tudor cross-Channel trade."}, {"id": 27, "sender": "Katrijne Tehaselare", "recipient": "her son Marten Tehaselare", "date": "[1533] May 27", "origin": "Brussels", "destination": "", "language": "Middle Dutch", "original_transcription": "Vrundelycke groetenisse voerscreven aen u Merten Diehaselare amijn beminde vruntta.\nU sal believen te weten, hoe dat ic Katrijne uwe moeder in redelycke pointe ben op desen\ntijt. Alsoe ic hope bij der gratien Goeds, dat ghij oock zijt met ouwer huysvrouwen ende\nouwe huysghesinde, waeraf dat ick me gheen kinnesse en hebbe, dat welcke mij hertlijcke\nlaedt es.\n\nMarten, mijn sone, ick late u te weten, hoe dat ic een groote crackte ghehadt hebbe,\nalsoe dat bicb meynde nimmermeer meer ou te siene te hebben. Maer Godt die heere, die\nmoet ghedanct sijn, het es nu ghebetert.\n\nIc late u te weten, hoe dat ic verstaen hebbe, dat ghij mij eenen tabbart laken ghesonden\n\nhebt, waeraf ic bub hertelyc dancke.\n\nMaerten, es mij noyt ter hart ghecommen gheweest, alsoe ghij ghemeyten hadt,\ndattet ter rechter hant thuys souwe ghecommen hebbe. Marten, ic late u weten, hoe dat\nic Kathryna ouwe moeder groete begheerte hebbe, om u noch eens bteb siene met mijnen\nlevende lijve, eer ic eertrijcke sceyde. Ende weet, dat ic ou noch een wat zondelinghes te\nsprecken ende zegghen hebbe, dat ic altoors in mijn herte secretelijc gehouden hebbe.\n\nAnders niet op desen tijt, dan dat Godt sij mit om in alder tijt. Ghescreven [bi]j mij\n\nJan Speeckaert te Bruesel den 27ten dach vanden Meyen.\n\n[later addition, very hasty handwriting]\n\nItem, Merten, mijn beminde vruntc. Ic lette ten weeten dat u zeer doen groeten die wewe\nBettulen ouwe wiff met Lussken hoer dochter. Ende weet dat Babelken hoer suster overleden\nes; daer af dat God ... ziele hebben moet.\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 25", "editorial_notes": "a-a Interlined with catchmark HL.\nseveral illegible words follow, struck through HL.\nfollow, struck through HL.\nb-b Interlined HL.\nc ick weete and\nd two illegible words", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 27 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA, Externa Anglicana no. 1606). Original letter, dictated. Paper. Sealed\nclosed with the signet of the writer in red wax (paper seal). On the dorse:\n[Disen brief sij] ghegeven M[erten] Thaselare.", "file": "catalogued/letter_27.md", "modern_english_translation": "Friendly greetings as aforesaid to you, Marten Tehaselare, my dear friend.\n\nYou will be pleased to know that I, Katrijne, your mother, am in reasonable health at this time. As I hope, by the grace of God, that you also are, together with your wife and your household, of whom I have had no news, which weighs heavily on my heart.\n\nMarten, my son, I wish to let you know that I have had a great illness, such that I believed I would never see you again. But God the Lord — may He be thanked — I have now recovered.\n\nI wish to let you know that I have learned that you sent me a tabard of cloth, for which I thank you heartily.\n\nMaerten, it has never truly come to my heart, as you had supposed, that it would have arrived at the right house. Marten, I wish you to know that I, Kathryna your mother, have a great desire to see you once more with my own living eyes, before I depart this earth. And know that I still have something particular to say and tell you, which I have always kept secretly in my heart.\n\nNothing more at this time, except that God be with you always. Written by me, Jan Speeckaert, in Brussels, the 27th day of May.\n\nAlso, Merten, my dear friend. I wish to let you know that the widow Bettulen, your wife's mother, sends you warm greetings, along with Lussken her daughter. And know that Babelken, her sister, has passed away; may God have mercy on her soul.", "summary": "Katrijne Tehaselare writes from Brussels to her son Marten in a deeply emotional letter, disclosing that she has been gravely ill and feared she would never see him again. She expresses a desperate longing to see him once more before she dies and hints at a secret she has kept in her heart that she wishes to reveal in person. A postscript notes that the sister Babelken has died.", "letter_type": "personal", "themes": ["family", "health", "women_writing", "gifts", "social_networks"], "people_mentioned": ["Katrijne Tehaselare", "Marten Tehaselare", "Jan Speeckaert", "Bettulen", "Lussken", "Babelken"], "goods_mentioned": ["tabard"], "notable": true, "notable_reason": "A dying mother dictating a farewell letter to her son, hinting at a lifelong secret never yet spoken aloud — one of the most emotionally raw surviving letters from this period."}, {"id": 28, "sender": "Richard Donne", "recipient": "his wife", "date": "[1533] July 23", "origin": "Antwerp", "destination": "London", "language": "Middle English", "original_transcription": "+\n\nI grett you well and all ounour, trostyng in God thatt he be in good helthe alle. And so\nI wasse at the makkyng heroff. Be the grasse of God he schall reseve in Adrean Gonson\nys howye of Andwarp – sche ys kallyd the Games of Andwarp – to maundys trencheores.\nIn the on mawnd ys 3000 and ode trencheors at 7s a the thousand and in the tother ys\n3000 trenchores, cost 2s in the thousand. And he schall reseve of hem a flore bake and in\nhem ther ys a dosen sleysa and 6 dosen 3 penys for settylsb. They cost all 4s 6d F[lemes’].\nThey be for my gossep John Nundeth. Let hem pay for the sleys and 4s sterling and for\nthe penys alle 3s sterling.\n\nI send yow to letters, on of John Don ys makeng. I troust he have reseved them. And\nI send you a letterc with Harode ys schepp and a smalle dry fat. I troust he have reseved\nthes ger or thes tyme her ys dyvers men he come bout. I have no letter as hyt of none\nof them, wereof I mervelle how hed have don with the wares that I send you with Petter\nClasson. I her no theng of hyt. I have her in an helle casse for mone, for I have not gotton\nenone as hyt. Nor I can get no grawnt of master Davusse sarvant as hyt bout a dryveythf\nme off to the paymentte. And I ferre me thatt a well desseve. And I have forrecallyd on\nfor the ould mone and I have not sould halff my nettes as hyt. I can not make the mone\nthey cost and therfor bey no mor of them bot yff they be verre good eande folle of florre.\nTherfor in anne wysse do your best and make mone. Sell awye thatt do gon, for I fere lyst\nI be trobold her. Be the next letter he schalle know more no more bout. Jhesu spede you\nwell. Wrettyn in Andwarp the 23. day of Jully.\n\n[signed] by your Recard Doune\n\na for follows, struck through HL.\nrected in HL from aletter.\nHL.\n\nf Corrected in HL from dyveth.\n\nb Corrected in HL from settys.\n\nd ve follows, struck through HL.\n\nc Cor-", "editorial_notes": "e-e Interlined", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 28 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in green wax (paper seal). On\nthe dorse: +; To the wyff of Recard Doune at the Covefase in Chepe\nSyde in London thes letter be deleveryd; N° Y.", "file": "catalogued/letter_28.md", "modern_english_translation": "I greet you well with all honor, trusting in God that he is in good health throughout. And so I was at the writing of this. By the grace of God, he shall receive in Adrian Gonson's house in Antwerp — she is called the Games of Antwerp — two maunds of trenchers. In the one maund there are 3,000 and odd trenchers at 7 shillings per thousand, and in the other are 3,000 trenchers, costing 2 shillings per thousand. And he shall receive from them a flour bag, and in it there is a dozen sleys and 6 dozen 3-penny pieces for settles. They cost in all 4 shillings 6 pence Flemish. They are for my gossip John Nundeth. Let them pay for the sleys 4 shillings sterling, and for the penny pieces all together 3 shillings sterling.\n\nI send you two letters, one of John Don's making. I trust he has received them. And I sent you a letter with Harold's ship and a small dry cask. I trust he has received these goods by this time, for there are diverse men who have come about. I have no letter as yet from any of them, whereof I marvel — how he has dealt with the wares that I sent you with Peter Classen, I hear nothing of it. I am here in a wretched case for money, for I have not gotten enough as yet. Nor can I get any grant from Master Davies's servant as yet — and I fear that he will deceive. And I have recalled one debt for the old money, and I have not sold half my nets as yet. I cannot make back the money they cost, and therefore buy no more of them unless they are very good and full of flour. Therefore in any wise do your best and raise money. Sell away what will go, for I fear lest I be troubled here. By the next letter he shall know more about it. Jesus speed you well. Written in Antwerp the 23rd day of July.\n\nBy your Richard Donne", "summary": "Richard Donne writes from Antwerp to his wife in London, sending trenchers, sleys, and settles via Adrian Gonson, and reporting with growing anxiety that he cannot recover money owed, fears being deceived by a servant, and has failed to sell half his nets. He urges his wife to sell what she can to raise funds before his situation becomes untenable.", "letter_type": "mixed", "themes": ["trade", "financial", "debt", "shipping", "family", "crafts"], "people_mentioned": ["Richard Donne", "Adrian Gonson", "John Nundeth", "Harold", "Peter Classen", "Master Davies"], "goods_mentioned": ["trenchers", "sleys", "settles", "nets"], "notable": false}, {"id": 29, "sender": "Jheronnimus", "recipient": "his brother Jasper", "date": "[1533] July 15", "origin": "", "destination": "", "language": "Middle Dutch", "original_transcription": "with the signet of the writer in red wax. On the dorse: Desen brif sal men\ngheven an Jasper den manedemuker8 bij sint Andries kerck tot Lonnen.\n\n+\n\nWeet het, lieve broeder, dat ic u heb ghesonden mit Peter Kalssen en 100 klyen vannen,\nkosten a15 vena stuvers ende een halven. Alsoe hebbe ic u 6 noebelen benalt ende 10 stuvers\nmeer dan u ghelt. Also hebbe ic u noch ghesonden een half doesijn hant scriyen, kosten 21\nstuvers ende noch 5 hant scriyen 20 stuvers ende noch dry dousenen waeijers ende 7, dy\nkosten 14 stuvers, dar en vasser op dat pas niet een meer. Ende noch hebt ghy ghehat dry\nkoeken, kosten 6 stuvers. Ende noch hebt ghij gehat een helgher, kosten dry stuvers. Ende\nock een pont gars dry stuvers. Ende den kors a6½a stuvers ende den tol van twe hondert\nwannen 24 stuvers met scep te don ick betalt hier. Al darom en gheft ghij niet. Ende hij\nhebt mij ens twe stuvers ghesonden ende ic hebbe eens twe gulden ontfanghen van Peter\nTijs moeder mar icb en sal dar niet mer hebben vant sijn mijn mosste, waant dy ic heb alsoe\nen vet ic met var ghij dy brieven sult bestellen, dat ick mocht ontfanghen. Ende vort soe en\nick dy mossen niet min krijghen dan 10 stuvers. Alsoe werden sij ghesocht, om dat in de\nmert is. Aalsoe hebt ic overlet, dat mij coemen sal 10s ende 5 stuvers, als ghij dyt hondert\ngroete wannen te hus hebt. Ende nu hebbe ic een noebel ontfanghen van Jan Peters, ende\nic sal u alle dynghen bestellen in God.\n\nWit, lieve broeder, het is mij alte let, dat ghij soe langhe hebt ghevacht, mar ons Her\nwet, dat ic dat ghelt niet en koste bijc bringhen, mar ic vant noch een frynt ghevonden, dy\nmij lenden dat vaten. Dy alder mostten klijen vannen, dy in de stat vaten in der warheijt,\nalso hebbe ic betalt an dy klijen vannen 10 stuvers meer dan u 6 noebelen also overlegt\nsolvet vat ic uut hebbe ghelet met cost verdelft sal ic u ander goet sinden in God belieft.\nGhescreven op Alder Appostelen dach bij mij Jheronimus u broeder altos beret tot\nuen besten groet ons Katrin onse susterd in font ende Merten ende Anne onse nicht ende\nCornelis ende Anne Banckers mit alden anderen wrunden. Hubert verkoept ock bier.\n\n[on the dorse, hidden when the letter was sealed] Ic sinde u met met Knapkout 10 bonden\ngrote vannen.", "editorial_notes": "a-a Reading uncertain HL.\nstruck through HL.\nd c follows HL.\nb s[al] follows, struck through HL.\nc by follows,", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 29 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA,\nExterna Anglicana no. 1606). Original holograph letter. Paper. Sealed closed", "file": "catalogued/letter_29.md", "modern_english_translation": "Know, dear brother, that I have sent you with Peter Kalssen one hundred small fans, costing 15 and a half stuivers each. Likewise I have paid you 6 nobles and 10 stuivers more than your money's worth. I have also sent you a half dozen handkerchiefs, costing 21 stuivers, and another 5 handkerchiefs for 20 stuivers, and also three dozen fans and 7 more, which cost 14 stuivers — there was not a single one more to be had at that moment. And you have also received three cakes, costing 6 stuivers. And you have also received a heller's worth, costing three stuivers. And likewise one pound of yarn for three stuivers. And the basket for 6½ stuivers, and the toll on two hundred fans — 24 stuivers — together with the shipping, I have paid here. You therefore owe nothing for any of that. And he has sent me two stuivers once, and I have received two guilders on one occasion from Peter Tijs's mother, but I shall have no more from that, as those are my costs — for what I have, I do not know by what means you will arrange delivery of the letters, so that I might receive payment. And furthermore, I cannot get the costs for less than 10 stuivers. That is what they fetch, because it is market time. So I have reckoned that I shall receive 10 shillings and 5 stuivers once you have this hundred large fans at home. And now I have received one noble from Jan Peters, and I shall arrange all things for you, God willing.\n\nKnow, dear brother, it grieves me greatly that you have waited so long, but Our Lord knows that I could not bring the money together, yet I found a friend who lent me what was needed. The very cheapest small fans to be had in the city, in truth — and so I have paid 10 stuivers more on the small fans than your 6 nobles, as reckoned — whatever I have laid out in costs and expenses I shall reimburse, and God willing I will send you other goods. Written on the Feast of All Apostles by me, Jheronimus, your brother, always ready for your good. Greet our Katrin our sister sincerely, and Merten and Anne our niece, and Cornelis and Anne Banckers, and all other friends. Hubert also sells beer.\n\nI am sending you with Knapkout 10 bundles of large fans.", "summary": "Jheronnimus writes to his brother Jasper with a meticulous accounting of goods sent — hundreds of fans, handkerchiefs, cakes, and yarn — listing prices in stuivers and nobles and tracking every toll and shipping cost. He apologizes for delays caused by cash-flow problems and mentions borrowing from a friend. A brief aside that 'Hubert also sells beer' hints at the diverse small-scale commercial activities in the brothers' network.", "letter_type": "business", "themes": ["trade", "financial", "shipping", "social_networks", "family", "debt"], "people_mentioned": ["Jheronnimus", "Jasper", "Peter Kalssen", "Katrin", "Merten", "Anne", "Cornelis", "Anne Banckers", "Hubert", "Knapkout"], "goods_mentioned": ["fans", "handkerchiefs", "cakes", "yarn", "basket"], "notable": false}, {"id": 30, "sender": "William Butler", "recipient": "his wife Brigit", "date": "1533 July 21", "origin": "Antwerp", "destination": "London", "language": "Middle English", "original_transcription": "+\nJhesus in Andwarpe the 21. daye of Julye anno 1533\n\n8  Possibly, this was Jasper Arnoldson, see https://www.englandsimmigrants.com/person/33497.\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 27\n\nBedffello, I hartely recommend me unto you, sertyffying you that by the brynger off\nthis letter Adryan Johnson, master of a shipp nameyd the Jamys of Andwarpe, I send\n2 frykynges with sturgine, item 3 lytill firkynges mor, oon with olyves, a
