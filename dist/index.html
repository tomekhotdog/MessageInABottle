 other with kapers,\nanother with sukatt which be in all 5 peces all markeyd in blake with this marke in the\nmargent [merchant’s mark (1) entered in the margin]. And ye must paye for fraught 12d, as\nby shippers boke doyth apee. And as oon of the barelles of sturgine and the sukatt, lett\nyt be opennyd for toa chice your gossoppis with all at your lying in, praying God to send\nyou welle therto, which shuldbe gretly to my comfort to her off.\n\nFarther ye shall understond that syns my comyng hither, I did send you a better by my\ncosine Pratt, wherwith I did send you a token whytch shortly I trust ye shall receve. And\nas shortly as I can I will bryng you a token my sollsse by the grace of God who have you\nin his mercyfull gouvernence.\n\nyour bedffellow\n[signed] William Butler9", "editorial_notes": "a 1 follows, struck through HL.\n1)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 6 (original classification by Dreyer:\nActa Anglicana, Appendix 2; later reclassified as ASA, Externa Anglicana\nno. 1606). Original holograph letter. Paper. Sealed closed with the signet of\nthe writer in red wax (paper seal). On the dorse: +; To his welbeloveyd\nwyffe Brigitt Butler this be delivered in Collman st[r]ett in London.", "file": "catalogued/letter_30.md", "modern_english_translation": "Bedfellow, I heartily commend myself to you, letting you know that by the bearer of this letter, Adryan Johnson, master of a ship named the James of Antwerp, I am sending 2 firkins of sturgeon, also 3 small firkins more — one with olives, another with capers, and another with succade — which are in all 5 pieces, all marked in black with this mark in the margin. And you must pay for freight 12 pence, as the shipper's book does show. And as for one of the barrels of sturgeon and the succade, let it be opened to treat your gossips withal at your lying-in, praying God to send you well through it, which would be greatly to my comfort to hear of.\n\nFurthermore, you shall understand that since my coming here, I did send you a letter by my cousin Pratt, with which I sent you a token, which shortly I trust you shall receive. And as soon as I can, I will bring you a token myself, by the grace of God, who keep you in His merciful governance.\n\nYour bedfellow,\nWilliam Butler", "summary": "William Butler writes from Antwerp to his pregnant wife Brigit in London, sending firkins of sturgeon, olives, capers, and succade via Adrian Johnson's ship the James of Antwerp. He instructs her to open the barrel of sturgeon and succade for her gossips at her lying-in, praying God to send her well through childbirth.", "letter_type": "mixed", "themes": ["family", "shipping", "food", "gifts", "health"], "people_mentioned": ["William Butler", "Brigit Butler", "Adrian Johnson", "cousin Pratt"], "goods_mentioned": ["sturgeon", "olives", "capers", "succade"], "notable": true, "notable_reason": "A merchant sending luxury foods home specifically for his wife's childbirth celebration, with a tender prayer for her survival — an unusually intimate window into domestic life behind Tudor commerce."}, {"id": 31, "sender": "Harry Maye", "recipient": "his master William Chamberlain, draper", "date": "1533 July 23", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+ Jhesus at Andwerpe the 23. day of Juley anno 1533\n\nRyght worschipfull master, my dewty consedryd I hartely recomend me unto you, glad\nfor to her of yowr good welfare wyche I pray Jhesu long to contenew to his pleser and to\nyowr hartesa most desyr, sartefing yow that at the makeng herof my master was in good\nhelthe thankyd by Jhesus. And so he trosteythe that yow be with alle his howshold etc.\nSartefing yow that of a latt my master hathe sent yow 1 letter bownd with master Larens\nletters of all hys holle mynd. And at the makeng herof he reseved 1 letter of master Thomas\nhond by the post. Also yow schalle reseve owt of Adryan Johnson of Andwerpe 4 pokes\n\n9  William Butler, mercer, admitted 1512.\n\n\nof hoppes cost 7s 8d the C. The furst peny yow most paye for frayght of 18 C – so I have\nwreton in his boke – at 4d the C and premanus beseydes.\n\nYow schalle understond that John Maye hathe bowght at Armew 3 C of Baye saltt cost\n£10 4s [the] C and every hondert ys 10 waye. Yt is redy to departe hens with the next wynd\nthat blowythe at the est and so ys Adryan Johnson. My master trostythe yow schalle yt\nfor 8d a boschell and by the way for 25s. He praythe yow for to sell ytt aforhand yf yow\ncane. Saltt ys resson at Armew within thys 4 days to £11 5s a C. Thus John Maye hathe\nwreton to my master.\n\nAnd as towcheng to the hoppes, iron and naylles, my master prayethe yow to ryde\nthem to the most proffett at ther comyng to yow. Hones iron ys her at 32 stevers the C\nand Namys iron at 28 stevers and halfe and 29 stevers Flemysche. Mader ys at 19s a C and\n19s 6d suche as my master is won to bey and the 4th kewers at 17s and 17s 8d the C yf yt\nbe good. And hopes 7s the C and 6s 8d the worst. Latyn wyar the C 32s, blake sope the\nbarell 23s 8d and 24s. Large massys the lb. 10s 6d, clovys the lb. 6s 8d, peper the lb. 2s 3d.\nHer ys myche scort of allam and wyght sope come in.\n\nMy master prayth yow to wryght hym 1 letter of yowr myndb as schortly as yow cane\nand whether yowc wylle have onny sope bowght and what wars yow thenke ys best to by.\nHe hathe mych mony leynge her and wolle not apon what ware he schal bestow hys mony\none to do onny proffet. In all thenges ys so der her and good chepe in England which\ngreythe schrowdly. Also my master intendythe tod dyspatche and to come home schortly.\nHe hathe sold alle hys clothes and dossens, saveng 2 wyghttes and 4 dossens. No more to\nyow at thys tyme butt Jhesus have yow in hys kepeng amen.\n\nBy yowr sarvand\n[signed] Harry Maye", "editorial_notes": "a hattes HL, in error.\nstruck through HL.\nb w follows, struck through HL.\nd dyspath follows, struck through HL.\nc ha[ve] follows,", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 7 (original classification by Dreyer:\nActa Anglicana, Appendix 2; reclassified as ASA, Externa Anglicana\nno. 1606). Original holograph letter. Paper. Sealed closed with the signet of\nthe writer in red wax. On the dorse: +; To hys worshipfulle master William\nChambeyrlyn draper in Sent Donstons in the Est over agenst the Dyce\nKeyes by Bellengesgat soytt delevered in London with hast; n° d s", "file": "catalogued/letter_31.md", "modern_english_translation": "Jesus, at Antwerp, the 23rd day of July, in the year 1533.\n\nRight worshipful master, my duty considered, I heartily commend myself unto you, glad to hear of your good welfare, which I pray Jesus long to continue to his pleasure and to your heart's most desire, certifying you that at the making hereof my master was in good health, thanked be Jesus. And so he trusts that you are with all his household, etc. Certifying you that of late my master has sent you one letter bound with Master Laurence's letters, of all his whole mind. And at the making hereof he received one letter of Master Thomas's hand by the post. Also you shall receive out of Adrian Johnson of Antwerp 4 pokes of hops, costing 7 shillings 8 pence the hundredweight. The first penny you must pay for freight of 18 hundredweight — so I have written in his book — at 4 pence the hundredweight, and handling charges besides.\n\nYou shall understand that John Maye has bought at Arnemuiden 3 hundredweight of bay salt, costing £10 4 shillings the hundredweight, and every hundredweight is 10 ways. It is ready to depart hence with the next wind that blows from the east, and so is Adrian Johnson. My master trusts you shall have it for 8 pence a bushel and by the way for 25 shillings. He prays you to sell it beforehand if you can. Salt has risen at Arnemuiden within these 4 days to £11 5 shillings a hundredweight. Thus John Maye has written to my master.\n\nAnd as touching the hops, iron, and nails, my master prays you to ride them to the most profit at their coming to you. Hones iron is here at 32 stivers the hundredweight, and Namur iron at 28 and a half stivers and 29 stivers Flemish. Madder is at 19 shillings a hundredweight and 19 shillings 6 pence, such as my master is accustomed to buy, and the 4th quality at 17 shillings and 17 shillings 8 pence the hundredweight if it be good. And hops 7 shillings the hundredweight and 6 shillings 8 pence the worst. Latten wire the hundredweight 32 shillings, black soap the barrel 23 shillings 8 pence and 24 shillings. Large maces the pound 10 shillings 6 pence, cloves the pound 6 shillings 8 pence, pepper the pound 2 shillings 3 pence. Here there is much shortage of alum and white soap coming in.\n\nMy master prays you to write him one letter of your mind as shortly as you can, and whether you will have any soap bought, and what wares you think it best to buy. He has much money lying here and does not know upon what ware he shall bestow his money so as to do any profit. In all things it is so dear here and cheap in England, which troubles him sorely. Also my master intends to dispatch and to come home shortly. He has sold all his cloths and dozens, saving 2 whites and 4 dozens. No more to you at this time, but Jesus have you in his keeping, amen.\n\nBy your servant,\nHarry Maye", "summary": "Harry Maye writes from Antwerp to his master William Chamberlain, a London draper, with a detailed account of commodity purchases and current market prices across both cities. He reports shipping hops and bay salt, notes sharp price rises at Arnemuiden, and surveys the cost of iron, madder, spices, soap, and wire. His master has money lying idle but cannot find profitable investments — everything is dear abroad and cheap at home.", "letter_type": "business", "themes": ["trade", "shipping", "spices", "textiles", "financial"], "people_mentioned": ["Harry Maye", "William Chamberlain", "Adrian Johnson", "John Maye"], "goods_mentioned": ["hops", "bay salt", "iron", "Namur iron", "madder", "latten wire", "black soap", "maces", "cloves", "pepper", "alum", "white soap", "cloth"], "notable": true, "notable_reason": "An exceptionally detailed snapshot of commodity prices across Antwerp and England in 1533, capturing the arbitrage logic of a Tudor merchant."}, {"id": 32, "sender": "William Colsell, mercer,", "recipient": "his wife Kate", "date": "1533 July 24", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "Ata Andwarp the 24th day of Juylly anno 1533\n\nMy Kayt, as harttely as I can, I recommend me unto you, glad to hire of your good\nwelffare with all my boyys. And so I send alle my boyys Goddes blessyng and myn. And\nthat master Dicke schalle have more tomorowe or I dyen. And yt amongist alle other\nrecommend me unto the littille pigge in the panyer. And so recommend me unto master\nFitRamys and to good mestres FightRamys. And I have reseved a letter from hym, the\nwiche I well understand, as this day and schortly as I can, I schall send her fyne pece of\ncloth home.\n\nAnd so, Kayt, I have reseved a letter from you, the wiche well understand ye have\nwrytten to me for semmys and yt ys to layt to wryte nowe, howebehit yf I bryng them\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 29\n\nnot myself. Nycolas, when he cumyth, schall bryng them. Ye chude no agevyn me then\nwhen I was ther myself and then I had browght them with me. Never the leesse for feer\nof a sower looke, I wold a said a schrew looke, I dare do none other to bdob my best as\nmoche as I can etc.\n\nAnd so Kait, I have sentt you a greett barrelle of styrgyn in a hoye of Andwarp callid\nAdryan Johnson. In the said barrelle ys 13 peces with 13c jollys in the said barrelle. Also ye\nschalle reseved yn the said schip a littille barrelle of stergyn for master Ressener, in the wiche\nbarrelle ys 12e joylles and 16f ronddes. And so when yt schall pleasse God that ye schalle\nreseve his letter, hit be delyverd unto master Ressener and schew hym hit ys vere good.\n\nAlso ye wrytte me that I schuld send you word to heer the bille of payment was from\nDenssy. I delyverd the said bille of Dynseys unto master Danelle in my cowntter. And\nthat he knowetes fulle well how be hit. I knawe his mynde: he lookkithg for hys rewarde.\nI trust in God to be att home schortly and paye hym myself.\n\nAnd nowe Kayt, I wold I weer at homme. Seyng my syyd grevith me vere soor. I cannot\ntell what I schalle saye unto hit, for yf your venyson cum not schortly, I thynke I schall get\nnoone of hit, ash Crist knoweth who ever kepe you and yours amen.\n\nWrytten in hast. Tomorowe I will wrytte you more, for then ys holy day Saynt James day.\n\n[signed] Yours ever William Colsell mercer 2\n\na Londo[n] follows, struck through HL.\ne ijth HL.\nfollows, struck through HL.\nHL.\n\nh Kr[ist] follows, struck through HL.\n\nb-b Interlined L.\nd s[chip]", "editorial_notes": "f 6ten HL. g he follows, struck through\nc 3ten HL.", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 8 (original classification by Dreyer:\nActa Anglicana, Appendix 2; reclassified as ASA, Externa Anglicana no. 1606).\nOriginal holograph letter. Paper. Sealed closed with the signet of the writer\nin red wax. On the dorse: +; To his welbelovyd wyffe Katteryn Colselle\nyn the Old Jure in London’ this bille be delyverd with speed; n° B.", "file": "catalogued/letter_32.md", "modern_english_translation": "At Antwerp, the 24th day of July, in the year 1533.\n\nMy Kate, as heartily as I can, I commend myself to you, glad to hear of your good health along with all my boys. And so I send all my boys God's blessing and mine. And that Master Dick shall have more tomorrow before I die. And among all others, commend me to the little pig in the basket. And so commend me to Master FitzRamys and to good Mistress FitzRamys. And I have received a letter from him, which I well understand, and as this day and as shortly as I can, I shall send her a fine piece of cloth home.\n\nAnd so, Kate, I have received a letter from you, which I well understand — you have written to me for seams, and it is too late to write now; however, if I do not bring them myself, Nicholas, when he comes, shall bring them. You should not have gone against me then when I was there myself, for then I would have brought them with me. Nevertheless, for fear of a sour look — I would have said a shrewish look — I dare do nothing other than to do my best as much as I can, etc.\n\nAnd so, Kate, I have sent you a great barrel of sturgeon in a hoy from Antwerp called Adrian Johnson. In the said barrel there are 13 pieces with 130 jellies in the said barrel. Also you shall receive in the said ship a little barrel of sturgeon for Master Ressener, in which barrel there are 12 jellies and 16 rounds. And so, when it shall please God that you shall receive his letter, let it be delivered to Master Ressener and show him it is very good.\n\nAlso, you write to me that I should send you word to hear what the bill of payment was from Denssy. I delivered the said bill of Dinsey's to Master Daniell in my counter. And he knows full well how it stands. I know his mind: he is looking for his reward. I trust in God to be at home shortly and pay him myself.\n\nAnd now, Kate, I wish I were at home, seeing that my side grieves me very sorely. I cannot tell what I shall say to it, for if your venison does not come shortly, I think I shall get none of it, as Christ knows — who ever keep you and yours, Amen.\n\nWritten in haste. Tomorrow I will write you more, for then is the holy day of Saint James's Day.\n\nYours ever, William Colsell, mercer", "summary": "Mercer William Colsell writes a warm and playful letter from Antwerp to his wife Kate, sending affectionate greetings to their children including a tender nickname for the youngest — 'the little pig in the basket.' He ships barrels of sturgeon, teases Kate about a past domestic disagreement, and confides that his side is giving him pain and he wishes he were home.", "letter_type": "mixed", "themes": ["family", "shipping", "food", "health", "social_networks", "gifts"], "people_mentioned": ["William Colsell", "Kate Colsell", "Master FitzRamys", "Mistress FitzRamys", "Nicholas", "Master Ressener", "Master Denssy", "Master Daniell", "Adrian Johnson"], "goods_mentioned": ["sturgeon", "cloth", "venison"], "notable": true, "notable_reason": "The nickname 'the little pig in the basket' for his youngest child and his self-deprecating domestic teasing give the letter an unusually human and intimate quality."}, {"id": 33, "sender": "John Westbury", "recipient": "his master Thomas Abraham, sen", "date": "1533 July 2", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+\nAt Andwerpe le 2de jour de July anno 1533\n\nRyght worshypfulle syr, my dewty done, I recommende me to your mastership. Syr,\nyow shall reseve by the grace of God owt of Adryan Johnson of aAndwerpea, the brynger\nhereof, a trusse containing 58 peces seyes [merchant’s mark no. 1 in the left margin] sortyd\nas shalle apere by thys bylle. Freyght 3s sterling.\n\nn° 1: 1 pece sey at 22s\nn° 2: 1 pece pore sey 23\nn° 3: 2 peces at 24\nn° 4: 2 peces at 25\nn° 5: 3 peces at 26\nn° 6: 2 peces at 27\nn° 7: 4 peces at 28\nn° 9: 3 peces at 29\nn° 10: 4 peces at 30\n\n\nn° 11: 5 peces at 31\nn° 12: 5 peces at 32\nn° 13: 4 peces at 33\nn° 14: 4 peces at 34s\nn° 15: 3 peces at 35s\nn° 16: 3 peces at 36\nn° 17: 3 peces at 37\nn° 18: 3 peces at 38\nn° 19: 1b pecec at 39\nn° 20: 1 pece at 40s\nn° 21: 1 pece at 45s\nn° 22: 2 peces at 54s\nn° 23: 1 pece at 60s\n\nSumma 58 peces amont to [£]95 7s besyde þe costes wyche yow shalle know by my letter\nby londe. In hast by yowrs\n\nb Corrected in HL from 2.\n\nc peces HL, in error (cf.\n\n[signed] John Westbery\n\na-a Interlined HL.\nvariant b).", "editorial_notes": "1)", "archival_reference": "HL AHL ASA, Externa Anglicana 781 (misfiled and misunderstood as ‘customs\nrates’ (“Zollsätze”)). Original holograph letter. Paper. Sealed closed with\nthe signet of the writer in red wax (paper seal). On the dorse: +; To the\nworshypfull Thomas Abram þe Oldre sott detur in Chepesyde at London’", "file": "catalogued/letter_33.md", "modern_english_translation": "At Antwerp, the 2nd day of July, in the year 1533.\n\nRight worshipful sir, my duty done, I commend myself to your mastership. Sir, you shall receive, by the grace of God, from Adrian Johnson of Antwerp, the bearer of this letter, a bundle containing 58 pieces of say, sorted as shall appear by this bill. Freight: 3 shillings sterling.\n\nNo. 1: 1 piece of say at 22s\nNo. 2: 1 piece of poor say at 23s\nNo. 3: 2 pieces at 24s\nNo. 4: 2 pieces at 25s\nNo. 5: 3 pieces at 26s\nNo. 6: 2 pieces at 27s\nNo. 7: 4 pieces at 28s\nNo. 9: 3 pieces at 29s\nNo. 10: 4 pieces at 30s\nNo. 11: 5 pieces at 31s\nNo. 12: 5 pieces at 32s\nNo. 13: 4 pieces at 33s\nNo. 14: 4 pieces at 34s\nNo. 15: 3 pieces at 35s\nNo. 16: 3 pieces at 36s\nNo. 17: 3 pieces at 37s\nNo. 18: 3 pieces at 38s\nNo. 19: 1 piece at 39s\nNo. 20: 1 piece at 40s\nNo. 21: 1 piece at 45s\nNo. 22: 2 pieces at 54s\nNo. 23: 1 piece at 60s\n\nTotal: 58 pieces amounting to £95 7s, besides the costs, which you shall know by my letter sent by land. In haste, yours,\n\nJohn Westbury", "summary": "Factor John Westbury writes from Antwerp to his master Thomas Abraham reporting the shipment of 58 pieces of say — a lightweight cloth — graded across multiple quality tiers with individual prices from 22s to 60s per piece, totalling £95 7s.", "letter_type": "business", "themes": ["trade", "textiles", "shipping", "financial"], "people_mentioned": ["John Westbury", "Thomas Abraham", "Adrian Johnson"], "goods_mentioned": ["say"], "notable": false}, {"id": 34, "sender": "John Westbery’s cargo in the ship of Adrian Johnson", "recipient": "", "date": "(undated)", "origin": "", "destination": "", "language": "Middle English", "original_transcription": "A le 2de de July anno [15]33\n\nn° [merchant’s mark no. 1\nfollows] 2us.\n\nJohn Westbery in Adryan Johnson of Andwerpe a\ntrusse under thys marke. Freyght 3s st.\n\n1)\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 31", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 481a, f. 3 (unaccountably filed together with\ntwo letters from the Antwerp/Bruges Counter to its counterpart in London,\ndated 15 Oct. and 18 Nov. 1572, dealing with matters of exchange). Original.\nSlip of paper. Unsealed.", "file": "catalogued/letter_34.md", "modern_english_translation": "On the 2nd of July, in the year 1533.\n\nJohn Westbery, aboard the ship of Adrian Johnson of Antwerp, one bale under this mark. Freight: 3 shillings sterling.", "summary": "A bare cargo note recording that John Westbery has one bale aboard Adrian Johnson's ship, with freight charged at three shillings sterling. It functions purely as a shipping label.", "letter_type": "business", "themes": ["shipping", "trade"], "people_mentioned": ["John Westbery", "Adrian Johnson"], "goods_mentioned": [], "notable": false}, {"id": 35, "sender": "John Smyth", "recipient": "John Dawes of Maldon/Essex", "date": "1533 July 22", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "Jhesus\nIn Andwarpe the 22. day of July anno 1533\n\nRyght worschopefull master Dawses, I recommend me unto yow as yett me knowe,\n\nbott I troste in God within schorte tyme to be bettar aquented with yow etc.\n\nSir, the cawese of my wrytenge to yow at thes tyme ys to scarteffy yow thatt master\nFlege, my good mastar and frende, hathes dyvars tymes schewed me of yowr goodnesce\nand good, trowe dellenge and owse that ye wollde haweffe heme to scend scartene wares\nthat ye haweff aveseda heme by your lettares wretten to heme as I do parscaweff by your\nlaste lettar ye scente heme by thes brengar Areane Johnsson schepemane of Andwarpe,\nthe weche lettar ys dattet the fereste Monday in Lente [3 Mar. 1533] etc. Sir, master Flege\nhathes so moche to do here with hes marchandys off stall, off clothes, that he hathe no\ngrett mynde to ocopy into Yengland. Syr, therefor that I haweff scene hes lettars scent by\nyow to heme and that ye wolld be glade to schowe hes scarvand the proffettes off your\ncontre. I at thes tyme haweff hyard a howye and haweff bowthe thes wares follenge and\ndo porpos to be with yow within thes monethe afftar the wrytenge off thes lettar.\n\nThes be the wares: 4000 [lb.] yeren of Names at 4s 3d a C, 2000 pottes at 3s 4db a\nC; 20,000c payffarenge tykelles at 3s 6d, 4400 [lb.] hopes at 7s a C in smaylle pokes and\nfare and 2 C Baye scallte at £12 a C (the C ys 10 waye and a hallfe London mesor), 24\nbarelles of fostes at 12s the barell and 12 barelles wyte scallte and 1 haweff lade yerneste of\n1000 stapell festher bolles as yett thar ys none come into Scellande. Allso I schall brenge\nwith me a C mayde floxes and hande baskettes and lantornes and some bellowes and a\nthousand trenchares. Allso I schalle brenge with me a smaylle barelle storgone to make\naquentanes with.\n\nSir, I praye yow to schowe to your aquaintanes that ye haweff sthos wares comenge,\nfor I well do. Ye schollde staye thes wares be your owne, wane thay come and, Sir, yff ye\ncollde make ane provegone for a C or 2 C waye of cheses and bottar at a resonaybelle\nprys, I wollde haweff yt at my comenge yff I methe [dorse] haweff lysanes for yt. I praye\nyow do your beste aganes my comenge and thane ye schalle knowe more off my mynde.\nSir, yff ye cane, by ane mostard scede for 8s or 10s or 12s a qwartour, yt were here good;\n\nallso tallowe and bagone and mallte and barle with dyvares odar goodes.\n\nSir, I wollde haweff wrett to yow dyvares tymes or thes tyme, bott I collde nott knowe\nhowe that my lettars schollde dbed convayd to yow, bott that thes my frende Areane Johns-\nson dos schowe me that he ys vere well aqwented with yow. Sir, thes brengar cane schowe\nyow more off my mynde, for he dos knowe me well. Sir, thos I ame bollde to wry[t]e to\nyow at thes tyme: I troste yt schalle be for your proffett and myne. Allso by Godes grays\nwe prosarveffe in hellthe and stond me well to Mallden.\n\n\nBy your owne to hes powre John Smythe grocer and one off the\noveffescares to the marchandes aventorares in Andwarpe and haweff\nbene thes ten yere.\n\na Corrected in HL from a vs vesed.\nd-d Interlined HL.\nin HL from 20.", "editorial_notes": "b Corrected in HL from 3d.\nc Corrected\n1)", "archival_reference": "HL AHL ASA, Externa Anglicana 481a, f. 3 (unaccountably filed together with\ntwo letters from the Antwerp/Bruges Counter to its counterpart in London,\ndated 15 Oct. and 18 Nov. 1572, dealing with matters of exchange). Original\nholograph letter. Paper. Sealed closed by the writer’s signet in green wax. On\nthe dorse: To the worschepefwlle John Dawes marchand off Malldon\nin Esexthe thes be delivered in Malldon [merchant’s mark no. 1 follows].", "file": "catalogued/letter_35.md", "modern_english_translation": "Jesus\n\nIn Antwerp, the 22nd day of July, in the year 1533\n\nRight worshipful Master Dawes, I commend myself to you as one not yet known to you, but I trust in God that within a short time we shall be better acquainted, etc.\n\nSir, the reason for my writing to you at this time is to certify you that Master Flege, my good master and friend, has at various times spoken to me of your goodness and your honest, true dealing, and of the wish that you would have him send certain wares that you have advised him of by your letters written to him, as I understand from your last letter, which you sent him by this bearer, Ariane Johnson, shipman of Antwerp. That letter is dated the first Monday in Lent [3 March 1533], etc. Sir, Master Flege has so much to do here with his merchandise of stall and of cloths, that he has no great inclination to trade into England. Sir, therefore, having seen his letters sent by you to him, and that you would be glad to show his servant the profits of your country, I have at this time heard of a hoy and have bought the following wares, and I purpose to be with you within this month after the writing of this letter.\n\nThese are the wares: 4,000 lb. of iron of Namur at 4s 3d per hundredweight; 2,000 pots at 3s 4d per hundredweight; 20,000 paving tiles at 3s 6d; 4,400 lb. of hops at 7s per hundredweight in small bags; and 2 hundredweight of Bay salt at £12 per hundredweight (the hundredweight being 10 and a half ways, London measure); 24 barrels of fustians at 12s per barrel; and 12 barrels of white salt; and I have also laded certain of 1,000 staple feather balls, of which there are as yet none come into Scotland. Also I shall bring with me a hundredweight of dressed flax, and hand baskets, and lanterns, and some bellows, and a thousand trenchers. Also I shall bring with me a small barrel of sturgeon to make acquaintance with.\n\nSir, I pray you to make known to your acquaintances that you have these wares coming, for I will do well by you. You should keep these wares as your own when they arrive, and, Sir, if you could make provision for a hundredweight or two hundredweight of cheeses and butter at a reasonable price, I would have it at my coming, if I might have licence for it. I pray you do your best against my coming, and then you shall know more of my mind. Sir, if you can buy mustard seed for 8s, 10s, or 12s a quarter, it would fetch a good price here; also tallow, and bacon, and malt, and barley, with various other goods.\n\nSir, I would have written to you at various times before now, but I could not find out how my letters might be conveyed to you, until this my friend Ariane Johnson showed me that he is very well acquainted with you. Sir, this bearer can tell you more of my mind, for he knows me well. Sir, thus I am bold to write to you at this time: I trust it shall be to your profit and mine. Also, by God's grace, we preserve in health. My good wishes to Maldon.\n\nBy your own to the best of his power, John Smyth, grocer, and one of the overseers to the Merchant Adventurers in Antwerp, and have been these ten years.", "summary": "Veteran Merchant Adventurer John Smyth writes from Antwerp to John Dawes of Maldon, Essex, introducing himself on the recommendation of a mutual contact and proposing a trading partnership. He lists a remarkable range of goods already purchased speculatively — iron, pots, paving tiles, hops, salt, fustians, feather balls, flax, and sturgeon 'to make acquaintance with' — and asks Dawes to source dairy, grain, and other commodities for the return trade.", "letter_type": "business", "themes": ["trade", "shipping", "financial", "social_networks", "food", "crafts"], "people_mentioned": ["John Smyth", "John Dawes", "Master Flege"], "goods_mentioned": ["Namur iron", "pots", "paving tiles", "hops", "bay salt", "fustians", "white salt", "feather balls", "dressed flax", "baskets", "lanterns", "bellows", "trenchers", "sturgeon", "cheeses", "butter", "mustard seed", "tallow", "bacon", "malt", "barley"], "notable": true, "notable_reason": "The sheer breadth of goods offers a vivid panorama of Anglo-Flemish import-export trade, and the note that feather balls are unknown in Scotland hints at the uneven spread of consumer goods."}, {"id": 36, "sender": "Marx Meyer", "recipient": "the Lübeck council", "date": "1533 Sept", "origin": "London", "destination": "", "language": "Low German", "original_transcription": "Mynen fruntlichgen grut tho voren etc. B[esondere], groth, gunstygen h[erren] unde\nguden frunde, ick kann juwen wisheyden nicht verbargen, wo ick faren bin unde noch\ndachlichges fare, angande myt den Engelschen. Den sulven sin yclickke guder ghenamen\nin unser feide schepe, welck sorghe unde moeige ick sampt dem ghemeinen koppman up\ndem Stalhave darfan hebbe. Ys juw nicht tho schryven, se hebben uns aallena dach vor dem\nkanyche unde bryngen ereb klacht an, wo se tho rade werden unde alwat se vorbringen,\nmoth recht syn sunder jyngerleyge insage, so dat ick dat aver in groter moeyge si sampt\ndem kopman. Se willen de goder sunder resspyt van dem kopman betalt hebben. So ys\nmyn beger, dat en. Erbr. wil dartho trachten, dat sadane goth, alse in den hoeigen mach\nsin, alde wi ghenamen hebben, mach by enander blyven unde nicht ghebuttet werden,\nwenthe yt syn nene feygende goder. Dar ys mangerleige goth inne, alse zergelt unde syden\nghewant, dar mi ser lede vor ys, dat sodane got schentlich wil vorruckket wenden durch\nde botlude unde schypperen, de doch nicht thobernen laten unde stellen ut dem weghe,\nwat se konen, den en. Erbr. sy dar frey tho vor vordacht, wes so vorruckket awerta, mate\ngy wolc bethalen, so ferne gy den Stalhof nicht sonder Hense myt der freyheyt enberen\nwillen. Vel beter weren 10 centena goldes vorlarend, den sodane freyheyt. Denack vorsen\nen. Erbr. wert so in de sake sen, dat yt nycht wert not synde.\n\nOck, gunstygen heren, ys dar en Spangert anghetastet, welcker vorgunt ys, alse Gasck\nRemradte tho hulppe tho synen rechte tho komen. So en. Erbr. thoradeble wol bewosst\n\n  10  Note that in this piece, the letter ‘u’ is signalled by two superscribed dots (ü) or a breve (ŭ) in order to distinguish\nit from two minims. Since this has no effect on the pronunciation of the word, ‘ü’ and ‘ŭ’transcribed as ‘u’.\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 33\n\nys, dat sulve schyp, welck so den Spangerden ghenamen ys, ys ghenamen in der Dunse.\nDat sulve wil de kanynck van Enghelant vor synen strom vorbydden. Datsulve schyp wil\nik framylick ock wedderumme ghegheven hebben unde dartho vorgulden hebben, wesf\nhe [sc. Henry VIII] dencklet darvor tho hebben, dat wi sodane schyp up synen strome\nghenamen hebben. So ys myn fruntlych ghebede, dat dat sulve gut maghe byenander\nbleven. Unde ofte de boglude unde dat ander folck dar wes afghenamen hadden, dat yt\ndar wedder by frame edder niemot yt ock tho dem durresten pennyck betalen.\n\nWyder, gunstygen heren, ys van noden, dat en. Erbr. anghesychtes dusses breves enen\nbref vorramet, so juw wol konen, unde wer wol nodych, dat dar en beredet, man mede\nqweme van unsen seckkerteren darsulvest byschreven unde ock muntlich werven leten,\ndat wy uns sunck ens gthog syner kannychlyck dorchlughtychheyt nycht vorsen hadden,\ndat he so scholde myt den unsen hebben umghegan de wyle wy dyt ganse jar den synen\nhebben myt aller barlychheyth vorghegan unde nergen myt vorhyndert, dat unsi bejegent\nys, dardorch uns nadel ghekamen ys, so dat wy unsen feyden wolden wol enen groten\nafbrack ghedan hebben, dat nergen dorch vorhyndert ys alse dar dorch, dat ick dar byn\nan lant gheholden, so gy dat wol bettofferenj werden, wo ick schryve.\n\nGunstygen heren! Gy magen dyt bet vorstan, wo ick gheschreven hebe de olderman\nsampt dem ghemenen kopman, de hebben ju ock alle umsstendych heyt wol gheschreven,\nunde de olderman Hans Molenbeke sampt des kopmans rat hebben allen flyt vorghewent,\ndat se mi gerne up freyge fote ghehat hadden, den yt mochte mi nycht ghebaren, aver ick\nmach wol gan un stan, wor ick wil, den ut dem lande mach ick nycht, den ick vorhape mi\nen. Erbr. wyl syck de sake so behertegen unde vorschryven, dat ick maghe los werden, unde\nde kopman mage unbemoeyget blyve. Datum in Lunden, den 9. dach Semtembri [15]33.\n\n[signed] Marx Meyger\nJw d[ener]\n\nb sclach follows, struck through HL.\n\nd Corrected in HL from vorlasen.\n\na-a Interlined HL.\nthrough HL.\nGasckrem and radt and struck through HL.\nHL.\nthrough HL.\nfrom bet stofferen.\n\ng-g Interlined above war, struck through HL.\n\ni bege[nt] follows, struck through HL.\n\nc so follows, struck\ne tho entered between\nf heb follows, struck through\nh h[egen] follows, struck", "editorial_notes": "j Corrected in HL", "archival_reference": "HL AHL ASA, Externa Anglicana 461 (formerly classified as Anglicana II\nApp. 1512-33). Bl. 28-29. Original holograph letter. Paper. Unsealed. On the\ndorse: Den erbern unde wol wisen heren borghemeisteren unde rat der\nstat Lübe mynen gunstigen frunde g[egeven]; much lower down: Marx\nMeier. Lübeck chancery entry in the upper left-hand corner on the verso of\nthe first page: Hanße Angl. 1533.10", "file": "catalogued/letter_36.md", "modern_english_translation": "My friendly greetings beforehand, etc. Esteemed, great, gracious lords and good friends: I cannot conceal from your wisdoms how I have fared and continue to fare daily in the matter concerning the English. They have seized certain goods in our open ships, and what worry and trouble I, together with the common merchant community at the Steelyard [Note: the Hanseatic Kontor in London], have had on account of this is not to be put into writing. They bring us before the king every single day and present their complaints, and however they choose to frame things and whatever they put forward must be accepted as right without any contradiction whatsoever, so that I find myself in great distress together with the merchants. They wish to have the goods paid for by the merchants without delay. It is therefore my request that your Honourable Council endeavour to ensure that such goods as may be in the hold, which we have taken, remain together and are not dispersed, for they are not enemy goods. There are various kinds of goods among them, such as money and silken cloth, and I am greatly troubled that such goods should be disgracefully removed and diverted by the boat-men and skippers, who nevertheless do not allow themselves to be restrained and put out of the way what they can. Your Honourable Council should be well aware in advance of this, for whatever is diverted away, you will have to make good — so long as you do not wish to lose the Steelyard together with the Hanse and its privileges. Far better would it be to lose ten hundredweight of gold than such a privilege. Therefore I trust your Honourable Council will look into the matter in such a way that it will not prove necessary.\n\nAlso, gracious lords: a Spaniard has been seized, who has been permitted, as Gasck Remrade, to come to his legal remedy. As your Honourable Council will doubtless be well aware, the very ship which was taken from the Spaniard was seized in the Downs [Note: a well-known anchorage off the Kent coast in the English Channel]. The King of England now wishes to prohibit that same vessel on account of his waters. I would urgently request that that same ship be given back, and moreover that compensation be made for whatever he considers himself owed for the fact that we seized such a ship in his waters. It is therefore my friendly petition that those same goods may remain together, and if the boat-men or other persons have removed anything from them, that it be restored, or else that someone pay for it at the very highest price.\n\nFurthermore, gracious lords: it is necessary that your Honourable Council, upon receipt of this letter, compose a letter as well as you are able, and it would be quite necessary that a suitable man come from our secretaries there, both in writing and in spoken petition, to the effect that we had not at all expected such treatment from his Royal Highness — that he should have dealt with our people in this manner, while throughout this entire year we have treated his subjects with all courtesy and have not in any way hindered them; and that the harm which has befallen us, by which we have been damaged, is such that we could well have done our enemies great injury, and nothing hindered this anywhere except the fact that I was detained here on land — as you will come to understand well enough from what I write.\n\nGracious lords: you may understand this better from what I have written to the Alderman together with the common merchant community; they too have written to you concerning all the circumstances in full. And the Alderman Hans Molenbeke, together with the merchant council, have applied every effort to have me released on free terms, but this could not be brought about for me. Nevertheless, I may go and stand wherever I wish within the city; I may only not leave the country. I therefore hope your Honourable Council will take this matter to heart and write accordingly, so that I may be freed and the merchants may remain undisturbed. Written in London, the 9th day of September 1533.\n\nMarx Meyer,\nYour servant.", "summary": "Hanseatic merchant Marx Meyer writes urgently from London to the Lübeck council describing a diplomatic crisis: English authorities have seized Hanseatic goods and are compelling Steelyard merchants to accept rulings without any right of reply. Meyer, detained and unable to leave England, warns that losing the Steelyard's privileges would be catastrophic — 'better to lose ten hundredweight of gold than such a privilege' — and begs the council to send a diplomatic petition.", "letter_type": "mixed", "themes": ["politics", "diplomacy", "trade", "financial", "shipping"], "people_mentioned": ["Marx Meyer", "Hans Molenbeke"], "goods_mentioned": [], "notable": true, "notable_reason": "A first-hand account of the political pressure bearing down on the Hanseatic Steelyard in London, capturing a merchant caught between two sovereign powers and the fragility of long-established trading privileges."}];
const DOCUMENTS = [{"id": 37, "section": "II", "section_title": "Capture of the ship of Adrian Johnson off England 19 Aug. 1533", "title": "Interrogations of Adrian Johnson and Hinrik Crn regarding the capture of Johnson’s ship off the south coast of England on 19 Aug. 1533", "date": "[15]33 Sept", "location": "Lübeck", "language": "Low German", "content": "Copia examinationis et depositionis Adriani Johanßen naute etc.\npro spectabili senatu Lubicensi\n\n[1.]  Anno etc. 33° in der 6. indiction am 25. dage des mntes Septembris sinth uth\nfurderynge eynes erbaren rades eyn schipper von Andorpp mit nhamen Adrian Johnßen\nund Hinrick Crn vhan heren Hinrick Kerchrinck und Hermen Schute vom erbaren rade\ndartho vorordenth des morgens tho 7 uren up de cantzellye, umbe ße to examinerende\nunde to vorhorende, jodoch eynen yderen in sunderheit vorbodeschupp wurden.\n[2.]\nItem vor erst gaff heren Hinrick Karkrinck dem schipper von Andorpen vor, wor\nher, wat heyme und worhen he mit dem schepe dachte to synde. Darupp de schipper\ngeanthwordet, he horde to Andorpe tho huß, were darsulvest eyn borger und dachte myt\ndem schepe uth furderinge des kopmans nha Engelandt to synde. Wyder wurt dem schipper\ngefragett, wanner und up wat tydt Hinrick Croen de hovetman by em in de see gekamen\nwer. Darup sede de schipper, he wer by em under Engelant ummetrent am 19. dage des\nmntes Augusti up den vormiddach umbe 10 edder umbe 11 uren, wor 3 weke sees vhom\nstrande. Und wer Hinrick Croen nicht by ehm gekamen, so wolde he dat schippe in den\nstrandt gelopen hetten und also des kopmannß gudt samptlick geburghet. Furder wurdt\ndem schipper gefraget, up wat wyße Crn by em quam und wat he em dede. Antworde\nde schipper, he dede my sunderlinx nicht, sunder dat he man eynen schote wol hoch inth\nsegel dede. Doen hedde he vort gestreken wyder dem schipper gefraget, wanner und\nworumme he dat gudt uth syneme schepe in Crns borgerde muste schepen. Doen sede de\nschipper, dat schip wurdt so vul waters, dat idt nicht mogelick waß tho reddende, wenthe\nick lepp tho jar dat schipp to Ostende in Flanderen up de grunth, worvon dat schipp eyne\nschorynge greth ock also seer, dat he de borde mith wagenschotte muste wedder vorfullen\nlaten, woruth he sick befruchtede, dat schip upt nyge eyne schanferynge hadde gekregen\nund dhoen dat schipp nicht to reddende stundt. Doen wurt dat gudt wol hart jegen den\navent wenthe schyr na midtnachten uth dem schepe in Kronß bogerde gehysset. Thon\nlesten wurth dem schipper ernstlick und uppt scharpeste na gelde gefragett, so he ock in\nsyneme schepe scholde gehat hebben und wen idt tohorde. Darup anthworde de schipper\n\n  11  Note that in this piece, the letter ‘u’ is signalled by two superscribed strokes (ű) or a breve (ŭ) in order to\ndistinguish it from two minims. Since this has no effect on the pronunciation of the word, ‘ű’ and ‘ŭ’ are\ntranscribed as ‘u’.\n\n\n1 35\n\nund soede, in dar was gelt in twe klene sokelen, worvan den eyn seckelyn int schipp by\nde pumpen dall smethen, und alse idt noch umbe middach uthen waß, vormende he sick\nnoch beyde schip und gudt to beholdende. Men den anderen seckelyn droch he by sick\ninde mouwen, beth dat he den Hinrick Crn doen muste. Und he tellede, dat forth waß\nummetrenth 34 edder 25 stücke goldes. Unde dat sulvige gelt, so he mende, horde eynem\nKolner tho. Dat worden de breve wol uthwyßen, men sust wuste he von genem gelde mer.\n[3.]  Thom anderen wardt Hinrick Krn gefraget, wo he by den schipperen gekamen\nwere. Darup Hinrick Krn hefft geanthwordet, he sy myth adema bogade uth bevell der\nflute hinder gebleven, de nucht under Dawerin gelegen. Darsulvet deß morgens tho segel\ngegn, vormende na afscheyde der flute de Dunße to finden, do se dar nicht weren, sochte\nhe vorth under idt vorlandt, dar wol 26 marßen schepe legen, aver de ern nicht, darmyt\nhe nu von dar gelopen fogede he ersten den Middelburgeschen bmanneb und dwanck\nohne tho strikende und dhoen wurth vort eyn schote dem Andorpeschen manne Adrian\nJohanßen syn segel wol hoch vhon dem holschepeß geschaten dede ock vorth stricken\nund quam ihn mytten bote he ehm thoschyckede an borth. Dat wart umbtrent up den\ndach to 10 offte 11 uren. Unde de schipper mochte wol seggen, wat he wil, wer he nicht by\nem gekamen, he hadde nicht eyn stucke gudes mogen berghen, so wul waters wurdt dath\nschipp van deß middages ahn beth jegen den aventh. Wyder sede ock Hinrick Crn, wo\nhe den schipper genodigett hadde umbe ethlich gelt, so in deme schepe sin scholde, van\nsick to donde, des hefft ohme dhe schipper eyn kleyn seckelyn eyns vingers lang uth der\nmouwen gedaen und vorth in jegenwordicheit des schippers getelt weren 31 engelluthen\nund 4 dubbelden ducaten etc. Geschreven bynnen Lubeck up der cantzelye darsulvest\nahm jar, dage, mnte und indiction, wo baven berort etc.\n\nTuge: Johan Wilmessen und Johann Hußer alle burger toc Middelburch\n\nNicolaws Clone notarius ad premissa legittime requisitus manu\npropria scripsit.\n\nAuscultata et collacionata est presens copia per me Michaelem Petri\nclericum Szwerinnensis diocesis publicum apostolica et imperiali\nauctoritatibus notarium et cum suo originali concordat teste manu\npropria.\na-a Interlined HL.\nfollows, struck through HL.\n\nb-b Interlined above whane, struck through HL.\n\nc Miller\n\nEditorial note: Although the translations of the depositions of Adrian Johnson and Hinrik Kron\ninto Latin printed here as no. 38 and 39 are substantially identical, it is sensible to print both\nseparately, particularly since no. 38 is clearly intended for internal use (being copied into a paper\nbooklet with other documents), while the intended use of no. 39 (a stand-alone document) is\nunclear.12 However, given how no. 39 is written – in a clear Renaissance hand on well-spaced\nlines13 – it must have had a particular function. Compare no. 38, closely written in a cursive\n\n  12  Note that no. 39 is mis-dated by exactly one year.\n  13  no. 39 takes six size 4 pages to transcribe substantially the same text which no. 38 manages to cram into just three\n\npages.\n\n\nGothic hand, with closely-spaced lines clearly designed to contain as much text as possible on\nthe page without sacrificing legibility\n\nwith the same lines in no. 39, written in an eminently clear hand, the lines being generously spaced", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 8v-9v. (original classification\nby Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn\nup by Michael Petri in 1525, indictione tercia, Monday 23 ...11", "file": "catalogued/doc_37.md", "modern_english_translation": "Copy of the examination and deposition of Adrian Johnson, sailor, etc., before the honourable council of Lübeck.\n\n[1.] In the year etc. 1533, in the 6th indiction, on the 25th day of the month of September, at the instigation of the honourable council, a skipper from Antwerp by the name of Adrian Johnson and Hinrik Kron were summoned in the morning at 7 o'clock to the chancellery by the lords Hinrik Kerchrinck and Herman Schute, appointed by the honourable council for this purpose, in order to examine and hear them — each one separately, however.\n\n[2.] Likewise, first of all, lord Hinrik Kerchrinck put it to the skipper from Antwerp where he was from, what his home was, and where he intended to go with the ship. To this the skipper answered that he was based in Antwerp, was a citizen there, and intended to sail with the ship to England at the instigation of the merchants. Further, the skipper was asked when and at what time Hinrik Kron, the captain, had come to him at sea. To this the skipper said that he had come to him off England, on around the 19th day of the month of August, in the forenoon at around 10 or 11 o'clock, about 3 sea-miles from shore. And if Hinrik Kron had not come to him, he would have run the ship aground and thereby saved all the merchants' goods. Further the skipper was asked in what manner Kron came to him and what he did to him. The skipper answered: he did nothing particular to me, except that he fired a shot fairly high into the sail. Then he [the skipper] had immediately struck [his colours]. Further the skipper was asked when and why he had to transfer the goods from his ship into Kron's bogarde [Note: a type of flat-bottomed river or coastal vessel]. The skipper said the ship took on so much water that it was impossible to save it, since the previous year he had run the ship aground at Ostend in Flanders, from which the ship had received a crack so large that he had had to fill the sides back up again with wainscoting boards; from this he had feared that the ship had sustained another split and that the ship was then beyond saving. So the goods were hoisted with some difficulty from the ship into Kron's bogarde from toward evening until nearly midnight. Finally, the skipper was questioned earnestly and most sharply about money that he was also supposed to have had in his ship, and to whom it belonged. To this the skipper answered and said there was money in two small pouches, of which one pouch had been thrown down into the ship beside the pump while it was still midday, as he still hoped to save both ship and goods. But the other pouch he carried on his person inside his sleeve, until he had to give it to Hinrik Kron. And he counted it out, and it amounted to approximately 34 or 25 pieces of gold. And that same money, as he understood, belonged to a man from Cologne. The letters [i.e. the documents accompanying the cargo] would confirm that, but otherwise he knew of no other money.\n\n[3.] Secondly, Hinrik Kron was asked how he had come to the skipper. To this Hinrik Kron answered that he had been left behind from the fleet by order of the fleet, with his bogarde, overnight near Dawerin [Note: possibly Davryn / the Downs area, off the Kent coast]. There in the morning he set sail, expecting after the departure of the fleet to find the Danes, but since they were not there, he searched further along the coast, where some 26 vessels lay at anchor, but not his own — which is why he sailed away from there; he first obliged the man from Middelburg to strike [his colours] and then fired a shot fairly high into the sail of the man from Antwerp, Adrian Johnson, from a certain ship, who likewise immediately struck and came to him in the small boat he sent to him, coming alongside at around 10 or 11 o'clock in the day. And whatever the skipper might say, if he [Kron] had not come to him, he would not have been able to save a single piece of cargo, the ship took on so much water from midday toward evening. Further Hinrik Kron also said that he had pressed the skipper to hand over some money that was supposed to be in the ship; the skipper took out of his sleeve a small pouch about a finger's length and immediately, in the presence of the skipper, there were counted from it 31 English gold coins called engellotten [Note: English gold angels] and 4 double ducats.\n\nWritten within Lübeck at the chancellery there, in the year, day, month and indiction as stated above.\n\nWitnesses: Johan Wilmessen and Johann Hußer, both citizens of Middelburg.\n\nNicolaus Clone, notary, duly called to the foregoing, wrote this with his own hand.\n\nThe present copy has been audited and collated by me, Michael Petri, cleric of the diocese of Schwerin, public notary by apostolic and imperial authority, and it agrees with its original, as attested by my own hand.\n\n---", "summary": "Formal examination conducted before the Lübeck council on 25 September 1533, recording separate depositions from Adrian Johnson (skipper of Antwerp) and Hinrik Kron (Lübeck captain) regarding the capture of Johnson's ship off the south coast of England on 19 August 1533. Johnson describes being boarded after a warning shot, the transfer of goods due to the ship taking on water, and the surrender of money hidden in his sleeve; Kron largely corroborates the seizure while defending his actions as a salvage. The document is authenticated by the notary Nicolaus Clone and later certified as a true copy by Michael Petri, notary of the diocese of Schwerin.", "document_type": "deposition", "themes": ["piracy", "legal_proceedings", "maritime", "testimony", "goods_seizure", "notarial", "financial"], "people_mentioned": ["Adrian Johnson", "Hinrik Kron", "Hinrik Kerchrinck", "Herman Schute", "Johan Wilmessen", "Johann Hußer", "Nicolaus Clone", "Michael Petri"], "goods_mentioned": [], "notable": true, "notable_reason": "Provides direct eyewitness testimony from both the victim and the privateer captain, including the specific detail of gold coins (31 English gold angels and 4 double ducats) hidden in the skipper's sleeve, giving rare insight into the mechanics of a 16th-century maritime seizure."}, {"id": 38, "section": "II", "section_title": "Capture of the ship of Adrian Johnson off England 19 Aug. 1533", "title": "Translation of the depositions of Adrian Johnson and Hinrik Kron into Latin", "date": "1533 Sept", "location": "Lübeck", "language": "Latin", "content": "1 37\n\nTranslata fuit, ut sequitur, hujusmodi examinationis et depositionis\ncopia\n\n[1.]  Anno Domini 1533, indictione asextaa, die vero vicesima quinta mensis Septembris\nsunt ex solicitatione spectabili senatus Lubicensis quidam rector navis sive nauta de\nAnthwerpia nomine Adrianus Johansen et Hinricus Crn capitaneus a spectabilibus\ndominis Hinricob Kerrinck et Hermanno Schuten consulibus Lubicensibus a spectabili\nsenatu Lubicensi ad hoc deputatis mane hora septima in cancellaria Lubicensi tamen ad\ndivisam vocationem cujuslibet examinati et interrogati.\n[2.]\nIn primis idem prelibatus dominus Hinricus Kerckrinck predictum Adrianum\nrectorem navis interrogavit, unde aut ex qua patria esset et quo navigare intendisset. Ad\nhec idem Adrianus respondit et dixit fore ex Anthwerpia et inibi se esse civem fuissetque\nintentionem ad solicitationem mercatorum ad Angliam navigandi. Ulterius fuit idem\nAdrianus interrogatus, quando et quo tempore Hinricus Croen Lubicensis capitaneus cin\nmari ad navem suamc ad eum venisset et seu ei applicuisset. Ad hoc idem Adrianus rector\nnavis respondit et dixit, quod ad navem ejus sub limitibus seu confinibus Anglie die decima\nnona mensis Augusti citra decima vel undecima horis ante meridiam tria miliaria maris\na litore venisset. Et si idem Hinricus Crn capitaneus ei non applicuisset, extunc navem\nsuam ad litus navigasset et ita bona mercatorum insimul cvelletc redimisse. Amplius dictus\nAdrianus a dicto domino Hinrico consule interrogabatur, per quem modum Hinricus\nCrn capitaneus ei applicuisset et quid ei fecisset. Ad quod dictus Adrianus Johanson\nnauta respondit, quod ei singularius nihil fecisset, nisi quod ei saltem unum ictum globuli\nsatis alte ad velum navis injecisset et sic protinus se dedisset. Adhuc idem Adrianus nauta\nulterius de dicto domino Hinrico consule fuit interrogatus et examinatus, quando et quare\nipse bona sua sibi commissa de dicta sua hoya exonerasset et navi Hinrici Crns capitanei\nreimposuisset. Tunc Adrianus Johansen respondit et dixit, quod pro redemptione bonorum\nin dicta sua navi existencium hoc fecisset, quia navis sua adeo aquosa et aquis impleta\nsuffecta fuerat, quod ei impossibile foret, bona ista redimere. Nam anno preterito dictam\nhoyam suam nuncupatam ad Orientem in Flandria ad fundum navigasset, et propterea\nnavis hujusmodi laterata et lesionem passa fuisset, adeo etiam quod superiores partes\nejus certi asseribus cogebatur reparare. Ex hoc ipse timmisit navem predictam de novo ac\niterato lesionem recepisse. Et ex qua redimenda spes non fuerit bona predicta a vespertino\ntempore post medium nocte ex sua ad dicti Hinrici capitanei navem fuerunt deducta et\nreposita. Postremo fuit idem Adrianus solemniter et acute examinatus et interrogatus de\ncertis pecuniis in dicta hoya, ut dicebatur, existentibus et ad quem pecunie iste pertinebant.\nAd quam interrogationem sepedictus Adrianus respondit et dixit, verum esse et nonnullas\npecunias in duobus parvis sacculis fuisse, quorum unum ex dictis sacculis ad aquehaustum\ndicte navis basse preterisset. Et cum in meridie fuisset, sperasset adhuc navem et bona\nretinere. Reliqum vero sacculum penes se in manica obtinuisset, quousque Hinricob Croen\ncapitaneo cogebatur porrigere. Et statim pecuniam istam de dicto sacculo numeravit et\nnumero fuisse referebat triginta quatuor vel viginti quinque aureos (ut ipse verius credebat),\nspectantes ad quendam Coloniensem. Et quod littere bene demonstrarent et sic de nullis\naliis pecuniis amplius furet.\nItem deinde examinatus et interrogatus fuit predictus Hinricus Crn, quomodo ipse\n[3.]\nad predictum Adrianum rectorem navis venisset seu ei applicuisset. Ad quod idem Henricus\n\n\nCrn capitaneus respondit et dixit, quod ipse cum sua navi bogerde wulgariter nuncupata\nex commissione classis Lubicensis se juxta noctem postergasset et penes Daveren moram\nhabuisset. Et inibi de mane se navigaturum et ad velum preparasset, existimando juxta\nrecessum classis portum de Dunse aggressum. Et cum classem suam inibi non repperit,\nulterius ante littus juxta terram quesivisset. Et aliam classem 26 numero navium et non\nsuam invenit. Et cum hoc abinde navigasset invenissetque primitus virum de Middelborg,\nipsumque velum relaxandi coegit et consequenter tunc unus ictus bombarde ad Adriani\nJohnsen viri de Anthwarpia velum navis eum satis alte a certis projectus fuit, qui eum ad\nstatim se dedisset, et parva navicula sibi obviam venisset in die ad decimam vel undecimam\nhoram adjungendo eum, quod dictus Adrianus diceret, quod vellet, si ei non applicuisset,\nminimam partem suorum bonorum, ex quo dicta sua navis a meridie usque ad vesperum\nadeo aquosa et aquis impleta fuisset, redimisset. Item ulterius idem Hinricus Crn dixit et\nallegavit, quod ipse predictum Adrianum rectorem navis tradendo de se certas pecunias in\ndicta navi existentes angariaverat recepissetque ab eo ex manica sua sacculum longitudinis\nunius digiti numerasseque dictas pecunias de dicto sacculo in presentia dicti rectoris navis\nfuisse numero in eodem triginta unum florenos aureos Anglicanos vocatos engellotten et\nquatuor duplices ducatos sive dupiones.\n[4.]  Actum Lubice, in cancellaria Lubicensi ibidem anno, indictione, die, mense supradictis,\npresentibus ibidem Johanne Wilemessen et Johanne Huster civibus de Middelborg testis\nvocatis atque rogatis.\n\nNicolaus Clone notarius ad premissa legitime requisitus manu\npropria scripsit\n\nAuscultata, collacionata ac diligenter translata est presens copia per\nme Michaelem Petri clericum Szwerinensis diocesis publicum sacris\napostolica et imperiali auctoritatibus notarium et cum suo originali\nin effectu concordat, quod attestor manu propria.\n\na-a Interlined above septima, struck through HL.\nHinricus.", "editorial_notes": "c-c Entered in the left margin with catchmark HL.\nb Corrected in L from", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 10r-11r (original classification\nby Dreyer: Acta Anglicana, Appendix 2; reclassified as ASA, Externa\nAnglicana no. 1606). Contemporaneous copy. Paper booklet bound in a\nnotarial instrument drawn up by Michael Petri in 1525, indictione tercia,\nMonday 23 ... Unsealed.", "file": "catalogued/doc_38.md", "modern_english_translation": "The copy of such an examination and deposition was translated as follows.\n\n[1.] In the year of the Lord 1533, in the sixth indiction, on the 25th day of the month of September, at the instigation of the honourable council of Lübeck, a certain master of a ship, or sailor, from Antwerp named Adrian Johnson, and Hinrik Kron, captain, were examined and questioned in the morning at the seventh hour in the chancellery of Lübeck — each of those examined being summoned separately — by the honourable lords Hinrik Kerrinck and Hermann Schute, councillors of Lübeck, appointed for this purpose by the honourable council of Lübeck.\n\n[2.] First, the aforesaid lord Hinrik Kerckrinck asked the aforesaid Adrian, master of the ship, where he was from or from what homeland, and where he had intended to sail. To this the same Adrian answered and said that he was from Antwerp and was a citizen there, and that it had been his intention to sail to England at the instigation of merchants. The same Adrian was further asked when and at what time Hinrik Croen, captain of Lübeck, had come to his ship at sea and had approached him. To this the same Adrian, master of the ship, answered and said that he had come to his ship within the bounds or limits of England on the nineteenth day of the month of August, at around the tenth or eleventh hour before noon, three sea-miles from shore. And if the same captain Hinrik Kron had not approached him, he would then have sailed his ship to shore and thus saved all the merchants' goods. The said Adrian was further asked by the said lord Hinrik, councillor, by what means captain Hinrik Kron had approached him and what he had done to him. To this the said Adrian Johnson, sailor, answered that he had done nothing particular to him, except that he had fired at least one shot of a cannon ball fairly high into the sail of the ship, and thus he had at once surrendered. The same Adrian the sailor was still further examined and questioned by the said lord Hinrik the councillor, when and why he had unloaded his goods entrusted to him from his said hoy [Note: a type of small coastal sailing vessel] and re-loaded them onto the ship of captain Hinrik Kron. Then Adrian Johnson answered and said that he had done this for the preservation of the goods existing in his said ship, because his ship had been made so leaky and filled with water that it would be impossible for him to save those goods. For in the previous year he had run his said vessel, named \"to the East,\" aground in Flanders, and on account of this the ship had been damaged and suffered injury, so much so that he was compelled to repair its upper parts with certain planks. From this he concluded that the aforesaid ship had again and afresh received an injury, and since there was no hope of saving it, the aforesaid goods were from evening time until after midnight conveyed from his ship and placed in the ship of the said captain Hinrik. Finally, the same Adrian was solemnly and sharply examined and questioned about certain monies said to be in the said hoy, and to whom those monies belonged. To which question the oft-mentioned Adrian answered and said that it was true that some monies had been in two small pouches, one of which had been thrown down to the bilge-pump of the said ship; and since it had been midday, he had hoped still to keep both ship and goods. But the remaining pouch he had kept with him in his sleeve, until he was compelled to hand it to captain Hinrik Croen. And immediately that money was counted from the said pouch and he stated the number to be thirty-four or twenty-five gold coins (as he himself more truly believed), belonging to a certain man from Cologne; and that the documents would show this clearly, and that he knew of no other monies.\n\n[3.] Likewise, the aforesaid Hinrik Kron was then examined and questioned as to how he had come to the aforesaid Adrian, master of the ship, or had approached him. To which the same captain Hinrik Kron answered and said that he, with his ship commonly called a bogarde, had by order of the Lübeck fleet fallen behind overnight and had stayed near Daveren [Note: the Downs off the Kent coast]. And there in the morning he had prepared to sail, thinking to make for the port of Dunse [Note: possibly Dungeness or the Downs] after the fleet's departure; and when he did not find his fleet there, he searched further along the coast close to shore. And he found another fleet of 26 ships, but not his own. And when he had sailed away from there, he first found a man from Middelburg and compelled him to lower his sail, and consequently one shot of a cannon was then fired fairly high into the sail of the ship of Adrian Johnson, the man from Antwerp, by certain persons, who had likewise immediately surrendered, and the small boat which had been sent toward him came alongside at the tenth or eleventh hour of the day; and let the said Adrian say what he would — if he had not approached him, he would not have saved the least part of his goods, since his said ship had been from midday to evening so leaky and filled with water. Likewise, the same Hinrik Kron further said and stated that he had compelled the aforesaid Adrian, master of the ship, to give over certain monies existing in the said ship, and had received from him from his sleeve a pouch about one finger's length, and had counted those monies from the said pouch in the presence of the said master of the ship, the number therein being thirty-one English gold florins called engellotten and four double ducats, also called dupiones.\n\n[4.] Done at Lübeck, in the chancellery of Lübeck, in the same year, indiction, day, and month as aforesaid, with Johann Wilemessen and Johann Huster, citizens of Middelburg, present there as witnesses, called and requested.\n\nNicolaus Clone, notary, duly called to the foregoing, wrote this with his own hand.\n\nThe present copy has been audited, collated, and diligently translated by me, Michael Petri, cleric of the diocese of Schwerin, public notary by holy apostolic and imperial authority, and it agrees in substance with its original, which I attest with my own hand.\n\n---", "summary": "A Latin translation of the same depositions recorded in Doc 37, produced by the notary Michael Petri and certified as agreeing in substance with the Low German original. It preserves the same testimony from Adrian Johnson and Hinrik Kron regarding the capture off England on 19 August 1533, with the ship named \"to the East\" explicitly identified. The document adds the formal Latin notarial apparatus and specifies the vessel type as a \"hoy.\"", "document_type": "deposition", "themes": ["piracy", "legal_proceedings", "maritime", "testimony", "goods_seizure", "notarial", "financial"], "people_mentioned": ["Adrian Johnson", "Hinrik Kron", "Hinrik Kerckrinck", "Hermann Schute", "Johann Wilemessen", "Johann Huster", "Nicolaus Clone", "Michael Petri"], "goods_mentioned": [], "notable": true, "notable_reason": "Identifies the ship by name (\"to the East\") and demonstrates the administrative practice of producing bilingual notarial records, reflecting the multilingual documentary culture of Hanseatic legal proceedings."}, {"id": 39, "section": "II", "section_title": "Capture of the ship of Adrian Johnson off England 19 Aug. 1533", "title": "Interrogation of Adrian Johnson and Hinrik Croen regarding the capture of Johnson’s ship off the coast of England on 19 Aug. 1533", "date": "1534 Sept", "location": "14", "language": "Latin", "content": "Unsealed.\n\n[1.]  Anno Domini 1534a, indictione septima, die vicesima quinta mensis Septembris\nsunt ad solicitationem spectabilis senatus Lubecensis quidam rector navis sive nauta de\nAnthwerpia nomine Adrianus Johansen et Henricus Croen capitaneus a spectabilibus\ndominis Henrico Karckrinck et Hermanno Schuten consulibus Lubecensibus a spectabili\nsentatu Lubecensi ad hoc deputatis mane hora septima in cancellaria Lubecensi tamen ad\ndivisam vocationem cujuslibet ipsorum examinati et interrogati.\n[2.]\nIn primis idem prelibatus dominus Henricus Karckrinck prędictum Andrianum\nrectorem navis interrogavit, unde aut ex qua patria esset et quo navigare intendisset. Ad\n\n  14  Note that the document is falsely dated by exactly one year.\n\n\n1 39\n\nhec respondit et dixit fore ex Anthwerpia et inibi se esse civem fuissetque intentione ad\nsolicitationem mercatorum ad Angliam navigandi. Ulteriusb idem Adrianus rector navis\nfuit interrogatus, quando et quo tempore Henricus Croen Lubecensium capitaneus ad\nnaven suam venisset et se ei applicuisset. Ad hoc idem Adrianus nauta respondit et dixit,\nquod ad navem ejus sub limitibus seu confinibus Anglię decima nona die mensis Augusti\nvel quasi decima vel undecima ejusdem diei horis ante meridiem tria miliaria maris a litore\nvenisset, nisi idem Henricus Croen capitaneus ei non applicuisset. Extunc navem suam\nad littus navigasset, et ita bona mercatorum vellet redimisse. Amplius a dicto domino\nHenrico consule prenominato Adriano fuit interrogatus, per quem modum Henricus\nCroen capitaneus ei applicuisset et quid ei fecisset. Ad quod idem Adrianus Johansen rector\nnavis respondit, quod ei singulara nihil fecisset, nisi quod ei saltem unum ictum globuli\nsatis alte ad velum navis injecisset et sic protinus se dedisset. Adhuc idem Adrianus rector\nnavis ulterius de dicto domino Henrico consule Lubicensi fuit interrogatus et examinatus,\nquando et quare ipse sua bona sibi commissa de dicta sua navic exonerasset et navi Henrici\nCroens capitanei reinposuisset. Tunc Adrianus respondendo dixit, hoc pro redemptione\nbonorum in dicta sua navi existentium fecisse, quia navis sua adeo aquosa et aquis impleta\nsuffecta fuerat, quod ei impossibile foret bona ista redimere. Nam anno preterito dictam\nhoyam suam nuncupatam ad Orientem in Flandria ad fundum navigasset, et propterea\nnavis sua lacerata et lesionem passa fuisset, adeo eciam quod superiores partes ejus certis\nasseribus cogebatur reparare. Ex hoc ipse timmisset navim suam predictam denuo et\niterato lesionem recepisse et ex quo redimenda spes non fueritd bona predicta a vespertino\ntempore post medium noctis ex sua ad dicti Henrici capitanei navem fuerunt deducta et\ndeposita. Postremo fuit idem Adrianus acute interrogatus de certis pecuniis in dicta sua\nnavi, ut dicebatur, existentibus et ad quem pecunię hujusmodi pertinebant. Ad quam\ninterrogationem sępedictus Adrianus respondit et dixit, verum esse nonnullas pecunias\nin duobus parvis sacculis fuisse, quorum unum ex dictis sacculis ad aquehaustum dictę\nnavis basse projecisset et cum in meridie fuisset, sperasset adhuc navem et bona retinere.\nReliquum vero sacculum penes se in manica obtinuisset, quousque Henrico Croon\ncapitaneo cogebatur porrigere. Et statim pecuniam istam numeravit et numero fuisse\nreferebat triginta quatuor vel viginti quinque aureos, ut ipse verius credebat, spectantem\nad quendam Coloniensem et quod hoc litterę bene demonstrarent et sic de nullis aliis\npecuniis sciret.\n[3.]\nItem deinde examinatus et interrogatus fuit prędictus Henricus Croen capitaneus,\nquomodo ipse ad prędictum Adrianum rectorem navis venisset seu ei applicuisset. Ad quod\nidem Henricus Croen capitaneus respondit et dixit, quod ipse sua navi bogerde vulgaritere\nnuncupata ex commissione classis Lubecensis se juxta noctem postergasset et penes\nDaveron pernoctasset et inibi de mane navigaturum et ad velum preparasset existimando\nfjuxtaf recessum classis portum de Dunse aggressuros et cum classem Lubicensem inibi non\nreperit, ulterius ante littus juxta horam quesivisset et aliam classem viginti fsexf numero\nnavium vidit et suam classem non invenit et cum hac abinde navigasset invenissetque\nprimitus virum de Middelborchg ipsumque velum relaxandi coegit et consequenter tunc\nunus ictus bombardę ad Adriani Johansen viri de Anthwerpia velum navis satis alte a certis\nprojectus fuit, qui eciam ad statim se dedisset et parva navicula sibi obviam venisset in die\nad decimam vel undecimam horas dicendo eciam dictus Adrianus diceret, quid vellet, si\nei non applicuisset, minimam partem suorum bonorum, ex quo dicta sua navis a meridie\n\n\nusque ad vesperam adeo aquosa et aquis impleta fuisset, non redimeret. Item ulterius idem\nHenricus Croen dixit et allegavit, quod ipse predictum Adrianum Johansen rectorem navis\ntradendo de se certas pecunias in dicta navi existentes solicitasset recepisseque ab eo et\nex manica sua parvum sacculum longitudinis unius digiti numerasse dictas pecunias de\ndicto sacculo in pręsencia dicti rectoris navis fuisseque numero in eodem triginta unum\nflorenos aureos Anglicanos angelottes et quatuor duplices ducatus sive dupiones.\n[4.]  Acta fuerunt hec Lubeck in cancellaria Lubicensi ibidemh anno, indictione, die,\nmense supradictis, presentibus ibidem Johanne Wilmessen et Johanne Husser civibus de\nMildelborch testibus vocatis atque rogatis.\n\nNicholaus Clove notarius ad premissa testatur requisitus manu\npropria significat.\n\nAuscultata, collocinata ac diligenter translata est presens copia per\nme Michaelem Petri clericum Zwerinensem diocesis publicus sacris\napostolica et imperiali auctoritatibus notarium et cum suo originali\nin effectu concordat, quod attestatur manu propria.\n\na Corrected in HL from 1034 (M xxxiiij).\nHL.\nfuerat.\nin HL from Mildelborch.", "editorial_notes": "c exonera follows, struck through HL.\ne Corrected in HL from wulgariter.\nb idem follows, struck through\nd Corrected in HL from\ng Corrected\nf-f Interlined HL.\nh Johanne follows, struck through HL.", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 16. Contemporaneous copy. Paper.", "file": "catalogued/doc_39.md", "modern_english_translation": "[1.] In the year of the Lord 1534 [Note: misdated; should be 1533], in the seventh indiction, on the 25th day of the month of September, at the instigation of the honourable council of Lübeck, a certain master of a ship, or sailor, from Antwerp named Adrian Johnson, and Henrik Croen, captain, were examined and questioned in the morning at the seventh hour in the chancellery of Lübeck — each of them being summoned separately — by the honourable lords Henrik Karckrinck and Hermann Schute, councillors of Lübeck, appointed for this purpose by the honourable council of Lübeck.\n\n[2.] First, the aforesaid lord Henrik Karckrinck asked the aforesaid Adrian, master of the ship, where he was from or from what homeland, and where he had intended to sail. To this he answered and said that he was from Antwerp and was a citizen there, and that it had been his intention to sail to England at the instigation of merchants. The same Adrian, master of the ship, was further asked when and at what time Henrik Croen, captain of Lübeck, had come to his ship and had approached him. To this the same Adrian the sailor answered and said that he had come to his ship within the bounds or limits of England on the nineteenth day of the month of August, at around the tenth or eleventh hour of that day before noon, three sea-miles from shore; and if the same captain Henrik Croen had not approached him, he would then have sailed his ship to shore and thereby would have saved the merchants' goods. He was further asked by the said lord Henrik the councillor, by what means captain Henrik Croen had approached him and what he had done to him. To this the same Adrian Johnson, master of the ship, answered that he had done nothing particular to him, except that he had fired at least one shot of a cannon ball fairly high into the sail of the ship, and thus he had at once surrendered. The same Adrian, master of the ship, was still further examined and questioned by the said lord Henrik, councillor of Lübeck, when and why he had unloaded his goods entrusted to him from his said ship and re-loaded them onto the ship of captain Henrik Croens. Then Adrian answered and said that he had done this for the preservation of the goods existing in his said ship, because his ship had been made so leaky and filled with water that it would be impossible for him to save those goods. For in the previous year he had run his said vessel, named \"to the East,\" aground in Flanders, and on account of this his ship had been damaged and suffered injury, so much so that he was compelled to repair its upper parts with certain planks. From this he concluded that his said ship had again and afresh received an injury, and since there was no hope of saving it, the aforesaid goods were from evening time until after midnight conveyed from his ship and placed in the said captain Henrik's ship. Finally the same Adrian was sharply questioned about certain monies said to be in his said ship, and to whom such monies belonged. To which question the oft-mentioned Adrian answered and said that it was true that some monies had been in two small pouches, one of which he had thrown down to the bilge-pump of the said ship; and since it had been midday, he had hoped still to keep both ship and goods. But the remaining pouch he had kept with him in his sleeve, until he was compelled to hand it to captain Henrik Croon. And immediately that money was counted and he stated the number to be thirty-four or twenty-five gold coins, as he himself more truly believed, belonging to a certain man from Cologne, and that the documents would show this clearly, and that he knew of no other monies.\n\n[3.] Likewise, the aforesaid captain Henrik Croen was then examined and questioned as to how he had come to the aforesaid Adrian, master of the ship, or had approached him. To which the same captain Henrik Croen answered and said that he, with his ship commonly called a bogarde, had by order of the Lübeck fleet fallen behind overnight and had stayed at Daveron [Note: near the Downs], and there in the morning had prepared to sail, expecting after the fleet's departure to make for the port of Dunse [Note: possibly Dungeness or the Downs]; and when he did not find the Lübeck fleet there, he searched further along the coast close to shore, and saw another fleet of twenty-six ships, and did not find his own fleet; and when he had sailed away from there, he first found a man from Middelburg and compelled him to lower his sail, and consequently one shot of a cannon was then fired fairly high into the sail of the ship of Adrian Johnson, the man from Antwerp, who had likewise immediately surrendered, and the small boat had come alongside at the tenth or eleventh hour of the day; and also saying that the said Adrian might say what he wished — if he had not approached him, he would not have saved the least part of his goods, since his said ship had been from midday until evening so leaky and filled with water. Likewise, the same Henrik Croen further said and stated that he had pressed the aforesaid Adrian Johnson, master of the ship, to give over certain monies existing in the said ship, and had received from him from his sleeve a small pouch about one finger's length, and had counted those monies from the said pouch in the presence of the said master of the ship, the number therein being thirty-one English gold florins called angelottes and four double ducats, also called dupiones.\n\n[4.] These matters were transacted at Lübeck, in the chancellery of Lübeck, in the same year, indiction, day, and month as aforesaid, with Johann Wilmessen and Johann Husser, citizens of Middelburg, present there as witnesses, called and requested.\n\nNicholaus Clove, notary, called to the foregoing, attests and signifies this with his own hand.\n\nThe present copy has been audited, collated, and diligently translated by me, Michael Petri, cleric of the diocese of Schwerin, public notary by holy apostolic and imperial authority, and it agrees in substance with its original, which he attests with his own hand.\n\n---", "summary": "A second Latin copy of the depositions of Adrian Johnson and Hinrik Kron, closely paralleling Doc 38 but bearing a misdated year of 1534 instead of 1533 and attested by a slightly different notarial hand (Nicholaus Clove rather than Nicolaus Clone). It records the same testimony about the seizure off England, the transfer of goods, and the money counted from the skipper's sleeve. The copy was likewise certified by Michael Petri as matching the original.", "document_type": "deposition", "themes": ["piracy", "legal_proceedings", "maritime", "testimony", "goods_seizure", "notaria
