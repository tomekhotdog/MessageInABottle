 1533 in London in the presence of the undersigned notary (John Devereux of London) there appeared Robert Pagiet, citizen and alderman of London, Thomas Gale, citizen and habderdasher, 57 years old or thereabouts, as he said, Robert Wilford, 36 years old or thereabouts, and Ralph Foxley, 26 years old or thereabouts, all of good", "date": "", "location": "", "language": "Latin", "content": "In Dei nomine amen. Per hoc presens publicum instrumentum cunctis evidenter appareat,\nquod anno Domini ab incarnacione millesimo quingentesimo tricesimo tercio, indictione\nsexta, pontificatus vero sanctissimi in Christo patris et domini nostri domini Clementis,\ndivina providencia hujus nominis pape septum, anno decimo, mensis vero Septembris,\ndie vicesima [20 Sept. 1533] in mei notarii publici subscripti testiumque infrascriptorum\npresentia personaliter constituti providi viri Robertus Pagiet, civis et aldermannus civitatis\nLondon’, Thomas Gale civis et habirdassher ejusdem civitatis etatis, ut asseruit, quinquaginta\net septem annorum vel circiter, Robertus Wilford etatis triginta sex annorum vel incirca et\nRadulphus Foxley etatis triginta et septem annorum vel circiter, ambo cives et mercatores\nantedicte civitatis, ac Willelmus Wilford, civis et grocerus ejusdem civitatis, etatis viginti et\nsex annorum vel circiter, omnes viri bone fame ac conversationis illese, non vi, dolo, metu,\nfraude seu aliqua machinacione sinistra inducti, seducti, coacti, decepti vel circumventi,\nut evidenter appareat, sed ex eorum meris, liberis, puris et spontaneis voluntatibus ad\nfuturam rei memoriam et pro rei veritatis infrascriptę declaratione ad conservacionem et\ndefensionem jurium suorum, ipsorum et cujuslibet ipsorum, dixerunt, deposuerunt et\ncertificaverunt mihi notario publico subscripto per eorum separalia juramenta facta ad\net super sancta Dei evangelia modo et forma subsequentibus, videlicet\n[1.]\nIn primis predictus Robertus Pagiet aldermannus animo deliberato dixit, deposuit\net certificavit mihi notario publico subscripto per juramentum suum factum ad et super\nsancta Dei evangelia tactis per eum manu sua dextera corporali scripturis verum fuisse\net esse, quod idem Robertus Pagiet deponens in mense Augusti jam proxime preterito\n[Aug. 1533] ante datam presentis publici instrumenti de bonis suis propriis carrigari et\nonerari fecit in portu civitatis London’ in quadam nave vocata le Christofer de le Moros\nin partibus Galicie, de qua Johannes Shewards sub Dei potestate tunc erat magister, duas\npaccas lini, unde utraque earundem cum marca ipsius Roberti Pagiet primo in margine\npresentis publici instrumenti facta fuit marcata [merchant’s mark no. 1 in the left margin].\nItem predictus Thomas Gale vive vocis oraculo dixit, deposuit et certificavit michi\n[2.]\nnotario publico subscripto per juramentum suum factum ad et super sancta Dei evangelia\ntacta per eum manu sua dextera corporale scripturis verum fuisse et esse, quod idem Thomas\n\n\nGale deponens de bonis suis propriis in dicto mense Augusti [Aug. 1533] in supradicto portu\net in predicta nave vocata le Christofer, unde predictus Johannes Shewars tunc fuit magister,\ncarcari et onerari fecit unam paccam de numero 4 in se continentem sexdecim pannos\nlaneos curtos ac duodecim pecias de statutis blodii coloris pro volvatura ejusdem super\ncanabasium cum cum secunda marca in margine [merchant’s mark no. 2 in the left margin]\npresentis instrumenti facta marcata existentibus colorum et longitudinem ut sequitur: a\nviolet 24¾ virge, a vesse 24¼ virge, a redde 25½, a muster 24¾, a grene medley 24¼, a\nmuster 24¾, a violet 24¼, a blue 24, a blue 24½, a blue 24. Et ulterius idem Thomas Gale\ndeponens dixit, deposuit et certificavit mihi dicto notario per juramentum suum forma\nut supra factum verum fuisse et esse, quod singula peciatam hujusmodi sexdecim pan-\nnorum laneorum quam dicta 12 pecia de statuto ipsius deponentis tercia marca in margine\n[merchant’s mark no. 3 in the left margin] presentis publici instrumenti facta et in plumbo\nimpressa cuilibet ipsorum pannorum et statutorum affixum marcata est.\nItem predictus Robertus Wilford animo deliberato dixit, deposuit et certificavit\n[3.]\nmihi notario publico subscripto per juramentum suum factum ad et super sancta Dei\nevangelia tacta per eum manu sua dextera corporali scripturis verum fuisse et esse, quod\nidem Robertus Wilford deponens in predicto mense Augusti [Aug. 1533] onerari et carigari\nfecit in dicta nave in predicto portu civitatis London’ tres fardell pannorum laneorum\ncurtorum cum volvatura eorumdem prefato Roberto Wilford et fratribus suis spectancium\net pertinencium, unde quelibet fardell earundem ab extra super canabasium marca quarta\nin margine [merchant’s mark no. 4 in the left margin] presentis instrumenti facta marcatum\nerat et quarum prime de numero 1 in se continente sexdecim pannos fuit numerorum,\ncolorum et longitudinum subsequencium, videlicet: 297 bleue 24¾ virge, 298 blewe\n24½, 283 blewe 23¾, 284 blewe 24½, 245 blewe 24½, 259 vesse 25¼, 272 vesse 25, 165\nmedley 24½, 173 medley 25, 299 redde 24¾, 224 russet 25, 175 russet 25¼, 54 muster 25,\n172 muster 25, 171 muster 25½, 277 plonkit 26. Summa hujusmodi sexdecim pannorum\nin longitudine 400 virge et unum quarter una cum tribus peciis de cottons pro volvaturis\nejusdem fardell de numero 1 in se continentis, ut sequitur: a grene 21¼ goodes, grene\n21¾ goodes, grene 20¾ goodes, unde singula pecia hujusmodi sexdecim pannorum\nlaneorum marcata cum marca quinta in margine [merchant’s mark no. 5 in left margin]\npresentis instrumenti in plumbo impressa cuilibet ipsorum affixa marcata erat. 2a fardell\nearundem trium in se continet novem vannos coloris subsequentis, de quibus sunt 4or\nblodii coloris et unum russet, unde quilibet pannus ipsorum quinque est cum sexta marca\nin margine [merchant’s mark no. 6 in the left margin] presentis publici instrumenti facta in\ncera impressa et residuum quatuor pannorum in eadem 2a fardella de numeris, colore et\nlongitudine sequentibus: 1 a violet 28¼ virge, 3 a tawney 26, 5 a medlay 25 virge, a pluncket\n22¾ cum duabus peciis de Northern dosseyns, a russet 12 virge, 1 russet pro involvatura\nejusdem et quod quilibet ipsorum pannorum cum septima marca in margine [merchant’s\nmark no. 7 in the left margin] presentis instrumenti facta in plumbo impressa marcata fuit.\nEt 3a fardella ipsorum in se continet 35 pecias de Northern dosseyns et quatuor pecias pro\ninvolvatura dicte 3cie fardelle.\nItem supradictus Radulphus Foxley vive vocis oraculo dixit, deposuit et certificavit\n[4.]\nmihi notario publico subscripto per juramentum suum factum ad et super sancta Dei\nevangelia tacta per eum corporali scriptura verum fuisse et esse, quod ipse Radulphus\ndeponens in supradicto mense Augusti [Aug. 1533] carcari et onerari fecit de bonis suis\n\n\fVi:  g oods taken in spa nis h s hips\n\n\npropriis in predicta nave vocata le Christofer duas paccas pannorum laneorum vocatorum\nNorthern dosseyns diversorum colorum, unde una ipsarum duarum pacca signata ab\nextra super canabase cum numero 5 et mercata cum octava marca in margine [merchant’s\nmark no. 8 in left margin] presentis instrumenti facta in se continente pecias 36 cum octo\npeciis hujusmodi duodenariarum pro volvatura ejusdem pacci et altera inde pacca ab extra\nsuper canabase ejusdem signata cum numero 5 et similiter cum prefata marca proxima\nantea marcata fuit, in se continente alias 26 pecie cum 8 peciis hujusmodi duodenararum\npro volvatura ejusdem pacce et unde quelibet pecia ipsarum duodenarum impressa fuit\nin plumbo cum le pellycan.\nItem predictus Willelmus Wilford dixit, deposuit et certificavit mihi dicto notario\n[5.]\nper juramentum suum factum ad et super sancta Dei evangelia tacta per eum manu sua\ndextera corporali scriptura verum fuisse et esse, quod idem Willelmus Wilford in predicto\nmense Augusti [Aug. 1533] onerari fecit in dicta navi unum pannum factum coloris puke in\nse continentem 22 virgas ac unum remanentem russeti continentem 7 virgas cum dimidia\nmensure Anglie inclusum in tilleta de buckeram ac unum bargelot factum in Hispania cum\ncertis rebus in eorum clausis ad valorem £4 sterlingorum ascendentem.\nItem predictus Radulphus Foxley jurando ut supra dixit, deposuit et certificavit mihi\n[6.]\ndicto notario verum fuisse et esse, quod Galfridus Vaughan apprenticius suus habuit in\ndicta nave tempore captionis ejusdem in pecuniis numeratis et aliis rebus ac apparatibus\nsibi spectantibus ascendentibus ad valorem £4 13s 4d sterlingorum.\n[7.]  Et ulterius supradicti Thomas Gale, Robertus Wilford, Radulphus Foxley et\nWillelmus Wilford jurando ut supra dixerunt, deposuerunt et certificaverunt mihi dicto\nnotario verum fuisse et esse, quod ipsi et eorum quilibet fieri causaverunt separales\ncokkettas in nomine dicti Johannis Sewars solummodo ob metum Scotorum et navium\narmatarum eorundem.\n\nActa fuerunt hec, prout suprascribuntur et recitant, presentibus tunc ibidem discretis\nviris Johanne Joyce et Ricardo Gryg civibus et mercatoribus civitatis London’ predicte,\nvidelicet infra domum mei notarii presenti subscripti situata in vico publico de Lombard\nstrete ejusdem civitatis testibus ad premissa vocata specialiter et rogata.\n\nEt quia ego Johannes Devereux clericus, civis\ncivitatis London’, publicus sacris apostolica\net imperiali auctoritatibus notarius, predictis\ndictionibus, depositionibus et certificationibus\nprefatorum deponencium per eorum separalia\njuramenta forma ut supra facta necnon ceteris\npremissis omnibus et singulis, dum, sicut\npremittitur, agebantur et fiebant unacum testibus\nprenominatis presens personaliter interfui eaque\nomnia et singula sic fieri vidi et audivi, igitur hoc\ninstrumentum – me aliunde prepedito – per\nalium scribi feci signoque et nomine meis solitis\net consuetis signavi in fidem et testimonium\nomnium et singulorum premissorum.\n\n[Notary’s mark of John Devereux of London]\n\nThe following merchants’ marks occurrences in the source refer to the same symbol: (2, 4, 8).", "editorial_notes": "1)\n6)\n2)\n3)\n4)\n5)\n7)\n8)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 17. Orginal notarial instrument\nwith notary’s mark (John Devereux cleric, citizen of London). Parchment.\nUnsealed.", "file": "catalogued/doc_66.md", "modern_english_translation": "In the name of God, amen. By this present public instrument let it be evident to all, that in the year of the Lord from the Incarnation one thousand five hundred and thirty-three, in the sixth indiction, in the pontificate of the most holy father in Christ and our lord, Lord Clement, by divine providence Pope of this name the seventh, in his tenth year, on the twentieth day of September [20 Sept. 1533], before me, the undersigned public notary, and the witnesses named below, there appeared in person the prudent men Robert Pagiet, citizen and alderman of the city of London, Thomas Gale, citizen and haberdasher [Note: a dealer in men's clothing and accessories] of the same city, aged, as he declared, about fifty-seven years, Robert Wilford, aged about thirty-six years, and Ralph Foxley, aged about thirty-seven years, both citizens and merchants of the aforesaid city, and William Wilford, citizen and grocer of the same city, aged about twenty-six years — all men of good repute and unblemished conduct, not induced, seduced, compelled, deceived or circumvented by force, fraud, fear, deceit or any sinister contrivance, as is evident, but of their own free, pure and spontaneous will, for future record and for the declaration of the truth of the matters written below, and for the preservation and defense of their rights, both those of them collectively and of each one of them individually — declared, deposed and certified to me, the undersigned public notary, by their separate oaths made upon and over the holy Gospels of God, in the manner and form following, namely:\n\n[1.]\nFirst, the aforesaid Robert Pagiet, alderman, having deliberated, declared, deposed and certified to me, the undersigned public notary, by his oath made upon and over the holy Gospels of God, touching the written text with his right hand, that it was and is true that the same Robert Pagiet, the deponent, in the month of August last past [Aug. 1533], before the date of this present public instrument, caused to be loaded and taken on board, in the port of the city of London, in a certain ship called the Christopher of Moros, in the parts of Galicia [Note: northwestern Spain], of which Johannes Shewards was then master under God, two packs of linen, each of which was marked with the first mark of the said Robert Pagiet made in the margin of this present public instrument [merchant's mark no. 1 in the left margin].\n\n[2.]\nItem, the aforesaid Thomas Gale declared by word of mouth, deposed and certified to me, the undersigned public notary, by his oath made upon and over the holy Gospels of God, touching the written text with his right hand, that it was and is true that the same Thomas Gale, the deponent, of his own goods in the said month of August [Aug. 1533], in the aforesaid port and in the aforesaid ship called the Christopher, of which the aforesaid Johannes Shewars was then master, caused to be loaded and taken on board one pack, numbered 4, containing sixteen short woolen cloths and twelve pieces of statutory [Note: cloth cut to the legally prescribed standard length] of blue color for wrapping the same, upon canvas, marked with the second mark in the margin [merchant's mark no. 2 in the left margin] of this present instrument, of the colors and lengths as follows: a violet 24¾ yards, a vesset [Note: a shade of tawny-brown] 24¼ yards, a red 25½, a muster [Note: a grey-brown mixed cloth] 24¾, a green medley 24¼, a muster 24¾, a violet 24¼, a blue 24, a blue 24½, a blue 24. And furthermore the same Thomas Gale, the deponent, declared, deposed and certified to me, the said notary, by his oath made as above, that it was and is true that each piece of the said sixteen woolen cloths and the said 12 pieces of statutory of the deponent were marked with the third mark in the margin [merchant's mark no. 3 in the left margin] of this present public instrument, impressed in lead and affixed to each of the said cloths and statutories.\n\n[3.]\nItem, the aforesaid Robert Wilford, having deliberated, declared, deposed and certified to me, the undersigned public notary, by his oath made upon and over the holy Gospels of God, touching the written text with his right hand, that it was and is true that the same Robert Wilford, the deponent, in the aforesaid month of August [Aug. 1533], caused to be loaded and taken on board in the said ship in the aforesaid port of the city of London three fardles [Note: bundles or bales] of short woolen cloths with their wrappings, belonging to and pertaining to the aforesaid Robert Wilford and his brothers, each fardle of the same being marked on the outside upon the canvas with the fourth mark in the margin [merchant's mark no. 4 in the left margin] of this present instrument; the first of these, numbered 1, containing sixteen cloths, was of the following numbers, colors and lengths, namely: 297 blue 24¾ yards, 298 blue 24½, 283 blue 23¾, 284 blue 24½, 245 blue 24½, 259 vesset 25¼, 272 vesset 25, 165 medley 24½, 173 medley 25, 299 red 24¾, 224 russet 25, 175 russet 25¼, 54 muster 25, 172 muster 25, 171 muster 25½, 277 plunket [Note: a dull grey-blue color] 26. The total length of the said sixteen cloths is 400 yards and one quarter, together with three pieces of cottons for wrapping the same fardle numbered 1, as follows: a green 21¼ yards good, green 21¾ yards good, green 20¾ yards good; each piece of the said sixteen woolen cloths being marked with the fifth mark in the margin [merchant's mark no. 5 in the left margin] of this present instrument, impressed in lead and affixed to each of the said cloths. The 2nd fardle of the said three contains nine cloths of the following color, of which 4 are of blue color and one russet, each of the said five cloths bearing the sixth mark in the margin [merchant's mark no. 6 in the left margin] of this present public instrument impressed in wax; and the remaining four cloths in the same 2nd fardle, of the following numbers, colors and lengths: 1 a violet 28¼ yards, 3 a tawny 26, 5 a medley 25 yards, a plunket 22¾ with two pieces of Northern dozens [Note: a cheaper woolen cloth from northern England], a russet 12 yards, 1 russet for wrapping the same; and each of those cloths was marked with the seventh mark in the margin [merchant's mark no. 7 in the left margin] of this present instrument, impressed in lead. And the 3rd fardle of the same contains 35 pieces of Northern dozens and four pieces for wrapping the said 3rd fardle.\n\n[4.]\nItem, the aforesaid Ralph Foxley declared by word of mouth, deposed and certified to me, the undersigned public notary, by his oath made upon and over the holy Gospels of God, touching the written text with his body, that he, Ralph, the deponent, in the aforesaid month of August [Aug. 1533], caused to be loaded and taken on board of his own goods in the aforesaid ship called the Christopher two packs of woolen cloths called Northern dozens of various colors, one of the said two packs being marked on the outside on the canvas with the number 5 and with the eighth mark in the margin [merchant's mark no. 8 in the left margin] of this present instrument, containing 36 pieces together with eight pieces of the said dozens for wrapping the same pack; and the other pack thereof, marked on the outside on the canvas with the number 5 and likewise with the aforesaid mark immediately preceding, containing 26 further pieces together with 8 pieces of the said dozens for wrapping the same pack; and each piece of the said dozens was impressed in lead with the pelican [Note: a lead seal bearing a pelican device].\n\n[5.]\nItem, the aforesaid William Wilford declared, deposed and certified to me, the said notary, by his oath made upon and over the holy Gospels of God, touching the written text with his right hand, that the same William Wilford in the aforesaid month of August [Aug. 1533] caused to be loaded in the said ship one cloth of puke [Note: a fine woolen cloth of dark color] containing 22 yards, and one remnant of russet containing 7½ yards, by English measure, enclosed in a wrapper of buckram [Note: a stiff coarse linen cloth], and one bargelot [Note: a small barrel or container] made in Spain with certain things enclosed therein, to the value of £4 sterling.\n\n[6.]\nItem, the aforesaid Ralph Foxley, swearing as above, declared, deposed and certified to me, the said notary, that it was and is true that Geoffrey Vaughan, his apprentice, had in the said ship at the time of her capture, in cash and other goods and equipment belonging to him, to the value of £4 13s 4d sterling.\n\n[7.]\nAnd furthermore, the aforesaid Thomas Gale, Robert Wilford, Ralph Foxley and William Wilford, swearing as above, declared, deposed and certified to me, the said notary, that it was and is true that they and each of them had caused separate cockets [Note: official customs certificates] to be made in the name of the said Johannes Sewars solely for fear of the Scots and their armed ships.\n\nThese acts were done as written and recited above, in the presence then and there of the discreet men John Joyce and Richard Gryg, citizens and merchants of the aforesaid city of London, within the house of me, the notary hereto subscribed, situated in the public street of Lombard Street of the same city, witnesses specially called and requested for the aforesaid matters.\n\nAnd because I, John Devereux, clerk, citizen of the city of London, public notary by sacred apostolic and imperial authority, was personally present at the aforesaid declarations, depositions and certifications of the aforesaid deponents made by their separate oaths in the form as above, and at all and singular the other matters aforesaid, while, as is stated above, they were transacted and carried out, together with the aforementioned witnesses, and saw and heard all and singular these things so done; therefore this instrument — being otherwise occupied — I caused to be written by another, and signed it with my customary and accustomed sign and name, in faith and testimony of all and singular the aforesaid matters.\n\n[Notary's mark of John Devereux of London]\n\n---", "summary": "A notarial deposition made on 20 September 1533 in London before notary John Devereux, in which five London merchants and citizens — Robert Pagiet, Thomas Gale, Robert Wilford, Ralph Foxley, and William Wilford — individually swore on oath to the precise contents of their goods loaded aboard the ship Christopher of Moros bound for Galicia in August 1533, prior to its capture. The deposition meticulously records the colors, lengths, and markings of numerous woolen cloths, and also reveals that the merchants had taken out customs cockets in a false name out of fear of Scottish raiders.", "document_type": "deposition", "themes": ["trade", "legal_proceedings", "cargo", "goods_seizure", "testimony", "notarial", "maritime", "textile_trade", "financial"], "people_mentioned": ["Robert Pagiet", "Thomas Gale", "Robert Wilford", "Ralph Foxley", "William Wilford", "Johannes Shewards (Shewars/Sewars)", "Geoffrey Vaughan", "John Joyce", "Richard Gryg", "John Devereux"], "goods_mentioned": ["linen packs", "woolen cloths (blue", "violet", "vesset", "red", "muster", "green medley", "russet", "plunket", "tawny", "medley)", "Northern dozens", "puke cloth", "russet cloth", "buckram wrapper", "bargelot"], "notable": true, "notable_reason": "The deponents openly admit to fraudulent customs documentation (cockets issued in a false name to avoid Scottish ships), providing rare direct evidence of merchants deliberately falsifying official records — a legally significant admission embedded within an otherwise routine sworn deposition."}, {"id": 67, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "Inventory of goods (taken in the presence of the Lübeck councillor Hans Sengesaken and the secretary of the London Counter Henning [Kulemeyer]) from the Spanish ship [the Christopher de Moria], presently in the inner harbor of Hamburg, in the custody of Kort Meyneken; one copy of the indenture goes to Lübeck, the other to the London", "date": "", "location": "", "language": "Low German", "content": "Dusse nagescreven guder syn by Kort Meyneken yn vorwaringe.\n\nItem 1 pecsken bereven darynne 9 sagen\nItem 10 agrotea tynnen vathe wegen\nItem 14 bunt flasses wegen\nItem 1 korff unde etlyke kysten; wes darynne ys my nicht bewust\nIn dat Hyspanieske schipp myt synem geschutte licht vor Hamborg bynnen bames up\n\nder Elve yn guder vorwaringe.\n\nDusse guder unde packen, we bavengescreven, heben mede besichtiget de erbar her\nHans Sengesakenn [councillor of Lübeck] unde de wolgelerde magister Hennyngus [Kule-\nmeyer] des kopmans secreterer thu Lunden sampt anderen loffwerdigen luden werden des\ntugenusse geven, wor des nodic werth syn. Unde tho merer orkunde syn dusser schriffte\n2 gemaket gehales ludes unde ynholdes myt des erbaren hern Hans Segestaken egen\nhant underscreven, de eyne by dem erbarn rade tho Lubeck, de ander myt des kopmans\nsecreterer nha Lunden gesant. Geven unde screven Hamborg, den 2. Novembris anno 1533.\n\na-a Entered in the left margin with catchmark HL.\n\n[signed] Hans Senghstake", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 22c, f. 2r. Original. Paper. Unsealed.71", "file": "catalogued/doc_67.md", "modern_english_translation": "The following goods are in the custody of Kort Meyneken.\n\nItem, 1 small package of saws therein, 9 saws.\nItem, 10 heavy tin vessels.\nItem, 14 bundles of flax.\nItem, 1 basket and some chests; what is therein I do not know.\nThe Spanish ship with its artillery lies before Hamburg within the boom [Note: a chain or barrier across the harbor] on the Elbe, in good custody.\n\nThese goods and packs, as listed above, have been inspected by the honorable Lord Hans Sengesakenn [councillor of Lübeck] and the learned Master Hennyngus [Kulemeyer], secretary of the merchant community [Note: the Hanseatic Kontor] in London, together with other credible persons, who will give testimony thereto where it should be necessary. And for greater authentication, two copies of this document have been made of identical wording and content, subscribed in the hand of the honorable Lord Hans Segestaken himself, one to remain with the honorable council of Lübeck, the other to be sent with the merchant's secretary to London. Given and written at Hamburg, the 2nd of November in the year 1533.\n\n[signed] Hans Senghstake\n\n---", "summary": "A brief inventory, signed by Lübeck councillor Hans Sengesaken and dated 2 November 1533, listing goods from the captured Spanish ship Christopher de Moria currently in custody of Kort Meyneken in Hamburg's inner harbor. Two identical copies were produced, one for Lübeck and one to accompany the secretary of the London Hanseatic Kontor.", "document_type": "inventory", "themes": ["piracy", "cargo", "goods_seizure", "maritime", "legal_proceedings", "trade"], "people_mentioned": ["Hans Sengesaken (Senghstake/Segestaken)", "Henning Kulemeyer", "Kort Meyneken"], "goods_mentioned": ["saws", "tin vessels", "flax", "basket", "chests"], "notable": false}, {"id": 68, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "Goods found in chests of the Spanish [probably the mariners’ portage from the Christopher de Moria] and which are presently in the custody of Korth Meyken of Hamburg", "date": "(undated)", "location": "", "language": "Low German", "content": "71  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.\n\n  72  See note 70.\n\n\fVi:  g oods taken in spa nis h s hips\n\n\nDusse nagescreven guder syn erfunden yn der Hyspannier kysten, wylke by Korth\n\nMeyken ynwonaringe tho Hamborg.\n\nUth dusser husen schepe.\n\nA\n\n7 stuven Engels wantes\n13 par knotter mowen\n1 plaw Engels mantel\n2 hemmede\n\nB\n1 stuve graw Engels\n1 rock myt knelingk gesoders\n1 paxken sagen\n1 hemede\n6 salser tynnen\n2 kompase\n\nC\n\n1 stuve pel want\n3 stuve ruddock\n2 graue rocke\n1 olt par hosen\n1 bereet\n1 swarte olde Spanske cappe\n1 kastylipper\n1 tynnen kanne\n1 karte\n1 compas\n3 carnateny yn golde\n\nUth Reymar Otten\n\nD\n\n3 grawe mantel\n2 palt rocke\n1 par witter wantbuxsten\n\nE\n\n2 klene stuven wandes\n3 wambose\n1 swart rock\n2 koken\n1 stuve graw schottes\n6 hemde\n3 par older hasen\n1 graw mantel\n1 parney\n\n2 Engelske keste\n½ halve hesken myt synem rescup\nF\n\n1 swarte olde Spanske kappe\n3 klene stuven blaw want\n2 kleyne tynnen kannen\n1 kastilipper\n1 par older hosen\n3 olde bonnithea\nG\n\n3 grote tynnen wasse\n27 tynnen segalen\n25 tynnen klene wates\n2 tynnen kannen\n2 mysinges luchter\n1 mysynges moser\n1 rooth banir\n4 par knotter hosen\n1 stuve Engels want\n1 neye sagen wames\n4 par neyer hosen\n1 with hosen laken\n2 swarte nye kappen\n2 nye pub rocke\n1 ulle swart Engels\n2 par nyer scho\n\nH\n2 tynnen kannen\n1 klene korff myt pluserye\n\nJ\n\n3 tynnen spyse warte\n26 tynnen schelen\n2 kynder berode\n3 ullen wathwellelynda\n1 Spanske kappe\n1 spegel\n1 par olde hosen\n1 olt wames\n1 par kleyner kynder scho\n\n\nK\n2 tynnen kannen\n8 tynnen wathe\n8 tynnen schalen\n1 tynnen soltwar\n4 hemede\n\nL\n\n3 tynnen spyse wathe fyn yn o\n\nM\n\n1 swart Spannsken goder\n2 par krussena\n1 par buxsen\n2 olde hemede\n\nN\n\n1 nye swart liffrock ys yn o\n\nO\n\n1 swarte Spanske kappe\n1 swart palt rock\n2 grawe liffrocke\n1 stuve wites wantes\n1 stuve pel wantes\n1 par roder hosen\n1 berates\n\nP\n\n1 klene kastylier\nunde ander pluserye myt mer wades\nQ\n\n1 nye palt rock\n4 packen so gesneden kledingen edder\nschrotarwicka\n\nR\n1 Spanske kappe myt 1 witte cruce\n1 swart rock laken\n1 blaw rock laken\n4 par witter hosen\n2 liff rocke\n\n1 pale rock\n1 kompas\n2 stunda pluse\n1 karte\n4 bonithe\n\nS\n\n2 stuve blaw wantes\n1 brun hosen laken\n1 stuve woldeck\n1 Spanske kappe\n3 par hosen\n1 graw mantel\n3 hemde\n3 kastilier\n6 par scho\n3 rokens beke\n\nT\n1 grou rock laken\n1 swarte stuve wandes\n2 palt rocke\n3 stucke dwolkes\n1 blaw parney\n\n1 par hosen\n\nU\n\nV\n\n4 par nedder hosen\n1 kastylier\n2 par krassen\n2 spegel\n\nW\n\n1 stuve wandes danetes\n1 stuve roetes Engels\n1½ ullen wit Engels\n1 Spanske kappe\n1 olt wammes\n40 tynnen kleine vathe\n1 tynnen wynkanne\n4 Spanske bagen\n\nUth duster hosen bereven korffen\n\na Reading uncertain HL.\n\n\fVi:  g oods taken in spa nis h s hips", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 22e. Paper booklet of 2 folios. Unsealed.72", "file": "catalogued/doc_68.md", "modern_english_translation": "The following goods were found in the Spaniards' chests, which are presently in the custody of Korth Meyken in Hamburg.\n\nFrom the chests of this ship.\n\nA\n7 lengths of English woolen cloth\n13 pairs of knotted sleeves\n1 blue English cloak\n2 shirts\n\nB\n1 length of grey English cloth\n1 coat with kneeling [Note: possibly knee-length] stitching\n1 small package of saws\n1 shirt\n6 tin saltcellars\n2 compasses\n\nC\n1 length of pelt cloth\n3 lengths of ruddock [Note: a reddish-brown cloth]\n2 grey coats\n1 old pair of hose\n1 beret\n1 black old Spanish cap\n1 Castilian leather pouch [Note: \"kastilipper,\" likely a type of Spanish leather bag or wallet]\n1 tin jug\n1 chart [Note: a sea chart]\n1 compass\n3 carnation-colored items in gold [Note: possibly gold-decorated items]\n\nFrom Reymar Otten\n\nD\n3 grey cloaks\n2 palt [Note: worn or patched] coats\n1 pair of white woolen breeches\n\nE\n2 small lengths of cloth\n3 doublets\n1 black coat\n2 cooks [Note: cooking pots]\n1 length of grey Scottish cloth\n6 shirts\n3 pairs of old hose\n1 grey cloak\n1 parney [Note: possibly a type of headgear or garment]\n\n2 English chests\n½ half cask with its fittings\n\nF\n1 black old Spanish cap\n3 small lengths of blue cloth\n2 small tin jugs\n1 Castilian leather pouch\n1 pair of old hose\n3 old bonnets\n\nG\n3 large tin wash-basins\n27 tin bowls [Note: \"segalen,\" possibly small dishes or plates]\n25 small tin vessels\n2 tin jugs\n2 brass candlesticks\n1 brass mortar\n1 red banner\n4 pairs of knotted hose\n1 length of English cloth\n1 new saw doublet [Note: possibly a jacket or doublet made of serge or similar fabric]\n4 pairs of new hose\n1 white hose-cloth\n2 black new caps\n2 new palt coats\n1 all-wool black English cloth\n2 pairs of new shoes\n\nH\n2 tin jugs\n1 small basket with trinkets [Note: \"pluserye,\" small ornamental items]\n\nJ\n3 tin spice vessels\n26 tin bowls\n2 children's berets\n3 woolen cloth-wrappers [Note: \"wattwellelinde,\" possibly pieces of cloth used for wrapping]\n1 Spanish cap\n1 mirror\n1 pair of old hose\n1 old doublet\n1 pair of small children's shoes\n\nK\n2 tin jugs\n8 tin vessels\n8 tin bowls\n1 tin salt-vessel\n4 shirts\n\nL\n3 fine tin spice vessels in o [Note: possibly stored in a specific container, \"o\" unexplained]\n\nM\n1 black Spanish garment\n2 pairs of croslets [Note: \"krussen,\" possibly ruffled collar pieces]\n1 pair of breeches\n2 old shirts\n\nN\n1 new black surcoat — is in o [Note: see above]\n\nO\n1 black Spanish cap\n1 black palt coat\n2 grey surcoats\n1 length of white cloth\n1 length of pelt cloth\n1 pair of red hose\n1 beret\n\nP\n1 small Castilian leather pouch\nand other trinkets with more cloth\n\nQ\n1 new palt coat\n4 packages of cut clothing or tailor's cuttings [Note: \"schrotarwick,\" fabric offcuts or pre-cut garment pieces]\n\nR\n1 Spanish cap with 1 white cross\n1 black coat-cloth\n1 blue coat-cloth\n4 pairs of white hose\n2 surcoats\n1 pale coat\n1 compass\n2 lengths of plush cloth [Note: \"stunda pluse,\" lengths of plush or velvet fabric]\n1 chart\n4 bonnets\n\nS\n2 lengths of blue cloth\n1 brown hose-cloth\n1 length of wool-cloth [Note: \"woldeck,\" possibly a woolen covering]\n1 Spanish cap\n3 pairs of hose\n1 grey cloak\n3 shirts\n3 Castilian leather pouches\n6 pairs of shoes\n3 coats' backs [Note: \"rokens beke,\" possibly coat-back fabric pieces]\n\nT\n1 grey coat-cloth\n1 length of black cloth\n2 palt coats\n3 pieces of toweling [Note: \"dwolkes,\" possibly coarse cloth for drying]\n1 blue parney\n1 pair of hose\n\nU\n[no items listed]\n\nV\n4 pairs of lower hose [Note: under-hose or stockings]\n1 Castilian leather pouch\n2 pairs of ruffs [Note: \"krassen,\" collar ruffs or frilled pieces]\n2 mirrors\n\nW\n1 length of Damasked [Note: damask-patterned] cloth\n1 length of red English cloth\n1½ all-wool white English cloth\n1 Spanish cap\n1 old doublet\n40 small tin vessels\n1 tin wine-jug\n4 Spanish bows\n\nFrom the dark hose-covered baskets [Note: \"duster hosen bereven korffen,\" baskets wrapped in dark hose-cloth or leather]", "summary": "An undated itemized inventory of personal goods found in chests belonging to the Spanish mariners of the Christopher de Moria, organized by letter-labeled lots and currently held by Korth Meyken in Hamburg. The contents are predominantly clothing, textiles, personal effects, and tin tableware, with some navigation instruments (charts and compasses) included, and one section attributed to a named individual, Reymar Otten.", "document_type": "inventory", "themes": ["cargo", "goods_seizure", "maritime", "personal_property", "textile_trade"], "people_mentioned": ["Korth Meyken", "Reymar Otten"], "goods_mentioned": ["English woolen cloth", "knotted sleeves", "English cloak", "shirts", "grey English cloth", "tin saltcellars", "compasses", "pelt cloth", "ruddock cloth", "grey coats", "hose", "beret", "Spanish caps", "Castilian leather pouches", "tin jugs", "sea charts", "gold-decorated items", "grey cloaks", "doublets", "Scottish cloth", "tin wash-basins", "tin bowls", "brass candlesticks", "brass mortar", "plush cloth", "damask cloth", "red English cloth", "white English cloth", "Spanish bows", "saws", "mirrors", "bonnets", "ruffs"], "notable": true, "notable_reason": "The inventory of Spanish mariners' personal chest contents is unusually granular, preserving details of individual sailors' clothing and possessions including navigation equipment (charts, compasses) and Spanish bows, offering rare insight into the material culture of 16th-century Iberian maritime crews."}, {"id": 69, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "On 7 Apr. 1534, in the presence of the undersigned notary (Johannes Kloth alias Platen), Johannes Hulpp, proconsul of Hamburg in the diocese of Bremen, specially deputized by the Hamburg council, there appeared Alphonsus de Sancto Johan, a Spanish merchant residing in London in England, and Joan de Lusis, of the Galician town of Muros, in", "date": "", "location": "", "language": "Low German", "content": "On 7 Apr. 1534, in the presence of the undersigned notary (Johannes Kloth alias Platen),\nJohannes Hulpp, proconsul of Hamburg in the diocese of Bremen, specially deputized by\nthe Hamburg council, there appeared Alphonsus de Sancto Johan, a Spanish merchant\nresiding in London in England, and Joan de Lusis, of the Galician town of Muros, in\ntheir capacity as plenipotentiary deputies of Albert de Astudillo, Ferdinand de Verdese,\nJohannes de Arabiano and Joannes de Bewariis, also present being magister Johannes\nHoper, specially deputized by the Lübeck council, to settle claims in their own names as\nwell as those of their principals and fully recover goods which, in the summer of 1533 off the\ncoast of England, were taken by milites stipendarii of Lübeck who with their warships\nseized the Spaniards’ ship, stole these goods and brought them (rapuerant, receperant\net abduxerant) to Hamburg, for the restitution of which the Spaniards have come to\nHamburg. There, in the presence of Joachim Gherkens, proconsul,73 and Johannes de\nLennepen,74 the Spaniards were – by the explicit command and assent of the Lübeck\ncouncil – satisfied of the value of (1) 83 magnis quam parvis sarcinis panni, as itemized\n(with their merchants’ marks) in a certified schedule which was publically displayed,\n(2) 48 dickers of hides, (3) 1 small congeriem of flax, (4) 10 vascula stannea with 20\nchests belonging to the shipmaster and the mariners containing goods and clothing, (5)\n20 vasa sive botas of Lisbon oil, (6) 1 centena of Brouage (Bruwase) salt estimated to\nbe worth 96 mr. lub. The ship (navis corbitam sive kraveel vocatam wulgari nomine\nAlmanice) Christofer captained by the said Joan de Lus, together with certain goods\nand merchandise belonging to him, which ship the said procurators Alphonsus de\nSancto Joan and Joan de Lusis sold for 1230 mr. lub. in Hamburg. The said Joan de\nLusis complained that certain articles of clothing, chests and goods belonging to him\nand his mariners had been taken, for which the Lübeck council compensated him with\n100 mr. lub. in cash. The plenipotentiaries Alphonsus de Sancto Joan and Joan de\nLusis acknowledge, by oath, receipt of adequate compensation, wherewith all their\nclaims and those of their principals (and their heirs) against Lübeck are deemed to\nhave been satisfied. Witnesses: Jodocus Burhorne, Sebastianus de Winthen, citizens\nof Hamburg. Notary: Johannes Kloth alias Platen, cleric of the diocese of Bremen. This\ntrue copy of the notarial instrument is attested by Michael Petri, cleric of the diocese of\nSchwerin. — 1534 Apr. 7. Hamburg.\n\nHL AHL ASA, Externa Anglicana 476, no. 10. Contemporaneous notarial\n\ncopy of a notarial instrument. Paper. Unsealed.75", "editorial_notes": "", "archival_reference": "", "file": "catalogued/doc_69.md", "modern_english_translation": "On 7 April 1534, in the presence of the undersigned notary (Johannes Kloth alias Platen), Johannes Hulpp, proconsul of Hamburg in the diocese of Bremen, specially deputized by the Hamburg council, there appeared Alphonsus de Sancto Johan, a Spanish merchant residing in London in England, and Joan de Lusis, of the Galician town of Muros, in their capacity as plenipotentiary deputies of Albert de Astudillo, Ferdinand de Verdese, Johannes de Arabiano and Joannes de Bewariis. Also present was magister Johannes Hoper, specially deputized by the Lübeck council, to settle claims in their own names as well as those of their principals and fully recover goods which, in the summer of 1533 off the coast of England, were taken by paid soldiers [Note: milites stipendarii — mercenary soldiers or privateers in Lübeck's pay] of Lübeck who with their warships seized the Spaniards' ship, seized these goods and carried them away to Hamburg, for the restitution of which the Spaniards have come to Hamburg. There, in the presence of Joachim Gherkens, proconsul, and Johannes de Lennepen, the Spaniards were — by the explicit command and assent of the Lübeck council — given satisfaction for the value of: (1) 83 large and small bales of cloth, as itemized (with their merchants' marks) in a certified schedule which was publicly displayed; (2) 48 dickers [Note: a dicker = a unit of ten hides] of hides; (3) 1 small bundle of flax; (4) 10 tin vessels with 20 chests belonging to the shipmaster and the mariners containing goods and clothing; (5) 20 casks or barrels of Lisbon oil; (6) 1 hundredweight of Brouage salt, estimated to be worth 96 marks Lübeck currency. The ship (called in the common German tongue a carvel) Christopher, captained by the said Joan de Lusis, together with certain goods and merchandise belonging to him, was sold by the said procurators Alphonsus de Sancto Joan and Joan de Lusis for 1,230 marks Lübeck currency in Hamburg. The said Joan de Lusis complained that certain articles of clothing, chests and goods belonging to him and his mariners had been taken, for which the Lübeck council compensated him with 100 marks Lübeck currency in cash. The plenipotentiaries Alphonsus de Sancto Joan and Joan de Lusis acknowledge, by oath, receipt of adequate compensation, wherewith all their claims and those of their principals (and their heirs) against Lübeck are deemed to have been satisfied. Witnesses: Jodocus Burhorne, Sebastianus de Winthen, citizens of Hamburg. Notary: Johannes Kloth alias Platen, cleric of the diocese of Bremen. This true copy of the notarial instrument is attested by Michael Petri, cleric of the diocese of Schwerin. — 7 April 1534. Hamburg.", "summary": "A notarial instrument dated 7 April 1534 in Hamburg recording the settlement between Spanish merchants and the Lübeck council for goods seized from the Spanish carvel Christopher in the summer of 1533 off the English coast. The Spanish plenipotentiaries Alphonsus de Sancto Joan and Joan de Lusis acknowledge full receipt of compensation totalling 1,230 marks Lübeck currency for the ship's sale, plus 100 marks for personal goods, and a further sum covering cloth, hides, flax, tin vessels, oil, and salt. All claims against Lübeck are declared satisfied.", "document_type": "legal_instrument", "themes": ["trade", "piracy", "legal_proceedings", "cargo", "compensation", "maritime", "diplomacy", "restitution", "notarial", "goods_seizure"], "people_mentioned": ["Johannes Kloth alias Platen", "Johannes Hulpp", "Alphonsus de Sancto Johan", "Joan de Lusis", "Albert de Astudillo", "Ferdinand de Verdese", "Johannes de Arabiano", "Joannes de Bewariis", "Johannes Hoper", "Joachim Gherkens", "Johannes de Lennepen", "Jodocus Burhorne", "Sebastianus de Winthen", "Michael Petri"], "goods_mentioned": ["bales of cloth", "hides", "flax", "tin vessels", "clothing", "Lisbon oil", "Brouage salt"], "notable": true, "notable_reason": "This is the formal settlement document closing all Spanish claims against Lübeck for the 1533 seizure, providing an itemised record of compensation and functioning as a comprehensive legal release — a key instrument in the entire case."}, {"id": 70, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "The rector navis Johannes de Lusis, dwelling in the town of Morys (Muros) in Galicia, and Alphonus de Sancto Joan, dwelling the the city of London in England, both Spaniards, acting as the procurators and commissioners of Joan Bewariis, dwelling in the said town of Morys, acknowledge receipt (for themselves and their principals and", "date": "", "location": "", "language": "Low German", "content": "The rector navis Johannes de Lusis, dwelling in the town of Morys (Muros) in Galicia,\nand Alphonus de Sancto Joan, dwelling the the city of London in England, both\nSpaniards, acting as the procurators and commissioners of Joan Bewariis, dwelling in\nthe said town of Morys, acknowledge receipt (for themselves and their principals and\ntheir heirs) in dieta Hamburgensi from the Lübeck proconsul Joachim Gherkens\n\n  73  Ratslinie no. 605.\n  74  Not listed in Ratslinie.\n  75  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or a breve\n(ŭ) in order to distinguish it from two minims. Since this has no effect on the pronunciation of the word, they are\ntranscribed as ‘u’.", "editorial_notes": "", "archival_reference": "", "file": "catalogued/doc_70.md", "modern_english_translation": "The shipmaster [Note: rector navis] Johannes de Lusis, dwelling in the town of Muros in Galicia, and Alphonsus de Sancto Joan, dwelling in the city of London in England, both Spaniards, acting as the procurators and commissioners of Joan Bewariis, dwelling in the said town of Muros, acknowledge receipt (for themselves and their principals and their heirs) in the Hamburg proceedings [Note: dieta Hamburgensi] from the Lübeck proconsul Joachim Gherkens", "summary": "A receipt document in which the Spanish shipmaster Johannes de Lusis and procurator Alphonsus de Sancto Joan, acting also on behalf of Joan Bewariis of Muros, acknowledge receiving compensation from Lübeck proconsul Joachim Gherkens at the Hamburg proceedings for goods seized from the ship Christophorus. The document is fragmentary, breaking off mid-sentence before specifying the full sum or goods list.", "document_type": "receipt", "themes": ["trade", "piracy", "legal_proceedings", "compensation", "maritime", "restitution", "goods_seizure"], "people_mentioned": ["Johannes de Lusis", "Alphonsus de Sancto Joan", "Joan Bewariis", "Joachim Gherkens", "Johannes de Lennepen"], "goods_mentioned": [], "notable": false}, {"id": 71, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "and the Lübeck council member Johannes de Lennepen (acting at the behest of the entire council) of compensation for all the goods taken by those of Lübeck in a ship called Christophorus, skippered by the said Joan de Lusis, off the coast of England last summer, namely one bale seu sarcina of cloth and 11 chests containing all in all 7", "date": "", "location": "", "language": "Middle English", "content": "Unsealed.76\n\n Alphonsus de Sancto Joan, a Spaniard residing in London in England, acting as\nprocurator of Albart de Astudilla, Ferdinand de Verdese and Johannes de Arabiano,\nacknowledges (also in the name of his principals) receipt of the goods taken in the previous\nyear by milites stipendarii of Lübeck off the coast of England, having come to Hamburg to\nreceive them from Joachim Gherkens proconsul and Johannes de Lennepen councillor\nof Lübeck, namely 79 large and small bales sive sarcinas of cloth, one bale of flax, 40\ndickers of hides, 10 vasa of tin, 9 chests with clothing and other things and all other goods\ntaken off England. As for the goods taken from ships called hoyges, namely 20 vasa of\noil of Lisbon and 1 cwt of salt of Brouage (Bruwasie), he acknowedges receipt of 96 mr.\nlub. representing the full value of these goods. He declares all claims to have been satisfied.\nIn testimony whereof he has sealed this quitclaim with his own signet and signed it with\nhis full name. Done in Hamburg, 7 Apr. 1534. Translated from the German and attested\nby Michael Petri, cleric of the diocese of Schwerin, notary. — 1534 Apr. 7. Hamburg.\n\nHL AHL ASA, Externa Anglicana 476, no. 14. Contemporaneous copy. Paper.\n\nUnsealed.77\n\nb) Maria de Gatolope (skipper Johannes de Calegio)", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 13. Contemporaneous copy. Paper.", "file": "catalogued/doc_71.md", "modern_english_translation": "and the Lübeck council member Johannes de Lennepen (acting at the behest of the entire council) of compensation for all the goods taken by those of Lübeck in a ship called Christophorus, skippered by the said Joan de Lusis, off the coast of England the previous summer, namely one bale of cloth and 11 chests containing in all 7\n\nAlphonsus de Sancto Joan, a Spaniard residing in London in England, acting as procurator of Albert de Astudilla, Ferdinand de Verdese and Johannes de Arabiano, acknowledges (also in the name of his principals) receipt of the goods taken in the previous year by paid soldiers of Lübeck off the coast of England, having come to Hamburg to receive them from Joachim Gherkens, proconsul, and Johannes de Lennepen, councillor of Lübeck, namely 79 large and small bales of cloth, one bale of flax, 40 dickers of hides, 10 vessels of tin, 9 chests with clothing and other things, and all other goods taken off England. As for the goods taken from ships called hoyes [Note: hoyges — flat-bottomed coastal trading vessels], namely 20 casks of Lisbon oil and 1 hundredweight of Brouage salt, he acknowledges receipt of 96 marks Lübeck currency representing the full value of these goods. He declares all claims to have been satisfied. In testimony whereof he has sealed this quitclaim with his own signet and signed it with his full name. Done in Hamburg, 7 April 1534. Translated from the German and attested by Michael Petri, cleric of the diocese of Schwerin, notary. — 7 April 1534. Hamburg.", "summary": "A continuation fragment and then a separate receipt in which Alphonsus de Sancto Joan, acting as procurator for Albert de Astudilla, Ferdinand de Verdese, and Johannes de Arabiano, acknowledges receipt in Hamburg of specific seized goods — 79 bales of cloth, flax, hides, tin vessels, chests with clothing, casks of Lisbon oil, and Brouage salt — from Lübeck representatives Joachim Gherkens and Johannes de Lennepen. He declares all claims satisfied and seals the quitclaim with his own signet, attested by notary Michael Petri.", "document_type": "receipt", "themes": ["trade", "piracy", "legal_proceedings", "cargo", "compensation", "maritime", "restitution", "notarial", "goods_seizure"], "people_mentioned": ["Johannes de Lennepen", "Joan de Lusis", "Alphonsus de Sancto Joan", "Albert de Astudilla", "Ferdinand de Verdese", "Johannes de Arabiano", "Joachim Gherkens", "Michael Petri"], "goods_mentioned": ["bales of cloth", "flax", "hides", "tin vessels", "clothing", "Lisbon oil", "Brouage salt"], "notable": false}, {"id": 72, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "On 20 Sept. 1533 in the house of the underscribed notary (John Devereux) in Lombard Street in the parish of St Mary Wolnoth in London, there appeared in the presence of the notary and the witnesses one Thomas Cole, citizen and merchant taylor of London, 64 years old or thereabouts, Simon Briganden, citizen and merchant taylor of London, 28", "date": "", "location": "", "language": "Low German", "content": "76  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or a breve\n(ŭ) in order to distinguish it from two minims. Since this has no effect on the pronunciation of the word, they are\ntranscribed as ‘u’.\n\n  77  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or a breve\n(ŭ) in order to distinguish it from two minims. Since this has no effect on the pronunciation of the word, they are\ntranscribed as ‘u’.\n\n\fVi:  g oods taken in spa nis h s hips\n\n\nIn Dei nomine amen. Per hoc presens publicum instrumentum cunctis evidenter\nappareat, quod anno Domini ab incarnacione millesimo quingentesimo tricesimo tercio,\nindiccione sexta, pontificatus vero sanctissimi in Christo patris et domini nostri domini\nClementis, divina providencia hujus nominis pape septum, anno decimo, mensis vero\nSeptembris, die 20a [20 Sept. 1533], infra domum habitacionis mei notarii publici subscripti\nsituatam in vico publico de Lombard Strete in parochia Beate Marie Wolnoth, civitatis\nLondon’, in meique ejusdem notarii ac testium infrascriptorum presencia personaliter\nconstituti prudentes viri Thomas Cole, civis et mercator scissor ejusdem civitatis, etatis,\nut asseruit, 64or annorum vel circiter, et Simon Briganden, etiam civis et mercator scissor\ncivitatis predicte, etatis, ut recolit, viginti et octo annorum vel incirca, homines bone fame\net conversationis illese, non vi, dolo, metu, fraude seu aliqua machinacione sinistra inducti,\nseducti, coacti, decepti vel circumventi, sed ex eorum meris, liberis, puris et spontaneis\nvoluntatibus ad futuram rei memoriam et pro rei veritatis infrascripte declaracione, ut\nevidenter apparuit et ut palam et publice fatebantur et confessi fuerunt et eorum alter\nfatebatur et confessus fuit, ad defensionem et conservationem jurium ipsorum et eorum\nalterius, dixerunt, deposuerunt et certificaverunt mihi notario publico subscripto per\neorum separalia juramenta facta modo et forma subsequentibus, videlicet\n[1.]\nIn primis dictus Thomas Cole animo deliberato dixit, deposuit et certificavit mihi\nnotario publico subscripto per juramentum suum factum ad et super sancta Dei evangelia\ntactis per eum manu sua dextera corporaliter scripturis verum fuisse et esse, quod ipse\nThomas Cole deponens in mense Julii jam proxime preterito ante presentem publicum\ninstrumentum in quadam nave tunc vocata aMaria de Gatolopea, de qua Johannes de\nCalegio sub Dei potestate fuit magister, tres fardellas pannorum laneorum in eis continentes\n30 pannos et 6 pecias cottons pro voluatura ipsorum, unde quilibet pannus et quelibet\npecia cottons in eisdem in plumbo cum marca propria ipsius deponentis prima in margine\nhujus instrumenti facta [merchant’s mark no. 1 in left margin] ad finem cujuslibet eorum fuit\nmarcata et ab extra super canabaso cujuslibet ipsorum secunda marca in margine presentis\ninstrumenti [merchant’s mark no. 2 in left margin] posita fuit in portu civitatis London’ de\nbonis suis propriis carcari et onerari fecit et quod longitudo cujuslibet earundem apparet\nper quandam schedulam manu propria ipsius Thome scriptam desuper filatam et colorum\nsubsequentem, videlicet prima fardella in se continet, ut sequitur: a grene 26¼ virge, a\nvesse 24¾ virge, a vesse 24½, a grene medley 25, a redde 26, 1 redde 26, a redde 26, a redde\n26, a redde 26, a redde 26 cum duabus voluaturis, a horseflesshe 22½ goodes, a russet\n26½. Secunda fardella in se continet a tawney 24½, a blewe 24¼, a blewe 24, a muster 25,\na muster 25, a russet 25¾, a violet 24¼, 1 violet 24¾, a grene medley 24, a vesse 25 cum\nduabus voluaturis, a russet 22¼ goodes, a yelow 22½ goodes. Et tercia fardella in se continet\na russet 24½, a pluncket 25¾, a violet 24¾, a blew 24½, a blew 24¾, a grene medley 25, a\nvesse 24½, a tawney 24½, a muster 25¼, a muster 25¼ cum duabus voluaturis, a kenet 23\ngoodes and a grene 22 goodes. Item dictus Thomas deponens per dictum suum juramentum\nut supra dixit, deposuit et certificavit mihi notario publico subscripto verum fuisse et esse,\nquod ipse deponens scribi et subscribi fecit separales schedulas cognosciamenti carcationis\nhujusmodi 3 fardellarum pannorum concernentes in nomine Francisci Maswelle alienigene\nsolummodo ob metum Scotorum et navium armatarum eorundem.\n[2.]\nItem predictus Symon Briganden vive vocis oraculo dixit, deposuit et certificavit\nmihi dicto notario publico subscripto per juramentum suum factum ad et super sancta\n\n\nDei evangelia tactis per eum manu sua dextera corporaliter scripturis verum fuisse et esse,\nquod ipse Simon deponens in predicto mense Julii de bonis suis propriis in predicta nave\net in dicto portu London’ unam paccam pannorum laneorum ab extra marca propria ipsius\nSimonis in margine presentis instrumenti 3° facta [merchant’s mark no. 3 in left margin] de\nnumero 3 etiam super eandem facto colorum et longitudinum subsequencium, videlicet\na vesse 25½ virge, 1 meddley 26, a blew 24¼, a russet 24, a light grene 26¾, a muster 25½,\na medley 25½, a vesse 25¼, a blew 24¼, a light grene 26, a pluncket 24¾, a pluncket 25½,\n3 gyngs, 5 russettes of Northe, 10 yards of fyne brown grene carcari et onerari fecit. Item\ndictus Simon jurando ut supra dixit, deposuit et certificavit mihi dicto notario publico\nsubscripto verum fuisse et esse, quod idem Simon deponens scribi et subscribi fecit\nseparaliles schedulas cognosciamenti carcacionis hujusmodi fardellarum de numero 3\nipsius deponentis concernentes in nomine Petri de Berevey alienigene solummodo ob\nmetum Scotorum et navium armatarum eorundem.\n\nActa fuerunt hec, prout suprascribuntur et recitantur, presentibus tunc ibidem discretis\nviris Johanne Banckes et Radulpho Foxley, civibus et mercatoribus antedicte civitatis\nLondon’ testibus ad premissa vocatis specialiter atque rogatis.\n\nEt quia ego Johannes Devereux clericus, civis civitatis\nLondon’, publicus sacris apostolica et imperiali auctori-\ntatibus notarius, predictis dictionibus, depositionibus et\ncertificationibus prefatorum deponentium et eorum alterius\nper juramenta sua separalia forma ut supra facta necnon\nceteris premissis omnibus et singulis, dum, sicut premit-\ntitur, agebantur et fiebant unacum testibus prenominatis\npresens personaliter interfui eaque omnia et singula sic\nfieri vidi et audivi, igitur hoc instrumentum – me aliunde\nprepedito – per alium scribi feci signoque et nomine\nmeis solitis et consuetis signavi in fidem et testimonium\nomnium et singulorum premissorum rogatus et requisitus\n\nNotary’s mark of John Devereux\n\na-a Entered by a different hand in a gap left by the notary for completion of the", "editorial_notes": "entry HL.\n1)\n2)\n3)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 20. Original notarial instrument\nwith notary’s mark of John Devereux cleric and citizen of London (see\nbelow). Parchment. Unsealed.", "file": "catalogued/doc_72.md", "modern_english_translation": "In the name of God, amen. Let it be evident to all by this present public instrument that in the year of the Lord's incarnation one thousand five hundred and thirty-three, the sixth indiction, in the tenth year of the pontificate of the most holy father in Christ and our lord Clement, by divine providence Pope of this name the seventh, on the 20th day of the month of September [20 Sept. 1533], within the dwelling house of me, the undersigned public notary, situated in the public street of Lombard Street in the parish of Blessed Mary Wolnoth in the city of London, there appeared in person before me, the said notary, and the witnesses underwritten, the prudent men Thomas Cole, citizen and merchant tailor of the said city, aged, as he stated, 64 years or thereabouts, and Simon Briganden, likewise citizen and merchant tailor of the aforesaid city, aged, as he recalls, about 28 years, men of good repute and unblemished conduct, induced, led, compelled, deceived or circumvented by no force, deceit, fear, fraud or any sinister contrivance, but of their own pure, free, clear and spontaneous wills, for future record and for declaration of the truth of the matters underwritten, as was evident and as they openly and publicly stated and confessed, and as each of them separately stated and confessed, for the defence and preservation of their rights and those of either of them, spoke, deposed and certified to me, the undersigned public notary, by their separate oaths taken in the manner and form following, namely:\n\n[1.]\nFirst, the said Thomas Cole, with deliberate intent, spoke, deposed and certified to me, the undersigned public notary, by his oath sworn upon and over the holy Gospels of God, physically touching the scriptures with his right hand, that it was and is true that he, Thomas Cole, the deponent, in the month of July last past before this present public instrument, in a certain ship then called the Maria de Gatolope, of which Johannes de Calegio was master under God's authority, caused three bales of woollen cloths, containing 30 cloths and 6 pieces of cotton for wrapping them, to be loaded and laded in the port of the city of London from his own proper goods, each cloth and each piece of cotton in the same being marked in lead with his own mark, the first placed in the margin of this instrument [merchant's mark no. 1 in the left margin], at the end of each of them, and on the outside upon the canvas of each of them the second mark placed in the margin of this instrument [merchant's mark no. 2 in the left margin]; and that the length of each of the same appears by a certain schedule written in Thomas's own hand, sewn on top and of the following colours, namely: the first bale contains as follows: a green 26¼ yards, a visset [Note: a type of cloth, possibly \"visset\" or woad-dyed] 24¾ yards, a visset 24½, a green medley 25, a red 26, 1 red 26, a red 26, a red 26, a red 26, a red 26 with two wrappings, a horseflesh [Note: a grey-brown cloth colour] 22½ good [yards], a russet 26½. The second bale contains: a tawny 24½, a blue 24¼, a blue 24, a musterdevillers [Note: a type of grey cloth] 25, a musterdevillers 25, a russet 25¾, a violet 24¼, 1 violet 24¾, a green medley 24, a visset 25 with two wrappings, a russet 22¼ good, a yellow 22½ good. And the third bale contains: a russet 24½, a plunket [Note: a pale blue cloth] 25¾, a violet 24¾, a blue 24½, a blue 24¾, a green medley 25, a visset 24½, a tawny 24½, a musterdevillers 25¼, a musterdevillers 25¼ with two wrappings, a kennet [Note: a type of coarse cloth] 23 good and a green 22 good. Likewise the said Thomas the deponent by the said oath, as above, spoke, deposed and certified to me, the undersigned public notary, that it was and is true that he, the deponent, caused separate bills of lading [Note: schedulas cognosciamenti — bills of lading or recognition notes] to be written and subscribed concerning the loading of these 3 bales of cloth in the name of Francis Maswelle, a foreigner, solely out of fear of the Scots and their armed ships.\n\n[2.]\nLikewise the aforesaid Simon Briganden by the oral testimony of his living voice spoke, deposed and certified to me, the said undersigned public notary, by his oath sworn upon and over the holy Gospels of God, physically touching the scriptures with his right hand, that it was and is true that he, Simon the deponent, in the aforesaid month of July, from his own proper goods, in the aforesaid ship and in the said port of London, caused one pack of woollen cloths to be loaded and laded, marked on the outside with his own mark of Simon, placed in the margin of this instrument [merchant's mark no. 3 in the left margin], numbered 3, also placed upon the same pack, of the following colours and lengths, namely: a visset 25½ yards, 1 medley 26, a blue 24¼, a russet 24, a light green 26¾, a musterdevillers 25½, a medley 25½, a visset 25¼, a blue 24¼, a light green 26, a plunket so called 24¾, a plunket 25½, 3 gings [Note: a type of cloth], 5 russets of the North, 10 yards of fine brown green — caused to be loaded and laded. Likewise the said Simon, swearing as above, spoke, deposed and certified to me, the said undersigned public notary, that it was and is true that he, Simon the deponent, caused separate bills of lading to be written and subscribed concerning the loading of this pack numbered 3 belonging to the deponent in the name of Peter de Berevey, a foreigner, solely out of fear of the Scots and their armed ships.\n\nThese acts were performed as written and recited above, in the presence then and there of the discreet men John Banckes and Ralph Foxley, citizens and merchants of the aforesaid city of London, witnesses specially called and requested for the foregoing.\n\nAnd I, John Devereux, clerk, citizen of the city of London, public notary by apostolic and imperial authority, was personally present at the aforesaid statements, depositions and certifications of the aforesaid deponents and each of them made by their separate oaths in the form as above, as well as at all and singular the other foregoing matters while, as is stated above, they were being conducted and done, together with the witnesses named above, and saw and heard all and singular the same being so done; therefore this instrument — being hindered elsewhere — I caused to be written by another, and signed it with my accustomed and customary sign and name, in faith and testimony of all and singular the foregoing, having been asked and requested.\n\n[Notary's mark of John Devereux]", "summary": "A notarial instrument drawn up by London notary John Devereux on 20 September 1533, recording sworn depositions by Thomas Cole and Simon Briganden, both London merchant tailors, regarding cloth they had loaded onto the Spanish ship Maria de Gatalope in July 1533. Each deponent provides an extremely detailed inventory of their bales — specifying cloth type, colour, and yardage for every piece — and both admit they had the bills of lading written in foreign names solely out of fear of Scottish warships.", "document_type": "deposition", "themes": ["trade", "legal_proceedings", "cargo", "maritime", "testimony", "goods_seizure", "textile_trade", "notarial"], "people_mentioned": ["Thomas Cole", "Simon Briganden", "John Devereux", "Johannes de Calegio", "Francis Maswelle", "Peter de Berevey", "John Banckes", "Ralph Foxley"], "goods_mentioned": ["woollen cloths", "cotton wrappings", "green cloth", "visset cloth", "red cloth", "horseflesh cloth", "russet cloth", "tawny cloth", "blue cloth", "musterdevillers", "violet cloth", "yellow cloth", "plunket cloth", "medley cloth", "kennet cloth", "silk girdles"], "notable": true, "notable_reason": "This document provides an exceptionally granular itemised inventory of individual cloth pieces with colours, yardages, and merchant marks, and contains the notable admission that bills of lading were falsified under foreign names to avoid Scottish privateers — shedding light on routine deceptive practices in 1530s English maritime trade."}, {"id": 73, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "Middle Low German translation of the depositions of John Hampton, Humphrey Knyght, Thomas Blancke, Thomas Kole, Simon Bryganden, Robert Pagiet, Thomas Gale, Robert Wilfort, Ralph Voxley, William Wilfort", "date": "(undated)", "location": "78", "language": "Low German", "content": "Unsealed.79\n\nJohannes Hampton hefft mÿt synem geswarede beholden und wargemaket, dath\n[1.]\nhe beyde vor syck und in namen Johannis Bryngborne, dewelke gedachten Johannis\nmasschopper isa, eyne schuten, darup Johannes Wyllyamson van Middelborch in Holandt\nschipper isb, gewest hebbec mÿt dussen synen navolgenden gudern in Zelandt ghefrachtet,\nalso myt 32 wage bruns soltes Engelscher mathe und myt 5½ dusent castrickstened und\neyne kisten myt der resschup und kledern so dar beÿ den gedachten factor hefft gewest\nund syn de guder werdt gewest 40 punt sterlinges.\n[2.]  Humfridus Knÿcht hefft myt synem ede beholden, dat sÿn factor Thomas Wakeham\nin eyne schuten to Flussching to hus behorende, darup Adrian van Sterree schipper is\ngewest, hebbe geschepet 14 tunen soltes vissches, darvan ein etlik tun also [merchant’s\nmark no. 1 follows] is gemarket, so syn der Lubschen orlage schepe der gemelten schuten\nbojegent und hebben dar 9 tunen vissches uthgenamen, derhalven he genante Humfridus\nso gudt als 6 punt und 6s Flamisscher grote in schaden gekamen sampt der exspensen.\n[3.]  Thomas Blancke hefft mÿt synem ede beholden, dat syn factor Gÿlbertus Pervissche\neine kleÿne trusse, darinne 48 fdossynf sÿden gordel syn beslaten gewest in obgemelten\nschuten hebbe geschepet und dat desulve gklein pacskeng trusse sy werdt gewest 14 punt\nund 16s Flamisscher grote, baven den tollen, de syckh belopt up 8s Flamissch.\niThomas Kole hefft mÿt sÿnem ede erholden und wargemaket, dath he hebbe\n[4.]\ngeschepet in ein schip geheten Maria van Gatalope, darup Johannes van Calegio is schipper\ngewest, 3 packen wullen laken. In densulven syn gewest 30 laken und 6 stucke cotton vor\nummeslege, darvan ein etlik laken und stucke cottons mÿt gedachter Thomas marke am\nrande in bleÿ gedrucktj, am ende eÿnes etliken dersulven is gemarket und van buten upp\ndem ummeslage myt dem andern marke gemarket [merchant’s marks no. 2 und 3 in the\nleft margin] und de lenge dersulven laken erschint durch ein zedel myt syner egen hanth\ngeschreven und daraver her geneyet van navolgender verwe, also de erste packe hefft in\nsyck ein gron van 26 garden 1 quarterk, 1 visse van 24 garden 3 quarter, 1 visse 24 garden\n2 quarter, 1 duncker gron 25 garden, 1 rodt 26 garden, 1 rodt 26 garden, 1 rodt 26 garden, 1\nrodt 26 garden, 1 rodt 26 garden, 1 rodt 26 garden myt 2 ummeslegen van horseflessche so\ngenant 22 gudes 2 quarter, 1 russet 26 garden 2 quarter. De ander packe helt in syck 1 tannet\n24 garden 2 quarter, 1 blaw 24 garden 1 quarter, 1 blaw 24 garden, 1 musterfyllre 25 garden, 1\nmusterfyllir 25 garden, 1 russet 25 garden 3 quarter, 1 violen 24 garden 1 quarter, 1 violen 24\ngarden 3 quarter, 1 duncker gron 24 garden, 1 visse 25 garden myt 2 ummeslegen, 1 russet\n22 gudes 1 quarter, 1 geel 22 gudes 2 quarter. Und de drytte packe holt in syck 1 russet 24\ngarden 2 quarter, 1 licht blaw 25 garden 3 quarter, 1 violen 24 garden 3 quarter, 1 blaw 24\ngarden 2 quarter, 1 blaw 24 garden 3 quarter, 1 duncker gron 25 garden, 1 visse 24 garden\n2 quarter, 1 tannet 24 garden 2 quarter, 1 muster 25 garden 1 quarter, 1 muster 25 garden\n1 quarter myt 2 ummeslegen, 1 ekemut 23 gudes und 1 gron 22 gudes. Item de gemelte\n\n  79  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish\nit from two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’. In addition,\nthe scribe has employed a superscribed breve to signal the letter ‘w’ (blew, verwe, loŭwande). This is transcribed\nas ‘w.’\n\n\nThomas hefft myt demsulven ede wargemaket, dat he hebbe laten schryven besundere\nzedelel van wegen und in namen Francisci Maswello eynes fromdtlinges alleyne umme\nfruchten wyllen der Schotten und ehrer orlage schepe to eyner erkentenisse und teken\nder vorfrachtinge der 3 packen.\n[5.]  mItem Simon Brÿganden hefft myt synem ede wargemaket und erholden, dat he in\ndath gemelte schip Maria van Gatalope van synen egen propern gudern heft geschepet 1\npacken wullen laken van buten myt synem egen marcke am rande [merchant’s mark no. 4\nin the left margin] alse dem drydden gemarket dat drydde des tales ock upp desulven\npacken der nachvolgenden verwe und lenge gemarket, also 1 visse 25 garden 2n quarter,\n2 myddelmelicho 26 garden, 1 blaw 24 garden 1 quarter, 1 russet 24 garden, 1 licht gron 26\ngarden 3 quarter, 1 musterfyllirp 25 garden 2 quarter, 1 myddelmelicho 25 garden 2 quarter,\n1 visse 25 garden 1 quarterq, 1 blawr 24 garden 1 quarter, 1 licht gron 26 garden, 1 plunckets\nalso genant 24 garden 3 quarter, 1 pluncket 25 garden 2 quarter, 3 gÿnges also genompt, 5\nrusset an der northseden gemaket 10 garden, offt fÿn brun growe.\n[6.]  Rubertus Pagiet alderman uns hefft myt synem geswaren ede wargemaket, dath he 2\npacken vlasses in ein schip genompt le Christoffer van Le ein Moria in dem grensen Galitie,\ndarup Johannes Shewars is schipper gewest, hebbe geschepet, darvan albeyde dersulven\npacken mÿt Robertus marke am rande is gemarket [merchant’s mark no. 5 in the left margin].\nItem Thomas Gale hefft mÿt synem ede wargemaket, dath he in obgemelten schip f1\n[7.]\npackenf im tale dat verdet hebbe geschepet in sick holdende 16u korte laken und 12 stucke\nde statutes blodiiv verwe also genompt vor ummeslege myt anderm marke [merchant’s mark\nno. 6 in the left margin] up wdemw lynnewande gemarket van verwe und lenge, wo volget,\n1 violen 24 garden 3 quarter, 1 visse 24 garden 1 quarter, 1 rodt 25 garden und 1 [quarter], 1\nmusterfyllre van 24 garden 3 quarter, 1 duncker gron van 24 garden 1 quarter, 1 musterfyllre\nvan 24 garden 3 quarter, 1 violen van 24 garden 1 quarter, 1 visse van 24 garden\n3 quarter, 1 duncker gron van 24 garden 3 quarter, 1 russet van 24½ garden, 1 russet van\n24 garden 1 quarter, 1 blaw van 24 garden 3 quarter, 1 blaw van 25½ garden, 1 blaw van 24\ngardenx. 1 blaw van 24½ garden, 1 blaw van 24 garden. Und vortes heft desulve Thomas\nGale bÿ dem vorigen ede wargemaket, dat emhe so wol alle dussey 16 stucke sodaner wullen\nlaken egen tobehoren alse zdez vorigen 12 stucke van statuten der verwe so genompt mÿt\ndem derden marke am ra[n]deaa [merchant’s mark no. 7 in the left margin] in bley gedruckt\neynem etliken laken angehefftet.\n[8.]\nItem Robertus Wilfordt hefft myt synem ede beholden, dat he in vilgedachte schip 3\npackenab korter wullen laken myt dersulven laken ummeslage genant Robertus und synen\nbrodern proper und egentlich tokamen, darvan 1 etlick packe dersulven van buten up dem\ndarummegeslagen louwande myt dem verden marcke so am rande steit [merchant’s mark\nno. 8 in the left margin], is gemarket und dath erste dersulven stucke holt in syck 16 laken\nvan tale, verwe und lenge, wo volget, alse 297 blaweac van 24 garden 3 quarter, 298 blawe\nvan 24 garden 2 quarter, 293 blawe van 23 garden 3 quarter, 284 blawe van 24 garden 2\nquarter, 245 blawe van 24 garden 2 quarter, 259 visse van 25 garden 1 quarter, 272 visse van\n25 garden, 165 myddelmetige van 25 garden 2 quarter, 173 myddelmetige van 25 garden,\n299 rode van 25 garden 3 quarter, 224 russet van 25 garden, 175 russet van 25 garden 1\nquarter, 34 musterfyllre van 25 garden, 172 musterfyllre van 25 garden, 171 musterfyllre\nvan 25 garden 2 quarter, 277 pluncket so genompt vanad 26 garden. Nach dusser 16 laken\n\n\fVi:  g oods taken in spa nis h s hips\n\n21 3\n\nlenge 400 garden und 1 quarter mÿt 3 stucken van cotton vor ummeslege dessulven\npacken dat erste im tale erholt in syck, wo folget: 1 gronae van 21 gudes 1 quarter, 1 grone\nvan 21af gudes 3 quarter, 1 grone van 20 gudes 3 quarter, darvanah ein islik stucke sodaner\nkorten laken myt dem vofften marke am rande [merchant’s mark no. 9 in the left margin] in\nbley gedruckt und eynem idern dersulven laken angehefftet is gemarket, de ander packe\ndersulvenai dryer erholt in syck 9 laken der volgenden verwe, van welchen synt 4 blodii\nverwe so genompt und 1 russet, darvan ein etlik laken der 5 is myt dem sesten marke am\nrande [merchant’s mark no. 10 in the left margin] in was gedruckt gemarket und de reste der\n4 laken in demsulven andern pack van navolgender tale, verwe und lenge: 1 violen van\n28 garden 1 quarter, 3 tannetes van 26 garden, 5 mÿddelmetige van 25 garden, 5 pluncket\nvan 22 garden 3 quarter myt 2 stucken an de northseden gemaket dosseÿns genompt, 1\nrusset van 12 garden, 1 russetaj tom ummeslage dessulven und dat ein etlik der 4 laken myt\ndem hoveden marke am rande [merchant’s mark no. 11 in the left margin] in bley gedruckt\nis gemarket. Und de 3 packe holt in syck 35 stucke an der northsyden gemaket dosseyns\ngenompt und 4 stucke vor ummeslage der genanten 3 packen.\nItem Radulphus Voxleyak hefft myt synem geswaren ede beholden, dath he in dath\n[9.]\nvorgedachten schip van synen egen und properen gudern 2 packenal wullen laken genompten\nNorthern dosseyns man niperley vor we fgeschepet hebbef darna 1 dersulven 2 packen is\ngetekent van buten up dem ummegeslagen louwean des vofften tales und achten marke\nam rande [merchant’s mark no. 12 in the left margin] und heft in sick 30 stucke und 6 myt 8\nstucken sodaner dosseyns vor ummeslege dersulven packen undam darvan de packen van\nbuten up dem ummgeslagen louwande is getekent dat soste im tale und des geliken my\ndeman vorgerurten marke is gemarket und erholt in syck 36 stucke myt 8 stucken sollicher\n12 dossyne vor ummeslage dersulven packen und einem etlick stucke der 12 dossyne is ein\npellican in bley gedruckt angehefftao.\n[10.]\nItem Wylhelmus Wylfordt heft myt synem geswaren ede wargemaket, dath he\nin vilgedachte schip geschepet hefft 1 fin laken van der verwe pucke geheten hefft in\nsick 22 garden und 1 stuven russet hefft in syck 7½ garden Engelscher math geslagen\nin buckeramap so genomptaq und ein bargelot gemaket in Hispannie myt sunderliken\nresschuppe in datsulve bargelot, dat kistken so genompt geslagen is werdt gewest 4\npunt sterlinges.\n[11.]  Ock hefft de vilgedachte Radulphus Foxley mÿt sÿnem ede wargemaketh, dath sin\nknecht Galfridus Vaugan hebbt gehat in demsulven schepe alse idt genamen is worden, in\ngetaldem gelde sampt andern dingen und resschup ehme egentlich tobohorich so gudt\nalse £4, 13s undar 4d sterlinges.\n[12.]\nItem dusse vorbenompt Thomas Gale, Robertus Wylfordt, Radulphus Foxley\nund Wylhelmus Wylfordt myt ehrem vorigen ede wargemaket, dat se hebben sunderlike\ntollen breve under dem namen des gedachten Johanns Sewars alleyne umme fruchten\nder Schotten und ehrer orlage schepen schriven laten, darmyt desulven ehre gudere desto\nsekerer mochten averkamen.\n\nThe  following  merchants’  marks  occurrenc
