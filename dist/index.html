ruck through HL.\n\nx 1 blaw follows, struck through HL.\nz-z Interlined HL.\n\naa gemarket follows, struck through HL.\n\nan vorg follows, struck through HL.\n\nar 4s follows, struck through HL.\n\nac 24 follows, struck through HL.\n\n\fVi:  g oods taken in spa nis h s hips\n\n21 5", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 21. Contemporaneous copy. Paper.", "file": "catalogued/doc_73.md", "modern_english_translation": "Johannes Hampton has confirmed and attested by his sworn oath that:\n\n[1.]\nHe, both for himself and in the name of Johannes Bryngborne, whose factor [Note: commercial agent] the said Johannes is, had a barge upon which Johannes Williamson of Middelburg in Holland was shipmaster, and had freighted it with the following goods bound for Zeeland, namely 32 weys [Note: a unit of weight] of brown salt in English measure and 5,500 castle stones [Note: castrickstened — possibly cobblestones or building stone] and one chest with the equipment and clothing of the said factor, and the goods were worth 40 pounds sterling.\n\n[2.] Humphrey Knight has confirmed by his oath that his factor Thomas Wakeham had shipped in a barge belonging to Flushing, upon which Adrian van Sterree was master, 14 barrels of salt fish, some of which barrels are marked thus [merchant's mark no. 1 follows], and that the Lübeck warships encountered the said barge and took from it 9 barrels of fish, on account of which he, the said Humphrey, suffered a loss of as good as 6 pounds and 6 shillings Flemish groats, together with expenses.\n\n[3.] Thomas Blanke has confirmed by his oath that his factor Gilbert Pervissche had shipped in the aforesaid barge a small bundle in which 48 dozen silk girdles were enclosed, and that the said small pack was worth 14 pounds and 16 shillings Flemish groats, over and above the toll, which amounted to 8 shillings Flemish.\n\n[4.] Thomas Cole has confirmed and attested by his oath that he had shipped in a ship called Maria de Gatalope, upon which Johannes de Calegio was master, 3 packs of woollen cloth. In the same were 30 cloths and 6 pieces of cotton for wrappings, each cloth and piece of cotton marked with the said Thomas's mark pressed in lead at the margin, at the end of each of them, and marked on the outside on the wrapping with the other mark [merchant's marks nos. 2 and 3 in the left margin]; and the length of the said cloths appears by a schedule written in his own hand and sewn over it, of the following colours: thus the first pack contains: a green 26 yards 1 quarter, 1 visset 24 yards 3 quarters, 1 visset 24 yards 2 quarters, 1 dark green 25 yards, 1 red 26 yards, 1 red 26 yards, 1 red 26 yards, 1 red 26 yards, 1 red 26 yards, 1 red 26 yards with 2 wrappings of the so-called horseflesh colour 22 good yards 2 quarters, 1 russet 26 yards 2 quarters. The second pack contains: 1 tawny 24 yards 2 quarters, 1 blue 24 yards 1 quarter, 1 blue 24 yards, 1 musterdevillers 25 yards, 1 musterdevillers 25 yards, 1 russet 25 yards 3 quarters, 1 violet 24 yards 1 quarter, 1 violet 24 yards 3 quarters, 1 dark green 24 yards, 1 visset 25 yards with 2 wrappings, 1 russet 22 good yards 1 quarter, 1 yellow 22 good yards 2 quarters. And the third pack contains: 1 russet 24 yards 2 quarters, 1 light blue 25 yards 3 quarters, 1 violet 24 yards 3 quarters, 1 blue 24 yards 2 quarters, 1 blue 24 yards 3 quarters, 1 dark green 25 yards, 1 visset 24 yards 2 quarters, 1 tawny 24 yards 2 quarters, 1 musterdevillers 25 yards 1 quarter, 1 musterdevillers 25 yards 1 quarter with 2 wrappings, 1 ekemut [Note: a cloth type, possibly \"acorn-coloured\"] 23 good yards and 1 green 22 good yards. Likewise the said Thomas has attested by the same oath that he caused separate bills of lading to be written in the name of Francis Maswelle, a foreigner, solely out of fear of the Scots and their warships, as a token and acknowledgement of the freighting of the 3 packs.\n\n[5.] Simon Briganden has confirmed and attested by his oath that he had shipped in the said ship Maria de Gatalope from his own proper goods 1 pack of woollen cloth, marked on the outside with his own mark at the margin [merchant's mark no. 4 in the left margin], being numbered third, likewise marked upon the said pack with the following colours and lengths: 1 visset 25 yards 2 quarters, 2 medleys 26 yards, 1 blue 24 yards 1 quarter, 1 russet 24 yards, 1 light green 26 yards 3 quarters, 1 musterdevillers 25 yards 2 quarters, 1 medley 25 yards 2 quarters, 1 visset 25 yards 1 quarter, 1 blue 24 yards 1 quarter, 1 light green 26 yards, 1 plunket so called 24 yards 3 quarters, 1 plunket 25 yards 2 quarters, 3 gings so named, 5 russets made on the north side 10 yards, or fine brown coarse cloth.\n\n[6.] Robert Pagiet, alderman, has confirmed by his sworn oath that he had shipped in a ship called the Christopher de le Moria [Note: Christopher of La Moria, i.e. Muros] in the territory of Galicia, upon which Johannes Shewars was master, 2 packs of flax, both of which said packs are marked with Robert's mark at the margin [merchant's mark no. 5 in the left margin].\n\n[7.] Thomas Gale has confirmed by his oath that he had shipped in the aforesaid ship 1 pack — the fourth in number — containing 16 short cloths and 12 pieces of the so-called statute bloody [Note: statutes blodie — a regulated type of red cloth] colour for wrappings, with another mark [merchant's mark no. 6 in the left margin] marked upon the linen wrapping, of the following colours and lengths: 1 violet 24 yards 3 quarters, 1 visset 24 yards 1 quarter, 1 red 25 yards and 1 quarter, 1 musterdevillers 24 yards 3 quarters, 1 dark green 24 yards 1 quarter, 1 musterdevillers 24 yards 3 quarters, 1 violet 24 yards 1 quarter, 1 visset 24 yards 3 quarters, 1 dark green 24 yards 3 quarters, 1 russet 24½ yards, 1 russet 24 yards 1 quarter, 1 blue 24 yards 3 quarters, 1 blue 25½ yards, 1 blue 24 yards, 1 blue 24½ yards, 1 blue 24 yards. And furthermore the same Thomas Gale has attested by the previous oath that all these 16 pieces of such woollen cloth are as much his own property as the aforesaid 12 pieces of statute cloth of the said colour, with the third mark at the margin [merchant's mark no. 7 in the left margin] pressed in lead and attached to each individual cloth.\n\n[8.] Robert Wilfordt has confirmed by his oath that he had shipped in the much-mentioned ship 3 packs of short woollen cloths with the wrappings of the same cloths, belonging properly and outright to the said Robert and his brothers, each individual pack of the same being marked on the outside upon the wrapping linen with the fourth mark as it stands at the margin [merchant's mark no. 8 in the left margin]; and the first of these pieces contains 16 cloths in number, colour and length as follows: no. 297 blue 24 yards 3 quarters, no. 298 blue 24 yards 2 quarters, no. 293 blue 23 yards 3 quarters, no. 284 blue 24 yards 2 quarters, no. 245 blue 24 yards 2 quarters, no. 259 visset 25 yards 1 quarter, no. 272 visset 25 yards, no. 165 medium 25 yards 2 quarters, no. 173 medium 25 yards, no. 299 red 25 yards 3 quarters, no. 224 russet 25 yards, no. 175 russet 25 yards 1 quarter, no. 34 musterdevillers 25 yards, no. 172 musterdevillers 25 yards, no. 171 musterdevillers 25 yards 2 quarters, no. 277 plunket so called 26 yards. After these 16 cloths, a total length of 400 yards and 1 quarter, with 3 pieces of cotton for the wrappings of the same pack — the first in number contains as follows: 1 green 21 good yards 1 quarter, 1 green 21 good yards 3 quarters, 1 green 20 good yards 3 quarters — each individual piece of such short cloth being marked with the fifth mark at the margin [merchant's mark no. 9 in the left margin] pressed in lead and attached to each individual cloth. The second pack of the said three contains 9 cloths of the following colour, of which 4 are of the so-called bloody colour and 1 russet, each individual cloth of the 5 being marked with the sixth mark at the margin [merchant's mark no. 10 in the left margin] pressed in wax; and the remaining 4 cloths in the same second pack of the following number, colour and length: 1 violet 28 yards 1 quarter, 3 tawnies 26 yards, 5 mediums 25 yards, 5 plunkets 22 yards 3 quarters with 2 pieces made on the north side called dozens [Note: dosseyns — a grade of cloth], 1 russet 12 yards, 1 russet for the wrapping of the same, and each individual cloth of the 4 being marked with the chief mark at the margin [merchant's mark no. 11 in the left margin] pressed in lead. And the 3rd pack contains 35 pieces made on the north side called dozens and 4 pieces for the wrappings of the said 3 packs.\n\n[9.] Ralph Voxley has confirmed by his sworn oath that he had shipped in the aforesaid ship from his own proper goods 2 packs of woollen cloths called Northern dozens [Note: a grade of cloth from northern England], of various colours [Note: man niperley vorwe — of no particular or mixed colours], of which 1 of the said 2 packs is marked on the outside upon the folded linen, being the fifth in number, with the eighth mark at the margin [merchant's mark no. 12 in the left margin], and contains 30 pieces and 6, with 8 pieces of such dozens for the wrappings of the same packs; and from these the packs marked on the outside upon the folded linen are the sixth in number and likewise marked with the aforementioned mark, and contain 36 pieces with 8 pieces of such 12 dozens for the wrappings of the same packs, and to each individual piece of the 12 dozens is attached a pelican pressed in lead.\n\n[10.] William Wilfordt has confirmed by his sworn oath that he had shipped in the much-mentioned ship 1 fine cloth of the colour called puke [Note: a high-quality dark cloth], containing 22 yards, and 1 piece of russet containing 7½ yards in English measure, wrapped in buckram [Note: a stiff coarse linen fabric] so called, and a baize [Note: bargelot — a type of coarse woollen cloth] made in Spain with particular equipment placed within the same baize in the chest so called, which was worth 4 pounds sterling.\n\n[11.] Also the much-mentioned Ralph Foxley has confirmed by his oath that his servant Geoffrey Vaughan had in the same ship at the time it was taken, in counted money together with other things and equipment belonging properly to him, as good as £4 13s 4d sterling.\n\n[12.] Likewise the aforementioned Thomas Gale, Robert Wilfordt, Ralph Foxley and William Wilfordt have attested by their previous oath that they had separate customs certificates [Note: tollen breve — customs or toll documents] written under the name of the said Johannes Sewars solely out of fear of the Scots and their warships, so that their said goods might pass more safely.", "summary": "A Middle Low German translation of sworn depositions by ten London merchants and factors — including John Hampton, Humphrey Knight, Thomas Blanke, Thomas Cole, Simon Briganden, Robert Pagiet, Thomas Gale, Robert Wilfordt, Ralph Voxley, and William Wilfordt — each itemising goods they had loaded onto vessels seized by Lübeck warships in 1533. The goods range from woollen cloth (described in minute detail by colour, length, and merchant mark) to salt, salt fish, silk girdles, flax, and personal cash. Several deponents admit to falsifying bills of lading under foreign names to evade Scottish warships.", "document_type": "deposition", "themes": ["trade", "piracy", "legal_proceedings", "cargo", "maritime", "testimony", "goods_seizure", "textile_trade", "food_trade", "financial", "notarial"], "people_mentioned": ["John Hampton", "Johannes Bryngborne", "Johannes Williamson", "Humphrey Knight", "Thomas Wakeham", "Adrian van Sterree", "Thomas Blanke", "Gilbert Pervissche", "Thomas Cole", "Francis Maswelle", "Simon Briganden", "Robert Pagiet", "Thomas Gale", "Robert Wilfordt", "Ralph Voxley", "William Wilfordt", "Ralph Foxley", "Geoffrey Vaughan", "Johannes de Calegio", "Johannes Shewars", "Johannes Sewars"], "goods_mentioned": ["brown salt", "castle stones", "salt fish", "silk girdles", "woollen cloth", "cotton wrappings", "flax", "short cloths", "statute bloody cloth", "Northern dozens", "puke cloth", "russet cloth", "buckram", "baize", "cash money"], "notable": true, "notable_reason": "This is the most comprehensive witness compilation in the collection, aggregating ten separate sworn testimonies with minute cloth inventories (colours, yardages, individual merchant marks) and covering multiple seized vessels; it also independently corroborates the practice of bill-of-lading fraud to avoid Scottish warships."}, {"id": 74, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "Indenture (drawn up in the presence of the mayor of Lübeck, Johann Sengestake,80 and Gosslick Remmynctotes81) accompanying the inventory of the goods from ‘the Spanish ship’ [probably the Christopher de Moria], presently in the custody of Mathias van Ryne", "date": "1533 Nov", "location": "Hamburg", "language": "Low German", "content": "Unsealed. On the dorse: Van guder by Mathis van Ryne copie.82\n\nIck Johann Hoper83 bekenne offentlich myt dusser myner eigen hantschrifft, dat de\nerbar her Johann Segestaken unde Gosslick Remmynctotes syn avereyn gekomen myt\ndem ersamen Mathia van Ryne, de Hispaniessken agudera yn syne behusingheb trower\nvorwaringe tho nemen. Des schal unde wyl de erber rath der stat Lubeck des ferndel jars\nvan ywelyken groten packen laken, der ym tale syn 13, geven 4s lub’ unde von ywelyken\nklenen packen, der ym tale 67 syn, ock vom ywelyken deker velle, der ym tale 48 syn,\nunde 1 klene packen flasses 2s lub’ geven. Dar ock dit guet awer 1 fertel jares ynt ander\nby ergemelten Mathia vam Ryne stunde, so schal desulve hues  chuerc enen vortganck\nhebben unde nar dat fertel jar gelick deme voregeven wollen betalinge doen, des schal\nergenannte Matheas dem erbaren rade der stat Lubeck yn dusse 3 gude eyne trowehant\nholden immant anders tho levelende ane eynes erbarn der stat Lubeck sunderlyke bevelig\nane alle geferde. Tho orkunde und thugenisse syn dusser schriffte 2 lykes ludes unde\ninheldes beramet uthenander gesneden, de eyne by Johann Hoper, de ander by Mathia\nvan Ryne yn vorwaringe. Geven unde screven Hamborg, den 2. Nove[m]bris anno 1533.\n\na-a Interlined HL.\nleft margin with catchmark HL.\n\nb Corrected in HL from behusinthe.\n\nc-c Entered in the", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 22b. Original indenture. Paper.", "file": "catalogued/doc_74.md", "modern_english_translation": "I, Johann Hoper, publicly acknowledge by this my own handwriting that the honourable Mr Johann Segestaken and Gosslick Remmynctotes have come to an agreement with the respectable Mathias van Ryne to take the Spanish goods into his house for safekeeping. For this, the honourable council of the city of Lübeck shall and will pay, per quarter year, for each of the large packs of cloth, of which there are 13 in number, 4 shillings Lübeck currency, and for each of the small packs, of which there are 67 in number, likewise for each dicker of hides, of which there are 48 in number, and 1 small pack of flax, 2 shillings Lübeck currency. If furthermore these goods should remain with the aforementioned Mathias van Ryne for more than one quarter year, then the said storage fee shall continue and, after the quarter year, payment shall be made in equal proportion to the foregoing, and the aforementioned Mathias shall keep faithful custody of these 3 goods [Note: i.e. the three categories of goods] on behalf of the honourable council of the city of Lübeck and deliver them to no one else without the special order of the honourable city of Lübeck, without any deception. In witness and testimony thereof, 2 identical copies of this document of the same tenor and content have been prepared and cut apart [Note: indenture — the document was physically cut in a jagged line to create matching halves as proof of authenticity], one to be kept by Johann Hoper and the other by Mathias van Ryne. Given and written at Hamburg, 2 November 1533.", "summary": "An indenture dated 2 November 1533, drawn up in Hamburg in the presence of Lübeck mayor Johann Sengestake and Gosslick Remmynctotes, recording a storage agreement between the Lübeck council and Mathias van Ryne for safekeeping the seized Spanish goods. It specifies a quarterly fee structure — 4 shillings per large pack, 2 shillings per small pack, per dicker of hides, and for the flax bundle — and stipulates that Ryne must hold the goods exclusively on Lübeck's authority until further order.", "document_type": "legal_instrument", "themes": ["trade", "legal_proceedings", "cargo", "compensation", "maritime", "goods_seizure", "notarial"], "people_mentioned": ["Johann Hoper", "Johann Segestaken", "Gosslick Remmynctotes", "Mathias van Ryne"], "goods_mentioned": ["bales of cloth", "hides", "flax"], "notable": true, "notable_reason": "This is the earliest-dated document in the batch (November 1533) and provides rare administrative detail on the immediate custody arrangements for seized goods, including a formal fee schedule — illuminating the logistical and financial mechanics of goods seizure and storage by a privateer-sponsoring city."}, {"id": 75, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "Inventory drawn up by Johann Hoper (in the presence of the Lübeck councillor Hans Sengestaken and Goslick Rennerelickrath [Reminckrode]) of packs of cloth in the captured Spanish ship, which goods are presently in the custody of Mathias van Ryne in Hamburg", "date": "[1533 Nov", "location": "Hamburg", "language": "Low German", "content": "Ick Johann Hoper bekenne offentlick myt dusser myner egen hant schrifft, dat ick uth\nbevele eynes e[rbaren] r[ades] der keyserlyken stat Lubeck myner hern hebbe besichtiget\n\n  80  Ratslinie no. 638. He had previously belonged to the Committee of 64 (Wullenwever’s power base) and was\n\nelected to the council on 21 Feb. 1533.\n\n  81  Merchant and shipowner of Reval, originally from Lübeck, who had insured the goods of the Spanish merchants:\n\nNAU 1 no. 151; HR IV 1, p. 168, no. 228 § 26-7, 35, p. 186 n. 4, no. 230 § 5, no. 231 § 2, no. 233 § 8, no. 255.\n\n  82  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or a breve\n(ŭ) in order to distinguish it from two minims. Since this has no effect on the pronunciation of the word, they are\ntranscribed as ‘u’.\n\n  83  Magister. Previously Lübecker Schloßschreiber, Rentmeister auf Gotland.\n  84  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.\n\n\nund gefunden by den ersamen Mathias van Ryne borger in Hamborch dorch den erbarn\nHans Sengestaken85 unde Goslick Rennerelickrath86 unde de uthliggers der Lubesken\norlages schepe eytlyke Hyspanieske guder, wylke dem patron tho besten by ergenanten\nMathia van Ryne, bethe tho bequemer tzit der segelacien scholen entholden werden.\n\nIn groten packen\n[merchant’s mark no. 1] 1 packe laken N° 2\n\n[merchant’s mark no. 2] 1 packen laken N° 1\n\n[merchant’s mark no. 3] 3a packen N° 5, 6, 7\n\n[merchant’s mark no. 4] 2 packen N° 12, 13\n\n[merchant’s mark no. 5] N° 13: 1 packen\n\n[merchant’s mark no. 6] [N°] 13: 1 packen\n\n[merchant’s mark no. 7] 1 packen N° 1\n[merchant’s mark no. 8] 2 packen laken N° 3, 4\nItem nog 1 packen laken dat marck kan me\nnicht kennen\n\nKlene packen\n[merchant’s mark no. 9] 19 klene packen laken\nN° 88, 74, 73, 91, 90, 81, 151, 100, 76, 78, 86,\n87, 89, 84, 83, 79, 82, 92, 77\n[merchant’s mark no. 10] 10 klene packen N°\n96, 95, 99, 98, 104, 97, 94, 103, 101, 102\n[merchant’s mark no. 11] 4 klene packen N° 21,\n23, 24, 22\n[merchant’s mark no. 12] 4 klene packen N° 1,\n2, 3, 4\n[merchant’s mark no. 13] 18 klene packen N° 1, 2,\n3, 5, 4, 6, 7, 8, 9, 10, 11, 47, 51, 52, 49, 46, 48, 50\n[merchant’s mark no. 14] 12 klene packen N°\n22, 27, 26, 25, 24, 29, 33, 28, 30, 32, 33, 31\n\n[merchant’s mark no. 15 follows] Under dussen marke 48 deker gelagede ossen hude.\nSumma der packen kleyn unde groth 80.\na Corrected in HL from 13.\n\nNo. 5 is a combination of a mark and a name. no. 6 is a name, not a mark, but it is used is a\nsimilar way in the source.\n\n1)\n\n6)\n\n2)\n\n7)\n\n3)\n\n8)\n\n4)\n\n9)\n\n5)\n\n10)\n\n  85  Johann Sengestake, elected councillor on 21 Feb. 1533 and an associate of Wullenwever: Ratslinie no. 638.\n  86  Merchant and shipowner of Reval, originally from Lübeck, who had insured the goods of the Spanish merchants:\n\nNAU 1 no. 151; HR IV 1, p. 168, no. 228 § 26-7, 35, p. 186 n. 4, no. 230 § 5, no. 231 § 2, no. 233 § 8, no. 255.\n\n\fVi:  g oods taken in spa nis h s hips\n\n21 7", "editorial_notes": "11)\n12)\n13)\n14)\n15)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 22c. Paper. Unsealed. On the dorse:\nInventarium der Hispanesken guder den erbaren rade in Lubeck tho\nbehendigen.84", "file": "catalogued/doc_75.md", "modern_english_translation": "I, Johann Hoper, hereby publicly acknowledge by this my own handwriting that, acting under orders from the honourable council of the imperial city of Lübeck, my lords, I have inspected and found in the keeping of the honourable Mathias van Ryne, citizen of Hamburg, through the honourable Hans Sengestaken and Goslick Rennerelickrath [Note: also rendered Reminckrode] and the privateers of the Lübeck warships, certain Spanish goods, which are to be held in the custody of the aforesaid Mathias van Ryne for the benefit of the patron until a convenient time for sailing.\n\nLarge packs:\n[merchant's mark no. 1]  1 pack of cloth, No. 2\n[merchant's mark no. 2]  1 pack of cloth, No. 1\n[merchant's mark no. 3]  3 packs, Nos. 5, 6, 7\n[merchant's mark no. 4]  2 packs, Nos. 12, 13\n[merchant's mark no. 5]  No. 13: 1 pack\n[merchant's mark no. 6]  [No.] 13: 1 pack\n[merchant's mark no. 7]  1 pack, No. 1\n[merchant's mark no. 8]  2 packs of cloth, Nos. 3, 4\nItem, also 1 pack of cloth whose mark cannot be identified.\n\nSmall packs:\n[merchant's mark no. 9]   19 small packs of cloth, Nos. 88, 74, 73, 91, 90, 81, 151, 100, 76, 78, 86, 87, 89, 84, 83, 79, 82, 92, 77\n[merchant's mark no. 10]  10 small packs, Nos. 96, 95, 99, 98, 104, 97, 94, 103, 101, 102\n[merchant's mark no. 11]  4 small packs, Nos. 21, 23, 24, 22\n[merchant's mark no. 12]  4 small packs, Nos. 1, 2, 3, 4\n[merchant's mark no. 13]  18 small packs, Nos. 1, 2, 3, 5, 4, 6, 7, 8, 9, 10, 11, 47, 51, 52, 49, 46, 48, 50\n[merchant's mark no. 14]  12 small packs, Nos. 22, 27, 26, 25, 24, 29, 33, 28, 30, 32, 33, 31\n\n[merchant's mark no. 15 follows]  Under this mark: 48 deckers [Note: a decker = 10 hides] of salted ox hides.\n\nTotal packs, small and large: 80.\n\n---", "summary": "Johann Hoper, acting under orders from the Lübeck council, inventories packs of cloth and ox hides held in custody by Mathias van Ryne in Hamburg. The goods, taken by Lübeck privateers from a Spanish ship, are itemised by merchant's mark and include 80 packs of cloth (large and small) and 48 deckers of salted ox hides. The document records the goods pending redistribution once conditions allow sailing.", "document_type": "inventory", "themes": ["trade", "piracy", "goods_seizure", "cargo", "maritime", "legal_proceedings", "textile_trade"], "people_mentioned": ["Johann Hoper", "Hans Sengestaken", "Goslick Rennerelickrath", "Mathias van Ryne"], "goods_mentioned": ["cloth (large packs)", "cloth (small packs)", "salted ox hides"], "notable": false}, {"id": 76, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "Report of Johan Hoper, under orders from the Lübeck council, on the goods taken by Lübeck privateers which were in the custody of Kort Meyneken, citizen of Hamburg, and which he (together with Hans Segestaken, councillor of Lübeck, and master Hennyng [Kulemeyer], secretary of the London Counter, inventoried", "date": "1533 Nov", "location": "Hamburg", "language": "Low German", "content": "Unsealed. On the dorse: Inventarium der Engelschen guder.87\n\nIck Johan Hoper bekenne vor idermenichlick, dat ick uth bevel des erbaren rades der\nkeyserlyken stat Lubeck myner heren hebbe besichtiget unde gefunden by dem ersamen\nKort Meyneken borger bynnen Hamborch dorch den erbarn Hans Segestaken radesheren\nunde uthligers der Lubeken orloges schepe yn trewe vorwaringe gedaen etlykke der gelikke\nguder, wylke den parten thom besten by ergenanten Kort Meyneken botte tho bequemer\ntzit der segelacien scholen entholden werden.\n\n[1.] under dussem marke\n[merchant’s mark no. 1]88\n\n[2.] under dussem marck\n[merchant’s mark no. 2]89\n\n[3.] under der marck\n[merchant’s mark no. 3]90\n\n[4.] under der marck\n[merchant’s mark no. 4]91\n\n1 packen laken N° 1\n1 packen laken N° 2\n1 packen laken N° 3\n1 packen laken N° 5\n1 packen laken N° 6\n\n1 packen laken N° 1\n1 packen laken N° 2\n1 packen laken N° 3\n\n1 packen laken N° 3\n\n2 packen flasses\n1 swart fyn puck laken\n2 grote rusken edder wesker vor pitzert\n\nDes ersten marck kyst 1 packen laken numero 4 hefft Nicolaus Raschew, Thomas Galen\ndener, up de Elve vor Hamborg weder entfangen unde myt sick in Engelant genamen. Unde\n\n  87  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.\n\n  88  These goods were in the Christofer de Moria.\n  89  These goods were in the Maria de Gatalope.\n  90  These goods were in the Maria de Gatalope.\n  91  These goods were in the Christofer de Moria.\n\n\n1 stuven russet van 7½ garden Engels hefft he vorkofft Johann van Horen menserscriver\nvor 3 gold kronen.\n\nDusse guder unde packen, wo vor gescreven, hebben mede besichtiget de erbar her\nHans Segestaken unde de wolgelerde magister Hennyngus [Kulemeyer] des kopemans\nsekreterera tho Lunden werden des tugenusse geven, wor des nodig werth syn. Tho\nmerer orkunde syn dusser schriffte 2 gemaket gelykes ludes unde inholdes utheynander\ngescreven unde myt unser twyer namen unde egen hantschrifft underscreven, de eyne by\ndem e[rbarn] r[ath] tho Lubeck, de ander by des kopmans secreterer tho Lunden gesant.\nGeven unde screven Hamborg, 2. Novembris anno 1533.\n\n[Signed] Wyllem Aysche, Ynglys [merchant’s mark no. 5 follows below]\n\na Corrected in HL from schetere.\n\n[signed] Johanne Hoper sc[ripsit]", "editorial_notes": "1)\n2)\n3)\n4)\n5)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 22g. Original indenture. Paper.", "file": "catalogued/doc_76.md", "modern_english_translation": "I, Johan Hoper, hereby acknowledge before all persons that, acting under orders from the honourable council of the imperial city of Lübeck, my lords, I have inspected and found in the keeping of the honourable Kort Meyneken, citizen of Hamburg, placed in faithful custody through the honourable Hans Segestaken, councillor, and the privateers of the Lübeck warships, certain similar goods, which are to be held in the custody of the aforesaid Kort Meyneken for the benefit of the parties until a convenient time for sailing.\n\n[1.] Under this mark:\n[merchant's mark no. 1]\n1 pack of cloth, No. 1\n1 pack of cloth, No. 2\n1 pack of cloth, No. 3\n1 pack of cloth, No. 5\n1 pack of cloth, No. 6\n\n[2.] Under this mark:\n[merchant's mark no. 2]\n1 pack of cloth, No. 1\n1 pack of cloth, No. 2\n1 pack of cloth, No. 3\n\n[3.] Under this mark:\n[merchant's mark no. 3]\n1 pack of cloth, No. 3\n\n[4.] Under this mark:\n[merchant's mark no. 4]\n2 packs of flax\n1 piece of fine black broadcloth [Note: \"puck laken\" — a type of fine woollen cloth]\n2 large Russian or Flemish cloths, sealed [Note: \"rusken edder wesker vor pitzert\" — the precise distinction is uncertain]\n\nOne pack of cloth No. 4 bearing the mark of the first entry was received back on the Elbe before Hamburg by Nicolaus Raschew, servant of Thomas Galen, and taken by him to England. And 1 piece of russet [Note: a coarse reddish-brown cloth] of 7½ yards English measure he sold to Johann van Horen, a [court] scrivener [Note: \"menserscriver\"], for 3 gold crowns.\n\nThe aforesaid goods and packs, as written above, have been jointly inspected by the honourable Hans Segestaken and the learned Master Hennyng [Kulemeyer], secretary of the merchant community in London, who will furnish witness thereof wherever it shall be needful. In further testimony hereof, two copies of this document have been made, of identical wording and content, written out one from the other and subscribed with both our names and our own handwriting; one sent to the honourable council in Lübeck, the other to the secretary of the merchant community in London. Given and written at Hamburg, 2 November 1533.\n\n[Signed] Wyllem Aysche, Englishman [merchant's mark no. 5 follows below]\n[Signed] Johan Hoper, wrote this\n\n---", "summary": "Johann Hoper inventories goods held in custody by Kort Meyneken in Hamburg, taken by Lübeck privateers from a Spanish ship, witnessed by Hans Segestaken and Hennyng Kulemeyer, secretary of the London merchant community. The inventory includes cloth, flax, fine black broadcloth, and Russian or Flemish cloths. Notably, one pack of cloth was retrieved on the Elbe by Nicolaus Raschew, servant of Thomas Galen, and taken to England, and a piece of russet was sold to a court scrivener for 3 gold crowns.", "document_type": "inventory", "themes": ["trade", "piracy", "goods_seizure", "cargo", "maritime", "legal_proceedings", "textile_trade", "financial"], "people_mentioned": ["Johan Hoper", "Hans Segestaken", "Hennyng Kulemeyer", "Kort Meyneken", "Nicolaus Raschew", "Thomas Galen", "Johann van Horen", "Wyllem Aysche"], "goods_mentioned": ["cloth (packs)", "flax", "fine black broadcloth", "Russian or Flemish cloths", "russet cloth"], "notable": true, "notable_reason": "Records the diversion of a cloth pack to England by a servant of Thomas Galen and the sale of a piece of russet to a named scrivener, providing granular detail about how seized goods were dispersed before formal restitution."}, {"id": 77, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "Costs incurred by Kordt Meyneke in taking custody of the goods seized in the Spanish ship and delivered to him by Gotschalk Remelckrade and out of the second Spanish ship. The delivery of these goods to Lübeck and Hamburg councillors is noted", "date": "1534 June 2", "location": "Hamburg", "language": "Low German", "content": "Unsealed.92\n\n[1.]\nItem entfangen van Gotschalck Remelckraden, dat yn dem Spanÿschen schepe\ngewest ÿs, 5 packen laken aldus [merchant’s mark no. 1 in the left margin],93 noch 2 packen\nflas aldus [merchant’s mark no. 2 in the left margin].\n\nGeven, dut gudt van der schullawer ut dem schepe tho halen bet by den kran to\nbrÿngen ys\n5 mr.\n[2.]  Noch entfangen 3 packen laken, aldus [merchant’s mark no. 3 in the left margin].94\nNoch 1 packen laken, aldus [merchant’s mark no. 4 in the left margin]. Noch 1 kÿsten, 1 korff,\n10 grote tÿnnen fate, 1 swart Engels laken.\n\nGeven krane gelt\nŸn unde ut hus tho foren\nHus hur\n\n11½s\n2 mr. 4s\n2 mr. 8s\n\n  92  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.\n\n  93  These goods were in the Christofer de Moria.\n  94  These goods belonged to Thomas Cole and were shipped in the Maria de Gatolope.\n\n\fVi:  g oods taken in spa nis h s hips\n\n21 9\n\nGeven, de laken up unde tho slande\nGeven vor 1 lynÿen\nGeven, dat flas up den hoff tho brÿngen\nHoff hur\nVan dem have tho bryngen\nGeven, dat flas up unde tho slande unde tho drogen\nDe laken unde dat flas tho schepe tho foren\n[dorse] Thollen up dat rathus\nDes haerttÿgen thollen\nmÿn gelt\nSumma ÿn als ÿs\n\n1 mr. 7½s\n5s\n8s\n8s\n4s\n11s\n13s\n6 mr. 2s\n12s\n3 mr.\n24 mr. 14s\n\nAlle tydt tho guder rekenschop alle mÿta rekent ÿs keyne betalynge gade befalen.\nGeschreven tho Hamborg den 2. Yunyus anno 1534.\n\n[signed] Kordt Meÿneke\n\n[recto side, 2nd column] Gelevert her Ÿochÿm Gerken95 unde mester Yohan Hoper hyr\n[3.]\nyn mÿnen hus 1 kÿst, 1 korff, 10 fate geschepet ÿn Hÿnrÿck Moller dorch heten her Gerdt\nOldenborch96 unde her Ÿohan van Lennepen97 unde Ÿohan van Horen dusse ÿegenische\n9 packen laken.\n[4.]  Gelevert her Hynrÿck Rademaker [councillor of Hamburg] yn mÿnen hus 1 swart\nEngels laken [see no. 78]", "editorial_notes": "a mys HL, in error.\n1)\n2)\n3)\n4)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 22d. Original. Single sheet of paper.", "file": "catalogued/doc_77.md", "modern_english_translation": "[Unsealed.]\n\n[1.]\nItem: received from Gotschalk Remelckraden, from what was in the Spanish ship, 5 packs of cloth as follows [merchant's mark no. 1 in the left margin], also 2 packs of flax as follows [merchant's mark no. 2 in the left margin].\n\nPaid: for unloading this cargo from the hold of the ship and bringing it to the crane: 5 marks.\n\n[2.] Also received: 3 packs of cloth as follows [merchant's mark no. 3 in the left margin]; also 1 pack of cloth as follows [merchant's mark no. 4 in the left margin]; also 1 chest, 1 basket, 10 large tin vessels, 1 piece of black English cloth.\n\nPaid: crane fee — 11½ shillings\nCarting in and out of the warehouse — 2 marks 4 shillings\nWarehouse rent — 2 marks 8 shillings\nPaid: for opening and closing the cloth [bales] — 1 mark 7½ shillings\nPaid: for 1 rope — 5 shillings\nPaid: for bringing the flax into the yard — 8 shillings\nYard rent — 8 shillings\nFor bringing [it] from the yard — 4 shillings\nPaid: for opening, closing and drying the flax — 11 shillings\nFor carting the cloth and the flax to the ship — 13 shillings\n[Dorse:] Toll at the town hall — 6 marks 2 shillings\nThe heart [harbour?] toll [Note: \"des haerttÿgen thollen\" — possibly a specific Hamburg toll] — 12 shillings\nMy [own] money — 3 marks\nTotal in all: 24 marks 14 shillings\n\nThroughout, all reckoning kept to good account; all that is reckoned, no payment [yet] received [Note: \"keyne betalynge gade befalen\" — goods commended to God, i.e., not yet paid]. Written at Hamburg, 2 June 1534.\n\n[Signed] Kordt Meÿneke\n\n[Recto side, 2nd column:]\n\n[3.] Delivered to Herr Joachim Gerken and Master Johan Hoper here in my house: 1 chest, 1 basket, 10 vessels — shipped in [the vessel of] Hinrick Moller by order of Herr Gerdt Oldenborch and Herr Johan van Lennepen and Johan van Horen — these same 9 packs of cloth.\n\n[4.] Delivered to Herr Hinrick Rademaker [councillor of Hamburg] in my house: 1 piece of black English cloth [see no. 78].\n\n---", "summary": "Kordt Meyneke itemises the costs he incurred in Hamburg for handling goods seized from two Spanish ships, including unloading, storage, drying, carting, crane fees, tolls, and warehouse rent, totalling 24 marks 14 shillings. He notes that no payment has yet been received. The document also records delivery of specific goods to named Lübeck and Hamburg councillors, including a piece of black English cloth delivered to councillor Hinrick Rademaker.", "document_type": "receipt", "themes": ["trade", "goods_seizure", "cargo", "maritime", "legal_proceedings", "financial", "restitution"], "people_mentioned": ["Kordt Meyneke", "Gotschalk Remelckraden", "Joachim Gerken", "Johan Hoper", "Hinrick Moller", "Gerdt Oldenborch", "Johan van Lennepen", "Johan van Horen", "Hinrick Rademaker"], "goods_mentioned": ["cloth (packs)", "flax", "chest", "basket", "tin vessels", "black English cloth"], "notable": false}, {"id": 78, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "On 9 June 1534, in Hamburg, the procurator or attorney William Ayshe, an Englishman, and Gerde Oldenbarch98 and Johan van Lennep,99 councillors and authorized representatives of the Lübeck council, appeared before representatives of the Hamburg council, namely Jochim Wullewevere and Hinrick Rademaker, to arrange the return", "date": "", "location": "", "language": "Low German", "content": "Paper. Unsealed.101\n\n  101  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 22f. Contemporaneous copy.", "file": "catalogued/doc_78.md", "modern_english_translation": "[Paper. Unsealed.]\n\n[Note: The content of this document as preserved consists only of the title description. On 9 June 1534, in Hamburg, the procurator or attorney William Ayshe, an Englishman, and Gerde Oldenbarch and Johan van Lennep, councillors and authorised representatives of the Lübeck council, appeared before representatives of the Hamburg council, namely Jochim Wullewevere and Hinrick Rademaker, to arrange the return of the seized goods.]\n\n---", "summary": "On 9 June 1534 in Hamburg, William Ayshe (English attorney) and Lübeck councillors Gerde Oldenbarch and Johan van Lennep appeared before Hamburg councillors Jochim Wullewevere and Hinrick Rademaker to arrange the return of seized goods. The document survives only as a title description, with no substantive text preserved.", "document_type": "legal_instrument", "themes": ["restitution", "goods_seizure", "legal_proceedings", "diplomacy", "maritime"], "people_mentioned": ["William Ayshe", "Gerde Oldenbarch", "Johan van Lennep", "Jochim Wullewevere", "Hinrick Rademaker"], "goods_mentioned": [], "notable": true, "notable_reason": "The document is fragmentary — only the title survives — making it an archival lacuna of significance for reconstructing the restitution proceedings."}, {"id": 79, "section": "VII", "section_title": "Goods taken from ships of the Low Countries", "title": "On 18 Sept. 1533 in the house of the underscribed notary (John Devereux) in Lombard Street in the parish of St Mary Wolnoth in London, there appeared before the notary and the witnesses John Hampton from Faversham (co. Kent), 60 years old or thereabouts, and deposed under oath in his own name as well as in that of John Bryngborne, also", "date": "", "location": "", "language": "Latin", "content": "In Dei nomine amen. Per hoc presens publicum instrumentum cunctis evidenter appareat,\nquod anno Domini ab incarnacione millesimo quingentesimo tricesimo tercio, indictione\nsexta, pontificatus vero sanctissimi in Christo patris et domini nostri domini Clementis,\ndivina providentia hujus nominis pape septum, anno decimo, mensis vero Septembris, die\n18a [18 Sept. 1533] infra domum habitacionis mei notarii publici subscripti situatam in vico\npublico de Lombard Strete in parochia Beate Marie Wolnoth civitatis London’, in meique\nejusdem notarii ac testium infrascriptorum presencia personaliter constitutus discretus vir\nJohannes Hampton de Feversham in comitatu Kancie partium regni Anglie mercator, etatis\nsexaginta annorum vel circiter, tam nomine suo proprio quam vice et nomine prudentis\nviri Johannis Bryngborne etiam de eadem villa mercatoris, qui cum eodem Johanne\nHampton, ut asseruit, in factis mercantilibus est consors, non vi, dolo, metu, fraude seu\naliqua machinacione sinistra inductus, seductus, coactus, deceptus vel circumventus, ut\nevidenter apparuit, sed ex sua mera, libera, pura et spontanea voluntate ad conservacionem\net defensionem jurium ipsorum Johannis Hampton et Johannis Bryngborne dixit, deposuit\net certificavit mihi notario publico subscripto per juramentum suum factum ad et super\nsancta Dei evangelia tactis per eum manu sua dextera corporaliter scripturis verum fuisse\net esse, quod quedam scuta, de qua Johannes Willyamson de Middilburgh in Zelandia\nproprietarius et magister sub Dei potestate prefuit, in navigando versus dictam villam\nde Feversham et per factorem ipsorum Johannis Hampton et Johannis Bryngborne in\nZelandia predicta cum bonis sequentibus, scilicet triginta et duabus weyes de brown salt\nmensure Anglie, quinque millibus cum dimidio de pavyngtyles et una cista cum apparatu\net vestibus ipsius factoris onusta et dictis Johanni Hampton et Johanni Bryngborne pleno\njure spectantibus et pertinentibus, per certas naves armatas de Lubic circa costeras de\n\n\nCambir [Camber, co. Surrey] partium dicti regni Anglie nuper capta fuit et quod omnia\npredicta bona tempore captionis ejusdem scute usque ad integram onerationem dicte\nscute fuerunt propria bona ipsorum Johannis Hampton et Johannis Bryngborne et quod\nfuerunt tunc valoris quadraginta librarum sterlingorum.\n\nActa fuerunt hec, prout suprascribunter et recitantur, presentibus tunc ibidem discretis\nviris Johanne God et Ricardo Braunche civibus et mercatoribus ejusdem civitatis testibus\nad premissa vocatis specialiter atque rogatis.\n\nEt quia ego Johannes Devereux clericus, civis\ncivitatis London’, publicus sacris apostolica\net imperiali auctoritatibus notarius, predictis\ndictionibus, depositionibus et certificationi-\nbus prefati deponentis per juramentum suum\nfactum forma ut supra necnon ceteris premissis\nomnibus et singulis, dum, sicut premittitur,\nagebantur et fiebant unacum testibus predictis\npresens personaliter interfui eaque sic fieri vidi\net audivi, igitur hoc instrumentum – me aliunde\nprepedito – per alium scribi feci signoque et\nnomine meis solitis et consuetis signavi rogatus\nin fidem omnium premissorum.\n\nNotary’s mark of John Devereux of London\n\nb) Adrian van Sterre of Vlissingen", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 19. Original notarial instrument\nwith notary’s mark of John Devereux, cleric and citizen of London. Parch-\nment. Unsealed.", "file": "catalogued/doc_79.md", "modern_english_translation": "In the name of God, amen. By this present public instrument let it be clearly apparent to all that in the year of the Lord from the Incarnation one thousand five hundred and thirty-three, in the sixth indiction [Note: \"indictio\" — a fifteen-year cycle used to date documents], in the pontificate of the most holy father in Christ and our lord, the lord Clement, by divine providence Pope of that name the seventh, in the tenth year of his pontificate, namely on the 18th day of the month of September [18 Sept. 1533], within the house of residence of me, the undersigned public notary, situated on the public street of Lombard Street in the parish of the Blessed Mary Wolnoth in the city of London, there appeared in person before me, the said notary, and the witnesses underwritten, the discreet man John Hampton of Faversham in the county of Kent in the parts of the kingdom of England, merchant, aged sixty years or thereabouts, both in his own name and in the name and on behalf of the prudent man John Bryngborne, also of the same town, merchant, who is, as he asserted, his partner in mercantile affairs; not induced, led astray, compelled, deceived or circumvented by force, fraud, fear, deceit or any sinister contrivance, as was clearly apparent, but of his own free, pure and spontaneous will, for the preservation and defence of the rights of the said John Hampton and John Bryngborne, he stated, deposed and certified to me, the undersigned public notary, by his oath made upon and over the holy Gospels of God, touched by him bodily with his right hand, that it was and is true that a certain shallop [Note: \"scuta\" — a flat-bottomed vessel] of which John Williamson of Middelburg in Zeeland was owner and master under God's authority, while sailing towards the said town of Faversham and laden by their factor in the aforesaid Zeeland with the following goods — namely thirty-two weys [Note: a unit of dry measure] of brown salt of English measure, five and a half thousand paving tiles, and one chest with the equipment and clothing of their said factor — belonging and pertaining in full right to the said John Hampton and John Bryngborne, was recently seized while near the shores of Camber [Note: Camber, co. Surrey] in the said kingdom of England by certain armed ships of Lübeck; and that all the aforesaid goods at the time of the seizure of the said shallop, up to the full loading of the said shallop, were the proper goods of the said John Hampton and John Bryngborne, and that they were then of the value of forty pounds sterling.\n\nThese acts were performed as written above and as recited, in the presence then and there of the discreet men John God and Richard Braunche, citizens and merchants of the said city, witnesses specially called and requested for the aforesaid matters.\n\nAnd because I, John Devereux, clerk, citizen of the city of London, public notary by apostolic and imperial authority, was personally present together with the aforesaid witnesses at the aforesaid statements, depositions and certifications of the aforesaid deponent made by his oath in the form described above, as well as at all and each of the other aforesaid matters, while, as stated above, they were being transacted and done, and I saw and heard them done in such a manner, I therefore caused this instrument — being detained elsewhere — to be written by another, and signed it with my accustomed and usual sign and name, as requested, in attestation of all the aforesaid matters.\n\n[Notary's mark of John Devereux of London]\n\n---", "summary": "Before notary John Devereux in London, John Hampton of Faversham testifies under oath on behalf of himself and his partner John Bryngborne that their shallop, owned and mastered by John Williamson of Middelburg, was seized near Camber by armed Lübeck ships while carrying 32 weys of brown salt, 5,500 paving tiles, and a chest of goods belonging to their factor. The deposition values the seized cargo at £40 sterling and is made for the preservation of their legal rights.", "document_type": "deposition", "themes": ["piracy", "goods_seizure", "legal_proceedings", "testimony", "maritime", "trade", "cargo"], "people_mentioned": ["John Hampton", "John Bryngborne", "John Williamson", "John Devereux", "John God", "Richard Braunche"], "goods_mentioned": ["brown salt", "paving tiles", "chest with equipment and clothing"], "notable": true, "notable_reason": "Provides precise notarial testimony identifying the location of seizure (Camber, Surrey), the specific vessel and its Dutch master, and the exact cargo composition, making it a key evidentiary document in the broader legal proceedings."}, {"id": 80, "section": "VII", "section_title": "Goods taken from ships of the Low Countries", "title": "On 20 Sept. 1533 in the house of the underscribed notary (John Devereux) in Lombard Street in the parish of St Mary Wolnoth in London, there appeared Humphrey Knyght, citizen and fishmonger, 57 years old or thereabouts, as he stated, and Thomas Blancke, citizen and haberdasher, 47 years old or thereabouts, both of good fame, to make their", "date": "", "location": "", "language": "Latin", "content": "In Dei nomine amen. Per hoc presens publicum instrumentum cunctis evidenter\nappareat, quod anno Domini ab incarnacione millesimo quingentesimo tricesimo tercio,\nindictione sexta, pontificatus vero sanctissimi in Christo patris et domini nostri domini\nClementis, divina providencia pape septum, anno decimo, mensis vero Septembris, die\nvicesima [20 Sept. 1533] infra domum habitacionis mei notarii publici subscripti situatam\nin vico publico de Lombard Strete in parochia Beate Marie Wolnoth civitatis London’,\nin meique ejusdem notarii et testium infrascriptorum presencia personaliter constituti\nprudentes viri Humfridus Knyght, civis et piscenarius ejusdem civitatis, etatis, ut asseruit,\n\n\fVii :  goo ds  tak en  from  ships  of  th e low  co unt ri es\n\n22 3\n\nquinquaginta et septem annorum vel incirca, et Thomas Blancke, civis et habirdassher\ncivitatis predicte, etatis, ut meminit, quadraginta et septem annorum vel circiter, homines\nbone fame et conversationis illese, non vi, dolo, metu, fraude seu aliqua machinatione\nsinistra inducti, seducti, coacti, decepti vel circumventi, ut evidenter apparuit, sed ex eorum\nmeris, liberis, puris et spontaneis voluntatibus ad futuram rei memoriam et pro rei veritatis\ninfrascripte declaratione ad conservationem et defensionem jurium ipsorum Humfridi\nKnyght et Thome Blancke et eorum alterius, dixerunt, deposuerunt et certificaverunt\nmihi notario publico subscripto per eorum separalia juramenta facta ad et super sancta\nDei evangelia modo et forma subsequentibus, videlicet\n[1.]\nIn primis predictus Humfridus Knyght vive vocis oraculo dixit, deposuit et certificavit\nmihi notario publico subscripto per juramentum suum factum ad et super sancta Dei\nevangelia tactis per eum manu sua dextera corporaliter scripturis verum fuisse et esse, quod\nquidam Thomas Wakeham apprenticius ipsius Humfridi, ut asseruit, in quadam scuta de\nFlusshyng, unde Adrianus van Sterre fuit nauta sive conductor, in partibus transmarinis\nnumerum quatuordecim barillos piscium salsorum, unde quodlibet barillus hujusmodi tali\nmarca [marchant’s mark no. 1 follows] propria ipsius Humfridi erat marcatus, tanquam bona\npropria ejusdem Humfridi nuper onerari et carcari feci et quod dicta scuta in sequendo\nsuum viagium versus portum predicte civitatis certe naves armate de Lubic obviam fecit\ndicte scute et abstulerunt extra eandem novem barillos ex hujusmodi quatuordecim barillis\npiscium salsorum prefato Humfrido spectantes et cum eisdem adduxerunt ad dampnum\nipsius Humfridi attingens usque ad summam librarum sex et solidorum sex monete gros-\nsorum Flandrie simul cum expensis eorundem novem barillorum sic captorum ut supra.\nItem predictus Thomas Blancke animo deliberato dixit, deposuit et certificavit\n[2.]\nmihi notario publico subscripto per juramentum suum factum ad et super sancta Dei\nevangelia atactisa per eum manu sua dextera corporaliter scripturis verum fuisse et esse,\nquod quidam Gilbertus Pervisshe ipsius Thome, ut fertur, apprenticius parvum trusse, in\nquo quadraginta et octo duodenas de diaper silke ryband clausa fuit in supradicta scuta\nejusdem Adriani van Sterre de Flusshyng oneravit et carcavit et quod idem trusse de diaper\nrybandes extra dictam scutam per quasdam naves armatas de Lubic supradictas captum\nfuit et secum conductum ad dampnum ipsius deponentis.\n[3.]  Et ulterius idem Thomas deponens jurando ut supra dixit, deposuit et certificavit\nmihi dicto notario, quod idem trusse erat valens tempore carcationis ejusdem in eadem\nscuta quatuordecim librarum ac sexdecim solidorum grossorum Flandrie aultraa custumas\nipsius deponentis extendentes ad summam solidorum octo eorundem grossorum Flandrie.\nActa fuerunt hec, prout suprascribuntur et recitantur, presentibus tunc ibidem\nvenerabile viro Waltero Champion, cive et aldirmanno predicte civitatis, ac discreto viro\nWillelmo Sawndirson, cive et piscenario ejusdem civitatis, testibus ad premissa vocatis\nspecialiter et rogatis.\n\n\nNotary’s mark of John Devereux\nof London\n\na-a Interlined HL.\n\n1)\n\nEt quia ego Johannes Devereux clericus, civis\ncivitatis London’, publicus sacris apostolica\net imperiali auctoritatibus notarius, predictis\ndictionibus, depositionibus et certificationibus\nper eorum separalia juramenta forma factis\nnecnon ceteris premissis omnibus et singulis,\ndum, sicut premittitur, agebantur et fiebant,\nunacum testibus predictis presens personaliter\ninterfui eaque sic fieri vidi et audivi, igitur hoc\ninstrumentum manu mea propria scriptum\ninde confeci signoque et nomine meis solitis\net consuetis signavi in fidem et testimonium\nomnium et singulorum premissorum rogatus\net requisitus.\n\nc) an unnamed ship of Zierikzee", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 18. Original notarial instrument\nwith notary’s mark (John Devereux cleric and citizen of London, below).\nParchment. Unsealed.", "file": "catalogued/doc_80.md", "modern_english_translation": "In the name of God, amen. By this present public instrument let it be clearly apparent to all that in the year of the Lord from the Incarnation one thousand five hundred and thirty-three, in the sixth indiction, in the pontificate of the most holy father in Christ and our lord, the lord Clement, by divine providence Pope the seventh, in the tenth year of his pontificate, namely on the twentieth day of the month of September [20 Sept. 1533], within the house of residence of me, the undersigned public notary, situated on the public street of Lombard Street in the parish of the Blessed Mary Wolnoth in the city of London, there appeared in person before me, the said notary, and the witnesses underwritten, the prudent men Humphrey Knyght, citizen and fishmonger of the said city, aged, as he stated, fifty-seven years or thereabouts, and Thomas Blancke, citizen and haberdasher of the aforesaid city, aged, as he recalled, forty-seven years or thereabouts, men of good repute and unblemished conduct, not induced, led astray, compelled, deceived or circumvented by force, fraud, fear, deceit or any sinister contrivance, as was clearly apparent, but of their own free, pure and spontaneous wills, for future record and for the declaration of the truth of the matters underwritten, and for the preservation and defence of the rights of the said Humphrey Knyght and Thomas Blancke and either of them, they stated, deposed and certified to me, the undersigned public notary, by their separate oaths made upon and over the holy Gospels of God, in the manner and form following, that is to say:\n\n[1.]\nFirst, the aforesaid Humphrey Knyght by his living voice stated, deposed and certified to me, the undersigned public notary, by his oath made upon and over the holy Gospels of God, touched by him bodily with his right hand, that it was and is true that a certain Thomas Wakeham, apprentice of the said Humphrey, as he asserted, caused to be loaded and laded in a certain shallop of Flushing, of which Adrian van Sterre was sailor or skipper, in foreign parts, the number of fourteen barrels of salt fish, of which every such barrel was marked with such a mark [merchant's mark no. 1 follows] belonging to the said Humphrey, as the proper goods of the said Humphrey; and that the said shallop, while pursuing its voyage towards the port of the said city, was met by certain armed ships of Lübeck, and they took out of the said shallop nine barrels from those fourteen barrels of salt fish belonging to the aforesaid Humphrey and carried them away, to the damage of the said Humphrey amounting to the sum of six pounds and six shillings in Flemish groat currency [Note: moneta grossorum Flandrie — Flemish groats, a unit of account], together with the expenses of those nine barrels so seized as above.\n\n[2.]\nItem, the aforesaid Thomas Blancke, with deliberate intent, stated, deposed and certified to me, the undersigned public notary, by his oath made upon and over the holy Gospels of God, touched by him bodily with his right hand, that it was and is true that a certain Gilbert Pervisshe, apprentice of the said Thomas, as is said, loaded and laded a small truss [Note: \"trusse\" — a bale or bundle] in the aforesaid shallop of the said Adrian van Sterre of Flushing, in which was enclosed forty-eight dozen diaper silk ribbons [Note: \"diaper silk ryband\" — woven silk ribbons with a diaper pattern]; and that the said truss of diaper ribbons was seized from the said shallop by the aforesaid certain armed ships of Lübeck and carried away, to the damage of the said deponent.\n\n[3.] And further the same Thomas, deposing under oath as above, stated, deposed and certified to me the said notary that the said truss was worth at the time of its loading in the said shallop fourteen pounds and sixteen shillings in Flemish groat currency, besides [Note: \"aultra\" — above and beyond] the customs of the said deponent amounting to the sum of eight shillings of the same Flemish groats.\n\nThese acts were performed as written above and as recited, in the presence then and there of the venerable man Walter Champion, citizen and alderman of the aforesaid city, and the discreet man William Sawndirson, citizen and fishmonger of the same city, witnesses specially called and requested for the aforesaid matters.\n\nAnd because I, John Devereux, clerk, citizen of the city of London, public notary by apostolic and imperial authority, was personally present together with the aforesaid witnesses at the aforesaid statements, depositions and certifications made by their separate oaths in the form described, as well as at all and each of the other aforesaid matters, while, as stated above, they were being transacted and done, and I saw and heard them done in such a manner, I therefore composed this instrument written by my own hand, and signed it with my accustomed and usual sign and name in attestation and testimony of all and each of the aforesaid matters, as requested and required.\n\n[Notary's mark of John Devereux of London]\n\n---", "summary": "Before notary John Devereux in London, Humphrey Knyght (fishmonger) and Thomas Blancke (haberdasher) separately depose under oath regarding goods seized from a Flushing shallop captained by Adrian van Sterre by armed Lübeck ships. Knyght testifies that nine of fourteen barrels of salt fish belonging to him were taken, valued at £6 6s Flemish; Blancke testifies that a truss of 48 dozen diaper silk ribbons belonging to him was seized, valued at £14 16s Flemish plus 8s customs.", "document_type": "deposition", "themes": ["piracy", "goods_seizure", "legal_proceedings", "testimony", "maritime", "trade", "cargo", "food_trade", "textile_trade", "financial"], "people_mentioned": ["Humphrey Knyght", "Thomas Blancke", "Thomas Wakeham", "Adrian van Sterre", "Gilbert Pervisshe", "Walter Champion", "William Sawndirson", "John Devereux"], "goods_mentioned": ["salt fish (barrels)", "diaper silk ribbons"], "notable": true, "notable_reason": "Captures two independent depositions in a single instrument, with named apprentices loading goods on behalf of their masters, and provides specific valuations in Flemish currency for both fish and luxury silk goods seized."}, {"id": 81, "section": "VII", "section_title": "Goods taken from ships of the Low Countries", "title": "On 23 June 1534, in the presence of the undersigned notary and witnesses, de erhafftyge man William Gilbancke of Colchester (Kolkyster) in England appeared in his role, as he said, of servant to the chancellor of England Thomas Artey [Audley] and took custody of the 2½ cwt of salt taken by Lübeck privateers (de Lupeschen uthligger) out", "date": "", "location": "", "language": "Low German", "content": "On 23 June 1534, in the presence of the undersigned notary and witnesses, de erhafftyge\nman William Gilbancke of Colchester (Kolkyster) in England appeared in his role,\nas he said, of servant to the chancellor of England Thomas Artey [Audley] and took\ncustody of the 2½ cwt of salt taken by Lübeck privateers (de Lupeschen uthligger) out\nof a ship of Sircksee in the feud with Holland last year and since then in the custody of\nthe Lübeck council. Gilbancke acknowledges receipt of the salt, but in addition claims\nthe following goods which he alleges have not been released: 12 pieces of halve sayen, 12\ntuns of soltes kabbelauwen, 2 verondell stors, 60 ells of canvas (kannefust), 12 ells of\nHolland linen cloth (Hollundesch lowent), 2 vedderbedde in eynem korve, eyn halve\nhundert Ylandesche vische, 3 hodesuckers noch dre lange vische langen genandt\nund 6 spegel. Lübeck offered him 125 Lübeck marks as compensation for these goods and\nas rebursement of all of his expenses, losses and costs. Having accepted this sum from the\nLübeck councillor Thyle Thegetmeyger, acting on behalf of the whole council, Gilbancke\ndeclared himself by oath in the presence of the notary and the witnesses to be content\nand all further claims to be null and void. Notarial instrument witnessed by Ciriacus\nWolmerstorp, cleric of the diocese of Lübeck and notary,102 and the Junkers Jheronimus\n\n  102  Ciriacus Wolmerstorp is well attested as a vicar in the Lübeck cathedral and in St Mary, St Peter, St Jacob:\n\nUBBL no. 1400/199, no. 2163, no. 2180, no. 2405/169, no. 2470/330, no. 2471/104, 485, 719, 805, no. 2478/26R,\nno. 2491/126, no. 2504, no. 5960.\n\n\fVii :  goo ds  tak en  from  ships  of  th e low  co unt ri es\n\n22 5\n\nvan Bromse and Jurgen van Ehelenleys of the diocese of Münster. Contemporaneous\ncopy of the notarial instrument drawn up by the notary Michael Petri, cleric of the diocese\nof Schwerin. — 1534 June 23. Lübeck.\n\nHL AHL ASA, Externa Anglicana 476, no. 23, f. 33r-34r (original classification\nby Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn\nup by Michael Petri in 1525, indictione tercia, Monday 23 ...103\n\nWilhelm Gilbancke\n\nAm jar 1534°, in der soveden indiction, des 23. dages des maents Junii [23 June 1534] is in\nmynes opentliken notarien und undergescrevenen thugen dartho sunderlix geescheet und\ngebeden jegenwordicheit personelick erschenen de erhafftyge man Wilhelm Gilbancke\nuth der stadt Kolkyster in Engelandt belegen und nu thor tydt, so he sede, des erbaren und\nhochgelerten heren Thomas Artey konenliker majestat tho Engelandt cancelers dener, und\nhefft in der besten wyse, wege, forme und gestaltenisse, alse he to rechte best scolde, konde\nund mochte, uth frygen willen, wolberaden mode bekandt, togestaen und gesecht, dat\nem sodane 2½ C soltes, alse ehme dorch de Lupeschen uthligger tegenst de Hollander in\nvorgangenen jare upp dem schepe van Sircksee affhendich gemaket hedden, were em dorch\nden erbar rat der stadt Lubeck mildichlich und gunstig wedder gegeven und welcker he\nmyt aller danckbarcheit und fuller noge wol wedder entfangen hedde. De wyle denne de\nobgenante Wilhelm Gilbancke dusse nabescreven portzele – also 12 stucke halve sagen, 12\ntunne soltes kabbelauwen, 2 verondell stors, 60 elen kannefusta, 12 elen Hollandesch louwent,\n2 vedderbedde in eynem korve, eyn halve hundert Ylandesche vische, 3 hodesuckers, noch\ndre lange vische langen genandt und 6 spegel – noch entbore und missede und dorch de\nobgnanten Lupeschen uthligger ock genamen und affhendich gemaket weren, so hedde\ndoch de erbar radt der stadt Lubeck umme sunderge reverencie, gnadt und gunst kon. mat.\nto Engelandt und des vorbenanten heren Thomas Artey wolgefalle demsulvigen Wilhelm\nGilbancke vor de bavengeschrevenen portzele, ock vor allen scaden, kost, theringhe und\ninteresse, dat he darumme gedaen hedde, eyn hundert und 25 marck lub. wol to dancke\neyns vor alle vornuget gulden und betalt, welcker he ock myth aller danckbarheit fullenka-\nmen und in getelledem gelde van heren Thylen Thegetmeyger rathmanne to Lubeck alse\ndartho vam gantz erbar rade tho Lubeck vorordenthen, entfangen, upgeboren und tho\ngantzer entschup by sick beholden. Hyrumme hefft velegedachte Wilhelm Gilbancke in\nmynes apentlyken notarien und undergeschrevenen thugen dartho sunderlix geescheet\nund gebaden jegenwordicheit dem vorbemelten erbar radt und gantz stadt Lubeck ock alle\nohre borger und inwaner und alle de jennen, de des to donde hebben offt in thokumpftigen\ntyden to donde mogen crygen, vor sick und alle syne erven gebaren und ungebaren der\nvorgeschrevenen 2½ C soltes und ander bavengenanten portzele halven, ock vorkost,\nscaden, therynghe, interesse, winst und vorlust, deger und genslick eyns bvor alleb thosprake\nund utgemanent quidt, fry, leddich und los vorlathen und quiteret, ock alles gheystlykes\nund werlickes rechtes und alles behelpes, wo dat jenyger gestalt whanne hebben mochte\n\n  103  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or a breve\n(ŭ) in order to distinguish it from two minims. Since this has no effect on the pronunciation of the word, they are\ntranscribed as ‘u’.\n\n\nrenunctieret, by also dat de erbar radt ock alle und yder borger und inwaner to Lubeck und\nde jennen, den duth anfechten mochte mitt sodaner gedanener enyger betalynghe eyns\nvor alle und stedes to ewigen tyd quidt, fry, leddich, los van em und synen erven blyven\nscolen. Darbeneffens hefft desulvige Wilhelm Gilbancke vor mi notario und mynen hand,\nangeroret de Hillige Scrifft, und tho Gade dem Almechtegen, tho synen hilligen und dem\nhilligen evangelio myt opgerichteden armen und uthgestreckeden vingeren stavedes edes\nwitliken geswaren, dat noch he offt syne erven to nenen tyd darwyder scolen und willen\ncummec sprecken offt willen sprecken offt nhamanen sub pena reatus perjurii ipso facto\njurejurando etc., wo wyder eyn apenbar instrumenth daraver to makende in bringeste\nwert vorbreyden alles ane geferde und argelist. De et super quibus etc.\n\nActum Lubeck darsulvest up dem neddersten rathuse in bywesenden und jegenwordicheit\ndes wolgelerten und furnamen Ciriaci Wolmerstorp, Lupeschen stifftes clerick und apenbar\nnotario, ock der eddelen und erbaren junckeren Jheronimus van Bromse und Jurgen van\nEhelenleys Monstersches stifftes also thugen hyrto sampt und besunder geescheet und\ngebeden.\n\nIta est ut supra Michael Petri clericus Zwerinensis diocesis publicus\nsacris apostolica et imperiali auctoritatibus notarius ad premissa\nrequisitus manu propria scripsit.\n\na 60 elen kannefust follows, struck through HL. b-b Repeated (written more\nclearly) in the left-hand margin, with catchmark HL. c Entered in the left-hand", "editorial_notes": "margin with catchmark HL.", "archival_reference": "", "file": "catalogued/doc_81.md", "modern_english_translation": "In the year 1534, in the seventh indiction, on the 23rd day of the month of June [23 June 1534], in the presence of me, the public notary undersigned, and the witnesses specially summoned and requested thereunto, there appeared in person the honourable man Wilhelm Gilbancke, of the city of Colchester in England, and at that time, as he stated, servant of the honourable and learned lord Thomas Artey [Note: Thomas Audley], Chancellor to the royal majesty of England; and he declared, acknowledged and stated in the best manner, way, form and fashion that he by law best should, could and might, of his own free will and considered mind, that the 2½ hundredweight [Note: \"C\" = centner] of salt that had been taken from him by the Lübeck privateers [Note: \"Lupeschen uthligger\"] against the Hollanders in the previous year, from a ship of Zierikzee [Note: \"Sircksee\"], had been graciously and generously restored to him by the honourable council of the city of Lübeck, and that he had received it back with all gratitude and full satisfaction.\n\nWhereas the aforesaid Wilhelm Gilbancke still lacked and was missing the following items — namely: 12 pieces of half-says [Note: \"halve sagen\" — a lighter variety of woollen cloth known as \"says\"], 12 tuns of salted cod [Note: \"soltes kabbelauwen\" — salted codfish], 2 quarter-barrels of sturgeon [Note: \"verondell stors\"], 60 ells of canvas [Note: \"kannefust\" — a coarse canvas fabric], 12 ells of Holland linen cloth [Note: \"Hollandesch louwent\"], 2 feather-beds in a basket, half a hundred Icelandic fish [Note: \"Ylandesche vische\" — dried Icelandic fish, probably stockfish], 3 hogsuckers [Note: \"hodesuckers\" — the meaning is uncertain; possibly a type of dried fish], 3 further long fish called \"langen\" [Note: \"lange\" — long fish, likely ling], and 6 mirrors — all of which had likewise been taken and seized by the aforesaid Lübeck privateers; nevertheless, the honourable council of the city of Lübeck, out of special reverence, grace and favour toward his royal majesty of England and to the pleasure of the aforementioned lord Thomas Artey, had to the same Wilhelm Gilbancke, in recompense for the goods written above, and also for all damage, cost, expenditure and loss that he had thereby incurred, well and contentedly paid and settled once and for all the sum of one hundred and twenty-five Lübeck marks, which he had also received with all gratitude in full and in counted coin from lord Thyle Thegetmeyger, councillor at Lübeck, appointed thereto by the whole honourable council of Lübeck, and retained in his full possession. Wherefore the aforesaid Wilhelm Gilbancke, in the presence of me the public notary and the witnesses specially summoned and requested thereunto, did for himself and all his heirs born and unborn, with regard to the aforesaid 2½ hundredweight of salt and the other goods named above, as well as costs, damage, expenditure, interest, profit and loss, fully and completely once and for all release, discharge, acquit and quit the aforementioned honourable council and the whole city of Lübeck, and also all their citizens and inhabitants, and all those who have or in time to come may have any dealings therein, from any and all claim and demand; and he renounced all spiritual and secular legal remedies and all recourse, in whatsoever form the same might be availed of, so that the honourable council and each and every citizen and inhabitant of Lübeck, and those whom this may concern, shall by virtue of such payment made remain once and for all and for ever quit, free, discharged and released from him and his heirs. Furthermore the same Wilhelm Gilbancke, before me the notary and touching with his hand the Holy Scripture, did knowingly swear a standing oath [Note: \"stavedes edes\" — an oath taken standing with raised arm and outstretched fingers] to God the Almighty, to His saints and to the Holy Gospel, with raised arm and outstretched fingers, that neither he nor his heirs shall at any time speak against or seek to contest this, under the penalty of the offence of perjury incurred by the very act of swearing, etc., as a further public instrument to be drawn up concerning the same shall more fully set forth — all without deceit or bad faith. Whereon, etc.\n\nDone at Lübeck, in the lower town hall there, in the presence and company of the learned and distinguished Ciriacus Wolmerstorp, cleric of the diocese of Lübeck and public notary, and also the noble and honourable Junkers Jheronimus van Bromse and Jurgen van Ehelenleys of the diocese of Münster, as witnesses specially summoned and requested thereto jointly and severally.\n\n[Latin attestation clause:] This is as stated above. Michael Petri, cleric of the diocese of Schwerin, public notary by apostolic and imperial authority, having been requested for the aforesaid matters, wrote this with his own hand.\n\n---", "summary": "Before notary Michael Petri at Lübeck's lower town hall, Wilhelm Gilbancke of Colchester, servant of English Chancellor Thomas Audley, formally acknowledges receipt of 2½ hundredweight of salt restored by Lübeck, and accepts 125 Lübeck marks as full compensation for all remaining unreturned goods, including half-says cloth, salted cod, sturgeon, canvas, Holland linen, feather-beds, Icelandic fish, and mirrors. He swears a standing oath renouncing all further legal claims against Lübeck and its citizens on behalf of himself and his heirs.", "document_type": "legal_instrument", "themes": ["restitution", "goods_seizure", "legal_proceedings", "compensation", "maritime", "diplomacy", "financial", "food_trade", "textile_trade", "personal_property"], "people_mentioned": ["Wilhelm Gilbancke", "Thomas Audley (Thomas Artey)", "Thyle Thegetmeyger", "Ciriacus Wolmerstorp", "Jheronimus van Bromse", "Jurgen van Ehelenleys", "Michael Petri"], "goods_mentioned": ["salt", "half-says cloth", "salted cod", "sturgeon", "canvas", "Holland linen cloth", "feather-beds", "Icelandic fish", "hogsuckers", "ling (langen)", "mirrors"], "notable": true, "notable_reason": "The only document in this batch recording a formal, sworn quitclaim and settlement, naming the English Lord Chancellor Thomas Audley as the patron whose favour prompted Lübeck's generosity, and providing a detailed list of unreturned goods together with the precise cash settlement figure."}, {"id": 82, "section": "VII", "section_title": "Goods taken from ships of the Low Countries", "title": "Goods lost in the taking of the ships of Johan Williamson, Adrian van Sterre and the Maria of Gatalope [recte Christopher de Moria] and taken into safe-keeping [in Hamburg], as ordered by Johan Hoper [of Lübeck]", "date": "(undated)", "location": "", "language": "Low German", "content": "aIn vormeldunge der certificacen unde instrumenten kysten den Engelsken guderen\n\n[1.]\nin schipper Wyllyamson van Mydelborch.105\n32 wage Barwases solt Engelsken maathe\n5½ dussent astrickes steynen\n1 kysten my[t] eren rescup unde kle[de]ren so guet alse £40 sterlings\n\nbIn schipper Adrian van Sterre continente solt vyskes so guet alse £8 unde 6s Flames\n\n[2.]\ngrote\n\n1 kleyn pexken, darynne 48 syden girdelen so guet alse £14 unde 16s Flames groten\n\nunde den tollen up 8s Flames peymentes106\n\n  104  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.\n\n  105  These goods belonged to John Hampton and John Bryngborne of Faversham.\n  106  These goods belonged to Thomas Blancke and were transported by his factor Gilbert Purfish in the ship of\n\nAdrian van Sterre.\n\n\fVii :  goo ds  tak en  from  ships  of  th e low  co unt ri es\n\n22 7\n\nIn Maria van Gatalope, dar Johann van Calessio schipper was,107 kist yn gelde,\n\n[3.]\nhuesgerade unde anderen dingen so guet alse £4 13s unde 4d sterlinges.108\n[4.]\nIn wes enem anderen collesken ende der pelykeam fremden guderen up genamen\nschepeng unde deme dar gesuncken ys noch unbewost werden tho eren gudern darumme\nfardele werd.\n\nDusse dinge sampt anderen mer yn guder acht tho hebben, umme wyderum schaden\n\ntho vormyden, ys fast geraden, dat ick j. v. guder menynge geve tho erkennen.\n\na hoye 1 marginated against this entry HL. b hoye 2 and merchant’s mark no. 1\nmarginated against this entry HL.\n\n[signed] Johann Hoper\n\n1)\n\n  107  This is an error: these goods were in the Christofer of Moria.\n  108  These goods belonged to Ralph Foxley’s servant Geoffrey Vaughan.", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 22a. Original. Paper. Unsealed.104", "file": "catalogued/doc_82.md", "modern_english_translation": "[Headed:] In declaration of the certificates and instruments [pertaining to] the chests [and] the English goods.\n\n[1.]\nIn the ship of skipper Williamson of Middelburg:\n32 weys of brown salt of English measure\n5½ thousand paving stones [Note: \"astrickes steynen\" — paving or cobble stones]\n1 chest with his equipment and clothing, to the value of £40 sterling\n\n[2.]\nIn the ship of skipper Adrian van Sterre: salted fish to the value of £8 and 6 shillings Flemish groats\n\n1 small package, containing 48 silk ribbons [Note: \"syden girdelen\" — silk girdles or ribbons] to the value of £14 and 16 shillings Flemish groats\n\nand the customs thereon: 8 shillings Flemish payment [Note: \"peymentes\" — a Flemish unit of account]\n\n[3.]\nIn the Maria van Gatalope [Note: the source title notes this is an error for Christopher de Moria], of which Johann van Calessio was skipper: a chest of money, household goods and other things to the value of £4 13 shillings and 4 pence sterling.\n\n[4.]\nIn whatever other Cologne [Note: \"collesken\" — possibly meaning goods of Cologne origin or another Low Countries provenance; interpretation uncertain] end of goods from the similar foreign goods taken up in ships and the one that was sunk — it is not yet known what will become of their share in those goods.\n\nThese matters, together with others, are to be kept carefully in mind in order to avoid further damage — it is strongly advised, which I give to understand in good faith.\n\n[Signed] Johann Hoper", "summary": "Johann Hoper compiles a memorandum summarising goods lost from three seized ships — those of skippers Williamson, Adrian van Sterre, and Johann van Calessio (the Maria van Gatalope) — with valuations, held in Hamburg under his orders. The document acknowledges that the fate of goods from additional vessels, including one that was sunk, remains unknown. Hoper concludes with a warning that these matters must be carefully monitored to prevent further damage.", "document_type": "memorandum", "themes": ["piracy", "goods_seizure", "cargo", "maritime", "legal_proceedings", "financial", "trade", "food_trade", "textile_trade"], "people_mentioned": ["Johann Hoper", "Johann van Calessio"], "goods_mentioned": ["brown salt", "paving stones", "chest with equipment and clothing", "salted fish", "silk ribbons", "chest of money and household goods"], "notable": true, "notable_reason": "Synthesises losses across multiple seized vessels including one that was sunk, and explicitly flags uncertainty about the disposition of further goods, making it a key administrative overview document in the restitution proceedings."}];

<!-- Application logic -->
<script>
// ── STATE ──
let currentTab = 'letters';   // 'letters' | 'casefile' | 'about'
let currentDetail = null;      // { type: 'letter'|'doc', id: number } or null
let filters = { type: 'all', language: 'all', notable: false };

// ── ROUTER ──
function parseHash() {
  const hash = location.hash.slice(1);
  if (hash.startsWith('letter/')) {
    return { tab: 'letters', detail: { type: 'letter', id: parseInt(hash.split('/')[1]) } };
  }
  if (hash.startsWith('doc/')) {
    return { tab: 'casefile', detail: { type: 'doc', id: parseInt(hash.split('/')[1]) } };
  }
  if (hash === 'about') return { tab: 'about', detail: null };
  if (hash === 'casefile') return { tab: 'casefile', detail: null };
  return { tab: 'letters', detail: null };
}

function navigate(tab, detail) {
  currentTab = tab;
  currentDetail = detail;
  if (detail) {
    location.hash = `${detail.type === 'letter' ? 'letter' : 'doc'}/${detail.id}`;
  } else if (tab === 'about') {
    location.hash = 'about';
  } else if (tab === 'casefile') {
    location.hash = 'casefile';
  } else {
    history.replaceState(null, '', location.pathname);
  }
  render();
}

window.addEventListener('hashchange', () => {
  const state = parseHash();
  currentTab = state.tab;
  currentDetail = state.detail;
  render();
});

// ── RENDER: NAV ──
function renderNav() {
  const nav = document.getElementById('site-nav');
  const tabs = [
    { id: 'letters', label: 'The Letters' },
    { id: 'casefile', label: 'The Case File' },
    { id: 'about', label: 'About' }
  ];
  nav.innerHTML = tabs.map(t =>
    `<button class="${currentTab === t.id ? 'active' : ''}" data-tab="${t.id}">${t.label}</button>`
  ).join('');
  nav.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      navigate(btn.dataset.tab, null);
    });
  });
}

// ── RENDER: HEADER ──
function renderHeader() {
  const header = document.getElementById('site-header');
  header.innerHTML = `
    <div class="ornament">&loz; &loz; &loz;</div>
