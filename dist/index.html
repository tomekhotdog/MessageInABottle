// ── HTML ESCAPING ──
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function truncate(str, len) {
  if (!str) return '';
  const s = String(str);
  if (s.length <= len) return s;
  return s.slice(0, len).replace(/\s+\S*$/, '') + '\u2026';
}

function textToParagraphs(text, cls) {
  if (!text) return '';
  return text.split(/\n\n+/).map(p => `<p class="${cls}">${escapeHtml(p.trim())}</p>`).join('');
}

// ── RENDER: LETTERS INDEX ──
function renderLetters() {
  const main = document.getElementById('main-content');
  const letter27 = LETTERS.find(l => l.id === 27);

  // Featured card
  let html = '';
  if (letter27) {
    html += `<div class="featured" onclick="navigate('letters', {type:'letter', id:27})">
      <div class="sender-line">${escapeHtml(letter27.sender)} <span class="to">to</span> ${escapeHtml(letter27.recipient)}</div>
      <div class="meta-line">${escapeHtml(letter27.origin)} &middot; ${escapeHtml(letter27.date)} &middot; ${escapeHtml(letter27.language)}</div>
      <div class="excerpt">I, Kathryna your mother, have a great desire to see you once more with my own living eyes, before I depart this earth. And know that I still have something particular to say and tell you, which I have always kept secretly in my heart.</div>
      <div class="summary-text">${escapeHtml(letter27.summary)}</div>
      <span class="read-link">Read this letter &rarr;</span>
    </div>`;
  }

  // Section divider
  html += `<div class="section-divider"><h2>All Letters</h2></div>`;

  // Filter bar
  const typeFilters = [
    { value: 'all', label: 'All' },
    { value: 'business', label: 'Business' },
    { value: 'personal', label: 'Personal' },
    { value: 'mixed', label: 'Mixed' }
  ];
  const langFilters = [
    { value: 'all', label: 'All' },
    { value: 'Middle English', label: 'Middle English' },
    { value: 'Middle Dutch', label: 'Middle Dutch' },
    { value: 'Low German', label: 'Low German' }
  ];

  html += `<div class="filters">`;
  html += `<span class="filter-label">Type</span>`;
  typeFilters.forEach(f => {
    html += `<button class="filter-pill${filters.type === f.value ? ' active' : ''}" data-filter="type" data-value="${f.value}">${f.label}</button>`;
  });
  html += `<div class="filter-sep"></div>`;
  html += `<span class="filter-label">Language</span>`;
  langFilters.forEach(f => {
    html += `<button class="filter-pill${filters.language === f.value ? ' active' : ''}" data-filter="language" data-value="${f.value}">${f.label}</button>`;
  });
  html += `<div class="filter-sep"></div>`;
  html += `<button class="filter-pill${filters.notable ? ' active' : ''}" data-filter="notable" data-value="toggle">Notable</button>`;
  html += `</div>`;

  // Filter logic
  const filtered = LETTERS.filter(l => {
    if (filters.type !== 'all' && l.letter_type !== filters.type) return false;
    if (filters.language !== 'all' && l.language !== filters.language) return false;
    if (filters.notable && !l.notable) return false;
    return true;
  });

  // Letter list
  if (filtered.length === 0) {
    html += `<div class="empty-state">No letters match the current filters.</div>`;
  } else {
    html += `<div class="letter-list">`;
    filtered.forEach((l, i) => {
      const delay = (0.03 * i).toFixed(2);
      html += `<div class="letter-row" data-id="letter-${l.id}" data-letter-id="${l.id}" style="animation-delay:${delay}s">
        <div class="row-number">${l.id}</div>
        <div class="row-body">
          <h3>${escapeHtml(l.sender)} <span class="arrow">to</span> ${escapeHtml(l.recipient)}</h3>
          <p class="summary">${escapeHtml(truncate(l.summary, 160))}</p>
        </div>
        <div class="row-meta">
          <span class="date">${escapeHtml(l.date)}</span>
          <span class="lang">${escapeHtml(l.language)}</span>
          ${l.notable ? '<span class="badge-notable">Notable</span>' : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  main.innerHTML = html;

  // Wire filter clicks
  main.querySelectorAll('.filter-pill').forEach(btn => {
    btn.addEventListener('click', () => {
      const f = btn.dataset.filter;
      const v = btn.dataset.value;
      if (f === 'notable') {
        filters.notable = !filters.notable;
      } else {
        filters[f] = v;
      }
      renderLetters();
      scrollToActive();
    });
  });

  // Wire letter row clicks
  main.querySelectorAll('.letter-row').forEach(row => {
    row.addEventListener('click', () => {
      navigate('letters', { type: 'letter', id: parseInt(row.dataset.letterId) });
    });
  });
}

// ── RENDER: CASE FILE INDEX ──
function renderCaseFile() {
  const main = document.getElementById('main-content');
  const SECTION_ORDER = ['II', 'III', 'IV', 'V', 'VI', 'VII'];

  let html = `<p class="intro-text">The administrative documents assembled here &mdash; depositions, inventories, schedules of losses, legal instruments, and certificates &mdash; record the legal aftermath of the seizure of Adrian Johnson&rsquo;s ship in August 1533. Together they reveal the bureaucratic machinery of early modern maritime dispute resolution, from the initial interrogation of captain and crew to the painstaking itemisation of lost goods.</p>`;

  let rowIndex = 0;
  SECTION_ORDER.forEach(sec => {
    const docs = DOCUMENTS.filter(d => d.section === sec);
    if (docs.length === 0) return;
    const title = docs[0].section_title;
    html += `<div class="section-header">
      <span class="section-num">Section ${escapeHtml(sec)}</span>
      <h3>${escapeHtml(title)}</h3>
    </div>`;
    docs.forEach(d => {
      const delay = (0.03 * rowIndex).toFixed(2);
      rowIndex++;
      html += `<div class="doc-row" data-id="doc-${d.id}" data-doc-id="${d.id}" style="animation-delay:${delay}s">
        <div class="row-number">${d.id}</div>
        <div class="row-body">
          <h3>${escapeHtml(d.title)}</h3>
          <p class="summary">${escapeHtml(truncate(d.summary, 160))}</p>
        </div>
        <div class="row-meta">
          <span class="date">${escapeHtml(d.date)}</span>
          <span class="badge-type">${escapeHtml(d.document_type)}</span>
          ${d.notable ? '<span class="badge-notable">Notable</span>' : ''}
        </div>
      </div>`;
    });
  });

  main.innerHTML = html;

  // Wire doc row clicks
  main.querySelectorAll('.doc-row').forEach(row => {
    row.addEventListener('click', () => {
      navigate('casefile', { type: 'doc', id: parseInt(row.dataset.docId) });
    });
  });
}

// ── RENDER: DETAIL PANEL ──
function renderDetail() {
  const overlay = document.getElementById('detail-overlay');
  if (!currentDetail) {
    overlay.className = 'detail-overlay';
    overlay.innerHTML = '';
    document.body.style.overflow = '';
    return;
  }

  const isLetter = currentDetail.type === 'letter';
  const item = isLetter
    ? LETTERS.find(l => l.id === currentDetail.id)
    : DOCUMENTS.find(d => d.id === currentDetail.id);

  if (!item) {
    overlay.className = 'detail-overlay';
    overlay.innerHTML = '';
    document.body.style.overflow = '';
    return;
  }

  document.body.style.overflow = 'hidden';
  overlay.className = 'detail-overlay open';

  let html = `<div class="detail-panel">`;
  html += `<button class="detail-close" aria-label="Close">&times;</button>`;

  // Header
  html += `<div class="detail-header">`;
  html += `<div class="number">${item.id}</div>`;

  if (isLetter) {
    html += `<h2>${escapeHtml(item.sender)} <span style="font-weight:400;font-style:italic;color:var(--sepia-mid);font-size:0.85em">to</span> ${escapeHtml(item.recipient)}</h2>`;
  } else {
    html += `<h2>${escapeHtml(item.title)}</h2>`;
  }

  // Meta row
  html += `<div class="detail-meta-row">`;
  html += `<div class="detail-meta-item"><span class="meta-label">Date</span><span class="meta-value">${escapeHtml(item.date)}</span></div>`;
  if (isLetter) {
    if (item.origin) html += `<div class="detail-meta-item"><span class="meta-label">Origin</span><span class="meta-value">${escapeHtml(item.origin)}</span></div>`;
  } else {
    if (item.location) html += `<div class="detail-meta-item"><span class="meta-label">Location</span><span class="meta-value">${escapeHtml(item.location)}</span></div>`;
  }
  html += `<div class="detail-meta-item"><span class="meta-label">Language</span><span class="meta-value">${escapeHtml(item.language)}</span></div>`;
  if (isLetter) {
    html += `<div class="detail-meta-item"><span class="meta-label">Type</span><span class="meta-value">${escapeHtml(item.letter_type)}</span></div>`;
  } else {
    html += `<div class="detail-meta-item"><span class="meta-label">Type</span><span class="meta-value">${escapeHtml(item.document_type)}</span></div>`;
  }
  html += `</div>`;

  // Theme tags
  if (item.themes && item.themes.length > 0) {
    html += `<div class="theme-tags">`;
    item.themes.forEach(t => {
      html += `<span class="theme-tag">${escapeHtml(t.replace(/_/g, ' '))}</span>`;
    });
    html += `</div>`;
  }

  html += `</div>`; // close detail-header

  // Notable reason (for documents)
  if (!isLetter && item.notable && item.notable_reason) {
    html += `<div class="detail-section">
      <h3>Why Notable</h3>
      <div class="detail-text">${escapeHtml(item.notable_reason)}</div>
    </div>`;
  }

  // Notable reason (for letters)
  if (isLetter && item.notable && item.notable_reason) {
    html += `<div class="detail-section">
      <h3>Why Notable</h3>
      <div class="detail-text">${escapeHtml(item.notable_reason)}</div>
    </div>`;
  }

  // Summary
  html += `<div class="detail-section">
    <h3>Summary</h3>
    <div class="detail-text summary">${escapeHtml(item.summary)}</div>
  </div>`;

  // Translation
  const translationText = item.modern_english_translation;
  if (translationText) {
    html += `<div class="detail-section">
      <h3>Modern English Translation</h3>
      ${textToParagraphs(translationText, 'detail-text')}
      <div class="ai-note">This translation was generated by AI (Claude, Anthropic) for accessibility. It is not a peer-reviewed scholarly translation. For the original text, see below.</div>
    </div>`;
  }

  // Original text toggle
  const originalText = isLetter ? item.original_transcription : item.content;
  if (originalText) {
    const origLabel = isLetter ? 'original transcription' : 'original text';
    html += `<div class="detail-section">
      <button class="toggle-btn" data-target="original-text"><span class="chevron">&#9654;</span> Show ${origLabel} (${escapeHtml(item.language)})</button>
      <div class="collapsible" id="original-text">
        ${textToParagraphs(originalText, 'detail-text original')}
      </div>
    </div>`;
  }

  // Editorial notes toggle
  if (item.editorial_notes && item.editorial_notes.trim()) {
    html += `<div class="detail-section">
      <button class="toggle-btn" data-target="editorial-notes"><span class="chevron">&#9654;</span> Show editorial notes</button>
      <div class="collapsible" id="editorial-notes">
        ${textToParagraphs(item.editorial_notes, 'detail-text original')}
      </div>
    </div>`;
  }

  html += `</div>`; // close detail-panel
  overlay.innerHTML = html;

  // Wire close button
  overlay.querySelector('.detail-close').addEventListener('click', () => {
    navigate(currentTab, null);
  });

  // Wire toggle buttons
  overlay.querySelectorAll('.toggle-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const target = document.getElementById(btn.dataset.target);
      if (!target) return;
      const isOpen = target.classList.toggle('open');
      btn.classList.toggle('expanded', isOpen);
      const label = btn.textContent.trim();
      if (isOpen) {
        btn.innerHTML = btn.innerHTML.replace('Show ', 'Hide ');
      } else {
        btn.innerHTML = btn.innerHTML.replace('Hide ', 'Show ');
      }
    });
  });

  // Stop panel clicks from closing overlay
  const panel = overlay.querySelector('.detail-panel');
  if (panel) {
    panel.addEventListener('click', (e) => {
      e.stopPropagation();
    });
  }
}

// ── SCROLL TO ACTIVE ──
function scrollToActive() {
  if (!currentDetail) return;
  const selector = `[data-id="${currentDetail.type}-${currentDetail.id}"]`;
  const el = document.querySelector(selector);
  if (el) {
    requestAnimationFrame(() => {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });
  }
}

// ── RENDER: MAIN ──
function render() {
  renderNav();
  renderHeader();
  renderFooter();

  if (currentTab === 'about') {
    renderAbout();
  } else if (currentTab === 'casefile') {
    renderCaseFile();
  } else {
    renderLetters();
  }

  // Detail panel
  renderDetail();

  // Scroll to active row
  scrollToActive();
}

// ── ESCAPE KEY ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && currentDetail) {
    navigate(currentTab, null);
  }
});

// ── OVERLAY CLICK ──
document.getElementById('detail-overlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    navigate(currentTab, null);
  }
});

// ── INITIAL LOAD ──
const initialState = parseHash();
currentTab = initialState.tab;
currentDetail = initialState.detail;
render();
</script>
