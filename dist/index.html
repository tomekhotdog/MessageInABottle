m, quietationem ac pactum\nperpetuum de ulterius rem habitam non petendo fecit renuntiando etiam exceptione\ndictorum bonorum restitutorum et solutorum et pecuniarum summa hujusmodi non\nhabitorum seu non receptorum et spei future habitionis, munerationis et persolutionis,\nquibus contra premissa vel aliquod premissorum se defendere posset quomodolibet vel tueri,\nadeo quod neque dictus senatus neque eorum cives seu inquilini post hac in perpetuum\nhorum atque omnium bonorum receptorum, persolutorum, direptorum aut submersorum\natque de dicta pecuniarum summa occasione amplius conveniri, vexari, inquietari etiam\nmolestari in judicio nec extra possent et debent, sed super hiis immumes, innoxios et\nindempnos, absolutos, emancipatos prestare et observare volens solemni stipulatione\ninterveniente ac sub hipoteca et obligatione omnium bonorum suorum mobilium et\nimmobilium presentium et futurorum ac qualibet alia juris et facti renuntiatione ad hec\nnecessaria pariter et cautela et omnia premissa se ac dictum Martinum ratione predicte\nbale bissi crudi firmiter et inviolabiliter observaturos sub pena reatus perjurii jurejurando\ntactis sacrosanctis ad sancta Dei evangelia juravit, de et super quibus omnibus et singulis\npremissis predictis dominus Godehardus Engelstede nomine totius senatus Lubicensis\nper me notarium publicum infrascriptum unum vel plura publicum seu publica fieri petiit\ninstrumentum et instrumenta.\n\nActa fuerunt hec in prelibata civitate Lubicensi ibidem in domo consulari superiori,\nanno, indictione, die et aliis quibus supra, presentibus ibidem honorabilibus viris dominis\nJohanne Proth et Joachim Szevelt presbiteris Lubicensibus necnon providis et honestis\nviris Johanne Vorhorde, layco Coloniensi, et Thoma Dusterhusen et Simone Schulren\ncivibus Lubicensibus testibus ad premissa vocatis specialiter atque rogatis.\n\nEt ego Michael Petri clericus Szwerinensis\ndiocesis publicus sacris apostolica et imperiali\nauctoritatibus notarius, quia hujusmodi confes-\nsioni, quietationi, promissioni, renunctiationi\net juramenti prestationi omnibusque aliis et\nsingulis premissis, dum sic, ut premittitur,\nfierent et agerentur unacum prenominatis\ntestibus presens interfui, eaque sic fieri vidi\net audivi ac in notam sumpsi, ideo hoc pre-\nsens publicum instrumentum manu alterius\nme interim aliis prepedito negotiis fideliter\nscriptum et ex notis meis extractum exinde\nconfeci, subscripsi, publicavi et in hanc pub-\nlicam formam redegi signoque, nomine et\ncognomine meis solitis et consuetis signavi,\nroboravi et communeri in fidem, robur et\nevidens testimonium omnium et singulorum\npremissorum rogatus et requisitus.\n\nNotarial sign of Michael Petri\n\na Federizo HL, in error.\n\n\fiV: goods taken from Venetian merchants in the ship of adrian johnson\n\n1 89", "editorial_notes": "", "archival_reference": "", "file": "catalogued/doc_56.md", "modern_english_translation": "Copy of the instrument of quitclaim and acknowledgment of goods received by Anthonius Oberomiza on behalf of the honorable council of Lübeck.\n\nIn the name of the Lord, amen. Let it be clearly apparent and known to all through this present public instrument that in the year from the Nativity of the same Lord one thousand five hundred and thirty-four, the seventh indiction, on Tuesday the thirty-first and last day of the month of March, under the reign of the most glorious, most unconquered, and Catholic prince and lord, lord Charles the Fifth, by the grace of divine clemency ever-august Emperor of the Romans, and king of Germany, Spain, both Sicilies, Jerusalem, Hungary, Dalmatia, Croatia, etc., Archduke of Austria, and Duke of Burgundy, etc., in the fifteenth year of his reign — whereas it had previously occurred that in the year of the Lord one thousand five hundred and thirty-three, in the month of August, during the time of wars and hostilities between the people of Lübeck on the one part and the Hollanders on the other part, the honorable lords of the council of Lübeck, among other goods, seized certain goods that were in a certain ship commonly called a hoy [Note: a type of single-masted coastal vessel] belonging to the city of Antwerp, of which the master or captain was Adrian Johansen (as he then was), and which had been seized on the open sea by the hired soldiers [Note: Latin milites stipendiarii, meaning mercenary or contracted soldiers] deputed by the said people of Lübeck, yet without the consent and mandate of the said lords of the council of Lübeck; and when those goods had arrived at or been brought to the city of Lübeck, the aforesaid council had received them into their custody for no other purpose than for the benefit and advantage of common merchants, and had caused them to be faithfully preserved — therefore, before the distinguished and prudent men, lords Godehard Engelstede and Albert Clever, councillors of Lübeck, deputed for this purpose by the distinguished council of Lübeck and assembled together for the conduct of this business in the upper chamber of the town hall of Lübeck, in my presence as public notary and that of the witnesses named below, specially called and requested for these matters — there appeared in person the prudent man Anthonius Oberomiza, a Venetian, residing as he declared in the kingdom of England in the city of London, who in person and on his own behalf designated certain goods as belonging to himself as the primary party, and one bale of raw silk called Talanna [Note: a type of raw silk, possibly from Talamone in Tuscany], weighing one hundred and sixty-four pounds in English measure at the rate of sixteen ounces to the pound, as belonging respectively to the prudent man Martin de Federigo, likewise a Venetian merchant, his principal, as having been in the said hoy — not compelled or induced by force, deceit, fear, fraud, or malicious contrivance, but by his own pure, free, spontaneous, and personal will, he had declared and openly and publicly acknowledged in truth, and did acknowledge and confess, both in his own name and in that of the said Martin his principal, sustained by his legitimate mandate for this purpose, that previously on the twelfth day of the said month of March, out of favor and reverence for the most serene prince and lord, lord Henry, King of England, from the distinguished and prudent men, lords Nicholas Bardewick and Hermann Schute, councillors of Lübeck, deputed for this purpose by the distinguished council of Lübeck, he had first, as the duly appointed and constituted procurator of the said Martin de Federigo his principal — as he demonstrated by proof of his mandate of procuration — truly and effectively received back the said bale of raw silk designated above and belonging to the said Martin his principal, and those goods and merchandise which the said hired soldiers the previous year and month, off the shores and ports of the kingdom of England, dispatched with the warships or vessels of war or hostility of the said city of Lübeck, had seized, taken, and carried away from him Anthonius Oberomiza, namely: nine dozen stoneware jugs or cups; item six dozen tin cups and nine tin cups; item seven dozen small bells and campanellas [Note: small bells], and seven campanellas; item ten mirrors and a certain image; item eight tin dishes or tarschas [Note: a type of flat dish]; item ten candlesticks; item six chests of silk made from pig bristles [Note: brushes made from pig-hair packed in chests]; item four iron rings for signs and further three iron rings; item twenty-six iron hammers; item eight iron tongs. He reported that the aforesaid goods had all been together in one large basket [Note: Latin magno canistro]. And for the purpose of seeking the restitution of those goods the said Anthonius Oberomiza had come to the city of Lübeck, and he had openly and publicly declared and acknowledged that those goods had been generously returned, restored, and delivered to him by the said lords councillors; and the said Anthonius swore, with arm outstretched and the foremost fingers raised, a bodily oath on the holy Gospels of God, that the aforesaid goods belonged to himself and the bale of raw silk to the said Martin, and to no others among the enemies of the said people of Lübeck. And since the same Anthonius had further complained that certain goods or merchandise belonging to him had been abstracted or alienated from the said hoy, or had gone missing when the said ship suffered shipwreck, and for the compensation of the same and for all other damages and all and every costs incurred on that account and for all loss of interest and profit, the said lords Godehard Engelstede and Albert Clever, the aforesaid councillors, in the name of the entire council of Lübeck, generously and favorably, in the presence of me the notary and the witnesses named below, assigned and paid to the same Anthonius Oberomiza twenty-five Rhenish florins [Note: a gold coin of the Holy Roman Empire] in ready and counted money, and those twenty-five florins he accepted gratefully in settlement of his claim, and he declared himself well paid, discharged, and acquitted for such lawful satisfaction and real settlement, and gave thanks. And concerning all and each of the aforesaid goods and the bale of raw silk and the said twenty-five florins and all other alienated, abstracted, plundered, or sunken goods — having been restored, received, and discharged — the oft-said Anthonius Oberomiza, fully on behalf of himself and the said Martin de Federigo on account of the aforesaid bale of raw silk, and in the names of their heirs, released, freed, wholly acquitted and absolved the aforesaid council, magistracy, councillors, and all citizens and inhabitants of Lübeck, and granted them a final settlement, quitclaim, and perpetual covenant not to seek anything further — renouncing also the exception [Note: a formal legal defence] of the said goods having been restored and paid and of such a sum of money not having been held or received, and of any future hope of holding, receiving, and being paid, by which he might be able in any way to defend or protect himself against the foregoing or any part thereof — to such a degree that neither the said council nor their citizens or inhabitants may henceforth ever in perpetuity be sued, harassed, disturbed, or troubled in court or outside it on account of these and all the received, discharged, plundered, or sunken goods and concerning the said sum of money, but willing to keep and observe them as immune, harmless, indemnified, absolved, and freed from these obligations by solemn stipulation [Note: a formal verbal contract], with the imposition of a mortgage and obligation over all his movable and immovable goods, present and future, and by any other renunciation of law and fact necessary for this purpose, and every precaution; and he swore by oath, touching the sacred things on the holy Gospels of God, that he and the said Martin, on account of the aforesaid bale of raw silk, would firmly and inviolably observe all the foregoing, under penalty of the guilt of perjury. Concerning all and each of the aforesaid matters, the said lord Godehard Engelstede in the name of the entire council of Lübeck requested through me the undersigned public notary that one or more public instrument or instruments be drawn up.\n\nThese things were done in the aforesaid city of Lübeck, in the upper chamber of the town hall there, in the year, indiction, day and other circumstances stated above, with the honorable men, lords Johannes Proth and Joachim Sevelt, priests of Lübeck, and the prudent and honorable men Johannes Vorhorde, layman of Cologne, and Thomas Dusterhusen and Simon Schulren, citizens of Lübeck, being present as witnesses specially called and requested for the foregoing.\n\nAnd I, Michael Petri, cleric of the diocese of Schwerin, public notary by sacred apostolic and imperial authority — since I was present together with the named witnesses at this confession, quitclaim, promise, renunciation, and oath-taking, and all and each of the foregoing, while they were being thus conducted and transacted as stated above, and I saw and heard them so done and took note of them — I therefore drew up, subscribed, published, and reduced to this public form this present public instrument, faithfully written by another hand while I was in the meantime occupied with other business, and extracted from my notes, and I signed, confirmed, and strengthened it with my customary and accustomed sign, name, and surname in faith, confirmation, and manifest testimony of all and each of the foregoing, having been called upon and required.\n\n[Notarial sign of Michael Petri]\n\n---", "summary": "A detailed notarial instrument drawn up by Michael Petri on 31 March 1534, recording the full settlement between Anthonius Oberomiza (a Venetian merchant based in London) and the Lübeck council for goods seized from Adrian Johansen's hoy by Lübeck mercenary soldiers in August 1533. The instrument records both the return of specific seized goods and a supplementary cash payment of 25 Rhenish florins for items lost or missing, along with a comprehensive quitclaim and oath never to pursue further claims.", "document_type": "legal_instrument", "themes": ["trade", "piracy", "legal_proceedings", "cargo", "restitution", "maritime", "notarial", "goods_seizure", "compensation", "financial", "testimony"], "people_mentioned": ["Anthonius Oberomiza", "Martin de Federigo", "Charles V", "Henry VIII", "Godehard Engelstede", "Albert Clever", "Nicholas Bardewick", "Hermann Schute", "Michael Petri", "Johannes Proth", "Joachim Sevelt", "Johannes Vorhorde", "Thomas Dusterhusen", "Simon Schulren", "Adrian Johansen"], "goods_mentioned": ["raw silk (Talanna)", "stoneware jugs", "tin cups", "small bells", "campanellas", "mirrors", "tin dishes", "candlesticks", "silk bristle brushes", "iron rings", "iron hammers", "iron tongs"], "notable": true, "notable_reason": "Exceptionally detailed inventory of seized goods combined with a cash compensation settlement; explicitly acknowledges that Lübeck's mercenary soldiers acted without the council's consent, and invokes the authority of both Emperor Charles V and King Henry VIII of England in the diplomatic resolution."}, {"id": 57, "section": "IV", "section_title": "Goods taken from Venetian merchants in the ship of Adrian Johnson (19 Aug. 1533)", "title": "On 31 Mar. 1534 the Lübeck councillors Godehard Engelsteden and Albert Clever inventoried the goods taken in August 1533 at the time of the Holland-Lübeck war on the occasion of the capture of the ship of Adrian Johanßen of Antwerp on the high seas by Lübeck milites stipendiarii, but without the consent of the Lübeck council; the goods", "date": "", "location": "", "language": "Latin", "content": "Copia instrumenti quietantie et confessionis\nreceptorum bonorum Anthonii Oberomeza\npro spectabili senatu Lubicensi\n\nIn nomine Domini amen. Per hoc presens publicum instrumentum cunctis pateat\nevidenter et sit notum, quod anno a Nativitate ejusdem Domini millesimo quingentesimo\ntricesimo quarto, indictione septima, die vero marti tricesima prima et ultima mensis\nMartii, imperante gloriosissimo, invictissimoque ac catholico principe et domino domino\nKarolo Quinto divina favente clementia Romanorum imperatore semper augusto ac\nGermanie, Hispaniarum, utriusque Sicilie, Hierusalem, Hungarie, Dalmatie, Croatie rege\netc., archiduce Austrie et duce Burgundie etc., anno imperii quinto decimo, cum aliter\nfuerit et sit, quod nuper de anno Domini millesimo quingentesimo tricesimo tercio de\nmense Augusti tempore guerrarum et inimicitiarum inter Lubicenses ex una et Hollan-\ndinos partibus ex altera spectabiles domini de senatu Lubicensi inter alia nonnulla bona\nin quadam nave hoya wulgariter nuncupata ville Anthwerpie, cujus patronus sive rector\nerat Adrianus Johansen (tunc existens), et per deputatos dictorum Lubicensium milites\nstipendiarios in publico mari sine tamen consensu et mandato dictorum dominorum de\nsenatu Lubicensi apprehensa et que bona, dum ad civitatem Lubicensem advenissent seu\nconfluissent, prelibatus senatus non alias quam pro commodo et utilitate communium\nmercatorum ad se recepissent et fideliter conservari fecissent. Idcirco coram spectabilibus\nac prudentibus viris dominis Godehardo Engelsteden et Alberto Clever consulibus\nLubicensibus tamquam ad hoc a spectabili senatu Lubicensi deputatis et propter actum\nhujusmodi in domo consulari Lubicensium superiori insimul congregatis in meique\nnotarii publici testiumque infrascriptorum et ad hec specialiter vocatorum et rogatorum\n\n  55  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or a breve\n(ŭ) or a caron (ǔ) in order to distinguish it from two minims. Since this has no effect on the pronunciation of the\nword, these are all transcribed as ‘u’.\n\n\npresentia presens et personaliter constitutus providus vir Anthonius Oberomeza, Venetus,\nin regno Anglie et civitate Lunden’, ut asseruit, residens, presenti personaliter pro se ipso\nnonnulla bona ad se ipsum tamquam principalem et unam balam bissi crudi Talanna\nvocati ponderantem centum sexaginta quatuor libras ponderis Anglie ad racionem\nsedecim uncearum pro libra et uncea ad providum virum Martinum de Federigo, etiam\nmercatorem Venetum, principalem suum, respective spectare et pertinere in dicta hoya\nfuisse designavit, non vi, dolo, metu, fraude seu sinistra machinatione coactus vel seductus,\nsed mera, libera, spontanea et propria voluntate confessus fuerat et in veritate palam et\npublice recognovit et confitebatur tam proprio quam predicti Martini principalis sui ab eo\nad hoc legitimo mandato suffultus nominibus antea duodecimo die prefati mensis Martii\nob favorem et reverentiam serenissimi principis et domini domini Henrici regis Anglie\na spectabilibus et prudentibus viris dominis Nicolao Bardewick et Hermanno Schute\nconsulibus Lubicensibus ad hoc a spectabili senatu Lubicensi deputatis primo tamquam\nlegitimus et constitutus procurator dicti Martini de Federigo principalis sui, prout de suo\nprocuratione mandato fidem fecit legittimam rehabuisse realiter et cum effectu recepisse\npredictam balam bissi crudi superius designatam et ad ipsum Martinum principalem suum\nspectantem et ipsa bona ac merces mercandilicias, que et quas predicto elapso anno et\nmense sub conterminis et portubus regni Anglie dicti milites stipendarii classibus sive\nnavibus bellicis seu hostilibus dicte civitatis Lubicensis expediti sibi Anthonio Oberomiza\nrapuerant, receperant et abduxerant, videlicet novem duodenas lapideum figulorum et seu\npoculorum, item sex duodenas stanneorum poculorum et novem stannea pocula. Item\nseptem duodenas parvarum campanarum et seu campanellarum et septem campanellas.\nItem decem specula et quandam hymaginem. Item octo stanneas schutellas sive tarschas.\nItem decem candelabra. Item sex scrinea setarum ex crinibus porcorum. Item quatuor\nferreos circulos signorum et adhuc tres ferreos circulos. Item viginti sex ferreos malleos.\nItem octo ferreas tenellas. Premissa bona insimul in uno magno canestro fuisse referebat. Et\nquorum bonorum restitutionem petendi causa sive occasione idem Anthonius Oberomiza\nse ad civitatem Lubicensem contulerat et bona ipsa sibi liberaliter reddita, restituta et\nconsignata per prenominatos dominos consules fore ac esse palam et publice confessus\nfuerat juravitque idem Anthonius extenso brachio primoribusque erectis digitis corporali\njuramento ad sancta Dei evangelia supradicta bona ad se et balam bissi crudi ad predictum\nMartinum et ad nullos alios dictorum Lubicensium hostes spectare et pertinere. Et cum idem\nAnthonius conquestus adhuc fuerat certa bona seu merces ad se pertinere de dicta hoya\nabstracta, alienataa seu ex quo dicta navis naufragium passa fuit submersa adhuc defuere\net pro eorundem recompensatione ac omnibus aliis dampnis et quibuscumque expensis\npropterea passis ac omnibus interesse et lucris cessantibus iidem domini Goddehardus\nEngelstede et Albertus Clever consules antedicti nomine totius senatus Lubicensis liberali\nmente et favorabiliter in presentia mei notarii et testium infracriptorum eidem Anthonio\nOberomiza viginti quinque florenos Renenses in moneta binb prompta et numerata pecunia\nassignarunt et persolverunt et quos viginti quinque florenos pro actione sua gratanter\nacceptavit et pro tam legali satisfactione et reali expeditione se bene pagatum, persolutum\net absolutum dixit et gratias egit. Et de quibus omnibus et singulis prenarratis bonis et\nbala bissi crudi et de dictis viginti quinque florenis et aliis alienatis, abstractis, direptis aut\nsubmersis bonis restitutum, receptum et exsolutum sepedictus Anthonius Oberomeza\n\n\fiV: goods taken from Venetian merchants in the ship of adrian johnson\n\n1 91\n\npro se totaliter et dicto Martino Federigo ratione predicte bale bissi crudi et eorumdem\nheredum nominibus prelibatos senatum, magistratum, senatores universosque cives et\ninquilinos Lubicenses quietavit, liberavit, penitus et absolvit eisque fynem, quietationem\nac pactum perpetuum de ulterius rem habitam non petando fecit renuntiando etiam\nexceptione dictorum bonorum restitutorum, solutorum et pecuniarum summa hujusmodi\nnon habitorum seu non receptorum et spei future habitionis, munerationis et persolutionis,\nquibus contra premissa vel aliquod premissorum se defendere posset quomodolibet vel tueri,\nadeo quod neque dictus senatus neque eorum cives seu inquilini post hac in perpetuum\nhorum atque omnium bonorum receptorum, persolutorum, direptorum aut submersorum\natque de dicta pecuniarum summa occasione amplius conveniri, vexari, inquietari etiam\nmolestari in judicio nec extra possint et debent, sed super hiis immumes, innoxios et\nindempnos, absolutos, emancipatos prestare et observare volens solemni stipulatione,\nintervencione ac sub hypotheca et obligatione omnium bonorum suorum mobilium et\nimmobilium presentium et futurorum ac qualibet alia juris et facti renuntiatione ad hec\nnecessaria pariter et cautela et omnium premissa se ac dictum Martinum ratione predicte\nbale bissi crudi firmiter et inviolabiliter observaturos sub pena reatus perjurii jurejurando\ntactis sacrosanctis ad sancta Dei evangelia juravit, de et super quibus omnibus et singulis\npremissis predictis dominus Goddehardus Engelstede nomine totius senatus Lubicensis\nper me notarium publicum infrascriptum unum vel plura publicum seu publica fieri petiit\ninstrumentum et instrumenta.\n\nActa fuerunt hec in prelibata civitate Lubicensi ibidem in domo consulari superiori,\nanno, indictione, die et aliis quibus supra, presentibus ibidem honorabilibus viris dominis\nJohanne Proth et Joachim Szevelt presbiteris Lubicensibus necnon providis et honestis\nviris Johanne Vorhorde, layco Coloniensi, et Thoma Dusterhusen et Symone Schulren\ncivibus Lubicensibus testibus ad premissa vocatis specialiter atque rogatis.\n\nEt ego Michael Petri clericus Zwerinensis diocesis publicus sacris\napostolica et imperiali auctoritatibus notarius, quia hujusmodi\nconfessioni, quietationi, promissioni, renunctiationi et juramenti\nprestationi omnibusque aliis et singulis premissis, dum sic, ut\npremittitur, fierent et agerentur unacum prenominatis testibus\npresens interfui, eaque sic fieri vidi et audivi ac in notam sumpsi,\nideo hoc presens publicum instrumentum manu propria scriptum\net ex notis meis extractum exinde confeci, subscripsi, publicavi et\nin hanc publicam formam redegi signoque, nomine et cognomine\nmeis solitis et consuetis signavic, roboravi et communeri in fidem,\nrobur et evidens testimonium omnium et singulorum premissorum\nrogatus et requisitus.\n\nAuschultata et collocionata fuit et est presens copia per me eundem\nMichaelem Petri clericum et notarium suprascriptum et cum suo\noriginali concordat, quod attestor manu propria.\n\na sex follows, struck through HL.\nthrough HL.\n\nb-b Interlined HL.\n\nc et follows, struck", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 18r-19v. (original classification\nby Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn up\nby Michael Petri in 1525, indictione tercia, Monday 23 ... Contemporaneous\ncopy of the instrument (originally executed by the notary Michael Petri)\nand certified by him here as accurate. Unsealed.55", "file": "catalogued/doc_57.md", "modern_english_translation": "Copy of the instrument of quitclaim and acknowledgment of goods received by Anthonius Oberomiza on behalf of the distinguished council of Lübeck.\n\nIn the name of the Lord, amen. Let it be clearly apparent and known to all through this present public instrument that in the year from the Nativity of the same Lord one thousand five hundred and thirty-four, the seventh indiction, on Tuesday the thirty-first and last day of the month of March, under the reign of the most glorious, most unconquered, and Catholic prince and lord, lord Charles the Fifth, by the grace of divine clemency ever-august Emperor of the Romans, and king of Germany, Spain, both Sicilies, Jerusalem, Hungary, Dalmatia, Croatia, etc., Archduke of Austria, and Duke of Burgundy, etc., in the fifteenth year of his reign — whereas it had previously occurred that in the year of the Lord one thousand five hundred and thirty-three, in the month of August, during the time of wars and hostilities between the people of Lübeck on the one part and the Hollanders on the other part, the honorable lords of the council of Lübeck, among other goods, seized certain goods that were in a certain ship commonly called a hoy belonging to the city of Antwerp, of which the master or captain was Adrian Johansen (as he then was), and which had been seized on the open sea by the hired soldiers deputed by the said people of Lübeck, yet without the consent and mandate of the said lords of the council of Lübeck; and when those goods had arrived at or been brought to the city of Lübeck, the aforesaid council had received them into their custody for no other purpose than for the benefit and advantage of common merchants, and had caused them to be faithfully preserved — therefore, before the distinguished and prudent men, lords Godehard Engelstede and Albert Clever, councillors of Lübeck, deputed for this purpose by the distinguished council of Lübeck and assembled together for the conduct of this business in the upper chamber of the town hall of Lübeck, in my presence as public notary and that of the witnesses named below, specially called and requested for these matters — there appeared in person the prudent man Anthonius Oberomeza, a Venetian, residing as he declared in the kingdom of England in the city of London, who in person on his own behalf designated certain goods as belonging to himself as the primary party, and one bale of raw silk called Talanna, weighing one hundred and sixty-four pounds in English measure at the rate of sixteen ounces to the pound, as belonging respectively to the prudent man Martin de Federigo, likewise a Venetian merchant, his principal — as having been in the said hoy — not compelled or induced by force, deceit, fear, fraud, or malicious contrivance, but by his own pure, free, spontaneous, and personal will, he had declared and openly and publicly acknowledged in truth, and did acknowledge and confess, both in his own name and in that of the said Martin his principal, sustained by his legitimate mandate for this purpose, that previously on the twelfth day of the said month of March, out of favor and reverence for the most serene prince and lord, lord Henry, King of England, from the distinguished and prudent men, lords Nicholas Bardewick and Hermann Schute, councillors of Lübeck, deputed for this purpose by the distinguished council of Lübeck, he had first, as the duly appointed and constituted procurator of the said Martin de Federigo his principal — as he demonstrated by proof of his mandate of procuration — truly and effectively received back the said bale of raw silk designated above and belonging to the said Martin his principal, and those goods and merchandise which the said hired soldiers the previous year and month, off the shores and ports of the kingdom of England, dispatched with the warships or vessels of war or hostility of the said city of Lübeck, had seized, taken, and carried away from him Anthonius Oberomiza, namely: nine dozen stoneware jugs or cups; item six dozen tin cups and nine tin cups; item seven dozen small bells and campanellas, and seven campanellas; item ten mirrors and a certain image; item eight tin dishes or tarschas; item ten candlesticks; item six chests of silk made from pig bristles; item four iron rings for signs and further three iron rings; item twenty-six iron hammers; item eight iron tongs. He reported that the aforesaid goods had all been together in one large basket. And for the purpose of seeking the restitution of those goods the said Anthonius Oberomiza had come to the city of Lübeck, and he had openly and publicly declared and acknowledged that those goods had been generously returned, restored, and delivered to him by the said lords councillors; and the said Anthonius swore, with arm outstretched and the foremost fingers raised, a bodily oath on the holy Gospels of God, that the aforesaid goods belonged to himself and the bale of raw silk to the said Martin, and to no others among the enemies of the said people of Lübeck. And since the same Anthonius had further complained that certain goods or merchandise belonging to him had been abstracted or alienated from the said hoy, or had gone missing when the said ship suffered shipwreck, and for the compensation of the same and for all other damages and all and every costs incurred on that account and for all loss of interest and profit, the said lords Godehard Engelstede and Albert Clever, the aforesaid councillors, in the name of the entire council of Lübeck, generously and favorably, in the presence of me the notary and the witnesses named below, assigned and paid to the same Anthonius Oberomiza twenty-five Rhenish florins in ready and counted money, and those twenty-five florins he accepted gratefully in settlement of his claim, and he declared himself well paid, discharged, and acquitted for such lawful satisfaction and real settlement, and gave thanks. And concerning all and each of the aforesaid goods and the bale of raw silk and the said twenty-five florins and all other alienated, abstracted, plundered, or sunken goods — having been restored, received, and discharged — the oft-said Anthonius Oberomeza, fully on behalf of himself and the said Martin de Federigo on account of the aforesaid bale of raw silk, and in the names of their heirs, released, freed, wholly acquitted and absolved the aforesaid council, magistracy, councillors, and all citizens and inhabitants of Lübeck, and granted them a final settlement, quitclaim, and perpetual covenant not to seek anything further — renouncing also the exception of the said goods having been restored and paid and of such a sum of money not having been held or received, and of any future hope of holding, receiving, and being paid, by which he might be able in any way to defend or protect himself against the foregoing or any part thereof — to such a degree that neither the said council nor their citizens or inhabitants may henceforth ever in perpetuity be sued, harassed, disturbed, or troubled in court or outside it on account of these and all the received, discharged, plundered, or sunken goods and concerning the said sum of money, but willing to keep and observe them as immune, harmless, indemnified, absolved, and freed from these obligations by solemn stipulation, with the imposition of a mortgage and obligation over all his movable and immovable goods, present and future, and by any other renunciation of law and fact necessary for this purpose, and every precaution; and he swore by oath, touching the sacred things on the holy Gospels of God, that he and the said Martin, on account of the aforesaid bale of raw silk, would firmly and inviolably observe all the foregoing, under penalty of the guilt of perjury. Concerning all and each of the aforesaid matters, the said lord Godehard Engelstede in the name of the entire council of Lübeck requested through me the undersigned public notary that one or more public instrument or instruments be drawn up.\n\nThese things were done in the aforesaid city of Lübeck, in the upper chamber of the town hall there, in the year, indiction, day and other circumstances stated above, with the honorable men, lords Johannes Proth and Joachim Sevelt, priests of Lübeck, and the prudent and honorable men Johannes Vorhorde, layman of Cologne, and Thomas Dusterhusen and Simon Schulren, citizens of Lübeck, being present as witnesses specially called and requested for the foregoing.\n\nAnd I, Michael Petri, cleric of the diocese of Schwerin, public notary by sacred apostolic and imperial authority — since I was present together with the named witnesses at this confession, quitclaim, promise, renunciation, and oath-taking, and all and each of the foregoing, while they were being thus conducted and transacted as stated above, and I saw and heard them so done and took note of them — I therefore drew up, subscribed, published, and reduced to this public form this present public instrument, written with my own hand and extracted from my notes, and I signed, confirmed, and strengthened it with my customary and accustomed sign, name, and surname in faith, confirmation, and manifest testimony of all and each of the foregoing, having been called upon and required.\n\nThis present copy was compared and collated by me, the same Michael Petri, cleric and notary as above-named, and it agrees with its original, which I attest with my own hand.\n\n---", "summary": "A Latin copy of the same notarial instrument as Doc 56, drawn up by Michael Petri and covering the identical settlement between Anthonius Oberomiza and the Lübeck council, with the same inventory of goods and 25 Rhenish florin compensation payment. The document notes that this copy was personally compared and collated against the original by the notary, and differs from Doc 56 in that it was written in Michael Petri's own hand rather than by another.", "document_type": "legal_instrument", "themes": ["trade", "piracy", "legal_proceedings", "cargo", "restitution", "maritime", "notarial", "goods_seizure", "compensation", "financial", "testimony"], "people_mentioned": ["Anthonius Oberomiza", "Martin de Federigo", "Charles V", "Henry VIII", "Godehard Engelstede", "Albert Clever", "Nicholas Bardewick", "Hermann Schute", "Michael Petri", "Johannes Proth", "Joachim Sevelt", "Johannes Vorhorde", "Thomas Dusterhusen", "Simon Schulren", "Adrian Johansen"], "goods_mentioned": ["raw silk (Talanna)", "stoneware jugs", "tin cups", "small bells", "campanellas", "mirrors", "tin dishes", "candlesticks", "silk bristle brushes", "iron rings", "iron hammers", "iron tongs"], "notable": true, "notable_reason": "Latin copy of the same settlement instrument as Doc 56, certified by the notary as matching the original; the existence of both a Low German and a Latin copy underscores the document's legal importance and the multinational parties involved."}, {"id": 58, "section": "V", "section_title": "Hanseatic losses in the taking of Adrian Johnson's ship", "title": "Cologne to Lübeck: The Cologne merchants who had goods in the ship of Adrian Johnson which have ended up in Lübeck have appointed Jacob van Mulheim as their plenipotentiary envoy for the recovery of the said goods. Cologne requests Lübeck’s cooperation in this matter", "date": "[15]33 Oct", "location": "Cologne", "language": "Low German", "content": "Unse frntlicke groite und wat wy gdes vermoigen! Ersame und wyse, besnder gnstige,\ngde frnde! Unse mede raidesfrnde une brgere mit namen Johann Campman, Peter\nHeynebach, Hermann Suyderman, Direith Horner, Peter Slootkenn und Johann Borner\nhebben uns angehaget und to kennen gegeen, wie sie vergangener tydt eynem schypmann\ngenant Adriain Janssoon vast gdere in ein schip verfracht, umb in Engelant to frren und\nto brengen, wilcke gudere, als sie verstain und geven to weten, worden ungestym weders\nhalen so in der see gewesen bynnen jwe eirsameheid stat Lbeke ankomen und in gde\ngewarnsam angenomen, wie dann jwe eirsamheid gegenwordigen Jacob van Mlheim,\nden sie mit tegenwordigen brieve under unser stat siegell besiegelt mit volkomen bericht\nund befeill umb dieselve gdere van irentweigen to verthedigen, idt sy mit eyde ader\nanders, als jwe eirsamheid van demselven vornemend werden, affgeferdiget und uns dairby\ngebeden hebben, wy derglycken van macht der Hansen doin und denselen frderlick\nto wesen, alsdan redelick und billick, wie jwe eirsameheit to gder maten weeten sick\ndat heeten und gebren will. Oick angesien wy uns tot jwen eirsamheid alle gnstelick\nfrdernis und vruntschap versien und vertroisten, so syn wy fruntelickes vlytes biddende\nund begerende, dat juwe eirsamheit uns to frntlicken gefallen und den vurgeschrevenen\nunseren brgeren to gde sick tegen den gemelten Jacob ihren befeilhebbere in syner\nwerbungen der vurgeroirter gdere halven volkomen geloiven geen und also gnstelick,\nfrderlick und behlpelick wesen willen, wairby die unsere vrscreven aen alle entgeltenis\nto iren gderen komen und verholpen werdeen moigen, als jwe eirsamheit im gelycken\nvan uns gerne gethain hetten und wy des und alles guden mitsampt gunst und vrientschap\nin snderheit gentzlick well to betrwen denselven jwen eirsamheit, die unser herre Got\nin aller gluckseliger wailfart und regimente lange tydt bewaren will. Geschreven am 6den\ndage Octobris anno etc. [15]33°.\n\nBrgermeistere und rait der stade Coelne\n\n\n1 93", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 3. Original. Paper. With fragments of\na seal in green wax closing the letter. On the dorse: Den eirsamen und wysen\nbrgermeisteren und raitmannen der stat Lbeke unsren besnderen\ngnstigen, guden frnden.", "file": "catalogued/doc_58.md", "modern_english_translation": "Our friendly greetings and whatever good we are able to offer! Honorable and wise, especially favorable, good friends! Our fellow council-members and citizens, namely Johann Campman, Peter Heynebach, Hermann Suyderman, Dirk Horner, Peter Slootkenn, and Johann Borner, have approached us and made known to us how, some time past, they had freighted goods on a ship with a shipper named Adrian Janssoon, to be conveyed and brought to England; which goods, as they understand and make known, having been carried by storm or similar circumstances at sea, have arrived at your honorable city of Lübeck and been received into safekeeping — as your honor is informed by the present bearer, Jacob van Mulheim, whom they have dispatched with the present letter sealed under our city seal, with full authority and instruction to defend said goods on their behalf, whether by oath or otherwise, as your honorable body shall determine from him. And they have further requested of us that we likewise act by virtue of the Hanse [Note: the Hanseatic League] and be favorable to him in this matter, as is then reasonable and proper, as your honorable body knows well how to conduct and carry itself. Also, since we look to and trust in your honorable body for all favorable assistance and friendship, we request and desire in friendly earnest that your honorable body, as a friendly favor to us and for the benefit of our aforesaid citizens, be willing to grant full credence to the said Jacob, their authorized agent, in his business regarding the aforesaid goods, and to be so favorable, supportive, and helpful that our aforesaid people may be assisted in coming to their goods without any penalty or loss, as your honorable body would willingly have done likewise in our case, and as we fully trust in you and all goodness together with favor and friendship in particular — to which same your honorable body may our Lord God preserve in all fortunate welfare and governance for a long time. Written on the 6th day of October in the year etc. [15]33.\n\nBurgomaster and council of the city of Cologne.\n\n---", "summary": "A letter of October 1533 from the Burgomaster and Council of Cologne to the Council of Lübeck, introducing Jacob van Mulheim as the authorised plenipotentiary of six named Cologne merchants whose goods were aboard Adrian Johansen's ship and had ended up in Lübeck. Cologne requests Lübeck's cooperation in releasing the goods to their agent, appealing to Hanseatic solidarity and mutual goodwill.", "document_type": "letter", "themes": ["trade", "legal_proceedings", "cargo", "maritime", "diplomacy", "goods_seizure", "restitution"], "people_mentioned": ["Jacob van Mulheim", "Johann Campman", "Peter Heynebach", "Hermann Suyderman", "Dirk Horner", "Peter Slootkenn", "Johann Borner", "Adrian Janssoon"], "goods_mentioned": [], "notable": true, "notable_reason": "Demonstrates the diplomatic and institutional dimension of the case, showing Cologne formally invoking Hanseatic League solidarity to secure restitution for its merchants; one of the few documents in this set originating from a city authority rather than from Lübeck itself."}, {"id": 59, "section": "V", "section_title": "Hanseatic losses in the taking of Adrian Johnson's ship", "title": "Inventory of the goods of Hanseatic merchants from the Cologne Third56 trading with England lost in the taking of the ship of Adrian Johnson, drawn up in the presence of Henning Kulemeiger, the secretary of the London Counter, and the Lübeck councillors Nicholas Bardewick and Hermann Schute and authenticated by the notary Nicholas", "date": "", "location": "", "language": "Latin", "content": "Item anno Domini 1533 in der 6ten indiction ahm 19. dage des mnts Octobris sinth\ndusse nascreven marck up den vorscreven baln unde gude vortekent, welch gudt in Adrian\nJohanßen vorbenannt sinem schepe is geweßen, in biwesend hern Nicolaus Bardewick\nund her Hermen Schutenna besichtiget und affgetekent worden gelick we hir nafolget,\njodoch durch furderinge des achtbarn hern magister Hennyngus Kulemeiger clerich eins\nersamen kopmans tho Lunden inb Engelanth upt Stallhoff residerund secret duth sulvige\nuth gunst und vorlove eins erbarn radmann alhir tho Lubgk den koppluden des Kolschen\ndurdendels thom besten gescheen etc.\nItem twee Oustburger fustewn baln gemarcket aldus [merchant’s mark no. 1 in the\n[1.]\nright margin] und sossuntwinttich stucke missing drades aldus gemarcket [merchant’s mark\nno. 2 in the right margin]\n[2.]\nright margin].\n[3.]\nmargin].\n[4.]\n[5.]\n[6.]\n[7.]\n[8.]\n\nItem ein vatken mith siden gemarcket aldus [merchant’s mark no. 5 in the right margin].\nItem ein packen gemarcket aldus [merchant’s mark no. 6 in the right margin].\nItem ein klein kistken aldus gemarcket [merchant’s mark no. 7 in the right margin].\nItem ein tunnicken gemarcket aldus [merchant’s mark no. 8 in the right margin].\nItem noch vath gemarcket aldus [merchant’s mark no. 9 in the right margin].\n\nItem ein vath mith kramgude gemarcket aldus [merchant’s mark no. 4 in the right\n\nItem ein pack mitth sagen offte arsch aldus gemarcket [merchant’s mark no. 3 in the\n\nTuge: her Hinrick Kordes und Tyle Lutguwe\nNicolaus Klone manu propria scripsit\n\na befest follows, struck through HL.\n\nb erge follows, struck through L.\n\n  56  As the name suggests, these merchants were from the western Third of the Hanse. Note that this list includes\n\nnot only goods of Cologne merchants, but also of one from Deventer (Roleff Vos § 7) and another from Wesel\n(Richard Engelbarth § 3). These two towns belonged to the Cologne Third.\n\n  57  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.", "editorial_notes": "1)\n2)\n3)\n4)\n5)\n6)\n7)\n8)\n9)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 6rv. (original classification\nby Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn up\nby Michael Petri in 1525, indictione tercia, Monday 23 ... Contemporaneous\ncopy. Unsealed.57", "file": "catalogued/doc_59.md", "modern_english_translation": "Item in the year of the Lord 1533, in the 6th indiction, on the 19th day of the month of October, the following marks were recorded on the aforesaid bales and goods — which goods were in the ship of the above-named Adrian Johansen — and were inspected and listed in the presence of lords Nicholas Bardewick and Hermann Schute, as follows, however brought about through the efforts of the honorable lord Master Henning Kulemeiger, cleric, secretary of the honorable merchant community at London in England, resident at the Steelyard [Note: the Kontor, or Hanseatic trading post, in London], this being done out of goodwill and with the leave of an honorable councillor here in Lübeck, for the benefit of the merchants of the Cologne Third [Note: one of the three administrative divisions of the Hanseatic League, grouping the western Hanseatic towns including Cologne].\n\n[1.] Item two bales of Osnabrück fustian [Note: a type of heavy cotton cloth from Osnabrück] marked thus [merchant's mark no. 1 in the right margin] and twenty-six pieces of brass wire marked thus [merchant's mark no. 2 in the right margin].\n\n[2.] Item one cask with silk marked thus [merchant's mark no. 5 in the right margin].\n\n[3.] Item one pack marked thus [merchant's mark no. 6 in the right margin].\n\n[4.] Item one small chest marked thus [merchant's mark no. 7 in the right margin].\n\n[5.] Item one small barrel marked thus [merchant's mark no. 8 in the right margin].\n\n[6.] Item another cask marked thus [merchant's mark no. 9 in the right margin].\n\n[7.] Item one cask with haberdashery goods marked thus [merchant's mark no. 4 in the right margin].\n\n[8.] Item one bale with saws or the like marked thus [merchant's mark no. 3 in the right margin].\n\nWitnesses: lord Hinrick Kordes and Tyle Lutguwe.\nNicholas Klone wrote this with his own hand.\n\n---", "summary": "A notarial inventory dated 19 October 1533 listing eight packages of goods belonging to Hanseatic merchants of the Cologne Third that were found aboard Adrian Johansen's ship, drawn up at Lübeck in the presence of councillors Nicholas Bardewick and Hermann Schute and facilitated by Henning Kulemeiger, secretary of the London Steelyard. Goods are identified by merchant marks and include fustian cloth, brass wire, silk, haberdashery, and saws.", "document_type": "inventory", "themes": ["trade", "cargo", "legal_proceedings", "maritime", "goods_seizure", "notarial", "textile_trade"], "people_mentioned": ["Nicholas Bardewick", "Hermann Schute", "Henning Kulemeiger", "Hinrick Kordes", "Tyle Lutguwe", "Nicholas Klone", "Adrian Johansen"], "goods_mentioned": ["Osnabrück fustian", "brass wire", "silk", "haberdashery goods", "saws"], "notable": true, "notable_reason": "Provides a concrete itemised record of Hanseatic merchant goods seized from the ship, with reference to the London Steelyard's involvement in the recovery process, illustrating the transnational commercial networks disrupted by the privateering action."}, {"id": 60, "section": "V", "section_title": "Hanseatic losses in the taking of Adrian Johnson's ship", "title": "Inventory of a vat [belonging to the Cologne merchant Peter Slotkyn]58 taken in Adrian Johnson’s ship, drawn up in the presence of Henning Kulemeier [secretary of the London Counter] and the Lübeck councillors Nicholas Bardewick and Hermann [Schute] and authenticated by the notary Nicholas Klne", "date": "[15]33 Oct", "location": "Lübeck", "language": "Low German", "content": "Item anno etc. 33 den 20ten dach Octobris is durch furderinge des achtbarrn hern magister\nHennyngus Kulemeier60 vorbonantt und ock in bywesende hern Nicolaus Bardewick\nund her Hermen ein vath gemarket aldus [merchant’s mark no. 1 follows] upgesclagen unde\nbosichtiget worden, worinne gefunden ethliche flocken myt pappir gewunden darmidden\nmanck ein klein lynnen pungeken myt gelde. Dat sulvige mith dussem marck [merchant’s\nmark no. 2 follows] vorsegelt, bovestuget und bekrefftiget worden.\n\nTuge: Marcus Luthmar, Siverth Kck, Clawes Haselouwe\n\nDusse boßetn burgers alle hir to sunderlinx geeschet und geboden.\n\nIta est ut supra, quod ego Nicolaus Klne meo cyrographo attestor.\nActum in Lubegk anno Domini ut supra, ad id notarius rogatus et\nrequisitus.\n\n  58  This is demonstrated by the merchant’s marks. Mark no. 1 here is identical with No 42 marks 25 & 51, no. 43 marks\n26 & 43, no. 62 mark 9 and no. 63 mark 6, where Slotkyn is named. Mark no. 2 here is identical with no. 63 Mark 7,\nwhere Slotkyn is named.\n\n  59  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.\n\n  60  Secretary of the London Counter.\n\n\n1 95", "editorial_notes": "1)\n2)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 7r. (original classification by\nDreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn up\nby Michael Petri in 1525, indictione tercia, Monday 23 ... Contemporaneous\ncopy. Unsealed.59", "file": "catalogued/doc_60.md", "modern_english_translation": "Item in the year etc. 33, on the 20th day of October, through the efforts of the honorable lord Master Henning Kulemeier aforesaid, and also in the presence of lords Nicholas Bardewick and Hermann [Schute], one cask marked thus [merchant's mark no. 1 follows] was opened and inspected, in which were found several bundles wrapped in paper, and among them a small linen purse with money. The same was sealed, confirmed, and authenticated with this mark [merchant's mark no. 2 follows].\n\nWitnesses: Marcus Luthmar, Sivert Kock, Claus Haselouwe.\n\nAll these established citizens were specially called and summoned here for this purpose.\n\nThis is as stated above, which I, Nicholas Klone, attest with my own hand. Done at Lübeck in the year of the Lord as above, the notary having been called upon and required for this purpose.", "summary": "A brief notarial record from 20 October 1533, documenting the opening and inspection of a single cask found in Adrian Johansen's ship at Lübeck, which was found to contain paper-wrapped bundles and a small linen purse with money. The cask was then resealed and authenticated with a merchant mark, with the proceedings attested by three citizen witnesses and notary Nicholas Klone.", "document_type": "inventory", "themes": ["trade", "cargo", "legal_proceedings", "maritime", "goods_seizure", "notarial", "financial", "personal_property"], "people_mentioned": ["Henning Kulemeier", "Nicholas Bardewick", "Hermann Schute", "Marcus Luthmar", "Sivert Kock", "Claus Haselouwe", "Nicholas Klone", "Peter Slotkyn"], "goods_mentioned": ["linen purse", "money"], "notable": true, "notable_reason": "The discovery of a linen purse containing money inside a sealed cask is a rare detail of personal or liquid assets being transported alongside commercial cargo, and the careful resealing and authentication of the cask reflects the council's procedural diligence in preserving merchant property."}, {"id": 61, "section": "V", "section_title": "Hanseatic losses in the taking of Adrian Johnson's ship", "title": "Inventory of goods of Cologne merchants taken in the ship of Adrian Johnson, drawn up in the presence of Jacob von der Mulln and the Lübeck councillors Nicolas Bardewick and Hermann Schute and authenticated by the notary Nicholas Klne", "date": "1533 Nov", "location": "", "language": "Low German", "content": "Item viffundveerttich butzen mith siden Johan Borne thobehorunde aldus gemarcket\n\nItem noch twee baln mith sardoke Johann Kamman thobehorende aldus gemarcket\n\nItem ein klein kistken mith glesen und einen sclachdock Dirick Horner thohorich\n\nItem anno 1533 in der 6ten indiction, ahm 6ten dage des mnts Novembris hefft Jacob\nvon der Mulln uth vorlove eins erbarn ratmann, ock in byweßende der ersamen hern her\nNicolaus Bardewick und her Hermenn Schutenn dusse nascreven gudere entfangen, de\nwelck uth Adrian Johanßen sinem schepe gelosset und vort in Hinrick Krons bowede\nunder Engelantes gehisset wern.\n[1.]\naldus gemarcket [merchant’s mark no. 1 in the right margin].\n[2.]\n[merchant’s mark no. 2 in the right margin].\n[3.]\n[merchant’s mark no. 3 in the right margin].\n[4.]\nItem noch ein klein tunneken hort einem armen jungen tho aldus gemarcket\n[merchant’s mark no. 4 in the right margin] und von duth marck schall Jacob vorbenannt\ndem erbarn rade alhir tho Lubk ein certification schaffen und thon handen kamen lathen.\n[5.]\nItem noch sossundtwinttich stuck kopperdraden Johann Kamman thobehorunde\ngemarcket aldus [merchant’s mark no. 5 in the right margin] und von duth marck schall ock\nde vorbenande Jacob certification schaffen etc.\nItem noch ein vath mith sosstich butzen und ein sclachline gemarket aldus [merchant’s\n[6.]\nmark no. 6 follows] Peter Sclotzke thobehorund, dar midden manck den vorgerurden butzen\neinen lynnen bundell gemarcket aldus [merchant’s mark no. 7 follows], darinne veer hunder\nsunnen kronen Peter Heinebach thobehorund. In dem sulven budel noch ein klein ander\npungeken gefunden aldus gemarket [merchant’s mark no. 8 follows], darinne gefunden\ntweeundverttigest halve engellutthen Hermen Suderman thobehorund.\n\nTugea: Her Albert Kleve und Adrian Johanßen\n\n  61  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.\n\n\nIta est ut supra, quod ego Nicolaus Klne meo cyrographo attestor.\nActum in Lubgk anno Domini ut supra ad id notarius rogatus et\nrequisitus.", "editorial_notes": "a Herman follows, struck through HL.\n1)\n2)\n3)\n4)\n5)\n6)\n7)\n8)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 7v-8r. (original classification\nby Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn up\nby Michael Petri in 1525, indictione tercia, Monday 23 ... Contemporaneous\ncopy. Unsealed.61", "file": "catalogued/doc_61.md", "modern_english_translation": "Item, forty-five bundles of silk belonging to Johann Borne, marked thus [merchant's mark no. 1 in the right margin].\n\nItem, also two bales of sardoc [Note: a type of woolen cloth] belonging to Johann Kamman, marked thus [merchant's mark no. 2 in the right margin].\n\nItem, one small chest with glassware and a slaughter-cloth [Note: a type of protective cloth] belonging to Dirick Horner.\n\nItem, in the year 1533, in the 6th indiction, on the 6th day of the month of November, Jacob von der Mulln, with the permission of an honorable council member, and also in the presence of the honorable lords Nicolaus Bardewick and Hermann Schuten, received the following goods, which had been unloaded from Adrian Johanssen's ship and subsequently hoisted into Hinrick Krons's warehouse under the Englishmen's [district].\n\n[1.]\nMarked thus [merchant's mark no. 1 in the right margin].\n\n[2.]\n[merchant's mark no. 2 in the right margin].\n\n[3.]\n[merchant's mark no. 3 in the right margin].\n\n[4.]\nItem, also one small cask belonging to a poor young man, marked thus [merchant's mark no. 4 in the right margin]; and for this mark the aforementioned Jacob shall procure a certificate for the honorable council here in Lübeck and have it delivered into their hands.\n\n[5.]\nItem, also twenty-six pieces of copper wire belonging to Johann Kamman, marked thus [merchant's mark no. 5 in the right margin]; and for this mark the aforementioned Jacob shall likewise procure a certificate, etc.\n\nItem, also one vat with sixty bundles and one slaughter-cord, marked thus [merchant's mark no. 6 follows], belonging to Peter Sclotzke; among the aforementioned bundles, a linen parcel marked thus [merchant's mark no. 7 follows], containing four hundred sun-crowns [Note: a gold coin, the écu au soleil] belonging to Peter Heinebach. In the same parcel yet another small purse was found, marked thus [merchant's mark no. 8 follows], in which were found forty-two and a half angel-nobles [Note: English gold coins] belonging to Hermen Suderman.\n\n[6.]\n\nWitnesses: Lord Albert Kleve and Adrian Johanssen.\n\nSo it is as stated above, which I, Nicolaus Klne, attest with my own signature. Done in Lübeck in the year of the Lord as stated above, I, the notary, having been requested and called upon.\n\n---", "summary": "A notarially authenticated inventory, drawn up in November 1533, of goods belonging to several Cologne merchants that were unloaded from Adrian Johnson's seized ship and stored in a Lübeck warehouse. The document records specific items including silk, woolen cloth, glassware, copper wire, currency (sun-crowns and angel-nobles), and personal effects, with each lot identified by a merchant's mark.", "document_type": "inventory", "themes": ["trade", "piracy", "legal_proceedings", "cargo", "goods_seizure", "maritime", "notarial", "financial", "personal_property"], "people_mentioned": ["Jacob von der Mulln", "Nicolas Bardewick", "Hermann Schute", "Nicholas Klne", "Johann Borne", "Johann Kamman", "Dirick Horner", "Peter Sclotzke", "Peter Heinebach", "Hermen Suderman", "Albert Kleve", "Adrian Johanssen", "Hinrick Krons"], "goods_mentioned": ["silk bundles", "sardoc (woolen cloth)", "glassware", "slaughter-cloth", "copper wire", "sun-crowns (écu au soleil)", "angel-nobles (English gold coins)"], "notable": true, "notable_reason": "Unique record of gold coins (both French sun-crowns and English angel-nobles) found hidden within a linen parcel among seized cargo, providing rare evidence of specie being smuggled or transported aboard merchant vessels."}, {"id": 62, "section": "V", "section_title": "Hanseatic losses in the taking of Adrian Johnson's ship", "title": "Unnamed [Cologne] merchant to Johannes Borne [of Cologne]: Requests his assistance, when he arrives in Lübeck, in the recovery of a tun containing clothing and other goods belonging to [a poor young merchant of Cologne, recently settled in England]", "date": "s", "location": "l", "language": "Low German", "content": "Unsealed. On the dorse: Jan Borne.62\n\nLaus Deo\n\nWussett liebe Johann goette freuntt, als ihr in Lubeck kompft, soe wiltt doch auch mitt\nnach dÿner tonnen fraghen. Daer sientt kleÿder in gewest, und die tonne ist gemercktt\nmitt dieser marke [merchant’s mark no. 1 in the right margin]. Gehurtt einem gesellen, zu der\nist nun kurtzlig ihn Engellantt gezogen und ist Johan Borne diener. Der hatt auch etlich\ngoett daer beÿ. Soe hatt sich Johann Born mitt ihn den brieff laessen schryven, den unse\nherren daerhyn senden werden, und watt vor goett daerbey hatt, soe hain mir dise nichts\ngewyst, das unse herren umb das goett geschreven hain, soe doett ihr doch das beste und\nfordertt daer nach, das man es weder mochtt kryghen. Ist sach, das es weder zun henden\nkompftt, sal man euch einen goett drinck pennig schencken.\n\nItem nemlich sientt diese kleider daer ihn gleich hier nach geschreven\n\nein tannetten Engellythe underrock\nein swartz worstein wambs\nein swartz sardoigs wambus\nzwey parr swartzer hoesens\n\n  62  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed inverted breve in order to\n\ndistinguish it from two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.\n\n\n1 97\n\nein cotten cammellott culler\neinen swartzen ledderen culler\nItem noch zweÿ swartzer vell und funff hembder\nnoch zwey parr schoen\nnoch zwein scheffen koecken und anders etlich dings mer als buecher und suneftucher\n\nund anders mer, das gelts wertt ist.\n\nLiebe Johann, so wiltt doch das beste doen. Man soll euch woll daer von loenen.\nDiesen brieff sultt ihr zu Lubeck gheven meynes herrn diener. Der ist daer waell bekantt.\nDer sal euch auch woll behulplich sein. Ihr sultt ihm wynkeller nach ihm fraghen. Daer\nsullen sei euch woll bescheid.\n\n1)\n\nGoods belonging to other Hanseatic merchants", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 4. Original holograph letter. Paper.", "file": "catalogued/doc_62.md", "modern_english_translation": "Praise be to God.\n\nKnow, dear Johann, good friend, that when you arrive in Lübeck, please also make enquiry about your tun. There were clothes in it, and the tun is marked with this mark [merchant's mark no. 1 in the right margin]. It belongs to a fellow who has recently moved to England and is a servant of Johan Borne. He also has certain goods there with it. So Johann Born had himself included with him in the letter which our lords will be sending there; and as for what goods he has with it, we had no knowledge that our lords had written about the goods, so do your best and press for it, that one might get it back. If it does come back to hand, you shall be given a good drink-money [Note: a gratuity].\n\nItem, namely these are the clothes that are therein, as written hereafter:\n\none taffeta English underskirt\none black worsted doublet\none black sardonet doublet\ntwo pairs of black hose\n\none cotton camlet collar [Note: camlet was a fine fabric, often of mixed wool and silk]\none black leather collar\nItem, also two black pelts and five shirts\nalso two pairs of shoes\nalso two wooden kitchen pots and other sundry things, such as books and fine cloths\n\nand other things more, which are worth money.\n\nDear Johann, do your best then. You will be well rewarded for it. You shall deliver this letter to my lord's servant in Lübeck. He is well known there. He shall also be of help to you. You shall ask for him at the wine-cellar. They will give you directions there.\n\n---", "summary": "An undated letter from an unnamed Cologne merchant to Johann Borne requesting him, upon arriving in Lübeck, to press for the return of a tun of personal clothing and goods belonging to a young merchant recently settled in England. The letter provides a detailed itemized list of the clothing contents of the tun and promises a gratuity for success.", "document_type": "letter", "themes": ["goods_seizure", "restitution", "personal_property", "textile_trade", "diplomacy"], "people_mentioned": ["Johann Borne", "Johan Borne"], "goods_mentioned": ["taffeta English underskirt", "black worsted doublet", "black sardonet doublet", "black hose", "cotton camlet collar", "black leather collar", "black pelts", "shirts", "shoes", "wooden kitchen pots", "books", "fine cloths"], "notable": false}, {"id": 63, "section": "V", "section_title": "Hanseatic losses in the taking of Adrian Johnson's ship", "title": "Heinrich Houwide, citizen of Bremen, acknowledges receipt of goods taken in Adrian Johnson’s ship from Nicholas Bardewick and Hermann Schute, acting for the Lübeck council", "date": "[15]33 Sept", "location": "[Lübeck]", "language": "Low German", "content": "Item anno etc. 33 den 27ten dach des mnts Septembris don entfenck Hinrick Houwide\n[1.]\nburger tho Bremen von dussen vorscreven gudera [namely those in Adrian Johnson’s ship:\nno. 42] elven stcke balun al gemarcket aldus [merchant’s mark no. 1 follows] uth vorlous\neins erbarun rades.\nItem noch entfenck Hinrick Houwide vorbenantt von demsulven vorscreven\n[2.]\ngude in namen und stdt Albert Kreiens twen balun myt mandelun gemarcket aldus\n[merchant’s mark no. 2 follows] dut sulve is ock geschen uth vorlous eins erbarn rades und\nin byweswescende der ersamen hern her Nicolaus Bardewick und her Hermen Schuten.\n\nTuge: her Hinrick Kordes und Tyle Lutzouwe\n\nNicolaus Klone manu propria scripsit\n\na twolff stucke follows, struck through L.\n\n  63  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed breve (ŭ) in order to distinguish it\n\nfrom two minims. Since this has no effect on the pronunciation of the word, it is transcribed as ‘u’.", "editorial_notes": "1)\n2)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 5v. (original classification by\nDreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn up\nby Michael Petri in 1525, indictione tercia, Monday 23 ... Contemporaneous\ncopy. Unsealed.63", "file": "catalogued/doc_63.md", "modern_english_translation": "Item, in the year etc. 33, on the 27th day of the month of September, Hinrick Houwide,\n\n[1.]\ncitizen of Bremen, received from the aforesaid goods [namely those in Adrian Johnson's ship: no. 42] eleven pieces of bales, all marked thus [merchant's mark no. 1 follows], with the permission of an honorable council.\n\nItem, the aforementioned Hinrick Houwide also received from the same aforesaid\n\n[2.]\ngoods, in the name and stead of Albert Kreien, two bales with almonds, marked thus [merchant's mark no. 2 follows]. This too was done with the permission of an honorable council and in the presence of the honorable lords Nicolaus Bardewick and Hermen Schuten.\n\nWitnesses: Lord Hinrick Kordes and Tyle Lutzouwe.\n\nNicolaus Klone wrote this with his own hand.\n\n---", "summary": "A brief receipt dated 27 September 1533, recording that Heinrich Houwide, a citizen of Bremen, received eleven bales of goods and two bales of almonds from the seized cargo of Adrian Johnson's ship, with the release authorized by the Lübeck council and witnessed by councillors Bardewick and Schute. The almonds were received on behalf of a merchant named Albert Kreien.", "document_type": "receipt", "themes": ["goods_seizure", "restitution", "cargo", "legal_proceedings", "food_trade", "maritime"], "people_mentioned": ["Hinrick Houwide", "Nicolaus Bardewick", "Hermen Schuten", "Albert Kreien", "Hinrick Kordes", "Tyle Lutzouwe", "Nicolaus Klone"], "goods_mentioned": ["bales (unspecified contents)", "almonds"], "notable": false}, {"id": 64, "section": "V", "section_title": "Hanseatic losses in the taking of Adrian Johnson's ship", "title": "Hieronymus Molhusen [of Lübeck] to Hermann Schute, town councillor of Lübeck, regarding losses of Hanseatic merchants in the taking of Adrian Johnson’s ship", "date": "[1533 Oct", "location": "Lübeck]", "language": "Low German", "content": "of his goods. Equally clear, however, is that Molhusen at the time of writing\nwas in Lübeck, since he states that Hynrick im Wynckel, eyn fulmechtyger\nvan Collen, had been hyr tho Lubeck. It is tempting to identify Molhusen\nwith the ‘man of the city of Lübeck,’ whom Jörn 1998, p. 186 states Henry VIII\nat the instigation of his council on 7 Sept. 1533 intended to send to Lübeck to\ndemand the return of the English goods. However, this is not the case. Jörn\nmisread his source (LP VI, no. 1125). The council decided that the king should\n‘send a man to [not ‘of’] the city of Lübeck’ for this purpose. However, goods\nwith these two merchants’ marks in this letter were included in the inventories\nof goods taken in Johnson’s ship on 13 & 15 Sept. (Mark 1 here = no. 41, mark\n20, § 22; no. 42, mark 21, § 22; Mark 2 here = no. 41, mark 12, § 12, no. 42 mark\n13 § 13). They were also included in the list of the goods of merchants of the\nCologne Third drawn up on 19 Oct. (No. 59, mark 8, § 7, and mark 4, § 3). By\nthe time Lübeck had been advised of the names of the Cologne merchants (on\nor shortly before 6 Nov. 1533), they no longer were included in the inventory, a\nclear indication that Schute had heeded Molhusen’s request to keep an eye\nout for goods with these marks and excluded them from the inventory drawn\nup on 6 Nov. because they were not Cologne goods (as Molhusen states).\nTherefore Molhusen’s letter must have been written between 19 Oct. and 6\nNov. 1533, and probably closer to the later date.64\n\n  64  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or a breve\n(ŭ) in order to distinguish it from two minims. Since this has no effect on the pronunciation of the word, they are\ntranscribed as ‘u’.\n\n\n1 99\n\nErsame und vorsychtyge her Harmen Schute! Juwer ersamheyth gelevet tho weten, dat\ndorch unse uthlyggers under Engelanth ane hoy Adrian Johansen genomet is angetastet\nworden, worinne eyn geselle, in der Hansa van Deventer gebaren, Roleff Vos genomet\n1 droge vatken myt dyssem mercke [merchant’s mark no. 1 in the left margin] gehat heft.\nDarinne scholen syn 37 stucke Bruggesch settyn, wo denne de verwe und tere genochsam\nna wysende wert ene fulmacht, de ick hebbe van dem ersamen copmanne in Engelanth\nresiderende, dem geliken dessulven Roleff Vos sine egen hantschrift.\n\nNoch sal darinne gewest syn ene kyste und eyn vatken [merchant’s mark no. 2 in the\nleft margin] enem manne van Wesel, int lant tho Cleve gebaren, nu averst in Engelanth\nwanend,65 tokomen, worvan her Marcus Meyger ock bevel heft, so averst de lude nu\nhoren, den luden ere guder wedder ghegeven werden und darup eyn fulmechtyger van\nCollen myt namen Hynrick im Wynckel hyr tho Lubeck gewest is und de guder am dele\nentfangen heft weten averst nycht eft ere guder ock mede loes ghegeven und vana dem\nvulmechtyger entfangen syn. Heft derhalven de bavengescreven Roleff Vos my vor dem\ncopmanne tho Lunden, syne gder tho entfangen, vulmechtych gemaket, de ander averst\nheft her Marcus Meyger und my dar beneven syne guder thob vorende gebeden. In dem\nnu sodane guder van bavengescreven mercken noch vorhanden weren und eyn ersam rath\nsampt juwer leve dartho geneget weren, wolde ick juwe ersamheyth fruntlick gebeden\nhebben, ghy so wol wolden gedan hebben und na sodanen mercken sen wolden und my\ndar eyn gudtlyck andtwert up geven wolden. Wor ick juwer ersamheyt wedder tho denste\nund wyllen syn kan, wyl ick na mynem vormoge alle tydt gudtwyllych gefunden werden.\nWyl Godt, dem ich juwe ersamheyth bevele.\n\na Corrected in L from vande. b erst follows, struck through L.\n\n[signed] Jheronimus Molhusen", "editorial_notes": "1)\n2)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 1. Original. Paper. Unsealed.\nDating: This letter, although undated, must be fairly early, since Molhusen records\nthe fact that Richard Engelbarth had named Marcus Meyer as his attorney\nfor the recovery of his goods. Meyer, however, was arrested on or before 21\nAug. 1533 (LP VI, no. 1012) and initially brought to Dover. He was still in\ncustody (if by now in London) on 8 Sept. (No. 35 supra) and was granted\nleave to depart from England on 10 Dec. 1533 (LP VI, no. 1595 (9)). Clearly,\nMolhusen was in London when this happened, since he records the fact that\nRoleff Vos nominated him in the presence of the inhabitants of the London\nCounter (vor dem copmanne tho Lunden) as his attorney for the recovery", "file": "catalogued/doc_64.md", "modern_english_translation": "Honorable and prudent Lord Harmen Schute! Your honor should know that by our privateers [Note: Lübeck's authorized raiders] operating under England, a ship named after Adrian Johansen was seized, in which a fellow, born into the Hanse [Note: the Hanseatic League] in Deventer, named Roleff Vos, had one dry small cask with this mark [merchant's mark no. 1 in the left margin]. Therein should be 37 pieces of Bruges satin [Note: \"Bruggesch settin,\" a high-quality silk fabric from Bruges], as the color and quality will sufficiently indicate, along with a power of attorney which I hold from the honorable merchant residing in England, likewise Roleff Vos's own handwriting.\n\nAlso therein should have been a chest and a small cask [merchant's mark no. 2 in the left margin] belonging to a man born in Wesel, in the land of Cleves, but now residing in England, for whom Lord Marcus Meyger also has authority. However, as people now hear, the goods are being returned to their owners, and accordingly a representative of Cologne by the name of Hynrick im Wynckel has been here in Lübeck and has received part of the goods. They do not know, however, whether their goods were also released and received by the representative. The aforementioned Roleff Vos has therefore granted me full power of attorney before the merchant community in London to receive his goods; the other man, however, has asked Lord Marcus Meyger and me alongside him to bring his goods. Since goods with the above-mentioned marks are still present, and an honorable council together with your honor are disposed toward this matter, I would wish to make a friendly request of your honor that you be so good as to look out for goods bearing such marks and give me a favorable answer thereon. Wherever I can be of service and goodwill to your honor, I will at all times be found ready and willing. God willing, to whom I commend your honor.\n\n[signed] Jheronimus Molhusen\n\n---", "summary": "A letter from Hieronymus Molhusen of Lübeck to councillor Hermann Schute, seeking assistance in recovering goods belonging to Roleff Vos (a Hanse-born merchant from Deventer) and an unnamed merchant from Wesel, both seized from Adrian Johnson's ship. Molhusen holds powers of attorney for both men and notes that a Cologne representative has already retrieved some goods, prompting urgency regarding the remaining lots.", "document_type": "letter", "themes": ["goods_seizure", "restitution", "legal_proceedings", "trade", "maritime", "diplomacy", "textile_trade"], "people_mentioned": ["Hieronymus Molhusen", "Harmen Schute", "Roleff Vos", "Marcus Meyger", "Hynrick im Wynckel"], "goods_mentioned": ["Bruges satin", "dry cask contents (unspecified)", "chest contents (unspecified)"], "notable": true, "notable_reason": "Explicitly names Lübeck's privateers as the agents of seizure and references the broader network of legal powers of attorney and merchant representatives operating across London, Lübeck, and Cologne to recover goods, illustrating the transnational legal mechanisms mobilized in response to the seizure."}, {"id": 65, "section": "V", "section_title": "Hanseatic losses in the taking of Adrian Johnson's ship", "title": "On 1 June 1534 Hermann Schute, councillor of Lübeck,66 at the behest of the Lübeck council, dem erhafftychen und furnemen manne m[agister] Johan Vorhorde – de wyle de sulve myt den erbarnen, vorsichtigen und hochwyßen heren her Gerth Odingborg67 und her Hans van Elphram68 ock rathmanne to Lubeck alse gesandte", "date": "", "location": "", "language": "Low German", "content": "On 1 June 1534 Hermann Schute, councillor of Lübeck,66 at the behest of the Lübeck\ncouncil, dem erhafftychen und furnemen manne m[agister] Johan Vorhorde – de\nwyle de sulve myt den erbarnen, vorsichtigen und hochwyßen heren her Gerth\nOdingborg67 und her Hans van Elphram68 ock rathmanne to Lubeck alse gesandte\nlegaten an konincklike majestat to Engellandt myth geschichten secretario – vorreket,\n\n  65  As the merchant’s mark in the margin shows, this was Richard Engelbarth.\n  66  Ratslinie no. 619, councillor from 1528.\n  67  Ratslinie no. 629. He had previously belonged to the Committee of 64 (Wullenwever’s power base) and was\n\nelected to the council on 27 Apr. 1531.\n\n  68  Ratslinie no. 640 ( Johann von Elpen). He had previously belonged to the Committee of 64 (Wullenwever’s power\n\nbase) and was elected to the council on 21 Feb. 1533.\n\n\naveranthwordet und gelevert eyn droge cram afata dor czum gude inne was und\neyn verkanthe grothe kyste offt packe gemarket aldus (merchant’s mark no. 1 in the\nleft margin), dat thohorde Richgart Engelbarth eyn Ludeschen kopman wanende\nim konninckrycke tho Engellantb.69 Duth droge cromfaet und verkanthe kyshte\neffte packe hefft obgenannte m[agister] Johanne Vorhorde also van her Hermen\nSchuten entfangen und de sulvige Richgart Engelbarth wedder to leverende und\ntor handen to scaffen gelavet. Actum Lubeck sub anno et die, prout supra. — 1534\nJune 1. Lübeck.\n\nHL AHL ASA, Externa Anglicana 476, no. 23, f. 32r. (original classification\nby Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn\nup by Michael Petri in 1525, indictione tercia, Monday 23 ... Superscribed:\nJohannes Vorhorde. Contemporaneous copy. Unsealed.70\n\na-a Interlined HL. b Two expunged words follow HL.\n\n1)\n\n  69  Odingborg and Elphram had been accredited as Lübeck’s ambassadors to England on 31 May 1534 (LP VII,\n\nno. 737, printed Foedera, vol 14, p. 539-40). Lübeck’s instructions for its representatives, which prior to World\nWar II were held in the Lübeck Civic Archives (AHL ASA, Externa Anglicana no. 047) have gone missing\n(Simon 2010, p. 13). The accreditation makes no mention of Vorhonde.\n\n  70  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or an\n\ninverted breve in order to distinguish it from two minims. Since this has no effect on the pronunciation of the\nword, they are transcribed as ‘u’.", "editorial_notes": "", "archival_reference": "", "file": "catalogued/doc_65.md", "modern_english_translation": "On 1 June 1534, Hermann Schute, councillor of Lübeck, at the behest of the Lübeck council, delivered and handed over to the worthy and distinguished man, Master Johan Vorhorde — given that he was accompanying the honorable, prudent, and most wise lords Gerth Odingborg and Hans van Elphram, also councillors of Lübeck, as appointed ambassadors to the royal majesty of England together with the appointed secretary — one dry merchandise cask in which goods were contained, and one square large chest or bale, marked thus [merchant's mark no. 1 in the left margin], belonging to Richard Engelbarth, a Hanseatic merchant residing in the kingdom of England. The aforementioned Master Johan Vorhorde received the said dry merchandise cask and square chest or bale from Lord Hermen Schuten as stated, and gave his promise to deliver and hand them over to the said Richard Engelbarth. Done at Lübeck in the year and on the day as stated above. — 1 June 1534. Lübeck.\n\n---", "summary": "A memorandum dated 1 June 1534 recording that Lübeck councillor Hermann Schute, acting on the council's behalf, handed over a merchandise cask and a chest of goods belonging to Richard Engelbarth (a Hanseatic merchant in England) to Master Johan Vorhorde, who was accompanying the Lübeck ambassadors to the English king. Vorhorde formally undertook to deliver the goods to Engelbarth.", "document_type": "memorandum", "themes": ["restitution", "diplomacy", "trade", "maritime", "legal_proceedings"], "people_mentioned": ["Hermann Schute", "Johan Vorhorde", "Gerth Odingborg", "Hans van Elphram", "Richard Engelbarth"], "goods_mentioned": ["dry merchandise cask", "chest/bale (contents unspecified)"], "notable": true, "notable_reason": "Directly links the restitution of seized goods to a formal diplomatic embassy sent by Lübeck to the English crown, demonstrating that the recovery of individual merchants' property was folded into high-level state diplomacy."}, {"id": 66, "section": "VI", "section_title": "Goods taken in Spanish ships", "title": "On 20 Sept.
