<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message in a Bottle — Merchants' Letters, 1533</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
/* ── CSS VARIABLES ── */
:root {
  --parchment: #f2ece0;
  --parchment-warm: #ede5d5;
  --sepia: #3d2e1e;
  --sepia-mid: #5e4a35;
  --sepia-light: #8b7a66;
  --sepia-faint: #b3a792;
  --oxide: #8e3b2a;
  --oxide-light: #a85040;
  --oxide-faint: rgba(142, 59, 42, 0.12);
  --white: #f8f5ee;
  --rule: #d1c7b4;
  --rule-light: #ddd5c4;
  --shadow: rgba(61, 46, 30, 0.06);
}

/* ── RESET & BASE ── */
* { margin: 0; padding: 0; box-sizing: border-box; }

html { font-size: 17px; }

body {
  font-family: 'Crimson Pro', serif;
  background: var(--parchment);
  color: var(--sepia);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

/* Paper texture overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ── HEADER ── */
header {
  padding: 5rem 2rem 3rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}

header::before {
  content: '';
  position: absolute;
  top: 2.5rem;
  left: 50%;
  transform: translateX(-50%);
  width: min(600px, 80vw);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule), transparent);
}

header::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: min(600px, 80vw);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule), transparent);
}

.ornament {
  font-size: 0.7rem;
  color: var(--sepia-faint);
  letter-spacing: 0.5em;
  margin-bottom: 1.5rem;
}

header h1 {
  font-family: 'Libre Baskerville', serif;
  font-weight: 400;
  font-size: 2.4rem;
  line-height: 1.2;
  color: var(--sepia);
  letter-spacing: 0.03em;
  margin-bottom: 0.3rem;
}

header .subtitle-line {
  font-family: 'Crimson Pro', serif;
  font-weight: 300;
  font-size: 1.15rem;
  font-style: italic;
  color: var(--sepia-mid);
  letter-spacing: 0.02em;
}

header .desc {
  font-family: 'Crimson Pro', serif;
  font-weight: 400;
  font-size: 0.9rem;
  color: var(--sepia-light);
  max-width: 480px;
  margin: 1.5rem auto 0;
  line-height: 1.75;
}

/* ── NAV TABS ── */
nav.tabs {
  display: flex;
  justify-content: center;
  gap: 2rem;
  padding: 1rem 2rem;
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--parchment);
}

nav.tabs button {
  font-family: 'Crimson Pro', serif;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--sepia-faint);
  background: none;
  border: none;
  padding: 0.4rem 0;
  cursor: pointer;
  transition: color 0.2s;
  letter-spacing: 0.03em;
  border-bottom: 1.5px solid transparent;
}

nav.tabs button:hover { color: var(--sepia-mid); }

nav.tabs button.active {
  color: var(--sepia);
  border-bottom-color: var(--oxide);
}

/* ── MAIN ── */
main {
  max-width: 820px;
  margin: 0 auto;
  padding: 2rem 2rem 4rem;
}

/* ── FEATURED LETTER ── */
.featured {
  background: var(--white);
  border: 1px solid var(--rule-light);
  padding: 2.5rem 2.5rem 2rem;
  margin-bottom: 3rem;
  position: relative;
  cursor: pointer;
  transition: box-shadow 0.25s;
}

.featured:hover {
  box-shadow: 0 4px 20px var(--shadow);
}

.featured::before {
  content: 'FEATURED';
  position: absolute;
  top: -0.5rem;
  left: 2rem;
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.25em;
  color: var(--oxide);
  background: var(--parchment);
  padding: 0 0.75rem;
}

.featured .sender-line {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.3rem;
  line-height: 1.35;
  margin-bottom: 0.5rem;
}

.featured .sender-line .to {
  font-style: italic;
  font-weight: 400;
  color: var(--sepia-mid);
  font-size: 1rem;
}

.featured .meta-line {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--sepia-faint);
  letter-spacing: 0.05em;
  margin-bottom: 1rem;
}

.featured .excerpt {
  font-size: 1rem;
  font-style: italic;
  font-weight: 300;
  color: var(--sepia-mid);
  line-height: 1.75;
  border-left: 2px solid var(--oxide-faint);
  padding-left: 1.25rem;
  margin-bottom: 1rem;
}

.featured .summary-text {
  font-size: 0.88rem;
  color: var(--sepia-light);
  line-height: 1.7;
}

.read-link {
  display: inline-block;
  font-family: 'Crimson Pro', serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--oxide);
  text-decoration: none;
  margin-top: 1rem;
  cursor: pointer;
  transition: color 0.2s;
}

.read-link:hover { color: var(--oxide-light); }

/* ── SECTION DIVIDER ── */
.section-divider {
  text-align: center;
  margin: 2rem 0 1.5rem;
}

.section-divider h2 {
  font-family: 'Libre Baskerville', serif;
  font-weight: 400;
  font-size: 1.15rem;
  color: var(--sepia);
  display: inline;
  background: var(--parchment);
  padding: 0 1.5rem;
  position: relative;
}

.section-divider::before {
  content: '';
  display: block;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule), transparent);
  margin-bottom: -0.6rem;
}

/* ── SECTION HEADERS (Case File) ── */
.section-header {
  margin: 2.5rem 0 1rem;
  padding-bottom: 0.5rem;
  border-bottom: 1px solid var(--rule);
}

.section-header h3 {
  font-family: 'Libre Baskerville', serif;
  font-weight: 400;
  font-size: 1.05rem;
  color: var(--sepia);
}

.section-header .section-num {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--sepia-faint);
  text-transform: uppercase;
  display: block;
  margin-bottom: 0.25rem;
}

/* ── FILTERS ── */
.filters {
  display: flex;
  justify-content: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 2rem;
  align-items: center;
}

.filters .filter-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--sepia-faint);
  margin-right: 0.15rem;
}

.filter-pill {
  font-family: 'Crimson Pro', serif;
  font-size: 0.78rem;
  color: var(--sepia-faint);
  background: transparent;
  border: 1px solid var(--rule);
  border-radius: 20px;
  padding: 0.3rem 1rem;
  cursor: pointer;
  transition: all 0.2s;
}

.filter-pill:hover {
  border-color: var(--sepia-faint);
  color: var(--sepia-mid);
}

.filter-pill.active {
  background: var(--sepia);
  border-color: var(--sepia);
  color: var(--parchment);
}

.filter-sep {
  width: 1px;
  height: 1rem;
  background: var(--rule);
  margin: 0 0.5rem;
}

/* ── LETTER LIST ROWS ── */
.letter-list {
  display: grid;
  grid-template-columns: 1fr;
  gap: 0;
}

.letter-row {
  padding: 1.5rem 0;
  border-top: 1px solid var(--rule-light);
  display: grid;
  grid-template-columns: 3.5rem 1fr auto;
  gap: 1.5rem;
  align-items: start;
  cursor: pointer;
  transition: background 0.2s;
  opacity: 0;
  transform: translateY(8px);
  animation: fadeUp 0.4s ease-out forwards;
}

.letter-row:hover {
  background: rgba(248, 245, 238, 0.6);
  margin: 0 -1rem;
  padding-left: 1rem;
  padding-right: 1rem;
}

.letter-row:last-child { border-bottom: 1px solid var(--rule-light); }

.row-number {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.6rem;
  font-weight: 400;
  color: var(--rule);
  line-height: 1;
  padding-top: 0.15rem;
}

.row-body h3 {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.05rem;
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 0.3rem;
}

.row-body h3 .arrow {
  font-family: 'Crimson Pro', serif;
  font-weight: 300;
  font-style: italic;
  color: var(--sepia-mid);
  font-size: 0.9rem;
  margin: 0 0.2rem;
}

.row-body .summary {
  font-size: 0.85rem;
  font-weight: 300;
  color: var(--sepia-light);
  line-height: 1.65;
  max-width: 580px;
}

.row-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0.3rem;
  padding-top: 0.15rem;
  white-space: nowrap;
}

.row-meta .date {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--sepia-faint);
  letter-spacing: 0.05em;
}

.row-meta .lang {
  font-size: 0.72rem;
  font-style: italic;
  color: var(--sepia-faint);
}

.badge-notable {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--oxide);
  border: 1px solid var(--oxide);
  border-radius: 1px;
  padding: 0.15rem 0.4rem;
  margin-top: 0.2rem;
}

/* ── DOCUMENT LIST ROWS ── */
.doc-row {
  padding: 1.25rem 0;
  border-top: 1px solid var(--rule-light);
  display: grid;
  grid-template-columns: 3.5rem 1fr auto;
  gap: 1.5rem;
  align-items: start;
  cursor: pointer;
  transition: background 0.2s;
  opacity: 0;
  transform: translateY(8px);
  animation: fadeUp 0.4s ease-out forwards;
}

.doc-row:hover {
  background: rgba(248, 245, 238, 0.6);
  margin: 0 -1rem;
  padding-left: 1rem;
  padding-right: 1rem;
}

.doc-row:last-child { border-bottom: 1px solid var(--rule-light); }

.doc-row .row-body h3 {
  font-size: 0.95rem;
}

.badge-type {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--sepia-light);
  background: var(--parchment-warm);
  border-radius: 2px;
  padding: 0.15rem 0.45rem;
  margin-top: 0.2rem;
}

/* ── DETAIL OVERLAY & SLIDE-IN PANEL ── */
.detail-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(61, 46, 30, 0.25);
  backdrop-filter: blur(3px);
}

.detail-overlay.open { display: block; }

.detail-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: min(720px, 90vw);
  height: 100vh;
  background: var(--white);
  overflow-y: auto;
  box-shadow: -4px 0 24px var(--shadow);
  padding: 3rem 2.5rem 4rem;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

.detail-close {
  position: absolute;
  top: 1.25rem;
  right: 1.25rem;
  font-size: 1.5rem;
  color: var(--sepia-faint);
  background: none;
  border: none;
  cursor: pointer;
  width: 2rem;
  height: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
}

.detail-close:hover { color: var(--sepia); }

.detail-header {
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--rule-light);
}

.detail-header .number {
  font-family: 'Libre Baskerville', serif;
  font-size: 3rem;
  font-weight: 400;
  color: var(--rule);
  line-height: 1;
  margin-bottom: 0.5rem;
}

.detail-header h2 {
  font-family: 'Libre Baskerville', serif;
  font-size: 1.5rem;
  font-weight: 400;
  line-height: 1.3;
  margin-bottom: 0.75rem;
}

.detail-meta-row {
  display: flex;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.detail-meta-item {
  font-size: 0.78rem;
}

.detail-meta-item .meta-label {
  font-family: 'DM Mono', monospace;
  font-size: 0.55rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--sepia-faint);
  display: block;
  margin-bottom: 0.1rem;
}

.detail-meta-item .meta-value {
  color: var(--sepia-mid);
}

/* ── THEME TAGS ── */
.theme-tags {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-top: 0.75rem;
}

.theme-tag {
  font-family: 'Crimson Pro', serif;
  font-size: 0.7rem;
  font-style: italic;
  color: var(--sepia-light);
  background: var(--parchment);
  border: 1px solid var(--rule-light);
  border-radius: 12px;
  padding: 0.2rem 0.6rem;
}

/* ── DETAIL SECTIONS ── */
.detail-section {
  margin-bottom: 2rem;
}

.detail-section h3 {
  font-family: 'Libre Baskerville', serif;
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--sepia);
  margin-bottom: 0.6rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.detail-section h3::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--rule-light);
}

.detail-text {
  font-size: 0.9rem;
  line-height: 1.85;
  color: var(--sepia);
}

.detail-text.summary {
  font-style: italic;
  font-weight: 300;
  color: var(--sepia-mid);
  font-size: 0.95rem;
  line-height: 1.7;
}

.detail-text.original {
  font-size: 0.82rem;
  color: var(--sepia-light);
}

.detail-text p + p { margin-top: 0.75rem; }

/* ── TOGGLE BUTTONS ── */
.toggle-btn {
  font-family: 'Crimson Pro', serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--oxide);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0.35rem 0;
  display: flex;
  align-items: center;
  gap: 0.35rem;
  transition: color 0.2s;
}

.toggle-btn:hover { color: var(--oxide-light); }

.toggle-btn .chevron {
  font-size: 0.65rem;
  transition: transform 0.2s;
  display: inline-block;
}

.toggle-btn.expanded .chevron {
  transform: rotate(90deg);
}

.collapsible {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}

.collapsible.open {
  max-height: 3000px;
}

/* ── AI DISCLAIMER ── */
.ai-note {
  font-family: 'DM Mono', monospace;
  font-size: 0.58rem;
  color: var(--sepia-faint);
  border-left: 2px solid var(--rule);
  padding: 0.5rem 0.75rem;
  margin-top: 1rem;
  line-height: 1.7;
}

/* ── ABOUT PAGE ── */
.about-content {
  max-width: 640px;
  margin: 0 auto;
}

.about-content h2 {
  font-family: 'Libre Baskerville', serif;
  font-weight: 400;
  font-size: 1.4rem;
  color: var(--sepia);
  margin: 2.5rem 0 0.75rem;
}

.about-content h2:first-child {
  margin-top: 0;
}

.about-content p {
  font-size: 0.92rem;
  color: var(--sepia-mid);
  line-height: 1.8;
  margin-bottom: 0.75rem;
}

.about-content a {
  color: var(--oxide);
  text-decoration: none;
}

.about-content a:hover {
  text-decoration: underline;
}

.about-content .credit-list {
  list-style: none;
  padding: 0;
  margin: 0.5rem 0;
}

.about-content .credit-list li {
  font-size: 0.88rem;
  color: var(--sepia-mid);
  padding: 0.3rem 0;
  padding-left: 1rem;
  position: relative;
}

.about-content .credit-list li::before {
  content: '\2022';
  position: absolute;
  left: 0;
  color: var(--sepia-faint);
}

/* ── INTRO PARAGRAPH (Case File) ── */
.intro-text {
  max-width: 640px;
  margin: 0 auto 2rem;
  font-size: 0.92rem;
  color: var(--sepia-light);
  line-height: 1.75;
}

/* ── EMPTY STATE ── */
.empty-state {
  text-align: center;
  padding: 3rem 1rem;
  color: var(--sepia-faint);
  font-style: italic;
  font-size: 0.9rem;
}

/* ── FOOTER ── */
footer {
  text-align: center;
  padding: 2.5rem 2rem;
}

footer::before {
  content: '';
  display: block;
  width: min(400px, 60vw);
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--rule), transparent);
  margin: 0 auto 1.5rem;
}

footer p {
  font-size: 0.75rem;
  color: var(--sepia-faint);
  max-width: 500px;
  margin: 0 auto;
  line-height: 1.7;
}

footer p + p {
  margin-top: 0.4rem;
}

footer a { color: var(--oxide); text-decoration: none; }
footer a:hover { text-decoration: underline; }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

.featured {
  opacity: 0;
  animation: cardIn 0.5s ease-out 0.1s forwards;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  header {
    padding: 3.5rem 1.5rem 2rem;
  }

  header h1 {
    font-size: 1.8rem;
  }

  header .desc {
    font-size: 0.82rem;
  }

  nav.tabs {
    gap: 1rem;
    padding: 0.75rem 1rem;
  }

  nav.tabs button {
    font-size: 0.78rem;
  }

  main {
    padding: 1.5rem 1rem 3rem;
  }

  .featured {
    padding: 1.5rem 1.5rem 1.25rem;
  }

  .featured .sender-line {
    font-size: 1.1rem;
  }

  .letter-row,
  .doc-row {
    grid-template-columns: 2.5rem 1fr;
    gap: 1rem;
  }

  .row-meta {
    grid-column: 2;
    flex-direction: row;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-top: -0.25rem;
  }

  .detail-panel {
    width: 100vw;
    padding: 2rem 1.5rem 3rem;
  }

  .detail-header .number {
    font-size: 2rem;
  }

  .detail-header h2 {
    font-size: 1.2rem;
  }

  .filter-pill {
    font-size: 0.72rem;
    padding: 0.25rem 0.75rem;
  }

  .filters {
    gap: 0.35rem;
  }
}
</style>
</head>
<body>

<header id="site-header"></header>
<nav class="tabs" id="site-nav"></nav>
<main id="main-content"></main>
<div class="detail-overlay" id="detail-overlay"></div>
<footer id="site-footer"></footer>

<script>
const LETTERS = [{"id": 1, "sender": "Christopher Meryng", "recipient": "Christopher Meryng", "date": "(undated)", "origin": "", "destination": "London", "language": "Middle English", "original_transcription": "marked with my mark with a rede stone.\n\n[signed] per me Cristofer Meryng", "editorial_notes": "", "archival_reference": "HL AHL, ASA, Externa Anglicana 476, Folder with letters, no. 1 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax. On the dorse: To\nCristofer Meryng in Saynt Lawrence Lane in London.\nRecomendyd etc. Ye shalle receive owte of this brynger Adryane Johnsone my male", "file": "catalogued/letter_01.md", "modern_english_translation": "marked with my mark, with a red stone.", "summary": "A fragmentary document in which Christopher Meryng identifies a cargo mark — a red stone — apparently the closing lines of a longer commercial letter. The fragment gives no context beyond the mark itself, suggesting it is the tail end of a shipment identification record.", "letter_type": "business", "themes": ["trade", "shipping"], "people_mentioned": ["Christopher Meryng"], "goods_mentioned": [], "notable": false}, {"id": 2, "sender": "William Gresham", "recipient": "his cousin Ellen in care of his wife", "date": "1533 Juli 21", "origin": "Antwerp", "destination": "London", "language": "Middle English", "original_transcription": "+ ade 21. de Julii anno 1533 in Andwarpe\n\nCossyn Elyne with alle my hartt I recomend me unto yow, glad to here of yowr good\nhelthe etc. Yow schalle resseive in the howy of Peter Cole 2 litille barrelles with sturgyne\nunder this marke. The grettest (which is n° 1a) is for yow and for goode frynddes, wherein\nis 10 peces sturgyne, of the which ther be 2 halfe jollis, so that I wolde Rowlond Schakerley\nschulde have one halfe jolle, my dowghter Wilson may not be forgottyn with one rond,\nmester Lock one ronde. And yf yow theying it best to master Botry oneb ronde and to\nThomas Abraham the older one ronde. And as towchyng thec other littille barrell (which\nis n° 2), it is for my lorde of Rutlond1 which I wolde schulde be conveyyd to Enffyld to\nhym as sone as is possybylled. Wherefor I wold that Thomas Wilson schulde enquere\nfor some of my sayd lorddes servandes at Holywelle, he schalle not faylle to have some\nof them and that he se it may be suerly conveyd to Enffyld aftyr the best maner, for I\nsopose ther lythe my lord. When God send it, I wold ther schulde be no tyme lost in\nþe delyverans of eite, thowe Thomas Wilson schulde take þe more payne in my name to\nse it delivered.\n\nMerten Albryght is cum, in whome have resseived one carettelle of ale with 4\npastis of venyson, which I perseyve þat Roger Manyngton did gyff me þe holle buck,\nfor the which I thancke hym hartely, fyndyng myselfe moche in his dett. I prey yow\nremember hym or mestres Manyngton with a rond of sturgyne tylle I may recumpensse\nhym better.\n\n1  Thomas Manners (Lord Ros), earl of Rutland 1525-43: HBC p. 480.\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 03\n\nAnd frome mestres Looke I have resseived 2 pastis venyson. And thus I rest in good\n\nhelthe to Godes plessure. Howe kepe yow.\n\n[signed] Yowr William Gresham\n\n[dorse]\n\nAnd alleso I marvelle that Thomas Wilson send me not the letter that he delyveryd\nto Antony Vyvaldes clarke to copye, which letter I have resseived be my brother John\nGresham which cam to þis towne the Monday after ther departyng frome London’ and\nmaster Locke with other etc.\n\nI trust yow have resseived the sturgyn þat I sent yow fyrst and that one barrelle is\n\ndelyveryd to master Cromwelle acordyng as I dyd wryghte\n\n+ the 23. day of theis present [23 July 1533]\n\nAnd whereas afor is wretyn þat yow schulde resseive the 2 litille barrelles with sturgyn\nin Peter Cole, now this is only to avyse yow that yow schalle resseive it in Awdryan Johnson\nand order it as afore is sayd. And thus I recomend me to yow etc.", "editorial_notes": "a to follows, interlined and struck through HL.\nc Corrected in HL from othe[r].\nHL.\ne-e Interlined HL.\nb 1 follows, struck through\nd for follows, struck through HL.", "archival_reference": "HL AHL, ASA, Externa Anglicana 476, Folder with letters, no. 2 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax. On the dorse: To\nthe wyffe of William Gresham this be delivered in Bowe Lane.", "file": "catalogued/letter_02.md", "modern_english_translation": "Written in Antwerp, the 21st of July 1533.\n\nCousin Ellen, with all my heart I commend myself to you, glad to hear of your good health, etc. You shall receive at the house of Peter Cole two little barrels of sturgeon, marked as below. The larger one (which is number 1) is for you and for good friends, and contains 10 pieces of sturgeon, of which 2 are half jowls. I would have Rowlond Schakerley receive one half jowl; my daughter Wilson must not be forgotten — she should have one round; Master Lock, one round. And if you think it best, Master Botry one round and Thomas Abraham the elder one round. As for the other little barrel (which is number 2), it is for my lord of Rutlond, and I would have it conveyed to him at Enffyld as soon as possible. Therefore I would ask that Thomas Wilson enquire after some of my said lord's servants at Holywelle — he shall not fail to find some of them — and that he see it safely conveyed to Enffyld in the best manner, for I suppose my lord is residing there. When God brings it to hand, I would have no time lost in the delivery of it, even if Thomas Wilson should take the greater trouble in my name to see it delivered.\n\nMerten Albryght has arrived, by whom I have received one cask of ale and 4 venison pasties. I perceive that Roger Manyngton gave me the whole buck, for which I thank him heartily, finding myself much in his debt. I pray you remember him or Mistress Manyngton with a round of sturgeon until I may recompense him better.\n\nAnd from Mistress Looke I have received 2 venison pasties. And so I remain in good health, at God's pleasure. How fare you?\n\nYour William Gresham\n\nAlso, I marvel that Thomas Wilson did not send me the letter he delivered to Antony Vyvaldes's clerk to copy — which letter I have since received by way of my brother John Gresham, who came to this town the Monday after their departure from London, together with Master Locke and others, etc.\n\nI trust you have received the sturgeon I sent you first, and that one barrel has been delivered to Master Cromwelle as I did write.\n\nThe 23rd day of this present month [23 July 1533].\n\nAnd whereas it was written above that you should receive the 2 little barrels of sturgeon at Peter Cole's, this is only to advise you that you shall now receive them at Awdryan Johnson's, and order the matter as was said before. And so I commend myself to you, etc.", "summary": "William Gresham writes warmly from Antwerp to his cousin Ellen, coordinating the distribution of barrels of sturgeon among named friends, family members, and notably Master Cromwell and the lord of Rutland. The letter reveals a dense social network of gift-giving and mutual exchange, including venison pasties received from Roger Manyngton and Mistress Looke, and ends with a last-minute change of collection point.", "letter_type": "mixed", "themes": ["food", "gifts", "social_networks", "shipping", "trade"], "people_mentioned": ["William Gresham", "Ellen", "Peter Cole", "Rowlond Schakerley", "daughter Wilson", "Master Lock", "Master Botry", "Thomas Abraham the elder", "lord of Rutland", "Thomas Wilson", "Merten Albryght", "Roger Manyngton", "Mistress Looke", "Master Cromwell", "Awdryan Johnson"], "goods_mentioned": ["sturgeon", "ale", "venison pasties"], "notable": true, "notable_reason": "Names Thomas Cromwell as a recipient of sturgeon, placing this merchant letter within the orbit of one of Henry VIII's most powerful ministers."}, {"id": 3, "sender": "William Laund, apprentice,", "recipient": "his master William Mery, grocer,", "date": "1533 July 22", "origin": "Antwerp", "destination": "London", "language": "Middle English", "original_transcription": "I deseyer yowr maistershepe to exsepe mey wrytyng, allthow yt be not so well has I wold\nyt wer, and conten yowr maistershep with Steven and never hortt yowr seleff for heme, for\nhe dowted he wyll do welle. Yt is no nother lyke for alle thes. He is yong and has wett has\nmyche has is poseybell. I thoug in my mynd that he has greved yowr maistershepe mor\nat the hartt than alle the godes that evar yowr maister[shepe] hathe lost. But let all thes\npase: he wyll begen a new leyffe and bey the grase of God he wyll do well in shortt spase.\n\n[signed] By yowr power aprentes William Lawnd\n\n[p. 2]\n\n+\n\nThe 22. day of Jully 1533\n\nRyght worshepefalle syr, my lowlest maner that I cane I recomend me unto yowr\nmaisterschepe, trewsteyng in the Lord that yowr maistershepe is in helthe, with the same\ndew unto my mistress. Has thes day I have resseived from yowr maistershepe 2 letares\ndated the 8. day and the 17. day of Jully. And werhas yowr maisterschepe wryttes of Charles\nBenche, yt is the gretest pete that I hard sene I came in to thes land, but agayntes the evelle\nchanes of the worlda, hape is he that cane wythestand yt. Yt hes a grett ynsampell to alle\n\n\nmen, but yt is grett pete that yt was proffed by hem, for ther was never a fayeffolder man\nlyvyng. Grett pete yt is, but I pray Jhesus (wyche all theng sendes) forgeffe heme hes\nmesededes and have marsey of is soll and alle Cresten solls amen.\n\nThes day I have bowt of John van den Gyr gynger 2 bages at 20d, nottes 2 bages\nVenys at 3s 6d, clovys 1 bag at 5s 8d and 1 at 5s 7d, maces larg 1 bag at 9s 6d. The gynger\nhes resen thes day 2d in a lb., peper ½d [in a] lb. and hes lyke to reyes mor. Therfor yffe\nyowr maisterschepe have stor, make myche therof or ells by same, for yt is lyke to ryse.\nQuyksylver 12d, vermylond at 16d. I have haleff at a bargen with a man to bey 10 or\n20 bages of new ryse. Yff I can have them for 10s to pay at the Cold Martt,2 I wyll toke\n10 bages, for I thenk that thay wyll be no betour chepe thes, ere thay ben sold for 9s 6d\nat thes owr.\n\nYowr maistershepe dothe wryt for to bey a bag middle crocus. Yt is her at a grett pryse\nand het they wyll sell now for lese they sell grett crocus with the hother. Therfor yt wer\nbetour to proffeyed yffe yt wer posybell at howr.\n\nYowr maisterschepe shall resseve by the grase of God in Awdryan Janson acordyn has\nI have wreten in dyvers letters corans 5 buttes and to of the peper and mor 1 small trewse\nthat is lyke a trewse of werynger with yowr marke and therin 36 lb. cynamon wyche cost\n6s 6d.3 Therfor you had ned sell yt betour thayn 4s 8d. Has yowr maisterschep prayes, it\nis sold. Make myche therof. Large ys at 7s 6d and wylle be deer. I have 200 the careseys\nyffe thay wer to 200 at thes owr, thay wold nott be resseved, for ther is grett war, werhas\nthay schold go and therfor careseys at a grett scap and is nott lyke to be well sold, nott\nthes 3 marttes. And the reson therof makes spycces to ryse, has I shall serten for yowr\nmaisterschep by the next leter than I wyll send. And then God wylyng I wyll com home\nwith the forst how or schep or ells by land. I demande of Steven for the money that you\nhave paid for hem with dyvers hother materes then yowr maisterschepe. He sayes that\nHarry Myles most pay for the haleff of them, for he had the most partt of them without\nmoney. I kold gett non mor wares. The trewthe is, has for has I cane se, he has no wares\nnor no grett stor of money. Therfor to gettett by aney menes, yt wer grett hendrans to hem\nbeyng her, but has I have sewed hem betewexst hem and me that yt is nott poseybell that\never he shall prosper or go forward in desevyng you afftour thes maner, has he has don\nso maney tymes and nevar wyll lesse. I told hem that I kold take yt no nother wayes but\nthat he dowes yt to shorten yowr leyffe or ells he wold ever dow, has he dowes sob hofften\ntymes. And therwythe he wepte that with dyvers hother thenges wyche wer to long to\nwryt at thes tyme. And thes the Lord be with yowr maisterschepe and my mistress, yowr\nbrother with all the rest of yowr good frendes.", "editorial_notes": "a wrold HL, in error.\nb fo follows, struck through HL.", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 3 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax. On the dorse:\nUnto hes worshepffulle master Wylliam Mery groser thes be delivered\nin London’; n° 23.", "file": "catalogued/letter_03.md", "modern_english_translation": "The 22nd day of July, 1533\n\nRight worshipful sir, in the humblest manner that I can, I commend myself to your mastership, trusting in the Lord that your mastership is in good health, and likewise my mistress. This day I have received from your mastership two letters, dated the 8th day and the 17th day of July.\n\nAs for what your mastership writes concerning Charles Benche — it is the greatest pity I have heard since I came into this land, but against the ill chances of the world, happy is he who can withstand them. It is a great example to all men, but it is a great pity that it was proved upon him, for there was never a more faithful man living. Great pity it is, but I pray Jesus (who sends all things) to forgive him his misdeeds and have mercy on his soul and all Christian souls, amen.\n\nThis day I have bought from John van den Gyr: ginger, 2 bags at 20d; nutmegs, 2 bags Venice at 3s 6d; cloves, 1 bag at 5s 8d and 1 at 5s 7d; large mace, 1 bag at 9s 6d. The ginger has risen this day 2d in the pound, pepper a half-penny in the pound, and is like to rise more. Therefore, if your mastership has stock, make much of it, or else buy some, for it is likely to rise. Quicksilver 12d, vermilion at 16d. I am half agreed with a man to buy 10 or 20 bags of new rice. If I can have them for 10 shillings, payable at the Cold Mart [Note: a major seasonal trade fair], I will take 10 bags, for I think they will be no cheaper than they are now — they are selling for 9s 6d at this hour.\n\nYour mastership writes to buy a bag of middle crocus [Note: likely saffron of a middling grade]. It is here at a great price, and they will not sell it now for less — they sell the large crocus alongside the other. Therefore it would be more profitable, if possible, to defer the purchase.\n\nYour mastership shall receive, by the grace of God, through Awdryan Janson, according to what I have written in several letters: 5 butts of currants and two of pepper, and also 1 small truss resembling a truss of Wieringen [Note: possibly referring to a style of packing from Wieringen], bearing your mark, containing 36 lb. of cinnamon which cost 6s 6d. Therefore you had need to sell it for better than 4s 8d. As your mastership wishes, it is sold — make much of it. The large is at 7s 6d and will be dear. I have 200 kerseys [Note: a type of coarse woollen cloth], but if they were 200 at this hour, they would not be received, for there is great war where they should go, and therefore kerseys are at a great loss and are not likely to sell well for the next three marts. And the reason for this is causing spices to rise, as I shall inform your mastership more fully by the next letter that I will send. And then, God willing, I will come home with the first vessel or ship, or else by land.\n\nI pressed Steven for the money that you have paid for him, along with various other matters on your mastership's behalf. He says that Harry Myles must pay for half of them, for he received the greater part of the goods without payment. I could get no more goods out of him. The truth is, as far as I can see, he has no goods and no great store of money. Therefore to recover anything by any means would be a great hindrance to him being here — but as I have reasoned with him, between him and me, it is not possible that he can ever prosper or go forward in deceiving you in this manner, as he has done so many times and will never stop. I told him that I could take it no other way but that he does this to shorten your life, or else he would ever do as he does so often. And with that he wept, along with various other things which would take too long to write at this time.\n\nAnd thus the Lord be with your mastership and my mistress, your brother, and all the rest of your good friends.\n\nI beg your mastership to be patient with my writing, though it is not so well as I would wish, and to be content with Steven and never trouble yourself over him, for I doubt not he will do well. There is no other likely outcome for all this. He is young and has learned as much as is possible. I think in my mind that he has grieved your mastership more at the heart than all the goods that your mastership has ever lost. But let all this pass — he will begin a new life, and by the grace of God he will do well in a short while.", "summary": "William Laund, an apprentice merchant in Antwerp, writes to his master William Mery with a detailed spice price report and shipping update, while also relaying the sad news of Charles Benche's death. The letter's most human moment comes when Laund describes confronting a debtor named Steven, who wept and admitted he had been deceiving his master, prompting the apprentice to plead for patience on Steven's behalf.", "letter_type": "business", "themes": ["spices", "trade", "financial", "debt", "shipping", "news", "health"], "people_mentioned": ["William Laund", "William Mery", "Charles Benche", "Steven"], "goods_mentioned": ["ginger", "nutmegs", "cloves", "mace", "pepper", "saffron", "currants", "cinnamon", "rice", "kerseys"], "notable": true, "notable_reason": "Combines granular commodity price intelligence with an emotionally vivid account of a debtor breaking down in tears — rare personal texture within a routine trade letter."}, {"id": 4, "sender": "John Copynger, fishmonger", "recipient": "his wife", "date": "[1533] July 17", "origin": "", "destination": "", "language": "Middle English", "original_transcription": "2  In 1533, the Cold Mart in Bergen op Zoom began on 6 Nov. and ended four to six weeks later.\n3  These goods were signalled as taken by Lübeck freebooters in the list of English damages: no. 40 § 3 below.\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 05\n\nclosed with the signet of the writer in red wax (paper seal). On the dorse:\nWannto þe whyff of John Copynger fysschemonger off Londen’ in\nHolldn Fyssche stret thys be delyvered with sped.\n\nBysly I recomend me home to yow and to alle good neybwres, trwstyng ye be in good\nhellth, with alle my chylldyrene and howsolld and alle other as I had reherst them be name\nalle. So ye schalle wndyrstond I hawe reseywyd yowyr letter þat Rabard Parys whort to\nme be master Kemp and towychyng for who schalle hawe from as sone as God send hyt\nhom her and as for barelle for her hys asder as hys in Londwn’ yet bwt I trwst who schalle\nhawe beter schep schortly.\n\nAllso the kawse of my whyrytyng to yow hys þat ye schalle reseywe of a hoye of Anwharp\na wesselle of frasche stwrgyne markyd with thys my mark [merchant’s mark no. 1 follows].\nThe mastyrs name wndyr God hys Awdryane Jounswn. Paye hym for the freyct off hyt 6d\nand sond hyt to my lord. Hyt ahysa not so gret for as I hawe sene bwt hyt ahysa wery gwd.\nAnd whylle I hawe sene 20 sens I kame and ther whas newer when to my mynd affore\nnowe. For owther they prowyd rede in the sethyng or elles they krombylled and mollyd\nawhey that I had no fanssy to them.\n\nAlleso I praye yow hawe me recomenddyd to mastyr Lark and mastyr Steward and\nmastyr Kwntrollarth. Alleso I praye yow loke whelle to yowyr afowkysa and so they stond\nnott ydylly in no whysse. And gether in yowyr deters, for I mwst payeb moche mony when\nI come home. I trwst so and the f ’ come I loke for. Allso let yowyr fowkys make me no\ndettyres bwt that they may gother hwphone Satyrday at nytte in no whysse. I praye yow\nlet þe Gwdman stone, so yowyr bylle and þe next. I trwst who schall whyryt, who schalle\nhaweswmer f ’ and þe whynde whylle win abowt. No more to yow at theys tyme, bwt Jhesu\nkepe yow. Whrytyn at Anwharpe þe 17° day of Jwly.\n\n[signed] Be me John Copynger\n\nHer the mark hyr betyr made and my name how þe tother hed\n[merchant’s mark no. 1 follows]\nSo yow schalle reseyve 2 koper boketys of tynn.", "editorial_notes": "a-a Interlined HL.\nb my follows, struck through HL.\n1)", "archival_reference": "HL AHL, ASA, Externa Anglicana 476, Folder with letters, no. 4 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; reclassified as ASA,\nExterna Anglicana no. 1606). Original holograph letter. Paper. Sealed", "file": "catalogued/letter_04.md", "modern_english_translation": "Most heartily I commend myself to you and to all good neighbours, trusting that you are in good health, along with all my children and household and all others as I would have rehearsed them by name one by one. So you shall understand that I have received your letter that Robert Paris wrote to me by Master Kemp, and touching who shall have freight as soon as God sends it home here — as for a barrel for it, there is as scarce here as there is in London yet, but I trust we shall have better ships shortly.\n\nAlso the cause of my writing to you is that you shall receive from a hoy of Antwerp a vessel of fresh sturgeon marked with my mark. The master's name under God is Adriane Jonson. Pay him for the freight of it 6d, and send it to my lord. It is not so large as I have seen, but it is very good. And while I have seen 20 since I came here, there was never one to my mind before now. For either they proved red in the seething, or else they crumbled and mouldered away, so that I had no fancy to them.\n\nAlso I pray you have me recommended to Master Lark and Master Steward and Master Comptroller. Also I pray you look well to your folks and see that they stand not idly in any wise. And gather in your debts, for I must pay much money when I come home. I trust so, and the freight I look for. Also let your folks make me no debtors, but that they may gather up on Saturday at night in any wise. I pray you let the Goodman Stone see your bill, and the next. I trust we shall write — we shall have summer freight and the wind will come about. No more to you at this time, but Jesus keep you. Written at Antwerp the 17th day of July.\n\nAlso you shall receive 2 copper buckets of tin.", "summary": "John Copynger, a fishmonger writing from Antwerp, directs his wife on how to receive and distribute a vessel of fresh sturgeon, while urging her to manage the household, supervise the workers, and collect outstanding debts in his absence. The letter captures the dual burden placed on a merchant's wife: acting as de facto business manager at home while her husband sourced goods abroad.", "letter_type": "mixed", "themes": ["trade", "shipping", "food", "debt", "family", "financial"], "people_mentioned": ["John Copynger", "Robert Paris", "Master Kemp", "Adrian Johnson"], "goods_mentioned": ["sturgeon", "copper buckets", "tin"], "notable": true, "notable_reason": "Illuminates the active economic role of a merchant's wife, tasked with collecting debts and overseeing workers while her husband was overseas."}, {"id": 5, "sender": "William Gresham, haberdasher,", "recipient": "his wife", "date": "(undated)", "origin": "4", "destination": "London", "language": "Middle English", "original_transcription": "4  Note that Gresham indicates the prices of the goods listed in this letter in code.\n\n\ndorse: Thys letter be delyverd wnto Wylham Gressent haburdascher\ndwelling at þe Red Balle in Chepe; N° Eg.\n\nRyght well belowyd wyffe, I hartyly recomend me unto you, trusting in Jhesu that yow be\nin good helthe with all my howsold, thanke it by God. Also you shall receive by the grasse\nof God in Rychard Rede of Mylton Shore a dry fat, aaa truseb, a barrell with shepe belles\nwith thys marke [merchant’s mark no. 1 in the left margin].\n\nItem 6 payntyd clothes\nItem 27 dosen [lb.] inkelles at price\nItem more a sacke of inkell under the same marke\nItem 3 dosen [lb.] Ownter thredc at  C s.\nItem dosen [lb.] Ownter therdc at  C s.\nItem 4 lb. Ownter thredc at p C s.\nItem 1½d dosen golde chekese at p C s.\nItem 3 bages anlettes wayng 202 lb. at Ed gr. ob’\nItem 3 gros hawke hendes at  Ed s.\nItem 9 lb. inkelles at p C gr./lb.\nItem 4½ dosen, 1 d bredes says p C s.\nItem f5f dosen 1 d bredes sayes at p Er s.\nItem 18 dosen new sayes at r s.\nItem ½ dosen sayes at p C s.\nItem 3 gros rassures at p Er s.\nItem [1] gros bosses at E s.\nItem 12,000 packe neddilles at Er s. p Er gr.\nItem 7 dosen fyne chekes with golde atg  Er s./dosen\nItem 3½ dosen myddell sayes at p Er s.\nItem 6 dosen bey sylke at p C s. p\nItem 5 boxses with myny kynces at p Es gr.\nItem [1] gros brase belles at p Er s.\nItem ½ gros brase belles at  s.\nItem 7 dosen lether at Er s. p C\nMore in the same shyppe a sacke inkelle waying 500 [lb.] at p E ½ gr.\nMore in the same shype a truse with 13h dosen lether at Er s. p C\nItem 8½ dosen of pay[n]ted clothes at  s.\nItem more 100 remes paper at p ½ gr.\nItem 50 remes of broune paper dowbylle at r gr.\nThe fraythe of all is\nItem a barrell of sheppe belles content 4200 at C s.\n\n[p. 2]\n\n+\n\nBy the Grace of Jhesu more in Petter Colle of Andwarpe\nItem 2 barrelles storgon continentes 16 rondes and 6 golles at E £ p s. p C gr.\nUnder thys marke [merchant’s mark no. 2 in the left margin] freyght\na-a Interlined above 2, struck through HL.\nHL, in error.\n\nd Corrected in HL from 1.\n\nb truses HL, in error.\n\nc therd\ne with follows, struck through HL.\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 07\n\nf-f Interlined above 4, struck through HL. ½ follows dosen, struck through.\nfollows, struck through HL.\n\nh Corrected in HL from 12.\n\ng p", "editorial_notes": "1)\n2)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 5 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax (paper seal). On the", "file": "catalogued/letter_05.md", "modern_english_translation": "Right well beloved wife, I heartily commend me unto you, trusting in Jesus that you are in good health, along with all my household — thanks be to God. Also, you shall receive, by the grace of God, in the care of Richard Rede of Mylton Shore, a dry cask, a truss, a barrel of sheep bells, all under this mark.\n\nItem: 6 painted cloths\nItem: 27 dozen pounds of inkle at [Note: price written in merchant's code]\nItem: furthermore, a sack of inkle under the same mark\nItem: 3 dozen pounds of Ounce thread at [Note: price written in merchant's code]\nItem: 1 dozen pounds of Ounce thread at [Note: price written in merchant's code]\nItem: 4 pounds of Ounce thread at [Note: price written in merchant's code]\nItem: 1½ dozen gold checks at [Note: price written in merchant's code]\nItem: 3 bags of aglets weighing 202 pounds at [Note: price written in merchant's code]\nItem: 3 gross hawk ends at [Note: price written in merchant's code]\nItem: 9 pounds of inkle at [Note: price written in merchant's code]\nItem: 4½ dozen, 1 broad says at [Note: price written in merchant's code]\nItem: 5 dozen, 1 broad says at [Note: price written in merchant's code]\nItem: 18 dozen new says at [Note: price written in merchant's code]\nItem: ½ dozen says at [Note: price written in merchant's code]\nItem: 3 gross razors at [Note: price written in merchant's code]\nItem: 1 gross bosses at [Note: price written in merchant's code]\nItem: 12,000 pack needles at [Note: price written in merchant's code]\nItem: 7 dozen fine checks with gold at [Note: price written in merchant's code] per dozen\nItem: 3½ dozen middle says at [Note: price written in merchant's code]\nItem: 6 dozen bay silk at [Note: price written in merchant's code]\nItem: 5 boxes of minikin pins at [Note: price written in merchant's code]\nItem: 1 gross brass bells at [Note: price written in merchant's code]\nItem: ½ gross brass bells at [Note: price written in merchant's code]\nItem: 7 dozen leather at [Note: price written in merchant's code]\nFurthermore, in the same ship, a sack of inkle weighing 500 pounds at [Note: price written in merchant's code]\nFurthermore, in the same ship, a truss with 13 dozen leather at [Note: price written in merchant's code]\nItem: 8½ dozen painted cloths at [Note: price written in merchant's code]\nItem: furthermore, 100 reams of paper at [Note: price written in merchant's code]\nItem: 50 reams of brown paper, double, at [Note: price written in merchant's code]\nThe freight of all is [Note: price written in merchant's code]\nItem: a barrel of sheep bells, containing 4,200, at [Note: price written in merchant's code]\n\nBy the grace of Jesus, furthermore, in the care of Petter Colle of Andwarpe:\nItem: 2 barrels of sturgeon containing 16 rounds and 6 gills at [Note: price written in merchant's code]\nUnder this mark, freight [Note: price written in merchant's code]", "summary": "William Gresham sends his wife what amounts entirely to a cargo manifest, listing a wide range of haberdashery goods shipped from Antwerp, with all prices recorded in merchant cipher. The letter contains no personal greeting or news, functioning purely as an encoded commercial document.", "letter_type": "business", "themes": ["trade", "textiles", "coded_prices", "shipping", "crafts"], "people_mentioned": ["William Gresham"], "goods_mentioned": ["painted cloths", "inkle", "ounce thread", "gold checks", "aglets", "hawk ends", "says", "razors", "bosses", "pack needles", "fine checks with gold", "bay silk", "minikin pins", "brass bells", "leather", "paper", "brown paper", "sheep bells", "sturgeon"], "notable": true, "notable_reason": "A rare surviving example of a merchant's price cipher in active use, offering direct evidence of how sixteenth-century traders concealed commercially sensitive information within family correspondence."}, {"id": 6, "sender": "Ryner Grover", "recipient": "Edward Morton, grocer", "date": "1533 July 18", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+ 1533 le 18. day Jully\n\nRyght worshyppfull sir, i[n] the lowest maner I hartfully recomend me unto yow,\ntrustyng in God that yow ar merry etc. Ser, yow shall receive now by the grace of God\nby the brynger hereof, hose name is Audryan Johnson of Andwarpe, under this marke\n[merchant’s mark no. 1 follows] large mayces 1 barell containing 42½ lb. anda 1 C barell\nsuccade, 2 lyttyl bareles orynges floris containing all an 186 lb. cc’ at 5d/lb.\n\nItem a tros with my weryng gown.\nAnd he moste have for his freight 2s.\nThe inwarde is markyd wythe this marke [merchant’s mark no. 2 follows].\nNo more to yow at this tyme, but owre Lord have yow in his kipyng.\n\n[signed] per me your servant Ryner Grover", "editorial_notes": "a 1 barell and follows, struck through HL.\n1)\n2)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 6 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax (paper seal). On\nthe dorse: To his maister Edward Morton grocer this letter be delivered\nin London.", "file": "catalogued/letter_06.md", "modern_english_translation": "Right worshipful sir, in the most humble manner I heartily commend myself to you, trusting in God that you are in good health. Sir, you shall receive now, by the grace of God, by the bearer of this letter, whose name is Audryan Johnson of Andwarpe, under this mark: one barrel of large maces containing 42½ lb., and one hundredweight barrel of succade, two small barrels of orange flowers containing in all 186 lb., priced at 5d per lb.\n\nItem: a truss containing my wearing gown.\nAnd he is to receive for his freight 2s.\nThe inward goods are marked with this mark.\n\nNo more to you at this time, but may our Lord keep you in his care.", "summary": "Ryner Grover sends a brief shipping note to Edward Morton, a grocer, listing spices and confectionery dispatched via Adrian Johnson's service from Antwerp. Among the goods is a personal item — his own wearing gown — tucked into a truss alongside the commercial cargo.", "letter_type": "business", "themes": ["spices", "trade", "shipping", "food"], "people_mentioned": ["Ryner Grover", "Edward Morton", "Adrian Johnson"], "goods_mentioned": ["mace", "succade", "orange flowers", "gown"], "notable": false}, {"id": 7, "sender": "Blase Saunders", "recipient": "his brother Edward Saunders", "date": "1533 July 21", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+ 1533 +\n\nIn Anwerpe the 21. day of Julye\n\nRyght worshypfull and well beloved brother my dutye rememberyd. I hertelye recom-\nmend me unto yow, trustyng in God that yow be in good helthe, which I pray God longe\nmay contyniu to hys plesure and after yowr hertys moste desyre etc. Sertefyeng yow that\nI have sente yow a letter and a dosyna lutyng stryngs which I truste yow have resevyd er\nthys tyme and I desyer gretlye to know yf they be good or bad. Yf they be nowght, I know\nwhere ys sume makyng that be fyner and belyke better thenb those I sent yow. Therefore\nyf yow wyll have any more, sende me monec ynowgh and yow shall have stryngys ynowgh.\nAlso my letter which I sente yow was so hastely wrytten that I thynke yow cowlde\n\nscarse rede yt. Howbeyt the tyme was so shorte, I cowlde wryte yt no better.\n\nAllso I desyer yow to have me recommendyd unto my father and my mother and desyer\nher of her blesyngd and to all my brothers and susters with all my other frendys. I wolde\nhave wrytten to my mother at thys tyme but for to wryte for her blesyng. I truste yt shall\nnot nede. Therefore as sone as I can, I wylle wryte here a letter that she shalle know how I\nbestow my tyme. By the grase of Jesu who ever preserve yow and kepe yow and alle other\ngoode frendys amen. Wrytten in haste by the hande of yowr lovyng brother.\n\na lactyyng follows, struck through HL.\nfollows, struck through HL.\n\nd I follows, struck through HL.\n\n[signed] Blase Saunders", "editorial_notes": "b Corrected in HL from them.\nc yp", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 7 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax (paper seal). On the\ndorse: Unto hys worshypfull brother Edward Saunders in the Mydle\nTemple thys be delyveryd in London.", "file": "catalogued/letter_07.md", "modern_english_translation": "In Antwerp, the 21st day of July, 1533.\n\nRight worshipful and well-beloved brother, my duty remembered. I heartily commend myself to you, trusting in God that you are in good health, which I pray God long may continue to His pleasure and according to your heart's most earnest desire.\n\nI am writing to let you know that I have sent you a letter and a dozen lute strings, which I trust you have received by this time, and I am very eager to know whether they are good or bad. If they are of no use, I know where there is some making that is finer and likely better than those I sent you. Therefore, if you will have any more, send me money enough and you shall have strings enough.\n\nAlso, the letter which I sent you was written so hastily that I think you could scarcely read it. However, the time was so short I could write it no better.\n\nI also ask you to give my regards to my father and my mother, and ask her for her blessing, and to all my brothers and sisters and all my other friends. I would have written to my mother at this time but to ask for her blessing — I trust it shall not be needed. Therefore, as soon as I can, I will write her a letter so that she shall know how I am spending my time. By the grace of Jesus, who ever preserve you and keep you and all other good friends, amen. Written in haste by the hand of your loving brother.", "summary": "Blase Saunders writes from Antwerp to his brother Edward, reporting on a previous letter and a gift of lute strings he had sent, and asking after their quality. He sends warm regards to his parents and siblings, asking especially for his mother's blessing, and promises to write her a proper letter soon. The letter reveals a young man living abroad who is clearly mindful of family bonds and eager to maintain them across distance.", "letter_type": "personal", "themes": ["family", "gifts", "social_networks"], "people_mentioned": ["Blase Saunders", "Edward Saunders"], "goods_mentioned": ["lute strings"], "notable": true, "notable_reason": "A rare glimpse of a young Englishman in Antwerp maintaining tender family ties across the Channel, complete with a gift of lute strings and a request for his mother's blessing."}, {"id": 8, "sender": "Jan van Espen", "recipient": "Liuken van Brussel", "date": "1533 May 26", "origin": "Brussels", "destination": "London", "language": "Middle Dutch", "original_transcription": "Vrindtlycke groete voirscreven. Liuken van Brussel mijn lieve werdinne. Ic, Jan van\nEspen, vernomen hebbe daervan, ghij mij last gaeft te wetene Peter Nene van goet, dat\ntot sinte Joos ten hoede leggen soude. Ende ghij die moete doen woudt alhier tot Brussel\nte commen. Aen het selve goet soudi wel geraken. Ende ic hope u cortelingen te comen\nbesoecken. Ende Wouter in de nobele doet u zeere groeten. Ende ic gebiede mij zeere tot\nMachielen ende tot allen mijn goeden vrinden. Hiermit blyft God bevolen. Gescreven te\nBrussel mitter haest opten 26den dach van Meye anno [15]33.\n\nDie al uwe onderdanige diener\n\n[signed] Jan van Espen\n\n(merchant’s mark no. 1 follows)\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 09", "editorial_notes": "1)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 8 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA Externa Anglicana no. 1606). Original holograph letter. Paper. Sealed\nclosed with the signet of the writer in red wax (paper seal). On the dorse:\nSij gegeven Liuken van Brussel op Sante Quarteyns [St Katharine’s by\nthe Tower] in de Zwane tot Lonnen.", "file": "catalogued/letter_08.md", "modern_english_translation": "Friendly greetings as aforementioned. Liuken van Brussel, my dear landlady [Note: \"werdinne\" means a female host or landlady, possibly a business associate with whom lodging or goods were arranged]. I, Jan van Espen, have learned of the matter in which you instructed me, namely concerning the goods of Peter Nene that are said to be lying at Sint Joos ten Hoede [Note: a location, likely a storage or lodging house]. And you wished to come here to Brussel to deal with that same matter. You would be well able to get hold of those goods. And I hope to come and visit you shortly. And Wouter in de Nobele sends you his warmest greetings. And I commend myself warmly to Machielen and to all my good friends. Herewith remain commended to God. Written at Brussel in haste on the 26th day of May in the year 1533.\n\nHe who is your most obedient servant,\n\nJan van Espen", "summary": "Jan van Espen writes from Brussels to Liuken van Brussel in London, reporting that he has looked into the matter of goods belonging to Peter Nene held at Sint Joos ten Hoede. He advises Liuken to come to Brussels in person to recover the goods, and notes that Wouter in de Nobele sends greetings.", "letter_type": "business", "themes": ["trade", "social_networks"], "people_mentioned": ["Jan van Espen", "Liuken van Brussel", "Peter Nene", "Wouter in de Nobele", "Machielen"], "goods_mentioned": [], "notable": false}, {"id": 9, "sender": "William Lawson", "recipient": "his master Thomas Dichfield", "date": "1533 July 12", "origin": "", "destination": "", "language": "Middle English", "original_transcription": "At Andwarpe the 12. day of July anno 1533\n\nSir and please you to understonde that by Godes grace you shall receive in Audryan\n\nJohnson a dry fat containing as folowiht\n\n24 dosens fygugurs H3H at 24s the dosen\n25 dosens de doble larg + at 18s 6d\n20 dosens de large Ø H3H at 9s\n20 dosens de oultre fyn + at 11s\n15 dosens de large bygare at 7s\n10 dosens de fin bygare at 6s\n10 dosens fyn 1d bredes fina at 9s 3d\n8 dosens 1d bredes fin at 7s 10d\n5 dosens de fygure Ø H3H at 18s\nfor the fat and nelles 2s\nThe wiche fat drawys to £89 -s 8d\n\nande is for the doble large and the oulter large. Colin dide sende hys brother a letter of hit\nande hys broder sende hym worde agen that hee sholde not selle the doble larger under\n19s ande the oultre large under 11s 6d for why the yarin costen 6d mandes more then it\ndid before. Ande Colin saythe is for thos 2 perselles a cannot bac nothing of bac thos that\na can bak a has bak you. Moreover you shall understandeb that Colin is sore sycke ande\nhas ben thys 5 days ande a coms not owt of hys bede. Ande hee ande I have not recovede\nyeet ande as for Andryas Sallman, hee saythe that a has a supina of the emperor that noo\nman shall have money of hym thys threy yere. Moreover you shall understandec that\nthere is shipinge in Clas Frys 175 bondelles paper wiche dcostd £2 16s 8d the 100 s[hetes]\n\n5  Note that the essential information in this letter is written in code, which I have reproduced as well as possible.\n\n\nande now a can by non for £3. No more unto you at this tyme, but eJhesue have you in hys\nkepinghe.\n\n[signed] By your servaunt William Lawson\n\na fff HL.\nundersha[ll].", "editorial_notes": "meant to be deleted HL.\nb Corrected in HL from undershall.\nc Corrected in HL from\ne-e Struck through, but obviously not\nd-d Interlined HL.", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 9 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax. On the dorse:\nUnto my master Thomas Dychefelde thys letter be delyverede in\nLondon.5", "file": "catalogued/letter_09.md", "modern_english_translation": "At Andwarpe, the 12th day of July, in the year 1533.\n\nSir, may it please you to know that, by God's grace, you shall receive through Audryan Johnson a dry crate containing the following:\n\n24 dozen fygugurs H3H [Note: price in merchant's code] at 24s the dozen\n25 dozen de doble larg + [Note: price in merchant's code] at 18s 6d\n20 dozen de large Ø H3H [Note: price in merchant's code] at 9s\n20 dozen de oultre fyn + [Note: price in merchant's code] at 11s\n15 dozen de large bygare at 7s\n10 dozen de fin bygare at 6s\n10 dozen fyn 1d bredes fina at 9s 3d\n8 dozen 1d bredes fin at 7s 10d\n5 dozen de fygure Ø H3H [Note: price in merchant's code] at 18s\nFor the crate and nails: 2s\nThe which crate comes to £89 0s 8d\n\nAnd as for the double large and the outer large: Colin did send his brother a letter about it, and his brother sent word back to him that he should not sell the double large under 19s, and the outer large under 11s 6d, because the yarn cost 6d more than it did before. And Colin says that for those 2 parcels he cannot reduce anything further — what he can reduce, he has already reduced for you. Furthermore, you should know that Colin is gravely ill and has been so for these 5 days, and he does not come out of his bed. And he and I have not yet settled our accounts. And as for Andryas Sallman, he says that he has a writ from the Emperor that no man shall receive money from him for these three years. Furthermore, you should know that there is shipping in Clas Frys of 175 bundles of paper, which cost £2 16s 8d per 100 sheets, and now one cannot buy any for £3. No more to you at this time, but may Jesus have you in His keeping.", "summary": "William Lawson writes from Antwerp to his master Thomas Dichfield with a detailed cargo manifest of figured cloths and textiles being shipped via Adrian Johnson, totalling nearly £89. He also relays important market intelligence: yarn price rises are pushing up cloth prices, a key merchant named Colin is gravely ill, and a trader named Andryas Sallman has obtained an imperial writ shielding him from creditors for three years.", "letter_type": "business", "themes": ["trade", "textiles", "shipping", "financial", "debt", "health"], "people_mentioned": ["William Lawson", "Thomas Dichfield", "Adrian Johnson", "Colin", "Andryas Sallman"], "goods_mentioned": ["figured cloths", "textiles", "yarn", "paper"], "notable": true, "notable_reason": "Combines a granular cloth cargo manifest with vivid market intelligence — rising yarn costs, a bedridden merchant, and a trader hiding behind an imperial writ."}, {"id": 10, "sender": "Jan van Espen", "recipient": "Marten", "date": "1533 July 7", "origin": "", "destination": "", "language": "Middle Dutch", "original_transcription": "Marten, ic gebiede mij zeer tot u ende ic laet u weten, dat ic een bode gesonde hebbe nae\nLonguen. Ende hij es geweest tot Grevelingen, ende hij seyde, dat men nyet passeren en\nmochte mits der belegen. Ende alsoe hebb ic moet ica patientie hebben. Ende hebbec sint\nnae vernomen ende hebbe verstaen, dat men wet daer passeren bmachb, sonder yemant\ntoe te seggen.\n\nMarten, soe bidd ic u vrindelyck, dat ghij wilt eenen scepper spreken van kennesse,\ndat hij u ’tgelt geven wilt, dat u commen mach. Ende laet hem wegen het dwerck het\n’tgheven, dat ghij avana mij hebt, ende ic sal die selve scepper, die dat dan soude wel en\ndueghdes constenteren, maer en gheefft nyet, sonder eenen brieff met te bringen, oft ten\nes wel versekert, want ic van stonden aen sijn gelt geven sal ende oick betaelen sijn arbeyt.\nIc soude selve gecomen hebbe, maer hebbe soe vele werckx, dat ic nyet en mach vrij ten\nahuysea sijn.\n\nMarten, ic gebiede mij zeer tot u lieve huysvrouwe ende seynde huer een Jhesus gesc\nzij bmijb gebeden hadde. Willet ’tselve in dancke ontfangen. Ic dancke van uwer goeder\ndueght. Mach ic den tijt eens leven, ic hoepe wederom aen u te verdienen.\nGescreven mit haesten op ten 7den daech van Julius anno [15]33.\n\n[signed] die al uwe Jan van Espen u\ndiener ende vrunde [merchant’s mark no. 1 follows]\na Sic. Gramatically, ‘moeten’ would have made more sense, but the handwriting\nb-b Interlined HL. c Reading uncertain HL. Only ges is legible.\nis clearly ‘ic’.\n\n1)\n\n\fi:  mercha nt s’  letters  (1533)\n\n1 11", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 10 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; reclassified as ASA\nExterna Anglicana no. 1606). Original holograph letter. Paper. Sealed closed\nwith the signet of the writer in red wax. On the dorse: Sij gegeven Marten\ndie cleermake[r] van Mallort fratre wonende up Tourwerck tot\nLonguen.", "file": "catalogued/letter_10.md", "modern_english_translation": "Marten, I commend myself most warmly to you and wish to let you know that I have sent a messenger to Longuen. He went as far as Grevelingen, but reported that one could not pass through on account of the siege. And so I have had no choice but to be patient. Since then I have made further enquiries and have come to understand that one can in fact pass through there without having to declare anything to anyone.\n\nMarten, I kindly ask you to speak with a skipper of your acquaintance, that he would be willing to give you the money that may be coming to you. Have him weigh the piece-goods that you have from me, and I shall satisfy that same skipper — one who would do it well and faithfully — but he must not give anything without bringing a letter with him, or else it is not properly secured, for I shall pay him his money immediately and also cover his labour. I would have come myself, but I have so much work that I cannot be free from the house.\n\nMarten, I commend myself most warmly to your dear wife and send her a Jesus [Note: likely a devotional gift, perhaps a small image or token of Jesus; the word is partially illegible in the original] such as she had asked me for. Please receive it in good spirit. I thank you for your kind goodwill. Should I live to see the time, I hope to earn it back from you in return.\n\nWritten in haste on the 7th day of July, in the year 1533.", "summary": "Jan van Espen reports that a messenger he sent to Longuen was blocked by a siege at Grevelingen, though he later learned passage was in fact possible without declaring goods. He asks Marten to find a reliable skipper to transport money on his behalf, and closes warmly with greetings to Marten's wife and a devotional Jesus token she had requested.", "letter_type": "mixed", "themes": ["trade", "shipping", "financial", "social_networks", "war", "religion", "gifts"], "people_mentioned": ["Jan van Espen", "Marten"], "goods_mentioned": ["Jesus token"], "notable": true, "notable_reason": "A military siege disrupting merchant courier routes combined with a devotional token sent as a personal gift — an unusually vivid blend of the political, commercial, and spiritual worlds of 1533."}, {"id": 11, "sender": "Christopher Fysher", "recipient": "his master William Windleff", "date": "1533 July 20", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+ the 20. jour Jully 1533\n\nRyght worshypffull syr, my dewty lowly consederred so etc. Syr, ye shall receive by\nthe grace of God in Awdryan Johnson a furkyne [merchant’s mark no. 1 in the left margin]\nwith 10 rondes sturgene etc. So Jhesus be with yow, amen.\n\n[signed] by yowr servant Christoffer Fysher", "editorial_notes": "1)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 11 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified\nas ASA, Externa Anglicana no. 1606). Original holograph letter. Paper.\nSealed closed with the signet of the writer in red wax. On the dorse: + To\nhys worshupffull master Wylliam Windleff so it delyvered in London.", "file": "catalogued/letter_11.md", "modern_english_translation": "Right worshipful sir, my duty humbly considered, and so forth. Sir, you shall receive, by the grace of God, in Awdryan Johnson's keeping, a firkin containing 10 rounds of sturgeon, and so forth. So Jesus be with you, amen.", "summary": "Christopher Fysher sends an extremely terse note from Antwerp to his master William Windleff, informing him that a firkin containing ten rounds of sturgeon is being dispatched via Adrian Johnson. The letter contains nothing beyond this bare shipment notice.", "letter_type": "business", "themes": ["trade", "shipping", "food"], "people_mentioned": ["Christopher Fysher", "William Windleff", "Adrian Johnson"], "goods_mentioned": ["sturgeon"], "notable": false}, {"id": 12, "sender": "Edward Faerlaey", "recipient": "his uncle Willem Faerlaey", "date": "1533 July 23", "origin": "Antwerp", "destination": "", "language": "Middle Dutch", "original_transcription": "+\n\nVriendelicke groetenesse voerscreven aen hu mij lieve ende zeer bemijnden hooem. Ic\nghebiede mij alsoee heertelic, alst mij moegelic ees, in hu ghoede ende amiabele graeesy.\nMin lieeve ende zeer beminde hooem hu sal believen te mercken, dat mij soee zeer verlaut\nain heenijge bij dinge van hu te hoeeren vant ic in soee langhe van hu niet ghehoerrt en\nhebbe et welck mij een groet verdriet ees, vant ic hebbe hu soe veel brieven ghescreven\nende ic en horee gheen andtvorde, maer ic moet pasieensy hebben tot ter tijt, dat hu\nmijn lieve hooem beelyft. Mijn lieve ende zeer beminde hooem, ic gebiede mij ende ic\nrecomandere mij in hu goede ende amiabele grasy. Ende ic bidde hu min lieve hoiem, dat\nghij toch vylt peensien om alle voerleeden saken et soude hu lyttel scaden ende mij aerm\nbloet veel helppen. Aldus bydd ic hu, min lieve hooem, vylt doch mins gedincken. Veet\nmin lieve hooem, dat ic hier ’tAnnerpen eenen Heijnghels man gesproeken hebbe, naer\ndat ic verstae, soee heef hij hu dochter ghetrout, ende dye eft mij gezeet, dat ghij noch\nfraeij ende gesonnt vart et velck mij zeer lief om hoeeren was. Aldus bydd ic hu, mijn lieve\nhoom, dat ic toch in hu memory mach staeen niet meer op deen tijt, min lieve hooem,\ndan God verleene hu en al hu geselscap een lanck leeven ende gesonnde. Mijn lieve hoem,\nkann ic hu hier heenygheen dyenst gedoeen, dat villic gheerne ende ghevillych doen. Ic\n\n\nbidde hu, mijn lieve hoem, dat hu vil ghelieven mij andtworde te senden, hoe dat met hu\nees. Gescreven met haestten tot Antwerpen den 23sten Julijus anno 1533.\n\n[signed] dee al hu dienaer Edewaert Faerlaey", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 12 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA Externa Anglicana no. 1606). Original holograph letter. Paper. Sealed\nclosed with the signet of the writer in red wax (paper seal). On the dorse:\nAen den eerzaeemen ende wysen coepman Villeen Faerlaey.", "file": "catalogued/letter_12.md", "modern_english_translation": "With friendly greetings as aforementioned to you, my dear and most beloved uncle. I commend myself as heartily as I am able to your good and amiable grace. My dear and most beloved uncle, it may please you to know that I am greatly distressed at having had no news of you, as I have not heard from you in so long, which causes me great sorrow, for I have written you so many letters and I receive no reply. But I must have patience until such time as it pleases you, my dear uncle. My dear and most beloved uncle, I commend and recommend myself to your good and amiable grace. And I beg you, my dear uncle, that you would be so good as to think upon all past matters [Note: likely referring to an outstanding debt or unresolved business between them], for it would cost you little and would help greatly one of your own poor blood. Thus I beg you, my dear uncle, please do remember me. Know, my dear uncle, that I have here in Antwerpen spoken with an Englishman who, as I understand, has married your daughter, and he told me that you are still hale and in good health, which was very glad news for me to hear. Thus I beg you, my dear uncle, that I may yet hold a place in your memory — no more for now, my dear uncle — but may God grant you and all your company long life and good health. My dear uncle, if I can render you any service here, I shall do so willingly and gladly. I beg you, my dear uncle, that it may please you to send me a reply of how you are faring. Written in haste at Antwerpen the 23rd of July in the year 1533.", "summary": "Edward Faerlaey writes a heartfelt and increasingly desperate letter from Antwerp to his uncle Willem, lamenting that his many previous letters have gone unanswered. He has learned through an Englishman who married his uncle's daughter that Willem is in good health, yet still has not heard from him, and begs to be remembered and helped with unspecified past matters that are likely financial.", "letter_type": "personal", "themes": ["family", "financial", "debt", "social_networks"], "people_mentioned": ["Edward Faerlaey", "Willem Faerlaey"], "goods_mentioned": [], "notable": true, "notable_reason": "The emotional intensity of a young man pleading repeatedly to be remembered by a silent uncle makes this one of the most humanly affecting letters in the collection."}, {"id": 13, "sender": "William Pratt, grocer,", "recipient": "his wife", "date": "1533 July 15", "origin": "Antwerp", "destination": "", "language": "Middle English", "original_transcription": "+\n\nAtt Andwarp the 15th de July anno 1533; N° 1a\n\nI trust by God you be all in gode helthe etc. Serteffyeng you thatt I have sentt Edward\ninto Zelland to come home with the fyrst wynde. Than, I wold you applyed your buyssynes\nand to tak syche monny as schalle forttune to fall. And thow you sell the better schep for\nmony, lett alleways atte the leste be twane in the schep. I wold you bowght a bollyne of\nquyksylver, so you may have ytt for 9d atte the most, as I thynk you schalle better schep\nand selle away the almondes and you can mak no store of no warre you have exseptt the\n2 balles of mader, wyche I wold have 15s 6d for 1 C redy mony att the lest.\n\nYou may schow Edward Mewrelle thatt my nosteys saythe sche lentte hyme a fetther\nbed anda a gowne wyche sche mervellythe he hathe nott sentt ageyne. If he hathe, lest ytt\nonny wherre, bydb hyme fynd same provyssyen thatt ytt may be sentt hether with spede,\nfor sche says she schalle elles pay for ytt.\n\nAnd ytt was no mervelle thatt Edward Marttens servantt sold the bag of peper untto\n\nyou, for ther was nott so myche in Andworp thys 7 yere att owne tyme.\n\nTherfor ryde ytt away and you can and yf you have made me overc no mony by exchange,\n\nmake over nowe.\n\nPeper ys chere at 27d and 3 myttes les, cloz 5s 6d and therffore mak no store bowtt\nsell and ytt be possybell. Take hede to your bemes and skalles and wayttes thatt you be\nnott dessevede in no wys and se thatt your comfettes and orradoes be made as sooune\nas Edward comynth home. In ony vys I ferre me lest my cottons be to a yll markett. Than\nschalle I nott save my costes. And loke you truste nonne dbowttd thatt you know be surre\nor elles thatt you have gode surtty. All owther warres kepethe ther prysses as they dyde\naffore. By owther letteres sentt by Edward gowne and thys fare you well.\n\n[signed] Your hosbande Wylliam Pratt g[entleman]", "editorial_notes": "a and repeated HL, in error.\nletter follows, struck through HL.\nb he follows, struck through HL.\nd-d Interlined HL.\nc One illegible", "archival_reference": "HL AHL ASA, Externa Anglicana 476, Folder with letters, no. 13 (original\nclassification by Dreyer: Acta Anglicana, Appendix 2; later reclassified as\nASA, Externa Anglicana no. 1606). Original holograph letter. Paper. Sealed\nclosed with the signet of the writer in red wax. On the dorse: + To Wylliam\nPratt of London grocer be delivered London.", "file": "catalogued/letter_13.md", "modern_english_translation": "At Antwerp, the 15th of July, in the year 1533; No. 1a\n\nI trust by God that you are all in good health, etc. I am letting you know that I have sent Edward into Zeeland to come home with the first wind. Then, I would have you attend to your business and to take such money as shall happen to come in. And though you sell the better sheep for money, let there always be at least two in the flock. I would have you buy a flask of quicksilver, so long as you can have it for 9d at the most, as I think you shall better ship and sell away the almonds — and if you can make no store of any wares you have, except the 2 bales of madder, for which I would have 15s 6d per hundredweight in ready money at the least.\n\nYou may inform Edward Mewrelle that my hostess says she lent him a featherbed and a gown, and she marvels that he has not sent them back. If he has left them somewhere, bid him find such provision that they may be sent here with speed, for she says she shall otherwise pay for it.\n\nAnd it was no wonder that Edward Martens's servant sold the bag of pepper to you, for there has not been so much in Antwerp in these past 7 years at one time.\n\nTherefore, rid yourself of it as best you can, and if you have not yet sent me over any money by exchange, send it over now.\n\nPepper is dear at 27d and 3 mites less; cloves at 5s 6d — and therefore make no store of it, but sell if it be possible. Take heed of your beams and scales and weights, that you be not deceived in any way, and see that your comfits and [Note: \"orradoes\" — uncertain term, possibly a type of confection or preparation; identity unclear] be made as soon as Edward comes home. In any case, I fear that my cottons may go to a poor market. Then I shall not recover my costs. And see that you trust none [Note: \"dbowttd\" appears to be a scribal corruption, likely \"doubt\" or \"doubtful credit\" — meaning: trust no one of uncertain standing] unless you know them to be sure, or else that you have good surety. All other wares keep their prices as they did before. By other letters sent by Edward previously, and this — fare you well.", "summary": "William Pratt, a grocer based in Antwerp, writes to his wife with detailed business instructions covering a wide range of commodities and household matters. He directs her on selling sheep, buying quicksilver, shipping almonds, and pricing madder, while noting that pepper is exceptionally plentiful — the most in seven years. The letter reveals a busy merchant household where wife and servant together manage operations in his absence.", "letter_type": "mixed", "themes": ["trade", "family", "food", "spices", "textiles", "financial"], "people_mentioned": ["William Pratt", "Edward", "Edward Mewrelle"], "goods_mentioned": ["sheep", "quicksilver", "almonds", "madder", "pepper", "featherbed", "comfits", "cottons", "scales", "weights"], "notable": true, "notable_reason": "A rare window into the domestic-commercial partnership of a Tudor merchant couple, with the wife acting as a capable business agent.
