dersigned notary draw up a notarial instrument (or notarial instruments) recording\nthe above. Done in Lübeck in the town hall in the presence of the town councillors on the\ndate recorded above [9 Apr. 1534]. Witnesses Hermann Iserhell, Conrad Cock, both\ncitizens of Lübeck. The usual notary’s entry follows. — 1534 Apr. 9. Lübeck.\n\nHL AHL ASA, Externa Anglicana 476, no. 11. Original notarial instrument\ndrawn up by Michael Petri, cleric of the diocese of Schwerin, with his notary’s\nmark (see below).\n\n[1.]\nIn nomine Domini amen. Per hoc presens publicum instrumentum cunctis pateat\nevidenter et sit notum, quod anno a nativitate Ejusdem millesimo quingentesimo\ntricesimo quarto, indictione septima, die vero jovis nona mensis Aprylis [9 Apr. 1534],\nimperante gloriosissimo invictissimoque ac catholico principe et domino domino\nKarolo Quinto divina favente clementia Romanorum imperatore semper augusto ac\nGermanie, Hispaniarum, utriusque Sicilie, Hierusalem, Hungarie, Dalmacie, Croatie etc.\nrege, archiduce Austrie, duce Burgundie etc. anno imperii quinto decimo, cum alias fuerit\net sit, quod nuper de anno Domini millesimo quingentesimo tricesimo tertio de mense\nAugusti tempore guerrarum et inimicitiarum inter Lubicenses ex una et Hollandinos\npartibus ex altera spectabiles domini de senatu civitatis Lubicensis inter alia nonnulla bona\nin quadam navi – hoya vulgariter nuncupata – ville Anthwerpie, cujus patronus sive rector\nerat Adrianus Johanßen tunc existentia, et per deputatos dictorum Lubicensium milites\nstipendiarios in publico mari sine tamen consensu et mandato dictorum dominorum de\nsenatu Lubicensi apprehensa et que bona, dum ad civitatem Lubicensem advenissent\nseu confluissent, prelibatus senatus Lubicensis non alias quam pro commodo et utilitate\ncommunium mercatorum ad se recepissent et fideliter conservari fecissent. Idcirco coram\neisdem prudentibus ac spectabilibus viris dominis proconsulibus et consulibus predicte\ncivitatis Lubicensis in sede et loco consulari consulariter congregatis in meique notarii\npublici ac testium infrascriptorum ad hoc specialiter vocatorum et rogatorum presentia\npersonaliter et presentialiter constitutus commendabilis vir Richardus Plunthon incola\ncivitatis Lunden’ in regno Anglie communiumque mercatorum ibidem, ut asseruit,\nsecretarius a diversis mercatorum predicti regni Anglie legittimus procurator, prout de suo\nprocuratione mandato fidem fecit legittimam, diversa bona ad suos principales pertinere et\nspectare in dicta hoya fuisse designavit, non vi, dolo, metu, fraude vel sinistra machinatione\nseductus vel coactus, sed mera, libera et propria voluntate confessus fuerat ac in veritate\npalam et publice recognovit et confitebatur tam proprio quam omnium principalium\nsuorum constituencium nominibus se antea prima die prefati mensis Aprylis [1 Apr. 1534]\na spectabilibus viris dominis Hermanno Schuten et Godehardo Engelsteden consulibus\n\n\nLubicensibus ad hoc a spectabili senatu Lubicensi deputatis ipsa bona ac merces, que et\nquas predicto proxime elapso anno et mense sub conterminis et portubus regni Anglie\ndicti milites stipendiarii classibus sive navibus bellicis et seu hostilibus dicte civitatis\nLubicensis expediti suis principalibus rapuerant, receperant et abduxerant rehabuisse ac\nrealiter et cum effectu recepisse.\n[2.]  Et primo unam magnam balam sive sarcinam spectantem ad quendam Johannem\nWestborri valoris novaginta sex librarum et unius solidi Flamingi.\nItem adhuc unam aliam magnam balam sive sarcinam centum triginta sex librarum\n[3.]\nFlamingi spectantem ad quendam Rubertum Meredi. In hiis balis seu sarcinis consistebant\nvarie et multe preciose res et merces.\n[4.]\nItem quoddam vas magnum et siccum spectans ad quendam Johannem Eduart,\nin quo varie erant portiones et mercantie valoris insimul, ut estimabatur, triginta novem\nlibrarum Flamingi.\n[5.]\nItem adhuc recepit et se recepisse confitebatur idem Richardus Plunthon unam\ncistam quinquaginta quatuor librarum sterlingorum valoris spectantem et pertinentem\nad quendam Johannem Gerholt.\n[6.]\nItem adhuc idem Richardus rehabuisse confessus fuit duas balas sive sarcinas\nspectantes et pertinentes ad quendam Richardum Wilsun et constant octuaginta sex\nlibras Flammingi.\n[7.]\nItem adhuc unam balam sive sarcinam spectantem et pertinentem ad quendam\nJohannem Practor valoris cum omnibus expensis sexaginta duarum librarum, decem et\nnovem solidorum ac quatuor denariorum Flamingi.\n[8.]\net constat octuainginta novem libras, quindecim solidos et duos denarios Flamingi.\n[9.]\nWilhelmum Lock valoris octuaginta quatuor librarum et solidorum decem.\nItem adhuc recepisse et rehabuisse attestatus fuit idem Richardus Plunthon duas\n[10.]\nparvas tunnas rumbi spectantes ad quendam Wilhelmum Kolsel valoris insimul sex\nlibrarum Flamingi.\n[11.]\nGrossen.\n[12.]\nItem adhuc rehabuisse et recepisse a dictis dominis consulibus idem Richardus\nreferbebat duos ferreatas cistas, quas predicti domini consules sibi aperiri fecerunt et\nfuerunt ydonee, ut esse debebant, reperte et quas ipse Richardus pro sufficienter recepis-\nset, spectantes ad quendam Rubertum Laurentii de civitate Lunden’ cum duabus urnis\nde auricalco taxatis insimul ad valorem decem et septem librarum, septem solidorum et\nocto denariorum Flamingi.\n[13.]\nItem adhuc alias duas ferreatas cistas de corio, in quibus erant certa vestimenta et\nnonnulle littere, insimul taxatas ad triginta libras sterlingorum spectantes et pertinentes\nad quendam Anthonium Sehrene.\n[14.]\nItem quatuor saccos piperis ponderantes insimul ad centum libras, duos\nsolidos et tres denarios Flamingi, spectantes et pertinentes ad quendam Richardum Ausborne.\n[15.]\nItem adhuc unum saccum filorum sive cum filis spectantem et pertinentem ad\nquendam Hinricum Betzer ponderatum et taxatum ad decem et novem libras et decem\net septem solidos et quinque denarios Flamingi.\n\nItem adhuc unam aliam balam sive sarcinam spectantem et pertinentem ad quendam\n\nItem adhuc aliam balam sive sarcinam spectantem ad quendam Henricum Augustin\n\nItem adhuc tres alias parvas tunnas rumbi spectantes ad quendam Wilhelmum\n\n\n1 65\n\nItem adhuc quatuor medias balas seu sarcinas valoris quinquaginta unius libre et\n\nItem adhuc parvum saccum, in quo erant certa folia valentia ad colorem, hec\n\nItem adhuc unam parvam sarcinam, in qua erant certa vestimenta spectantia ad\n\nItem tres saccos canapis spectantes et pertinentes ad quendam Rubertum Reygenholt\n\n[16.]\nItem prefatus Richardus Plunthon adhuc rehabuisse et recepisse publice confessus\nfuit unam balam seu sarcinam piperis, in qua tres sacci piperis continebantur, spectantem\net pertinentem ad quendam Nicolaum Tisborne taxatam et ponderatam ad septingentas\n51 libras et duodecim uncias.\n[17.]\nItem adhuc unam mediam tunnam lineis pannis ab extra ligatum, in qua erant\ncerta aromata, videlicet quadraginta semities libre florum muscatorum, spectantem et\npertinentem ad quendam Eduardum Morthon.\n[18.]\nquendam famulum.\n[19.]\net quinque fasciculos ferreos spectantes ad caldarios.\n[20.]\nquinque solidorum spectantes et pertinentes ad quendam Wilhelmum Bateman.\n[21.]\nItem adhuc saccum unum, in quo erant certa aromata, videlicet cinamomum,\nponderantia ad triginta sex libras et valet qualibet libra sex solidos quatuor denarios. Erat\nsaccus hujusmodi in una tunna sine signo, spectans et pertinens ad quendam Rubertum Meri.\n[22.]\nItem adhuc sepedictus Richardus Plunton recepisse confessus fuit septem fasciculos\ncujusdam grossi lintei panni vulgo kannefast et unam parvam tunnam cum linteis filis et\nparvum saccum cum rubeis lapidibus.\n[23.]\npertinebant ad quendam Rubbertum Dene.\n[24.]\nItem adhuc magnum vas siccum, in quo erant varie res et portiones mercandilitiarum,\ntaxatum ad octuaginta novem libras et octo denarios, spectans et pertinens ad quendam\nThomam Distfelt.\n[25.]\nRodolphum Warinthun.\n[26.]\nspectantibus ad uxorem cujusdam Thome Bruns.\n[27.]\n[28.]\nduas cistas et unum consolier spectantes ad eandem uxorem Thome Bruns.\n[29.]\nuxorem cujusdem Johannis Martini.\n[30.]\net pertinentes ad quendam Johannem Pappham.\n[31.]\nad quendam Maryn Capella.\n[32.]\nTisborn.\n[33.]\nItem adhuc sepedictus Richardus Plunthon rehabuisse et recepisse publice\nconfessus fuit a spectabili domino Tilemanno Tegetmeyger consule Lubicensi tanquam\nad hoc a spectabili senatu Lubicensi deputato unum magnum vas olei et tres tunnas sive\nvasa olei – pypen vulgariter nominata –, spectancia ad quendam Wilhelmum Cassellin.\n[34.]\nspectantes et pertinentes ad quendam Hammoth Hammekrottes civem Lunden’.\n\nItem adhuc unam tunnam spectantem ad quendam Augustinum Hindt.\nItem adhuc sepedictus Richardus Plunthon recepisse attestatus fuit unum lectum,\n\nItem tres fasciculos bissi crudi valoris tredecim librarum sterlingorum, spectantes\n\nItem adhuc magnum vas siccum, in quo erant varie res mercantiarum, spectantes\n\nItem adhuc unam parvam balam seu sarcinam cum certis rebus pellibus et vestibus\n\nItem duos fasciculos rotundos linei panni et duos fasciculos filorum spectantes ad\n\nItem quendam corium saccum cum certis vestibus pertinentes ad quendam\n\nItem adhuc quindecim parvas alias tunnas olei raparum et tres saccos humili,\n\nItem adhuc triginta sex capita succari, spectantes ad quendam Nicolaum\n\n\n[35.]  Quarum mercium et bonorum restitutionem petendi causa sive occasione idem\nRichardus Plunthon se ad civitatem Lubicensem suorum principalium nominibus\ncontulerat et a magnifico ac spectabili senatu Lubicensi omnia et singula suprascripta\nbona tam magnas quam parvas balas sive sarcinas quamlibet sub suo signo notatatis et\nspecificatis juxta tenorem cujusdam certificationis desuper exhibite cum rebus etiam parvis\nquam magnis introclusis nihil ex hiis direptis sive abstractis liberali mente et favorabiliter\nsibi fore ac esse bona hujusmodi reddita, restituta et consignanta, ut premittitur, palam\net publice coram eisdem dominis de senatu Lubicensi confessus fuit juravitque extenso\nbrachio primoribusque erecta digitis corporali juramento ad sancta Dei evangelia\nsupradicta bona ad suos supranominatos principales prelibati regni Anglie regnicolas\net ad nullos alios, dictorum Lubicensium hostes spectare et pertinere et pro tam legali\nrestitutione et reali expeditione suprascriptorum bonorum dictis dominis de senatu\nLubicensi gracias dixit et egit. Et de quibus omnibus et singulis prenarratis bonis, rebus\nmercandilitiis tam parvis quam magnis sic restitutis, receptis et consignatis sepedictus\nRichardus Plunthon omnium suorum principalium ac eorundem heredum nominibus\nprefatos proconsules, consules totumque senatum civitatis Lubicensis auniversosque\ncives et inquilinos dicte [civitatis]a omnesque alios et singulos, quorum interest aut\ninteresse poterit quomodolibet in futurum, quietavit, liberavit penitus de dictis bonis\nperceptis et absolvit eisque finem, quitationem ac pactum perpetuum de ulterius semel\nrem habitam non petendo fecit, renuntiando etiam exceptionem dictorum bonorum\nsic per eum receptorum non habitorum seu non receptorum et spei future habitionis\net numerationis, quibus contra premissa vel aliquod premissorum se defendere posset\nquomodolibet vel lucri, adeo quod neque dictus senatus neque eorum cives seu inquilini\npost hac inperpetuum harum atque mertium sive bonorum, ut prefertur, direptionum\noccasione amplius conveniri, vexari, inquietari et molestari in judicio nec extra possint\net debent, sed super hiis immunes, indemnes, innoxios, absolutos, emancipatos prestare\net observare volens solemni stipulatione interveniente ac sub hypotheca et obligacione\nomnium et singulorum bonorum suorum mobilium et immobilium presentium et\nfuturorum ac qualibet alia juris et facti renunciatione ad hec necessaria pariter et cautela.\nAc omnia premissa se ac suos principales firmiter et involabiliter observaturos sub pena\nreatus perjurii jurejurando tactis scripturis sacrosanctis ad sancta Dei evangelia juravit, de\net super quibus omnibus et singulis premissis spectabilis ac prudens vir dominus Joachim\nGerkens senior proconsul Lubicensis nomine totius senatus Lubicensis per me notarium\npublicum infrascriptum unum vel plura publicum seu publica fieri petiit instrumentum\net instrumenta.\n\nActa fuerunt hec in sepedicta civitate Lubicensi, ibidem in domo consulari et coram\ndominis de senatu anno, indictione, die, mense et aliis quibus supra. Presentibus ibidem\nprovidis et honestis viris Hermanno Iserhell et Conrado Kock civibus Lubicensibus\ntestibus ad premissa vocatis specialiter atque rogatis.\n\nApprobo ego Michael notarius apposita ob errorem omissa.\nSimiliter ego idem notarius infrascriptus approbo rasuram in verbis\nseptingentas quinquaginta unam libras in tricesima quarta linea a\nprincipio hujus instrumenti computando comissam, quod attestor\nmanu propria.\n\n\n1 67\n\nEt ego Michael Petri clericus Szwerinnensis diocesis\npublicus sacris apostolica et imperiali auctoritatibus\nnotarius quia hujusmodi confessioni, quitationi,\npromissioni, renuntiatione et juramenti prestationi\nomnibusque aliis et singulis premissis, dum, sicut\npremittitur, fierent et agerentur unacum prenominatis\ntestibus presens interfui eaque sic fieri vidi et audivi\nac in notum sumpsi, ideo hoc presens publicum\ninstrumentum manu alterius me interim aliis pre-\npedito negotiia fideliter scriptum et ex notis meis\nextractum exinde confeci subscripsi publicavi et in\nhanc publicam formam redegi signoque nomine\net cognomine meis solitis et consuetis signavi,\nroboravi et communivi in fidem, robur et evidens\ntestimonium omnium et singulorum premissorum\nrogatus et requisitus.\n\nNotary’s mark of Michael Petri", "editorial_notes": "a-a Entered at the bottom of the text with catchmark HL.", "archival_reference": "", "file": "catalogued/doc_48.md", "modern_english_translation": "[1.]\nIn the name of God, amen. By this present public instrument let it be clearly apparent and known to all that in the year from the birth of the Same one thousand five hundred and thirty-four, in the seventh indiction, on Thursday the ninth day of the month of April [9 April 1534], during the reign of the most glorious, most unconquered and Catholic prince and lord, the lord Charles the Fifth, by the grace of God Emperor of the Romans, ever augustus, and king of Germany, Spain, both Sicilies, Jerusalem, Hungary, Dalmatia, Croatia, etc., archduke of Austria, duke of Burgundy, etc., in the fifteenth year of his reign — whereas it had previously been and was the case that in the recent year of Our Lord one thousand five hundred and thirty-three, in the month of August, in the time of the wars and hostilities between the Lübeckers on the one part and the Hollanders on the other part, the notable lords of the council of the city of Lübeck had, among other things, caused certain goods — which had been in a certain ship, commonly called a hoy, of the city of Antwerp, of which the master or captain was Adrian Johansen, and which had been seized by the aforesaid Lübeckers' appointed hired soldiers [Note: milites stipendiarii — mercenary troops or privateers] on the open sea, yet without the consent or mandate of the said lords of the Lübeck council — to be received into their custody and caused to be faithfully preserved, not otherwise than for the benefit and advantage of the fellowship of merchants: therefore before the same prudent and notable men, the lords proconsuls and councillors of the aforesaid city of Lübeck, assembled in council in their council chamber and seat, and in the presence of me, the undersigned public notary, and of the witnesses hereunder written specially summoned and requested for this purpose, there appeared personally and in person the commendable man Richard Plunthon, inhabitant of the city of London in the kingdom of England and, as he stated, secretary of the fellowship of merchants there, legitimate procurator of diverse merchants of the aforesaid kingdom of England, as he gave lawful proof of his mandate of procuration, who designated diverse goods belonging to his principals and intended for the said hoy, acting not under duress, deceit, fear, fraud or sinister contrivance, but of his own free, unconstrained and personal will, and did confess and in truth openly and publicly acknowledge and confess, both in his own name and in the names of all his principals and constituents, that on the first day of the aforesaid month of April [1 April 1534] he had already received back and did truly and effectively receive from the notable men, the lords Hermann Schuten and Godehard Engelsteden, councillors of Lübeck, specially deputed hereto by the notable council of Lübeck, those very goods and merchandise which the said hired soldiers, dispatched on warships or hostile vessels of the said city of Lübeck, had in the previous year within the limits and ports of the kingdom of England plundered, taken and carried off from his principals.\n\n[2.] And first: one large bale or pack belonging to a certain John Westborri, worth ninety-six pounds and one shilling Flemish.\n\n[3.] Item: furthermore one other large bale or pack of one hundred and thirty-six pounds Flemish, belonging to a certain Robert Meredy. Within these bales or packs were contained various and many precious goods and merchandise.\n\n[4.] Item: a certain large dry vat belonging to a certain John Eduart, in which were various portions and merchandise, valued together, as estimated, at thirty-nine pounds Flemish.\n\n[5.] Item: furthermore the same Richard Plunthon received and acknowledged receipt of one chest worth fifty-four pounds sterling, belonging and pertaining to a certain John Gerholt.\n\n[6.] Item: furthermore the same Richard confessed to having received back two bales or packs belonging and pertaining to a certain Richard Wilsun, valued at eighty-six pounds Flemish.\n\n[7.] Item: furthermore one bale or pack belonging and pertaining to a certain John Practor, worth with all expenses sixty-two pounds, nineteen shillings and four pence Flemish.\n\n[8.] Item: furthermore another bale or pack belonging to a certain Henry Augustin, valued at eighty-nine pounds, fifteen shillings and two pence Flemish.\n\n[9.] Item: furthermore another bale or pack belonging to a certain William Lock, worth eighty-four pounds and ten shillings.\n\n[10.] Item: furthermore the same Richard Plunthon attested to having received and recovered two small tuns of rumbi [Note: a type of spirits or cordial] belonging to a certain William Kolsel, worth together six pounds Flemish.\n\n[11.] Item: furthermore three other small tuns of rumbi belonging to a certain William Grossen.\n\n[12.] Item: furthermore the same Richard stated that he had received back and recovered from the said lords councillors two iron-bound chests, which the aforesaid lords councillors had caused to be opened for him and which were found to be proper and as they should be, and which the said Richard acknowledged as sufficiently received, belonging to a certain Robert Laurentii of the city of London, together with two brass urns [Note: venis de auricalco — vessels of brass or latten], valued together at seventeen pounds, seven shillings and eight pence Flemish.\n\n[13.] Item: furthermore two other iron-bound leather chests, in which were certain garments and various letters, valued together at thirty pounds sterling, belonging and pertaining to a certain Anthony Sehrene.\n\n[14.] Item: four sacks of pepper weighing together one hundred pounds, two shillings and three pence Flemish, belonging and pertaining to a certain Richard Ausborne.\n\n[15.] Item: furthermore one sack of thread belonging and pertaining to a certain Henry Betzer, weighed and valued at nineteen pounds, seventeen shillings and five pence Flemish.\n\n[16.] Item: furthermore the aforesaid Richard Plunthon publicly confessed to having received back and recovered one bale or pack of pepper, in which three sacks of pepper were contained, belonging and pertaining to a certain Nicholas Tisborne, weighed and measured at seven hundred and fifty-one pounds and twelve ounces.\n\n[17.] Item: furthermore one half-tun of linen cloth bound on the outside, in which were certain spices, namely forty and a half pounds of mace [Note: floris muscatorum — literally \"flowers of musk,\" i.e. mace], belonging and pertaining to a certain Edward Morthon.\n\n[18.] Item: one small pack in which were certain garments belonging to a certain servant.\n\n[19.] Item: three sacks of hemp [Note: canabis] belonging and pertaining to a certain Robert Reygenholt, and five iron bundles pertaining to cauldrons [Note: fasciculos ferreos spectantes ad caldarios — iron fittings or handles for kettles].\n\n[20.] Item: furthermore four medium bales or packs worth fifty-one pounds and five shillings, belonging and pertaining to a certain William Bateman.\n\n[21.] Item: furthermore one sack in which were certain spices, namely cinnamon, weighing thirty-six pounds, worth six shillings and four pence per pound. This sack was contained within one tun without a merchant's mark, belonging and pertaining to a certain Robert Meri.\n\n[22.] Item: furthermore the aforesaid Richard Plunthon confessed to having received seven bundles of a certain coarse linen cloth commonly called canvas [Note: kannefast], and one small tun with linen thread, and a small sack with red stones.\n\n[23.] Item: furthermore a small sack containing certain leaves useful for dyeing [Note: certa folia valentia ad colorem], belonging to a certain Robert Dene.\n\n[24.] Item: furthermore a large dry vat in which were various goods and portions of merchandise, valued at eighty-nine pounds and eight pence, belonging and pertaining to a certain Thomas Distfelt.\n\n[25.] Item: a leather sack containing certain garments, belonging to a certain Ralph Warinthun.\n\n[26.] Item: furthermore a small bale or pack containing certain goods, furs and garments, belonging to the wife of a certain Thomas Bruns.\n\n[27.] Item: one tunic belonging to Augustin Hindt.\n\n[28.] Item: furthermore one bed, two chests and one coverlet [Note: consolier — a cover or quilt], belonging to the said wife of Thomas Bruns.\n\n[29.] Item: two round bundles of linen cloth and two bundles of thread, belonging to the wife of a certain John Martini.\n\n[30.] Item: furthermore a large dry vat containing various goods and merchandise, belonging and pertaining to a certain John Pappham.\n\n[31.] Item: three bundles of raw silk [Note: bissi crudi] worth thirteen pounds sterling, belonging to a certain Maryn Capella.\n\n[32.] Item: furthermore thirty-six sugarloaves, belonging to a certain Nicholas Tisborn.\n\n[33.] Item: furthermore the aforesaid Richard Plunthon publicly confessed to having received back and recovered from the notable lord Tilemann Tegetmeyger, councillor of Lübeck, specially deputed hereto by the notable council of Lübeck, one large vat of oil and three tuns or vats of oil — commonly called pipes [Note: pypen — large barrel-casks] — belonging to a certain William Cassellin.\n\n[34.] Item: furthermore fifteen other small tuns of rape oil and three sacks of hops [Note: humili], belonging and pertaining to a certain Hamnoth Hammekottes, citizen of London.\n\n[35.] The aforesaid Richard Plunthon, for the purpose and occasion of seeking restitution of these goods and merchandise, had come to the city of Lübeck in the names of his principals, and before the magnificent and notable council of Lübeck he openly and publicly — in the presence of the same lords of the Lübeck council — confessed that all and singular the goods listed above, both large and small bales or packs, each noted and specified under its mark, in accordance with the tenor of a certain certification produced in relation thereto, together with the small as well as the large items contained within, nothing of these being taken away or removed, had been restored, returned and consigned to him liberally and favourably, as aforesaid. And he swore, with arm extended and the first fingers raised, a bodily oath upon the holy Gospels of God, that the aforesaid goods belonged and pertained to his abovenamed principals, subjects of the aforesaid kingdom of England, and to no others, and not to any enemies of the said Lübeckers; and for such lawful restitution and real discharge of the abovescribed goods he gave and rendered thanks to the said lords of the Lübeck council. And concerning all and singular the aforementioned goods, things and merchandise, both small and great, so restored, received and consigned, the aforesaid Richard Plunthon, in the names of all his principals and their heirs, did fully release, liberate and acquit the aforesaid proconsuls, councillors and the whole council of the city of Lübeck and all citizens and inhabitants of the said city and all others whosoever whose interest it is or may be in any way in future, from the said received goods, and made with them a final settlement, acquittance and perpetual pact of not seeking again a thing already received, renouncing also the exception that the said goods had not been thus received or had not been received, and the hope of future receipt and payment, by which he could defend himself in any way against the foregoing or any part thereof, or for gain; so that neither the said council nor their citizens or inhabitants should henceforth in perpetuity be summoned, vexed, disturbed or molested in court or out of court on account of the said seizures of goods and merchandise, as aforesaid, but should be held, maintained and preserved immune, harmless, inoffensive, absolved and released therefrom, with solemn stipulation intervening and under the mortgage and obligation of all and singular his goods, movable and immovable, present and future, and with every other renunciation of law and fact necessary hereto and every safeguard. And he swore, touching the holy scriptures, a bodily oath upon the holy Gospels of God, that he and his principals would firmly and inviolably observe all the foregoing, under penalty of the guilt of perjury.\n\nConcerning all and singular the aforesaid matters, the notable and prudent man, the lord Joachim Gerkens senior, proconsul of Lübeck, in the name of the whole council of Lübeck, requested me, the undersigned public notary, to draw up one or more public instrument or instruments recording the above.\n\nThese acts were done in the aforesaid city of Lübeck, in the council house there, before the lords of the council, in the year, indiction, day, month and other particulars as stated above. Present there were the prudent and honourable men Hermann Iserhell and Conrad Kock, citizens of Lübeck, witnesses specially summoned and requested for the foregoing.\n\nI approve, I Michael the notary, having placed what was omitted through error.\nLikewise I, the same undersigned notary, approve the erasure committed in the words \"seven hundred and fifty-one pounds\" in the thirty-fourth line counted from the beginning of this instrument, as I attest with my own hand.\n\nAnd I, Michael Petri, clerk of the diocese of Schwerin, public notary by sacred apostolic and imperial authority — because I was present together with the aforesaid witnesses at this confession, acquittance, promise, renunciation and swearing of oath, and at all and singular the foregoing, while they were being performed and transacted as aforesaid, and saw and heard them so done and took note thereof — have therefore drawn up, subscribed, published and reduced into this public form the present public instrument, faithfully written by another's hand while I was in the meantime occupied with other business, and extracted from my notes, and have signed, confirmed and authenticated it with my customary and accustomed sign, name and surname, in faith, strength and evident testimony of all and singular the foregoing, having been asked and requested.\n\n[Notary's mark of Michael Petri]", "summary": "A formal notarial instrument dated 9 April 1534, in which Richard Plunthon publicly confesses before the Lübeck council to having received back all seized goods on behalf of the English merchants, swears an oath that the goods belong to English subjects and not Lübeck's enemies, and issues a full and perpetual acquittance releasing the council of Lübeck from any further legal claims arising from the seizure. The document is drawn up by notary Michael Petri and witnessed by Hermann Iserhell and Conrad Kock.", "document_type": "legal_instrument", "themes": ["restitution", "legal_proceedings", "goods_seizure", "maritime", "notarial", "diplomacy", "compensation", "financial"], "people_mentioned": ["Richard Plunthon", "Charles V", "Adrian Johansen", "Tilemann Tegetmeyger", "Joachim Gerkens", "Hermann Schuten", "Godehard Engelsteden", "Michael Petri", "John Westborri", "Robert Meredy", "John Eduart", "John Gerholt", "Richard Wilsun", "John Practor", "Henry Augustin", "William Lock", "William Kolsel", "William Grossen", "Robert Laurentii", "Anthony Sehrene", "Richard Ausborne", "Henry Betzer", "Nicholas Tisborne", "Edward Morthon", "Robert Reygenholt", "William Bateman", "Robert Meri", "Robert Dene", "Thomas Distfelt", "Ralph Warinthun", "Thomas Bruns", "Augustin Hindt", "John Martini", "John Pappham", "Maryn Capella", "William Cassellin", "Hamnoth Hammekottes", "Hermann Iserhell", "Conrad Kock"], "goods_mentioned": ["pepper", "mace", "cinnamon", "hemp", "canvas", "linen cloth", "thread", "silk", "sugarloaves", "oil", "rape oil", "hops", "rumbi", "cloth", "furs", "garments", "kettles", "dyestuffs", "haberdashery"], "notable": true, "notable_reason": "The definitive legal closure document for the entire case: a sworn public instrument before the Lübeck council in which the English attorney formally acquits Lübeck of all liability, referencing Emperor Charles V's reign and employing full notarial Latin formulae, making it the most legally significant document in the collection."}, {"id": 49, "section": "III", "section_title": "Losses in the ship of Adrian Johnson (1533): English losses", "title": "Goods of English merchants received by Richard Plumpton in Lübeck", "date": "1534 Apr", "location": "", "language": "Latin", "content": "Alia copia instrumenti quietancie et confessionis diversorum\nnotabilium receptorum bonorum Richgardi Plonthon pro spectabili\nsenatu Lubicensi\n\nIn nomine Domini amen. Per hoc presens publicum instrumentum cunctis pateat\n[1.]\nevidenter et sit notum, quod anno a nativitate Ejusdem millesimo quingentesimo tricesimo\nquarto, indictione septima, die vero jovis nona mensis Aprylis [9 Apr. 1534], imperante\ngloriosissimo invictissimoque ac catholico principe et domino domino Karolo Quinto divina\nfavente clemencia Romanorum imperatore semper augusto ac Germanie, Hispaniarum,\nutriusque Sicilie, Hierusalem, Hungarie, Dalmacie etc. rege, archiduce Austrie et duce\nBurgundie etc. anno imperii quinto decimo, cum alias fuerit et sit, quod nuper de anno\nDomini millesimo quingentesimo tricesimo tercio de mense Augusti tempore guerrarum et\ninimicitiarum inter Lubicenses ex una et Hollandinos partibus ex altera spectabiles domini\nde senatu civitatis Lubicensis inter alia nonnulla bona in quadam navi – hoya wulgariter\n\n  42  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű), a caron\n\n(ǔ) or a breve (ŭ) – also inverted – in order to distinguish it from two minims. Since this has no effect on the\npronunciation of the word, these are all transcribed as ‘u’. In addition, the letter ‘n’ is occasionally signalled by a\nsuperscribed inverted breve. Again, this is ignored in the transcription.\n\n\nnuncupata – ville Anthwerpie, cujus patronus sive rector erat Adrianus Johansen (tunc\nexistente), et per deputatos dictorum Lubicensium milites stipendiarios in publico mari\nsine tamen consensu et mandato dictorum dominorum de senatu Lubicensi apprehensa\net que bona, dum ad civitatem Lubicensem advenissent seu confluissent, prelibatus\nsenatus Lubicensis non alias quam pro commodo et utilitate communium mercatorum\nad se recepissent et fideliter conservari fecissent. Idcirco coram eisdem prudentibus ac\nspectabilibus viris dominis proconsulibus et consulibus predicte civitatis Lubicensis in\nsede et loco consulari consulariter congregatisa in meique notarii publici testiumque\ninfrascriptorum et ad hoc specialiter vocatorum et rogatorum presentia personaliter\net presentialiter constitutus commendabilis vir Richgardus Plunthon incola civitatis\nLunden’ in regno Anglie communiumque mercatorum ibidem, ut asseruit, secretarius\na certis diversis mercatoribus predicti regni Anglie legittimus procurator, prout de suo\nprocuratione mandato fidem facit litteram, diversa bona ad suos principales pertinere et\nspectare in dicta hoya fuisse designavit, non vi, dolo, metu, fraude vel sinistra machinatione\ncoactus vel seductus, sed mera, libera et propria voluntate confessus fuerat et in veritate\npalam et publice recognovit betb confitebatur tam proprio quam omnium principalium\nsuorum bconstituenciumb nominibus se antea prima die prefati mensis Aprylis [1 Apr. 1534]\na spectabilibus viris dominis Hermanno Schuten et Godehardo Engelsteden consulibus\nLubicensibus ad hoc a spectabili senatu Lubicensi deputatis ipsa bona ac merces, que et\nquas predicto proximo elapso anno et mense sub conterminis et portubus regni Anglie\ndicti milites stipendiarii classibus sive navibus bellicis et seu hostilibus dicte civitatis\nLubicensis expediti suis principalibus rapuerant, receperant et abduxerant prehabuisse\nac realiter et cum effectu recepisse.\n[2.]  Et primo unam cmagnamc balam sive sarcinam spectantem ad quendam Johannem\nWestborri valoris novaginta sex librarum et unius solidi Flammingensium.\nItem adhuc unam aliam magnam balam sive sarcinam valoris centum triginta sex\n[3.]\nlibrarum Flammingensium, spectantem ad quendam Rubbertum Meredi. In hiis balis sive\nsarcinis consistebant varie et multe preciose res et merces.\nItem quoddam vas magnum et siccum spectans ad quendam Johannem Eduwart,\n[4.]\nin quo varie erant portiones et mercantie valoris insimul, ut estimabatur, triginta novem\nlibrarum Flammingensium.\nItem adhuc recepit et se recepisse confitebatur idem Richgardus Plunthon unam\n[5.]\ncistam quinquagintarum quatuor librarum sterlingorum valoris, spectantem et pertinentem\nad quendam Johannem Gherholt.\nItem adhuc idem Richgardus rehabuesse confessus fuit duas balas sive sarcinas\n[6.]\nspectantes et pertinentes ad quendam Richgardum Wilsun et constant octuaginta sex\nlibras Flammingensium.\nItem adhuc unam balam sive sarcinam spectantem et pertinentem ad quendam\n[7.]\nJohannem Practor, valoris cum omnibus expensis sexaginta duarum librarum, decem et\nnovem solidorum ac quatuor denariorum Flammingensium.\nItem adhuc aliam balam sive sarcinam spectantem ad quendam Hinricum\n[8.]\nAugustyn, et constat octuaginta novem libras, quindecim solidos et duos denarios\nFlammingensium.\n[9.]\nWilhelmum Lock, valoris octuagintarum quatuor librarum et solidorum decem.\n\nItem adhuc unam aliam balam sive sarcinam spectantem et pertinentem ad quendam\n\n\n1 69\n\nItem adhuc tres alias parvas tunnas rumbi, spectantes ad quendam Wilhelmum\n\nItem adhuc recepisse et rehabuisse attestatus fuit idem Richardus Plunthon duas\n[10.]\nparvas tunnas rumbi spectantes ad quendam Wilhelmum Kolsel, valoris insimul sex\nlibrarum Flamingensium.\n[11.]\nGrossen.\nItem adhuc rehabuisse et recepisse predictis dominis consulibus idem Richgardus\n[12.]\nrefeberebat duos ferreatas cistas, quas predicti domini [con]silii aperiri fecerunt et fuerunt\nydonie, ut esse debebant, repertas, et quas ipse Richgardus pro sufficienter recepisset,\nspectantes ad quendam Rubbertum Laurentii de civitate Lundon’ cum duabus urnis de\nauriculco taxatis insimul ad valorem decem et septem librarum, septem solidorum et octo\ndenariorum Flammingensium.\nItem adhuc duas alias ferreatas cistas de coreo, in quibus erant certa vestimenta et\n[13.]\nnonnulle littere, insimul taxatas ad triginta libras sterlingorum, spectantes et pertinentes\nad quendam Anthonium Serene.\nItem quatuor saccos piperis ponderantes insimul ad centum libras, [ad] duos\n[14.]\nsolidos et tres denarios Flamingensium [pro libra], spectantes et pertinentes ad quendam\nRichgardum Ousborne.\nItem adhuc unum saccum filorum sive cum filis, spectantem et pertinentem ad\n[15.]\nquendam Hinricum Betzer, ponderatum et taxatum ad decem et novem librasd et decem\net septem solidos et quinque denarios Flammingensium.\nItem prefatus Richgardus Plunthon adhuc rehabuisse et recepisse publice confessus\n[16.]\nfuit unam balam sive sarcinam piperis in quatrese saccie piperis continebantur, spectantem\net pertinentem ad quendam Nicolaum Tysborne, taxatum et ponderatum ad septingentas\nquinquaginta unum libras et duodecim uncias.\nItem adhuc unam mediam tunnam lineis pannis ab extra ligatam, in qua erant\n[17.]\ncerta aromata, videlicet quadraginta semities libre florum muscatorum, spectantem et\npertinentem ad quendam Eduwartus Morthon.\n[18.]\nquendam famulum.\n[19.]\nReygenholt et quinque fasciculos ferreos spectantes ad caldarios.\nItem adhuc quatuor medias balas sive sarcinas valoris quinquagintarum unius\n[20.]\nlibre et quinque solidorum spectantes et pertinentes ad quendam Wilhelmum Bateman.\nItem adhuc saccum unum, in quo erant certa aromata, videlicet cinamomum\n[21.]\nponderatum ad triginta sex libras et valet qualibet libra sex solidos 4 denarios. Erat\nsaccus hujusmodi in una tunna sine signo, spectans et pertinens ad quendam Rub-\nbertum Meri.\nItem adhuc sepedictus Richgardus Plunton recepisse confessus fuit septem fasciculos\n[22.]\ncujusdam grossi lineii panni wulgo kannefust et unam parvam tunnam cum lineis filis et\nparvum saccum cum rubeis lapidibus.\n[23.]\npertinabat ad quendam Rubbertum Dene.\nItem adhuc magnum vas siccum, in quo erant varie res et portiones mercandilinitese\n[24.]\ntaxatum ad novem et octuaginta libras et octo denarios, spectans et pertinens ad quendam\nThomam Dystfelt.\n\nItem adhuc unam parvam sarcinam, in qua erant certa vestimenta spectantia ad\n\nItem adhuc parvum saccum, in quo erant certa folia valentia ad colorem. Hoc\n\nItem tres saccos canapis spectantes et pertinentes ad quendam Rubbertum\n\n\nItem quendam coreum saccum cum certis vestibus pertinentes ad quendam\n\nItem duos fasciculos rotundos linnei panni et duos fasciculos filorum spectantes\n\nItem adhuc magnum vas siccum, in quo erant varie res mercantiarum, spectans et\n\nItem tres fasciculos bissi crudi valoris tredecim librarum sterlingorum, spectantes\n\nItem adhuc unam parvam balam seu sarcinam cum certis brebusb pellinibus et\n\nItem adhuc unam tunnam spectantem ad quendam Augustinum Hindt.\nItem adhuc sepedictus Richgardus Plunthon recepisse attestatus fuit unum lectum,\n\n[25.]\nRodolphum Warynthun.\n[26.]\nvestibus spectantes ad uxorem cujusdam Thome Bruns.\n[27.]\n[28.]\nduas cistas et unum confor spectantes ad eandem uxorem Thome Bruns.\n[29.]\nad uxorem cujusdem Johannis Martini.\n[30.]\npertinens ad quendam Johannem Pappham.\n[31.]\nad quendam Maryn Capella.\nItem adhuc triginta sex capita succari, spectantes ad quendam Nicolaum Tisborne.\n[32.]\nItem adhuc sepedictus Richgardus Plunthon rehabuisse et recepisse publice\n[33.]\nconfessus fuit a spectabili domino Tylemanno Thegetmeyger consule Lubicensi tanquam\nad hoc a spectabili senatu Lubicensi deputato unum magnum vas olei et tres tunnas sive\nvasa olei – pypen wulgariter nominata -, spectancia ad quendam Wilhelmum Cassellyn.\nItem adhuc quindecim parvasf alias tunnas olei raparum et tres saccos humili,\n[34.]\nspectantes et pertinentes ad quendam Hammot Hammetrottes civem Lunden’, quarum\nmercium et bonorum restitutionem petendi causa sive occasione.\nIdem Rigghardus Plunthon se ad civitatem Lubicensem suorum principalium\n[35.]\nnominibus contulerat et a magnifico ac spectabili senatu Lubicensi omnia et singula\nsuprascripta bona, tunnas, magnas quamg parvas balas sive sarcinas quibuslibet sub suo\nsigno notatatis et specificatis juxta tenorem cujusdam certificationis desuper exhibite cum\nrebus etiam parvis quam magnis introclusis nihil ex hiis direptis sive abstractis liberali\nmente et favorabile sibi fore ac esse bona hujusmodi reddita, restituta et consignanter,\nut premittitur, palam et publice coram eisdem dominis de senatu Lubicensi confessus\nfuit juravitque extenso brachio primoribusque erectis digitis corporaliter juramento ad\nsancta Dei evangelia sepedicta bona ad suos supranominatos principales prelibati regni\nAnglie regnicolas et ad nullos alios, dictorum Lubicensium hostes, spectare et pertinere\net pro tam legali restitutione et reali expeditione dictorum suprascriptorum bonorum\ndictis dominis de senatu Lubicensi gracias dixit et egit. Et de quibus omnibus et singulis\nprenarratish bonis, rebus mercandiliniis tam parvis quam magnis sic restetutise, receptis\net consignatis idem sepedictus Richgardus Plunthon omnium suorum principalium\nac eorundem heredum nominibus prefatos proconsules, consules totumque senatum\nuniversosque cives ac inquilinos dicte civitatis Lubicensis omnesque alios et singulos,\nquorum interest aut interesse poterit, quolibet in futurum quietavit, liberavit penitus de\ndictis perceptis bonis et absolvit eisque fynem, quitationem ac pactum perpetuum de\nulterius semel rem habitam non petendo fecit, renuntiando etiam exceptionem dictorum\nbonorum sic per eum receptorum non habitorum seu non receptorum et spei future\nhabitionis et jurationis, quibus contra premissa vel aliquod premissorum se defendere\nposset quomodolibet vel lucri, adeo quod neque dictus senatus neque eorum cives seu\ninquilini post hoc inperpetuum harum atque mertium sive bonorum, ut prefertur, direptionis\noccasione amplius conveniri, vexari, inquietari et molestari in judicioi nec extra possint et\n\n\n1 71\n\ndebent, sed super hiis immunes, indempnes, innoxios, absolutos, emancipatos prestare\net observare volens solemni stipulationis intervenientes ac sub hipoteca et obligacione\nomnium et singulorum bonorum suorum mobilium et immobilium presentium et\nfuturorum ac qualibet alia juris et sacri renunciatione ad hec necessaria pariter et cautela.\nEt omnia premissa se ac suos principales firmiter et involabiliter observatura sub pena\nreatus perjurii jurejurando tactis scripturis sacrosanctis ad sancta Dei evangelia juravit,\nde et super quibus omnebuse et singulis premissis spectabilis ac prudens vir dominus\nJoachim Gherkens senior proconsul Lubicensis nomine totius senatus Lubicensis per\nme notarum publicum infrascriptum unum vel plura publicum seu publica fieri petiit\ninstrumentum et instrumenta.\n\nActa fuerunt hec in sepedicta civitate Lubicensi, ibidem in domo consulari et coram\ndominis de senatu anno, indictione, die, mense et aliis quibus supra. Presentibus ibidem\nprovidis et honestis viris Hermanno Iserahel et Conrado Kock civibus Lubicensibus\ntestibus ad premissa vocatis specialiter atque rogatis.\n\nEt ego Michael Petri clericus Szwerinensis diocesis publicus sacris\napostolica et imperiali auctoritatibus notarius omnia hujusmodi\nconfessioni, quitationi, promissioni, renuntiationis et juramenti\nprestationi omnibusque aliis et singulis premissis, dum, sicut\npremittitur, fierent et agerentur unacum prenominatis testibus\npresens interfui eaque sic fieri vidi et audivi ac in notum sumpsi.\nIdeo hoc presens publicum instrumentum manu propria scriptum\net ex notis meis extractum exinde confeci, subscripsi, publicavi et\nin hanc publicam formam redegi signoque nomine et cognomine\nmeis solitis et consuetis signavi, roboravi et communivi in fidem,\nrobur et evidens testimonium omnium et singulorum premissorum\nrogatus et requisitus.\n\nAusculata et collocionata est presens copia per me eundem Michaelem\nPetri clericum et notarium suprascriptum. Et cum suo orginali\nconcordat, quod attestor manu propria.\n\na congregata follows, struck through HL.\nthe left margin with catchmark HL.\nHL.\nnaratis L, in error.\n\nf aliases follows, struck through HL.\ni juho HL.\n\nb-b Interlined HL.\n\nd libras repeated HL, in error.\ng quas HL, in error.\n\nc-c Entered in\ne Sic\nh preen-", "editorial_notes": "", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 20r-23r (original classification\nby Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn up\nby Michael Petri in 1525, indictione tercia, Monday 23 ... Contemporaneous\ncopy (certified as accurate by the notary Michael Petri). Unsealed.42", "file": "catalogued/doc_49.md", "modern_english_translation": "Another copy of the instrument of quitclaim and acknowledgement of the receipt of various notable goods by Richard Plunthon on behalf of the honourable council of Lübeck.\n\n[1.] In the name of the Lord, amen. Let it be clearly apparent and known to all through this present public instrument that in the year from the nativity of the same [Lord] one thousand five hundred and thirty-four, the seventh indiction, on Thursday the ninth day of the month of April [9 Apr. 1534], during the reign of the most glorious, unconquered and Catholic prince and lord, lord Charles the Fifth, by the favour of divine clemency ever-august Emperor of the Romans and King of Germany, the Spains, both Sicilies, Jerusalem, Hungary, Dalmatia etc., Archduke of Austria and Duke of Burgundy etc., in the fifteenth year of his empire — whereas it had been and is the case that recently, in the year of the Lord one thousand five hundred and thirty-three, in the month of August, at the time of the wars and hostilities between the Lübeckers on the one part and the Hollanders on the other part, the honourable lords of the council of the city of Lübeck had, among certain other goods, [seized goods] in a certain ship — commonly called a hoy [Note: a type of coastal sailing vessel] — of the town of Antwerp, whose master or captain was Adrian Johnson at that time, and [those goods had been] seized on the open sea by the mercenary soldiers deputed by the said Lübeckers, yet without the consent and mandate of the said lords of the council of Lübeck; and whereas those goods, once they had come and been brought to the city of Lübeck, the aforesaid Lübeck council had received into its custody for no other purpose than for the benefit and advantage of the common merchants and had caused them to be faithfully preserved — therefore, before those same prudent and honourable men, the lords burgomasters and councillors of the aforesaid city of Lübeck, assembled in council in the council chamber and council seat, and in the presence of me, the undersigned public notary, and of the witnesses named below, specially summoned and requested for this purpose, there appeared personally and in person the commendable man Richard Plunthon, a resident of the city of London in the kingdom of England and, as he asserted, secretary of the common merchants there, a lawful attorney of certain various merchants of the aforesaid kingdom of England, as the letter of his mandate of procuration attests; he designated various goods belonging to his principals and pertaining to them as having been in the said hoy, not compelled or induced by force, deceit, fear, fraud or malicious contrivance, but of his own free and willing accord; and he had confessed and openly and publicly in truth acknowledged and did confess, both in his own name and in the name of all his principals, that he had previously, on the first day of the aforesaid month of April [1 Apr. 1534], already received those goods and merchandise from the honourable men lords Hermann Schuten and Godhard Engelsteden, councillors of Lübeck deputed for this purpose by the honourable council of Lübeck — namely those goods and merchandise which, in the immediately preceding year and month, under the coasts and in the harbours of the kingdom of England, the said mercenary soldiers dispatched with the warships and hostile fleets of the said city of Lübeck had seized, taken and carried away from his principals — and that he had truly and effectively received them.\n\n[2.] And first, one large bale or bundle belonging to a certain John Westborri, of the value of ninety-six pounds and one shilling Flemish.\n\nItem, yet another large bale or bundle of the value of one hundred and thirty-six pounds Flemish, belonging to a certain Robert Meredi. In these bales or bundles there were various and many precious items and merchandise.\n\n[3.] Item, a certain large dry cask belonging to a certain John Edward, in which there were various items and merchandise, of the value together, as estimated, of thirty-nine pounds Flemish.\n\n[4.] Item, likewise the said Richard Plunthon received and acknowledged having received a chest of the value of fifty-four pounds sterling, belonging and pertaining to a certain John Gherholt.\n\n[5.] Item, likewise the said Richard acknowledged having recovered two bales or bundles belonging and pertaining to a certain Richard Wilsun, worth eighty-six pounds Flemish.\n\n[6.] Item, likewise one bale or bundle belonging and pertaining to a certain John Practor, of the value with all charges of sixty-two pounds, nineteen shillings and four pence Flemish.\n\n[7.] Item, likewise another bale or bundle belonging to a certain Henry Augustyn, worth eighty-nine pounds, fifteen shillings and two pence Flemish.\n\n[8.] Item, likewise one bale or bundle belonging and pertaining to a certain William Lock, of the value of eighty-four pounds and ten shillings.\n\n[9.] Item, likewise one other bale or bundle belonging and pertaining to a certain William Lock [Note: the Latin reads \"Wilhelm Lock\" but the section number and context suggest this entry properly belongs to a different merchant; the Low German parallel text at Doc 51 item [8] shows this as Wilhelm Lock with camlots, and [9] as Wilhelm Colsen with tuns of sturgeon — the Latin text appears to have suffered some disruption here], of the value of eighty-four pounds and ten shillings.\n\nItem, likewise three other small tuns of sturgeon [Note: Latin \"rumbum\"; Low German \"stors\" — sturgeon] belonging to a certain William —\n\n[10.] Item, likewise the said Richard Plunthon attested to having received and recovered two small tuns of sturgeon belonging to a certain William Kolsel, of the total value of six pounds Flemish.\n\n[11.] [Note: this item number appears without a complete corresponding entry in the Latin; the Low German parallel text shows it relates to Wilhelm Grosshen.] Item, likewise the said Richard reported to the aforesaid lords councillors that he had recovered and received two iron-bound chests, which the aforesaid lords of the council had caused to be opened and were found to be in proper order as they ought to be, and which Richard himself had accepted as sufficiently received, belonging to a certain Robert Laurentii of the city of London, together with two bronze urns, valued together at seventeen pounds, seven shillings and eight pence Flemish.\n\n[12.] Item, likewise two other iron-bound leather chests, in which were certain garments and various letters, valued together at thirty pounds sterling, belonging and pertaining to a certain Anthony Serene.\n\n[13.] Item, four sacks of pepper weighing together one hundred pounds [at] two shillings and three pence Flemish [per pound], belonging and pertaining to a certain Richard Ousborne.\n\n[14.] Item, likewise one sack of thread or containing thread, belonging and pertaining to a certain Henry Betzer, weighed and valued at nineteen pounds and seventeen shillings and five pence Flemish.\n\n[15.] Item, the aforesaid Richard Plunthon further publicly acknowledged having recovered and received one bale or bundle of pepper — in which four sacks of pepper were contained — belonging and pertaining to a certain Nicholas Tysborne, weighed and measured at seven hundred and fifty-one pounds and twelve ounces.\n\n[16.] Item, likewise one half-tun wrapped on the outside in linen cloth, in which were certain spices, namely forty-two and a half pounds of mace [Note: \"flores muscatorum,\" literally \"nutmeg flowers\" = mace], belonging and pertaining to a certain Edward Morton.\n\n[17.] Item, [a small packet with certain garments] belonging to a certain servant.\n\n[18.] Item, [three sacks of hemp] belonging to a certain Reynenholt and five iron bundles belonging to cauldrons [Note: \"fasciculos ferreos spectantes ad caldarios\" — iron fittings or hoops for kettles/cauldrons].\n\n[19.] Item, likewise four half-bales or bundles of the value of fifty-one pounds and five shillings, belonging and pertaining to a certain William Bateman.\n\n[20.] Item, likewise one sack in which were certain spices, namely cinnamon weighing thirty-six pounds, each pound worth six shillings four pence. This sack was in a tun without a mark, belonging and pertaining to a certain Robert Meri.\n\n[21.] Item, likewise the aforesaid Richard Plunton acknowledged having received seven pieces of a certain coarse linen cloth commonly called kannefust [Note: Low German \"kannefast\" — a type of coarse linen canvas] and one small tun with linen thread and a small sack with red stones.\n\n[22.] [A small parcel belonging to a certain] Robert Dene.\n\n[23.] Item, likewise a large dry cask in which there were various items and quantities of merchandise, valued at eighty-nine pounds and eight pence, belonging and pertaining to a certain Thomas Dystfelt.\n\nItem, likewise a small bundle in which were certain garments belonging to [a certain person].\n\nItem, likewise a small sack in which were certain leaves useful for dye. This [item —]\n\nItem, three sacks of hemp belonging and pertaining to a certain Robert [Reynenholt —]\n\nItem, a leather sack with certain garments belonging to a certain [person —]\n\nItem, two round bundles of linen cloth and two bundles of thread belonging [to —]\n\nItem, likewise a large dry cask in which there were various quantities of merchandise, belonging and [pertaining to —]\n\nItem, three bundles of raw silk [Note: \"bissi crudi\"] of the value of thirteen pounds sterling, belonging [to —]\n\nItem, likewise one small bale or bundle with certain short furs and [—]\n\nItem, likewise one tun belonging to a certain Augustine Hindt.\n\nItem, likewise the aforesaid Richard Plunthon attested to having received one bed —\n\n[24.] [belonging to] Rodolph Warynthun.\n\n[25.] [—] garments belonging to the wife of a certain Thomas Bruns.\n\n[26.] [—]\n\n[27.] two chests and one coffer [Note: \"confor\" — a small chest or coffer] belonging to the same wife of Thomas Bruns.\n\n[28.] [—] to the wife of a certain John Martini.\n\n[29.] [—] belonging to a certain John Pappham.\n\n[30.] [—] to a certain Maryn Capella.\n\nItem, likewise thirty-six loaves of sugar belonging to a certain Nicholas Tisborne.\n\n[31.] Item, likewise the aforesaid Richard Plunthon publicly —\n\n[32.] [33.] acknowledged having received from the honourable lord Tylemannus Thegetmeyger, councillor of Lübeck, deputed for this purpose by the honourable council of Lübeck, one large vat of oil and three tuns or vats of oil — commonly called pipes [Note: Low German \"pypen\" — large barrels, equivalent to pipes] — belonging to a certain William Cassellyn.\n\n[34.] Item, likewise fifteen small tuns of rape oil and three sacks of hops, belonging and pertaining to a certain Hammot Hammetrottes, citizen of London, for the restoration of which merchandise and goods —\n\n[35.] The said Richard Plunthon had betaken himself to the city of Lübeck in the name of his principals and from the magnificent and honourable council of Lübeck he had received back truly and effectively all and singular the goods written above, the tuns, the large as well as the small bales or bundles, each noted and specified under their mark, according to the tenor of a certain certification exhibited in relation to them, together with the small as well as the large items contained therein, nothing of these plundered or abstracted; and he acknowledged openly and publicly before the said lords of the council of Lübeck that the said goods had been restored, returned and delivered to him in a liberal and favourable manner, as stated above; and he swore with arm outstretched and the first fingers raised, bodily oath upon the holy Gospels of God, that the said goods aforesaid belong and pertain to his above-named principals, inhabitants of the aforesaid kingdom of England, and to no others, enemies of the said Lübeckers; and for such lawful restitution and real delivery of the said goods written above he gave and rendered thanks to the said lords of the council of Lübeck. And of and concerning all and singular the aforesaid goods, merchandise — both small and large — thus restored, received and delivered, the said aforesaid Richard Plunthon, in the name of all his principals and their heirs, fully and completely released, freed and absolved the aforesaid burgomasters, councillors and the entire council, and all citizens and inhabitants of the said city of Lübeck and all others and each of them who have or may have any interest therein at any point in the future, in respect of the said goods received; and made a final quitclaim and perpetual agreement never henceforth to seek again what had once been obtained; renouncing also the exception that the said goods thus received by him had not been had or received, and [renouncing] the hope of future having and claiming thereof, by which he might defend himself against the foregoing or any part thereof in any way, or [claim] profit — so that neither the said council nor their citizens or inhabitants can or should thereafter in perpetuity be summoned, vexed, disturbed or troubled in court or out of court on account of the seizure of these goods and merchandise as aforesaid, but [the said council and citizens] shall keep and observe them immune, unharmed, blameless, absolved and free of any claim, with solemn stipulation intervening and under mortgage and obligation of all and singular his goods, movable and immovable, present and future, and every other renunciation of law and sacred matter necessary to this matter and every precaution. And that he and his principals will firmly and inviolably observe all the foregoing he swore under pain of the guilt of perjury, oath taken touching the holy scriptures upon the holy Gospels of God; and of and concerning all and singular the aforesaid matters the honourable and prudent man lord Joachim Gherkens, senior burgomaster of Lübeck, in the name of the entire council of Lübeck, requested of me, the undersigned public notary, that one or more public instrument or instruments be made.\n\nThese acts were done in the aforesaid city of Lübeck, in the council house there and before the lords of the council, in the year, indiction, day, month and other circumstances as above. Present there were the prudent and honourable men Hermann Iserahel and Conrad Kock, citizens of Lübeck, witnesses specially summoned and requested for the foregoing.\n\nAnd I, Michael Petri, clerk of the diocese of Schwerin, public notary by sacred apostolic and imperial authority, was personally present at all this confession, quitclaim, promise, renunciation and oath-taking and all other and singular matters aforesaid while they were, as stated above, being done and transacted, together with the aforementioned witnesses; I saw and heard these things done in this manner and took notes thereof. Therefore I have drawn up this present public instrument, written in my own hand and extracted from my notes, and have subscribed, published and reduced it to this public form, and have signed, confirmed and fortified it with my customary and accustomed sign, name and surname, in witness, strength and evident testimony of all and singular the foregoing, as requested and required.\n\nThis present copy has been checked and collated by me, the same Michael Petri, clerk and notary as above-named. And it agrees with its original, as I attest in my own hand.\n\n---", "summary": "A notarial instrument dated 9 April 1534 in which Richard Plunthon, acting as attorney for English merchants, formally acknowledges before the Lübeck council that he has received back a large collection of goods seized from Adrian Johnson's hoy in August 1533. The document lists 35 numbered items belonging to named English merchants and includes a full sworn quitclaim releasing Lübeck from all further liability for the seizure. It was drawn up by notary Michael Petri and is described as a copy checked against the original.", "document_type": "legal_instrument", "themes": ["trade", "piracy", "legal_proceedings", "cargo", "compensation", "maritime", "goods_seizure", "restitution", "notarial", "testimony", "textile_trade", "spice_trade", "food_trade", "personal_property"], "people_mentioned": ["Richard Plunthon", "Charles V", "John Westborri", "Robert Meredi", "John Edward", "John Gherholt", "Richard Wilsun", "John Practor", "Henry Augustyn", "William Lock", "William Kolsel", "Robert Laurentii", "Anthony Serene", "Richard Ousborne", "Henry Betzer", "Nicholas Tysborne", "Edward Morton", "Reynenholt", "William Bateman", "Robert Meri", "Robert Dene", "Thomas Dystfelt", "Augustine Hindt", "Rodolph Warynthun", "Thomas Bruns", "John Martini", "John Pappham", "Maryn Capella", "William Cassellyn", "Hammot Hammetrottes", "Hermann Schuten", "Godhard Engelsteden", "Joachim Gherkens", "Hermann Iserahel", "Conrad Kock", "Michael Petri"], "goods_mentioned": ["bales of says", "bales of arras cloth", "dry cask of miscellaneous merchandise", "chest of cypress goods", "bales of sardock cloth", "pepper", "yarn", "mace", "camlots", "sturgeon", "linen cloth", "raw silk", "coarse linen canvas (kannefust)", "cinnamon", "hemp", "rape oil", "olive oil", "hops", "sugar loaves", "red stones", "dyestuff leaves", "iron fittings for cauldrons", "garments", "chests", "letters"], "notable": true, "notable_reason": "The most detailed surviving Latin quitclaim for goods from Adrian Johnson's hoy, listing 35 individual items with named English merchant owners, quantities, values in Flemish pounds and sterling, and a complete sworn release — a key primary source for the cargo composition and the legal resolution of the seizure."}, {"id": 50, "section": "III", "section_title": "Losses in the ship of Adrian Johnson (1533): English losses", "title": "Richard Plunthen acknowledges receiving from the Lübeck councillor Tyle Thegetmeyger by order of the Lübeck council the following goods: 1 great vat of oil and 8 pipes of oil belonging to William Cassellyn (merchant’s mark no. 1 in the left margin);43 15 small tuns of rape oil and 3 sacks of hops belonging to Homont Hametrettes of London", "date": "", "location": "", "language": "Low German", "content": "", "editorial_notes": "1)\n2)", "archival_reference": "HL AHL ASA, Externa Anglicana 476, no. 23, f. 31v. (original classification\nby Dreyer: Acta Anglicana, Appendix 2; later reclassified as ASA, Externa\nAnglicana no. 1606). Paper booklet bound in a notarial instrument drawn up\nby Michael Petri in 1525, indictione tercia, Monday 23 ... Contemporaneous\ncopy (certified as accurate by the notary Michael Petri). Unsealed.44", "file": "catalogued/doc_50.md", "modern_english_translation": "[No content — document title only: Richard Plunthon acknowledges receiving from the Lübeck councillor Tyle Thegetmeyger, by order of the Lübeck council, the following goods: one great vat of oil and eight pipes of oil belonging to William Cassellyn; fifteen small tuns of rape oil and three sacks of hops belonging to Homont Hametrettes of London.]\n\n---", "summary": "A document title entry in Low German recording that Richard Plunthon acknowledged receiving from Lübeck councillor Tyle Thegetmeyger, by order of the council, one great vat of oil and eight pipes of oil belonging to William Cassellyn, plus fifteen small tuns of rape oil and three sacks of hops belonging to Homont Hametrettes of London. No full text survives beyond the title.", "document_type": "receipt", "themes": ["trade", "legal_proceedings", "cargo", "restitution", "goods_seizure", "maritime", "food_trade"], "people_mentioned": ["Richard Plunthon", "Tyle Thegetmeyger", "William Cassellyn", "Homont Hametrettes"], "goods_mentioned": ["olive oil", "rape oil", "hops"], "notable": false}, {"id": 51, "section": "III", "section_title": "Losses in the ship of Adrian Johnson (1533): English losses", "title": "Contemporaneous copy of the quitclaims of Anthonius Oberomiza, Martinus de Federigo and Richard Plunthon for the goods lost in the taking of the ship of Adrian Johnson, translated into Middle Low German for the Lübeck council", "date": "1534 after Apr", "location": "Lübeck", "language": "Low German", "content": "Copia apro spectabili senatu Lubicensia restitutionis certorum\nbonorum restitutorum\n\n[I] Anthonius Oberomiza\n\nAm jar 1534, indictione 7., donnerdages des twolfften des mnts Martii hebbe de\nerbarne und hochwyse heren her Clawes Bardewick und her Hermen Schute rathmanne\nto Lubeck uth bovele des erbaren rades darsulvest to Lubeck und vor ein openbare notario\nund undergeschrevenen thugen hyrto sunderlix geeschet unde gebeden jegenwordicheit\ndem erhafftygen mane Anthonio Oberomiza Venecianer to Lunden in Engellant wanende\nalse eynen hovetmanne to em sulvest horende dusser nageschrevene guder und portzele\nnicht tu plicht, sunder uth gunst und umme reverencie und gundt konichlicher werde\nvan Engellandt mildichliken wedder gegeven, vorrekett und avergeleverth und welcker\nde obgenante Anthonius uth sulcker averleverynge hefft myt danckbarheit wedder\nentfangen, de ock specificert und designeret und dar beneffens stavedes edes to Gade\nund synen helligen geswaren, dat dusse nageschrevenen portzele to em sulvest und susten\n\n  44  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) in order to\n\ndistinguish it from two minims. Since this has no effect on the pronunciation of the word, ‘ű’ is transcribed as ‘u’.\n  45  Note that in this piece, the letter ‘u’ is occasionally signalled by a superscribed double accent aigue (ű) or a breve\n(ŭ) in order to distinguish it from two minims. Since this has no effect on the pronunciation of the word, both are\ntranscribed as ‘u’.\n\n\n1 73\n\nnenem Hollander, Brabander offte Zelander tobehoren und dat ock nemant van den\ndar deel offte antpart ane hebbe etc. Nach lude eynes apenbaren instrumentes darwider\navergemakett etc. und dusse portzele sint in schipper Adrian Johansen hoyge geschepet\ngewesen und weren in schyrst vorgangen sommer dorch der Lüpeschen uthligger tegenst\nde Hollander upp apenbar see, idoch buten des erbaren rades to Lubeck bovele undt\nconsent angenamen.\n\nActum Lubeck und darsulvest dhaen Anthonius den eth dede upp cancellaria und to\naverkennynge und wedder entfangenge der portzele in Hinrick Cordes borgers to Lubeck\nhuse in jegenwardicheit der ersamen manner Laurens Wellmes, Hermen Mollirs und her\nGhert Falcken bosetene borgers to Lubeck hyrto sampt und besundergen geescheet und\ngebedeen.\n\nIta est ut supra, quod ego Michael Petri publicus apostolica et\nimperiali auctoritatibus notarius ad premissa requisitus attestor\nmanu propria.\n\nItem dusse nageschrevenen portzele hebben de genannten heren Anthonio Oberomiza\n\naveranthwordet und welcker he entfangen\n\nNegen dossyne stenene potte\n6 dossyne tynnene potte und 9 potte\nItem 5 dossyn klocken und 5 clocken\nItem 10 spegel\nItem eyn bilde offte hyllige\nItem 8 schottelen\nItem 10 luchter\nItem 6 nascheen myt swyne bosten\nItem 4 marck cirkel und 4 cyrkel\nItem 26 hamer\nItem 8 tangen\nItem desse vorgeschrevene portzele weren in eynem groten korve.\nDewyle denne desulvege Hollandesche hoyge, dar des vorgeschrevenen Anthonius\nOberomiza gudt is inne geschepett geweset, is gesuncken und susten vorsweket, also dat\nsick desulvege Anthonius beclagede, dat he noch sulvige guder offte portzele, welcker em\nweren vorsuncken offt dorche de Lupeschen crygeslude affhendich gemaket noch missede\netc., szo hefft dorch darnab de erbar radt to Lubeck dorch ere vorordenthen uth sunderger\nwoldaet sick to fullenkamen ende genslich deger und alle mit dem obgnanten Anthonio\naller guder und portzele halven, de em vorsunken offte affhendich gemaket weren und he\nnoch myssede, gudt vorengenamen summe geldes, welcker he van Gottken Engelsteden\nund her Albert Clever rathmanne to Lubeck darto vorordenthen up eynen dach und tydt\nvor my apenbar notario und thugen dartho int sunderge geescheett thor nage in getelledem\ngelde wul und wol to dancke entfangen hefft und hefft dhaen forth den vorbenomeden\nerbar aradta ock alle und gemene borger und inwaner der stadt Lubeck vor sick und syne\nerven van allen baven geschrevenen entfangenen vorsunckenen und genamen guder und\nportzele ock van allen, wes he noch missede, ock van trost, schad und therynge, wynst und\ninteresse deger und alle quidt, leddich, los und fry van alle thosprake quiteret und vorlaten\nund alles rechten renunctieret etc. Ock geswaren eyn witlich eth vor sick und syne erven,\n\n\ndarumme nummer to spreckende offte manende etc., also dat eyn erbar radt und de stadt\nLubeck scal myt eyner betalynge quidt, fry, leddich und los wesen.\n\nNach lude eyns apenbaren instrumentes daraver gemaket dar sodans wyder ist anne\n\nvorhalt, ane geferde und argelyst.\n\nIta est ut supra, quod ego Michael Petri publicus apostolica et imperiali\nauctoritatibus notarius ad premissa requisitus manu propria attestor.\n\n[II] Martinus de Federigo\n\nAm dem sulvigen jar 1534 in der sevenden indiction donnerdages des twolfften des\nmnts Martii hebbe de erbaren und hochwyse heren her Clawes Bardewick und her\nHermen Schute rathmanne to Lubeck dartho vorordenthe dem velegedachten Anthonio\nOberomiza vor my apenbar notario und undergeschrevenen thugen dartho geeschet und\ngebeden alse eynem warhafftygen und ungetwyfelden procurator und bevelhebber des\nerhafftigen mannes Martini de Federigo Venedieschen kopmanns syns principals vorrekt\navergelevert und averanthwordet eyne packe syden gemarket aldus [merchant’s mark no. 1\nin the left margin] und welcke packe dem gnanten Martino de Federigo tobehort und\nwelcke de obgenanten Anthonius Oberomiza van synent wegen myt danckbarheit hefft\nwedder entfangen und den vorgemelten erbar radt, alle und gemene borger und inwaner\nund gantz keyserlike stadt Lubeck darvan genslich vorlaten und quitiret. Ock in synes\nprincipales sele geswaren, dar nummer wyder umme to sprekende, also dat de erbar radt\nund stadt Lubeck mydt eyner averleverrynge quid, fry, leddich und los wesen scholde und\nalles rechtes van synes hovetmans wegen und aller syner erven vorthygelt und renunctiert\nludes eynesc apenbaren instrumentes daraver gemaket, wor sodans is, inne wyder vorhalt\nund vorbreydet alles ane geferde und argelist. Dusse packe syden is ock in schipper Adrian\nJohansen hoyge geschepet gewesen.\n\nGescheen tho Lubeck nach des edes swerynge upper canzellarie und des packen\nentfanginge in Hinrick Cordes huse in bywesende und jegenwordicheit der erhafftygen\nmanner Laurens Willmes, Herman Moller und Gert Falcken besetenen borgers to Lubeck\nalse thugen hyrto intsunderged sampt und besunderen geescheet und geboden.\n\nIta est ut supra, quod ego Michael Petri publicus sacris apostolica\net imperiali auctoritatibus notarius ad premissa requisitus manu\npropria attestor.\n\n[III] Richgardus Plunthon\n\nAm jar 1534 in der soveden indiction midtwekens des ersten dages des mntes Aprylis\n[1 Apr. 1534] hebbe de erbare, vorsichtigen und wyse heren her Hermen Schute und Gotke\nEngelstede rathmanne to Lubeck uth bovele des erbaren rades darsulvest to Lubeck und in\nmynes apentliken notarien und undergeschrevenenen thugen hyrto sunderlix geeschet und\ngebeden jegenwordicheit dem erhafftygen manne Richgart Plunthon uth Engellandt und\ndes gemenen kopmans darsulvest, so he sede, secretarius und alse eyn fulmechtyger dusser\nnabeschrevenen guder und portzele to entfangende gemechtigett umme reverentia, gnade\nund gunst des durchluchtigesten, grothmechtigesten, hochgebornen fursten und heren heren\n\n\n1 75\n\nHinrickes coningen to Engellandt etc. avergelevert, vorreket und wedder averanthwordtet,\nwelcker ock forth de obgenanten Richgart Plunthon alse eyn fulmechtiger und bevelhebber\ndes kopmans in Engelandt in syne were wedder hefft angenamen und entfangen. Dusse\nnabeschreven guder und portzele weren dorch der Lupeschen vorordenthen in dem\nHollander cryge in vorgangen jar upper apenbar see, idoch buten des erbaren rades tho\nLubeck bevele angenamen und sint in schipper Adrian Johansen hoyge geschepet geweset.\n\nIta est ut supra, [quod ego] Michael Petri notarius ad premissa\nrequisitus manu propria scripsit.\n\nDe obgenanten vorordenthen heren des rades alhyr to desser wedderleverynge sint\nbereith und erbodich gewesen, alse dusse nabeschrevenen packen Richgart Plunthon, so\nhe dar wan to hebben mochte, to apenen etc., welcker Richgart tor noge wedder entfangen\nhefft und ane apenynge darmit wol gef[r]edigeet gewesett.\n\nIta est, [quod] ego idem Michael Petri, qui supra notarius ad premissa\nrequisitus attestor manu propria.\n\n[1.]  Thom ersten eyn grote packe hebben se Richgart Plunthon gelevert und welcker\nhe van den obgenanten heren entfangen hefft. Dar was inne 58 stucke sagen gemarket\naldus [merchant’s mark no. 2 in the left margin] und kostet £96 1s Vlames und hort to Johan\nWestborre.\n[2.]\nItem so hebben noch de heren Richgart Plunthon gelevert und welck he entfangen\nhefft 1 grote packe arsch darinne 70 stucke. Kosten in all £136 5s Vlams aldus gemarket\n[merchant’s mark no. 3 in the left margin] und hort to Rubbert Meredi.\n[3.]\nItem noch Richgart gelevert und welcker he entfangen hefft eyn groth droge cramfaet.\nDar weren inne vele clene porzele gemarket aldus [merchant’s mark no. 4 in the left margin]\nund hort to Johan Eduwarth und staen to samende £39 Vlames.\nItem noch hebben se Richgart gelevert und welcke he entfangen hefft eyne clene\n[4.]\nkyste. Dar was inne 16 bunt sipperkost. Hort to Johan Gerholt. Gemarket aldus [merchant’s\nmark no. 5 in the left margin] und staet £54 sterlynges.\n[5.]  Noch hefft Richgart entfangen 2 packen. Hyrinne 4 balen sardokes. Horen to\nRichgart Wilsun. Gemarket aldus [merchant’s mark no. 6 in the left margin] und staen £86\nVlames.\n[6.]\nItem noch hefft Richgart entfangen, welcker em de heren gelevert hebben, eyn bale.\nDar was inne 38 stucke sagen und hort to Johan Practor gemarket aldus [merchant’s mark\nno. 7 in the left margin]. Kostet myt allem ungelde £62 19s 4d Vlames.\n[7.]\nItem noch hebben de heren Richgart Plunthon gelevert und welcker he entfangen\nhefft eyn packe. Hort to Hinrick Augustyn, darinne 68 stucke Hollandesch louwent\ngemarket aldus [merchant’s mark no. 8 in the left margin]. Kostet £89 15s 2d Vlames.\nItem noch hefft Richgart van den obgnanten heren entfangen eyn bale. Hort to\n[8.]\nWilhelm Lock. Dar was inne 65 stucke kammelottes, darunder 50 tannete und 15 swarte,\ngemarket aldus [merchant’s mark no. 9 in the left margin] und kosten £84 10s.\n[9.]\nno. 10 in the left margin]. Horen to Wilhelm Colsen. Kosten £6 Vlames.\n\nItem noch em avergelevert 2 clene tunnen stors gemarket aldus [merchant’s mark\n\n\n[10.]\nItem noch hebben de heren Richgart Plunthon wedder avergelevert 3 clene tunne\nstors. Horen to Wilhelm Grosshen van twygerleyge marke vormarket aldus [merchant’s\nmark no. 11 and 11a in the left margin].\nItem noch hefft Richgart van den heren entfangen 2 ruge bslagene kysten van\n[11.]\nledder. Darinne etlike cleider und breve. Wert to samende geschattet up £30 sterlinges.\nUngemarket. Horen to Anthonio Serene.\n[12.]\nItem noch hebben de heren Richgart Plunthon wedder gelevert 2 swarte bslagene\nkysten. Und ward geapent und fulgefunden, so se naesen scholden, also dat Richgart se to\nfuller noge wedder entfangen hefft. Und horden tho Rubbert Laurens van Lunden. Und\ndar by gelevert 2 myssenge emmer. Duth to hope geschattet ungeferlich up £17 grote und\n7s 8d Vlames. Gemarket aldus [merchant’s marks no. 12 and 13 in the left margin].\nItem noch hefft Rechgart Plunthon van den heren wedder entfangen, und welcker\n[13.]\nem gelevert is, 4 secke pepers gemarket aldus [merchant’s mark no. 14 in the left margin]\nund welcker hort und geschepet hefft Richgart Außborne und hebben gewagen 891 punt.\nDat punt kostet 2s 3d Vlames. Is £100 2s 3d Vlames.\n[14.]\nItem noch hebben de heren Richgart wedder gelevert und voranthwordet eyn sack\ngarns, welcker tohort und geschepet hefft Hinrick Beger. Dusse sacke hefft gewugen 530\npunt. Dat punt kostet 9d Vlames und is vormarket aldus [merchant’s mark no. 15 in the left\nmargin]. Summa is to hope £19 17s 5d Vlames.\n[15.]\nItem noch hefft Richgart van den heren entfangen, und welcker em gelevert is, eyn\nbale pepers, darinne 3 secke pepers. Wagen in all 751 punt, 12 untzen und hort Nicolaus\nTisborne und was gemarket aldus [merchant’s mark no. 16 in the left margin].\nItem noch hebben de heren Richgart Plunthon wedder avergelevert, und welckes he\n[16.]\nentfangen hefft, eyn halve tunne bereven myt kannefast, welcker tobehort und geschepet\nhefft Eduwartus Mortson, gemarket aldus [merchant’s mark no. 17 in the left margin] und\nhyr was inne 42½ punt muscaten blomen.\nItem noch hebben de heren Richgart Plunthon gelevert eyn kleyn packschen myt\n[17.]\nknechte clederen gemarket aldus [merchant’s mark no. 18 in the left margin] und welcker\nhe entfangen hefft.\n[18.]\nItem noch hebben de heren Richgart gelevert und voranthwordet 3 secke hennepes\ngemarket aldus [merchant’s mark no. 19 in the left margin], de thohort und schepet hefft\nRubbert Reyneholt. Item em ock darby gelevert 5 bunt ketelhenge offte ketelbande.\n[19.]\nItem noch hebben se Richgart gelevert und voranthwordet 4 halve balen Olmer\nsardock, de horen to Wilhelm Bateman, gemarket aldus [merchant’s mark no. 20 in the left\nmargin] und in idelyker bale 25 halve stucke. Summa £51 Vlames.\n[20.]\nItem noch hefft Richgart van den heren entfangen, welcker se em gelevert hebben,\nund dat thohort und geschepet hefft Wilhelm Meri eyn sack cannels wecht 36 punt. Kostet\netlick punt 6s 4d. Geslagen in 2 swarte rocke van frese gemaket. Kostet 12s grote und was\nin eyner tunnen ungemarket.\n[21.]\nItem noch hefft Richgart Plunthon van den heren wedder entfangen, und welck se\nem gelevert hebben, 7 stucke kannefast und 1 clene tunne garne. Item eyn cleynen bundel\nmyt roth steen und eyn cleyne sack myt bladen, welcker tohort Rubbert Den, gemarket\naldus [merchant’s mark no. 21 in the left margin].\n[22.]\nItem de heren hebben Richgart noch gelevert, welck he entfangen hefft, eyn groth\ndroge cramfaet. Darinne was cramwerck, welcker tohort und geschepet hefft Thomas\n\n\n1 7 7\n\nItem noch hefft Richgart Plunthon van den heren entfangen eyn bedde, twe kysten\n\nItem noch hefft Richgart van den heren entfangen eynen ledderen watsack myt\n\nItem noch hefft Richgart van den heren entfangen eyn mans rock. Hort to Augustin\n\nDystfelt. Vormerket aldus [merchant’s mark no. 22 in the left margin]. Und kostet in all £89\n8d Flames.\n[23.]\nclederen ungemarket und hort tho Raff Warynthun.\n[24.]\nItem noch hebben de heren Richgart Plunthon avergelevert und voranthwordet\neyn pascheens, darinne dre bunt sickelthun, eyn grote Vlamesche deken. Item elck foder.\nItem eyn roden frouwen rock. Duth alle hort to der fruwen Thomas Bruns.\n[25.]\nHindt.\n[26.]\nund eyn conferken. Hort ock to d
